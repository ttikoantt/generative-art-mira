<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starry Sky Timelapse - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.7;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info" id="info"></div>

    <button class="fullscreen-btn" id="fullscreen">⛶ Fullscreen</button>

    <div class="controls">
        <button id="pause">⏸ Pause</button>
        <button id="regenerate">🔄 New Sky</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let stars = [];
        let shootingStars = [];
        let time = 0;
        let isPaused = false;
        let animationId;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function initStars() {
            stars = [];
            const numStars = Math.floor((width * height) / 3000);

            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 2 + 0.5,
                    brightness: Math.random(),
                    twinkleSpeed: Math.random() * 0.02 + 0.01,
                    angle: Math.random() * Math.PI * 2,
                    orbitSpeed: (Math.random() - 0.5) * 0.0001,
                    orbitRadius: Math.random() * 100
                });
            }
        }

        function createShootingStar() {
            const startX = Math.random() * width;
            const startY = Math.random() * height * 0.5;

            shootingStars.push({
                x: startX,
                y: startY,
                vx: (Math.random() - 0.3) * 15,
                vy: Math.random() * 10 + 5,
                life: 1,
                trail: []
            });
        }

        function drawSky() {
            // Night sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#000011');
            gradient.addColorStop(0.5, '#001133');
            gradient.addColorStop(1, '#002255');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Milky Way effect
            ctx.save();
            ctx.globalAlpha = 0.1;
            const milkyWayGradient = ctx.createLinearGradient(0, 0, width, height);
            milkyWayGradient.addColorStop(0, 'transparent');
            milkyWayGradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.1)');
            milkyWayGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = milkyWayGradient;
            ctx.fillRect(0, 0, width, height);
            ctx.restore();
        }

        function drawStars() {
            const centerX = width / 2;
            const centerY = height / 2;

            stars.forEach(star => {
                // Update twinkle
                star.brightness += Math.sin(time * star.twinkleSpeed) * 0.01;
                star.brightness = Math.max(0.3, Math.min(1, star.brightness));

                // Orbit movement
                star.angle += star.orbitSpeed;

                // Calculate position with subtle orbit
                const x = star.x + Math.cos(star.angle) * star.orbitRadius;
                const y = star.y + Math.sin(star.angle) * star.orbitRadius * 0.5;

                // Draw star
                ctx.save();
                ctx.globalAlpha = star.brightness;

                // Glow effect
                const glowGradient = ctx.createRadialGradient(x, y, 0, x, y, star.radius * 3);
                glowGradient.addColorStop(0, `rgba(255, 255, 255, ${star.brightness})`);
                glowGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.arc(x, y, star.radius * 3, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                ctx.beginPath();
                ctx.arc(x, y, star.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            });
        }

        function drawShootingStars() {
            shootingStars = shootingStars.filter(ss => ss.life > 0);

            shootingStars.forEach(ss => {
                // Update trail
                ss.trail.push({ x: ss.x, y: ss.y });
                if (ss.trail.length > 20) ss.trail.shift();

                // Draw trail
                ctx.save();
                ctx.strokeStyle = `rgba(255, 255, 255, ${ss.life})`;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';

                if (ss.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(ss.trail[0].x, ss.trail[0].y);

                    for (let i = 1; i < ss.trail.length; i++) {
                        const alpha = i / ss.trail.length;
                        ctx.globalAlpha = alpha * ss.life;
                        ctx.lineTo(ss.trail[i].x, ss.trail[i].y);
                    }

                    ctx.stroke();
                }

                ctx.restore();

                // Update position
                ss.x += ss.vx;
                ss.y += ss.vy;
                ss.life -= 0.02;
            });
        }

        function updateInfo() {
            document.getElementById('info').innerHTML = `
                Time: ${Math.floor(time / 60)}:${String(Math.floor(time % 60)).padStart(2, '0')}
                <br>Stars: ${stars.length}
            `;
        }

        function animate() {
            if (!isPaused) {
                drawSky();
                drawStars();
                drawShootingStars();
                updateInfo();
                time++;

                // Random shooting star
                if (Math.random() < 0.01) {
                    createShootingStar();
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        // Event Listeners
        document.getElementById('pause').addEventListener('click', function() {
            isPaused = !isPaused;
            this.textContent = isPaused ? '▶ Play' : '⏸ Pause';
        });

        document.getElementById('regenerate').addEventListener('click', function() {
            time = 0;
            shootingStars = [];
            initStars();
        });

        document.getElementById('fullscreen').addEventListener('click', function() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
                this.textContent = '⛶ Fullscreen';
            } else {
                document.documentElement.requestFullscreen();
                this.textContent = '⛶ Exit';
            }
        });

        // Touch support
        let touchStartX, touchStartY;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;

            // Swipe to create shooting star
            if (Math.abs(dx) > 50 || Math.abs(dy) > 50) {
                shootingStars.push({
                    x: touchStartX,
                    y: touchStartY,
                    vx: dx * 0.1,
                    vy: dy * 0.1,
                    life: 1,
                    trail: []
                });
            }
        });

        // Initialize
        window.addEventListener('resize', () => {
            resize();
            initStars();
        });

        resize();
        initStars();
        animate();
    </script>
</body>
</html>
