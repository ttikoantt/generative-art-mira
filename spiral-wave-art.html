<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Wave Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        h1 {
            margin: 20px 0;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .canvas-container {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
        }

        canvas {
            display: block;
            background: #000;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-width: 800px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <h1>🌀 Spiral Wave Art</h1>

    <div class="canvas-container">
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Waves:</label>
            <input type="range" id="waveCount" min="3" max="20" value="8">
            <span id="waveCountValue">8</span>
        </div>

        <div class="control-group">
            <label>Speed:</label>
            <input type="range" id="speed" min="1" max="10" value="3">
            <span id="speedValue">3</span>
        </div>

        <div class="control-group">
            <label>Spread:</label>
            <input type="range" id="spread" min="1" max="10" value="5">
            <span id="spreadValue">5</span>
        </div>

        <button onclick="randomize()">🎲 Randomize</button>
        <button onclick="togglePause()">⏯ Pause</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let centerX, centerY;
        let time = 0;
        let paused = false;

        // Parameters
        let waveCount = 8;
        let speed = 3;
        let spread = 5;

        // Initialize
        function init() {
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
            resizeCanvas();
        }

        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 200, 800);
            canvas.width = size;
            canvas.height = size;
            centerX = size / 2;
            centerY = size / 2;
        }

        // Color palette
        function getColor(t, i) {
            const hue = (t * 20 + i * (360 / waveCount)) % 360;
            return `hsl(${hue}, 80%, 60%)`;
        }

        // Draw spiral wave
        function drawSpiralWave(time, waveIndex) {
            const points = 500;
            const amplitude = 30 + waveIndex * 5;

            ctx.beginPath();
            ctx.strokeStyle = getColor(time, waveIndex);
            ctx.lineWidth = 2;

            for (let i = 0; i < points; i++) {
                const angle = (i / points) * Math.PI * 2 * spread;
                const radius = (i / points) * (canvas.width / 2 - 50);

                // Add wave motion
                const waveOffset = Math.sin(angle * 3 + time * speed + waveIndex) * amplitude * (i / points);

                const x = centerX + Math.cos(angle + time * 0.5 + waveIndex * 0.3) * (radius + waveOffset);
                const y = centerY + Math.sin(angle + time * 0.5 + waveIndex * 0.3) * (radius + waveOffset);

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();
        }

        // Draw center glow
        function drawCenterGlow() {
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100);
            gradient.addColorStop(0, `rgba(255, 255, 255, 0.3)`);
            gradient.addColorStop(0.5, `rgba(138, 43, 226, 0.1)`);
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Main animation loop
        function animate() {
            // Clear with fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center glow
            drawCenterGlow();

            // Draw all waves
            for (let i = 0; i < waveCount; i++) {
                drawSpiralWave(time, i);
            }

            if (!paused) {
                time += 0.016;
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        document.getElementById('waveCount').addEventListener('input', (e) => {
            waveCount = parseInt(e.target.value);
            document.getElementById('waveCountValue').textContent = waveCount;
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseInt(e.target.value);
            document.getElementById('speedValue').textContent = speed;
        });

        document.getElementById('spread').addEventListener('input', (e) => {
            spread = parseInt(e.target.value);
            document.getElementById('spreadValue').textContent = spread;
        });

        function randomize() {
            waveCount = Math.floor(Math.random() * 15) + 5;
            speed = Math.floor(Math.random() * 8) + 1;
            spread = Math.floor(Math.random() * 8) + 2;

            document.getElementById('waveCount').value = waveCount;
            document.getElementById('waveCountValue').textContent = waveCount;
            document.getElementById('speed').value = speed;
            document.getElementById('speedValue').textContent = speed;
            document.getElementById('spread').value = spread;
            document.getElementById('spreadValue').textContent = spread;
        }

        function togglePause() {
            paused = !paused;
            document.querySelector('button[onclick="togglePause()"]').textContent = paused ? '▶ Play' : '⏯ Pause';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resizeCanvas);

        // Start
        init();
        animate();
    </script>
</body>
</html>
