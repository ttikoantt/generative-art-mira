<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dawn Chorus Visualizer - 夜明けの合唱視覚化装置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a0a2a);
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, sans-serif;
        }
        canvas {
            display: block;
        }
        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 220, 200, 0.5);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-size: clamp(0.9rem, 3vw, 1.1rem);
        }
        .time-display {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 200, 150, 0.4);
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="info">夜明けの合唱視覚化装置 - クリック/タップでさえずりを生成</div>
    <div class="time-display" id="timeDisplay">5:02 AM - Dawn Approaching</div>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const timeDisplay = document.getElementById('timeDisplay');
        let width, height;
        let mouseX = 0, mouseY = 0;
        let startTime = Date.now();
        let waves = [];
        let particles = [];

        // 早朝のカラーパレット
        const dawnColors = [
            { h: 260, s: 60, l: 30 },  // 薄紫
            { h: 280, s: 50, l: 35 },  // 紫
            { h: 300, s: 40, l: 40 },  // ピンク紫
            { h: 320, s: 50, l: 45 },  // ピンク
            { h: 340, s: 60, l: 50 },  // 薄いピンク
            { h: 20, s: 70, l: 55 },   // オレンジの始まり
            { h: 30, s: 65, l: 50 },   // ゴールデン
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // さえずりの波
        class ChorusWave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.startTime = Date.now();
                this.maxRadius = Math.random() * 300 + 200;
                this.speed = Math.random() * 1.5 + 0.8;
                this.color = dawnColors[Math.floor(Math.random() * dawnColors.length)];
                this.frequency = Math.random() * 3 + 2;
                this.amplitude = Math.random() * 20 + 10;
                this.phase = Math.random() * Math.PI * 2;
                this.lineWidth = Math.random() * 3 + 1;
                this.life = 1;
                this.decay = Math.random() * 0.003 + 0.001;
            }

            update() {
                const elapsed = Date.now() - this.startTime;
                this.radius = elapsed * this.speed * 0.1;
                this.life -= this.decay;
                return this.life > 0 && this.radius < this.maxRadius;
            }

            draw() {
                if (this.radius <= 0) return;

                const alpha = this.life * 0.6;
                ctx.strokeStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, ${alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.lineCap = 'round';

                // 複数の波を描画（干渉パターン）
                for (let i = 0; i < 3; i++) {
                    const offsetRadius = this.radius + i * 8;
                    ctx.beginPath();
                    
                    // 波の歪み（さえずりのリズム）
                    for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                        const waveOffset = Math.sin(angle * this.frequency + this.phase + this.radius * 0.02) * this.amplitude * (1 - this.radius / this.maxRadius);
                        const r = offsetRadius + waveOffset;
                        const x = this.x + Math.cos(angle) * r;
                        const y = this.y + Math.sin(angle) * r;
                        
                        if (angle === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.closePath();
                    ctx.stroke();
                }

                // 中心の光
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 0.3);
                gradient.addColorStop(0, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l + 20}%, ${this.life * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 光の粒子
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 0.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 3 + 1;
                this.color = dawnColors[Math.floor(Math.random() * dawnColors.length)];
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.005;
                this.twinkle = Math.random() * Math.PI * 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vy += 0.02; // 軽い重力
                this.life -= this.decay;
                this.twinkle += 0.1;
                return this.life > 0;
            }

            draw() {
                const alpha = this.life * (0.5 + Math.sin(this.twinkle) * 0.3);
                ctx.fillStyle = `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // グロー
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 3);
                gradient.addColorStop(0, `hsla(${this.color.h}, ${this.color.s}%, ${this.color.l}%, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 背景グラデーション（時間経過で変化）
        function drawBackground() {
            const elapsed = (Date.now() - startTime) / 1000;
            const progress = Math.min(elapsed / 300, 1); // 5分で完全な朝へ

            const topH = 260 + progress * 20; // 260 -> 280
            const topS = 30 + progress * 20;  // 30 -> 50
            const topL = 5 + progress * 15;   // 5 -> 20

            const bottomH = 280 + progress * 40; // 280 -> 320
            const bottomS = 40 + progress * 20;  // 40 -> 60
            const bottomL = 10 + progress * 25;  // 10 -> 35

            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, `hsl(${topH}, ${topS}%, ${topL}%)`);
            gradient.addColorStop(1, `hsl(${bottomH}, ${bottomS}%, ${bottomL}%)`);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 星（時間経過で消える）
            const starAlpha = Math.max(0, 0.5 - progress * 0.5);
            if (starAlpha > 0 && Math.random() < 0.3) {
                ctx.fillStyle = `rgba(255, 255, 255, ${starAlpha * 0.3})`;
                const x = Math.random() * width;
                const y = Math.random() * height * 0.6;
                ctx.beginPath();
                ctx.arc(x, y, Math.random() * 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // 時間表示を更新
            const hours = 5 + Math.floor(progress);
            const mins = Math.floor((elapsed % 60));
            const timeStr = `${hours}:${mins.toString().padStart(2, '0')} AM`;
            const phase = progress < 0.2 ? 'Dawn Approaching' : 
                         progress < 0.5 ? 'First Light' :
                         progress < 0.8 ? 'Sunrise Soon' : 'Morning Has Broken';
            timeDisplay.textContent = `${timeStr} - ${phase}`;
        }

        // アニメーションループ
        function animate() {
            // 背景をクリア（トレイル効果なし）
            drawBackground();

            // 波を更新
            waves = waves.filter(wave => {
                const alive = wave.update();
                if (alive) wave.draw();
                return alive;
            });

            // 粒子を更新
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });

            // 波同士の干渉（視覚的強調）
            ctx.globalCompositeOperation = 'lighter';
            waves.forEach((wave, i) => {
                waves.forEach((other, j) => {
                    if (i < j) {
                        const dx = wave.x - other.x;
                        const dy = wave.y - other.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 200 && dist > Math.abs(wave.radius - other.radius)) {
                            const midX = (wave.x + other.x) / 2;
                            const midY = (wave.y + other.y) / 2;
                            const gradient = ctx.createRadialGradient(midX, midY, 0, midX, midY, 50);
                            const alpha = (1 - dist / 200) * wave.life * other.life * 0.3;
                            gradient.addColorStop(0, `hsla(${wave.color.h}, 80%, 60%, ${alpha})`);
                            gradient.addColorStop(1, 'transparent');
                            ctx.fillStyle = gradient;
                            ctx.beginPath();
                            ctx.arc(midX, midY, 50, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                });
            });
            ctx.globalCompositeOperation = 'source-over';

            requestAnimationFrame(animate);
        }

        // イベントハンドラー
        canvas.addEventListener('mousedown', (e) => {
            for (let i = 0; i < 3; i++) {
                waves.push(new ChorusWave(e.clientX, e.clientY));
            }
            for (let i = 0; i < 15; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                for (let i = 0; i < 3; i++) {
                    waves.push(new ChorusWave(touch.clientX, touch.clientY));
                }
                for (let i = 0; i < 15; i++) {
                    particles.push(new Particle(touch.clientX, touch.clientY));
                }
            }
        });

        // 自動的にさえずりを生成（早朝の鳥たち）
        setInterval(() => {
            if (Math.random() < 0.3) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                waves.push(new ChorusWave(x, y));
                for (let i = 0; i < 8; i++) {
                    particles.push(new Particle(x, y));
                }
            }
        }, 2000);

        animate();
    </script>
</body>
</html>
