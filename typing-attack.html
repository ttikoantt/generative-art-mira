<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Typing Attack ⌨️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a3e 50%, #0a0a1e 100%);
            min-height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .game-ui {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 2px solid #00ff88;
        }

        .game-ui .stats {
            display: flex;
            gap: 20px;
            font-size: 16px;
        }

        .game-ui .stats .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-ui .stats .stat-label {
            font-size: 11px;
            color: #888;
            margin-bottom: 2px;
        }

        .game-ui .stats .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #00ff88;
        }

        .game-ui .lives {
            display: flex;
            gap: 5px;
        }

        .game-ui .lives .life {
            font-size: 24px;
        }

        .game-ui .lives .life.lost {
            opacity: 0.2;
        }

        .game-ui .level {
            text-align: center;
        }

        .game-ui .level-label {
            font-size: 11px;
            color: #888;
        }

        .game-ui .level-value {
            font-size: 24px;
            font-weight: bold;
            color: #ffaa00;
        }

        .controls {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #00ff88;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group label {
            display: block;
            margin-bottom: 3px;
            font-size: 11px;
            color: #aaa;
        }

        .control-group select {
            width: 100%;
            padding: 6px;
            border-radius: 5px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .control-group select option {
            background: #1a1a3e;
        }

        .fullscreen-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #000;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .fullscreen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            flex-direction: column;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-content {
            text-align: center;
            color: white;
        }

        .overlay-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        .overlay-content h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ff4444;
        }

        .overlay-content p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #aaa;
        }

        .overlay-content .stats {
            margin-bottom: 30px;
            font-size: 24px;
        }

        .overlay-content button {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .overlay-content button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.5);
        }

        .current-word {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #00ff88;
            color: white;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .current-word .typed {
            color: #00ff88;
        }

        .current-word .remaining {
            color: #666;
        }

        @media (max-width: 768px) {
            .game-ui {
                flex-wrap: wrap;
                font-size: 12px;
            }

            .game-ui .stats {
                gap: 10px;
            }

            .controls {
                top: auto;
                bottom: 80px;
                right: 10px;
                left: 10px;
                font-size: 11px;
            }

            .overlay-content h1 {
                font-size: 32px;
            }

            .overlay-content h2 {
                font-size: 24px;
            }

            .current-word {
                font-size: 18px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="game-ui">
        <div class="stats">
            <div class="stat">
                <div class="stat-label">SCORE</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">COMBO</div>
                <div class="stat-value" id="combo">x1</div>
            </div>
            <div class="stat">
                <div class="stat-label">ACCURACY</div>
                <div class="stat-value" id="accuracy">100%</div>
            </div>
        </div>

        <div class="level">
            <div class="level-label">LEVEL</div>
            <div class="level-value" id="level">1</div>
        </div>

        <div class="lives" id="lives">
            <span class="life">❤️</span>
            <span class="life">❤️</span>
            <span class="life">❤️</span>
        </div>
    </div>

    <div class="controls">
        <h3>⚙️ Settings</h3>
        <div class="control-group">
            <label>Language</label>
            <select id="language">
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>
        </div>
        <div class="control-group">
            <label>Difficulty</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <button class="fullscreen-btn" id="fullscreenBtn">🖥️ Fullscreen</button>
    </div>

    <div class="current-word">
        <span id="typedWord" class="typed"></span><span id="remainingWord" class="remaining">Type to start...</span>
    </div>

    <div class="overlay" id="startOverlay">
        <div class="overlay-content">
            <h1>⌨️ Typing Attack</h1>
            <p>Type the falling words before they hit the ground!</p>
            <button id="startBtn">▶️ Start Game</button>
        </div>
    </div>

    <div class="overlay hidden" id="gameOverOverlay">
        <div class="overlay-content">
            <h2>💀 Game Over!</h2>
            <div class="stats">
                <div>Final Score: <span id="finalScore">0</span></div>
                <div>Level Reached: <span id="finalLevel">1</span></div>
                <div>Max Combo: <span id="finalCombo">0</span></div>
            </div>
            <button id="restartBtn">🔄 Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Word lists
        const wordLists = {
            en: {
                easy: ['cat', 'dog', 'sun', 'run', 'jump', 'play', 'blue', 'red', 'green', 'tree', 'book', 'moon', 'star', 'water', 'fire', 'wind', 'earth', 'love', 'hope', 'dream'],
                normal: ['attack', 'defend', 'battle', 'victory', 'strength', 'warrior', 'mission', 'tactical', 'strategy', 'command', 'explore', 'adventure', 'challenge', 'triumph', 'courage'],
                hard: ['phenomenon', 'extraordinary', 'spectacular', 'magnificent', 'extraordinary', 'breathtaking', 'unbelievable', 'incredible', 'impossible', 'revolutionary', 'transformative', 'exceptional']
            },
            ja: {
                easy: ['あめ', 'かぜ', 'ひかり', 'やま', 'かわ', 'そら', 'ほし', 'つき', 'ひ', 'みず', 'き', 'はな', 'ねこ', 'いぬ', 'とり', 'さかな', 'むし', 'くも', 'ゆき', 'あめ'],
                normal: ['あたたかい', 'すずしい', 'うつくしい', 'たのしい', 'おもしろい', 'いきいき', 'しぜん', 'かがやき', 'おおぞら', 'せかい', 'みらい', 'ゆめ', 'きぼう', 'あい', 'やさしさ'],
                hard: ['げんじつ', 'きぼう', 'かんがえる', 'つづける', 'まなぶ', 'わかれる', 'はじめる', 'いきる', 'うまれる', 'かける', 'おわる', 'すすむ', 'かえる', 'であう', 'はなす']
            }
        };

        // Game state
        let gameState = {
            isRunning: false,
            score: 0,
            lives: 3,
            level: 1,
            combo: 1,
            maxCombo: 1,
            accuracy: 100,
            totalTyped: 0,
            correctTyped: 0,
            currentWord: null,
            typedCharacters: '',
            fallingWords: [],
            spawnTimer: 0,
            spawnInterval: 150,
            settings: {
                language: 'en',
                difficulty: 'normal'
            }
        };

        class FallingWord {
            constructor(word) {
                this.word = word;
                this.x = Math.random() * (canvas.width - 200) + 100;
                this.y = -30;
                this.speed = 1 + gameState.level * 0.2 + Math.random() * 0.5;
                this.color = `hsl(${Math.random() * 60 + 120}, 70%, 50%)`;
                this.size = 20 + Math.random() * 8;
            }

            update() {
                this.y += this.speed;
                return this.y > canvas.height;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size}px 'Courier New', monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // Glow effect
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fillText(this.word, this.x, this.y);
                ctx.restore();
            }
        }

        function spawnWord() {
            const wordList = wordLists[gameState.settings.language][gameState.settings.difficulty];
            const word = wordList[Math.floor(Math.random() * wordList.length)];
            gameState.fallingWords.push(new FallingWord(word));
        }

        function selectWord(word) {
            gameState.currentWord = word;
            gameState.typedCharacters = '';
            updateCurrentWordDisplay();
        }

        function updateCurrentWordDisplay() {
            const typedEl = document.getElementById('typedWord');
            const remainingEl = document.getElementById('remainingWord');

            if (gameState.currentWord) {
                const typed = gameState.currentWord.substring(0, gameState.typedCharacters.length);
                const remaining = gameState.currentWord.substring(gameState.typedCharacters.length);

                typedEl.textContent = typed;
                remainingEl.textContent = remaining;

                // Color feedback
                if (typed === gameState.currentWord) {
                    typedEl.style.color = '#00ff88';
                } else if (typed !== gameState.typedCharacters) {
                    typedEl.style.color = '#ff4444';
                } else {
                    typedEl.style.color = '#00ff88';
                }
            } else {
                typedEl.textContent = '';
                remainingEl.textContent = 'Type the first letter...';
            }
        }

        function handleKeyPress(e) {
            if (!gameState.isRunning) return;

            const key = e.key.toLowerCase();

            // Japanese input handling
            if (gameState.settings.language === 'ja') {
                if (gameState.currentWord) {
                    gameState.typedCharacters += key;
                    gameState.totalTyped++;

                    if (gameState.currentWord.startsWith(gameState.typedCharacters)) {
                        gameState.correctTyped++;
                        if (gameState.typedCharacters === gameState.currentWord) {
                            // Word completed!
                            const points = gameState.currentWord.length * 10 * gameState.combo;
                            gameState.score += points;
                            gameState.combo = Math.min(gameState.combo + 1, 10);
                            gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);

                            // Remove word
                            gameState.fallingWords = gameState.fallingWords.filter(w => w !== gameState.currentWord);
                            gameState.currentWord = null;
                            gameState.typedCharacters = '';

                            // Level up check
                            if (gameState.score >= gameState.level * 500) {
                                gameState.level++;
                                gameState.spawnInterval = Math.max(50, 150 - gameState.level * 10);
                            }
                        }
                    } else {
                        // Wrong character
                        gameState.combo = 1;
                        gameState.typedCharacters = '';
                    }

                    updateAccuracy();
                    updateCurrentWordDisplay();
                    updateUI();
                } else {
                    // Try to find a word that starts with this character
                    const matchingWord = gameState.fallingWords.find(w =>
                        w.word.toLowerCase().startsWith(key)
                    );

                    if (matchingWord) {
                        selectWord(matchingWord);
                        gameState.typedCharacters = key;
                        gameState.totalTyped++;
                        gameState.correctTyped++;
                        updateAccuracy();
                        updateCurrentWordDisplay();
                    }
                }
            } else {
                // English input
                if (!gameState.currentWord) {
                    // Try to find a word that starts with this character
                    const matchingWord = gameState.fallingWords.find(w =>
                        w.word.toLowerCase().startsWith(key)
                    );

                    if (matchingWord) {
                        selectWord(matchingWord);
                        gameState.typedCharacters = key;
                        gameState.totalTyped++;
                        gameState.correctTyped++;
                        updateAccuracy();
                        updateCurrentWordDisplay();
                    }
                } else {
                    const expectedChar = gameState.currentWord[gameState.typedCharacters.length].toLowerCase();

                    if (key === expectedChar) {
                        gameState.typedCharacters += key;
                        gameState.totalTyped++;
                        gameState.correctTyped++;

                        if (gameState.typedCharacters === gameState.currentWord) {
                            // Word completed!
                            const points = gameState.currentWord.length * 10 * gameState.combo;
                            gameState.score += points;
                            gameState.combo = Math.min(gameState.combo + 1, 10);
                            gameState.maxCombo = Math.max(gameState.maxCombo, gameState.combo);

                            // Remove word
                            gameState.fallingWords = gameState.fallingWords.filter(w => w !== gameState.currentWord);
                            gameState.currentWord = null;
                            gameState.typedCharacters = '';

                            // Level up check
                            if (gameState.score >= gameState.level * 500) {
                                gameState.level++;
                                gameState.spawnInterval = Math.max(50, 150 - gameState.level * 10);
                            }
                        }

                        updateAccuracy();
                        updateCurrentWordDisplay();
                        updateUI();
                    } else {
                        // Wrong character
                        gameState.totalTyped++;
                        gameState.combo = 1;
                        updateAccuracy();
                        updateUI();
                    }
                }
            }
        }

        function updateAccuracy() {
            if (gameState.totalTyped > 0) {
                gameState.accuracy = Math.round((gameState.correctTyped / gameState.totalTyped) * 100);
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('combo').textContent = `x${gameState.combo}`;
            document.getElementById('accuracy').textContent = `${gameState.accuracy}%`;
            document.getElementById('level').textContent = gameState.level;

            // Update lives
            const livesContainer = document.getElementById('lives');
            livesContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const life = document.createElement('span');
                life.className = 'life' + (i >= gameState.lives ? ' lost' : '');
                life.textContent = '❤️';
                livesContainer.appendChild(life);
            }
        }

        function gameLoop() {
            if (!gameState.isRunning) return;

            // Clear canvas
            ctx.fillStyle = 'rgba(15, 15, 30, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Spawn words
            gameState.spawnTimer++;
            if (gameState.spawnTimer >= gameState.spawnInterval) {
                spawnWord();
                gameState.spawnTimer = 0;
            }

            // Update and draw falling words
            for (let i = gameState.fallingWords.length - 1; i >= 0; i--) {
                const word = gameState.fallingWords[i];
                if (word.update()) {
                    // Word hit the ground!
                    if (word === gameState.currentWord) {
                        gameState.currentWord = null;
                        gameState.typedCharacters = '';
                        updateCurrentWordDisplay();
                    }

                    gameState.fallingWords.splice(i, 1);
                    gameState.lives--;
                    gameState.combo = 1;

                    if (gameState.lives <= 0) {
                        gameOver();
                        return;
                    }

                    updateUI();
                } else {
                    word.draw();
                }
            }

            // Draw current word highlight
            if (gameState.currentWord) {
                const word = gameState.currentWord;
                ctx.save();
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = 20;
                ctx.strokeRect(word.x - 50, word.y - 20, 100, 40);
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            gameState = {
                isRunning: true,
                score: 0,
                lives: 3,
                level: 1,
                combo: 1,
                maxCombo: 1,
                accuracy: 100,
                totalTyped: 0,
                correctTyped: 0,
                currentWord: null,
                typedCharacters: '',
                fallingWords: [],
                spawnTimer: 0,
                spawnInterval: 150,
                settings: {
                    language: document.getElementById('language').value,
                    difficulty: document.getElementById('difficulty').value
                }
            };

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            updateUI();
            updateCurrentWordDisplay();
            gameLoop();
        }

        function gameOver() {
            gameState.isRunning = false;

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalLevel').textContent = gameState.level;
            document.getElementById('finalCombo').textContent = gameState.maxCombo;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // Event listeners
        document.addEventListener('keydown', handleKeyPress);

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Prevent default touch behavior
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            canvas.focus();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
