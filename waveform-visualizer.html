<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Waveform Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        canvas {
            background: #000;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            display: block;
            margin: 0 auto;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f260, #0575e6);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-tertiary {
            background: linear-gradient(135deg, #fa709a, #fee140);
            color: white;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .mode-indicator {
            color: #00ffcc;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 18px;
            }

            button {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">🔳 全画面</button>

    <div class="container">
        <h1>🎵 Interactive Waveform Visualizer</h1>
        <canvas id="visualizer"></canvas>
        <div class="mode-indicator" id="modeIndicator">Mode: Waveform</div>
        <div class="controls">
            <button class="btn-primary" id="startBtn">🎤 Start Mic</button>
            <button class="btn-secondary" id="modeBtn">🎨 Change Mode</button>
            <button class="btn-tertiary" id="colorBtn">🌈 Change Colors</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const modeBtn = document.getElementById('modeBtn');
        const colorBtn = document.getElementById('colorBtn');
        const modeIndicator = document.getElementById('modeIndicator');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let audioContext;
        let analyser;
        let dataArray;
        let bufferLength;
        let isRunning = false;
        let currentMode = 0;
        let colorScheme = 0;
        let mouseX = 0;
        let mouseY = 0;

        const modes = [
            { name: 'Waveform', draw: drawWaveform },
            { name: 'Frequency Bars', draw: drawFrequencyBars },
            { name: 'Circular', draw: drawCircular },
            { name: 'Particles', draw: drawParticles }
        ];

        const colorSchemes = [
            ['#00f260', '#0575e6', '#00d2ff'],
            ['#f093fb', '#f5576c', '#fa709a'],
            ['#fa709a', '#fee140', '#f9d423'],
            ['#a8edea', '#fed6e3', '#d299c2'],
            ['#667eea', '#764ba2', '#f093fb']
        ];

        function resizeCanvas() {
            const container = document.querySelector('.container');
            canvas.width = Math.min(window.innerWidth - 40, 1200);
            canvas.height = Math.min(window.innerHeight - 200, 500);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);

                bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isRunning = true;
                startBtn.textContent = '✅ Running';

                animate();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                alert('マイクへのアクセスが許可されていません');
            }
        }

        function drawWaveform() {
            analyser.getByteTimeDomainData(dataArray);

            const colors = colorSchemes[colorScheme];
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, colors[0]);
            gradient.addColorStop(0.5, colors[1]);
            gradient.addColorStop(1, colors[2]);

            ctx.lineWidth = 3;
            ctx.strokeStyle = gradient;
            ctx.beginPath();

            const sliceWidth = canvas.width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * canvas.height) / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.stroke();
        }

        function drawFrequencyBars() {
            analyser.getByteFrequencyData(dataArray);

            const colors = colorSchemes[colorScheme];
            const barWidth = (canvas.width / bufferLength) * 2.5;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height;

                const hue = (i / bufferLength) * 360 + (mouseX / canvas.width) * 60;
                ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;

                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }

        function drawCircular() {
            analyser.getByteFrequencyData(dataArray);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) * 0.5;

            const colors = colorSchemes[colorScheme];

            for (let i = 0; i < bufferLength; i++) {
                const angle = (i / bufferLength) * Math.PI * 2;
                const amplitude = (dataArray[i] / 255) * radius;

                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + amplitude);
                const y2 = centerY + Math.sin(angle) * (radius + amplitude);

                const hue = (i / bufferLength) * 360 + (mouseX / canvas.width) * 60;
                ctx.strokeStyle = `hsl(${hue}, 70%, 50%)`;
                ctx.lineWidth = 2;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        let particles = [];

        function drawParticles() {
            analyser.getByteFrequencyData(dataArray);

            const avgFreq = dataArray.reduce((a, b) => a + b, 0) / bufferLength;

            // 新しいパーティクルを追加
            if (particles.length < 200) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height,
                    size: Math.random() * 5 + 2,
                    speedY: Math.random() * 2 + 1,
                    color: colorSchemes[colorScheme][Math.floor(Math.random() * 3)]
                });
            }

            // パーティクルを更新して描画
            particles = particles.filter(p => {
                p.y -= p.speedY + (avgFreq / 50);
                p.size += 0.02;

                if (p.y < 0) return false;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = 0.7;
                ctx.fill();
                ctx.globalAlpha = 1;

                return true;
            });
        }

        function animate() {
            if (!isRunning) return;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            modes[currentMode].draw();

            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', startAudio);

        modeBtn.addEventListener('click', () => {
            currentMode = (currentMode + 1) % modes.length;
            modeIndicator.textContent = `Mode: ${modes[currentMode].name}`;
        });

        colorBtn.addEventListener('click', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                canvas.requestFullscreen();
            }
        });

        // 初期画面
        function drawInitialScreen() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const colors = colorSchemes[0];
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, colors[0]);
            gradient.addColorStop(0.5, colors[1]);
            gradient.addColorStop(1, colors[2]);

            ctx.strokeStyle = gradient;
            ctx.lineWidth = 2;
            ctx.beginPath();

            for (let i = 0; i < canvas.width; i++) {
                const y = canvas.height / 2 + Math.sin(i * 0.02 + Date.now() * 0.001) * 50;
                if (i === 0) {
                    ctx.moveTo(i, y);
                } else {
                    ctx.lineTo(i, y);
                }
            }
            ctx.stroke();
        }

        drawInitialScreen();
        setInterval(() => {
            if (!isRunning) {
                drawInitialScreen();
            }
        }, 50);
    </script>
</body>
</html>
