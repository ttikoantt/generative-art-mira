<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Wave Art - 絵文字ウェーブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        label {
            color: #fff;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input[type="range"] {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .emoji-set {
            display: flex;
            gap: 5px;
        }

        .emoji-btn {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .emoji-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .emoji-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            width: 45px;
            height: 45px;
            padding: 0;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .controls {
                top: 10px;
                padding: 10px 15px;
                gap: 10px;
                max-width: 90%;
            }

            input[type="range"] {
                width: 80px;
            }

            button {
                padding: 8px 15px;
                font-size: 11px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .info {
                bottom: 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>波の数</label>
            <input type="range" id="waveCount" min="1" max="10" value="5">
        </div>
        <div class="control-group">
            <label>スピード</label>
            <input type="range" id="speed" min="1" max="10" value="5">
        </div>
        <div class="control-group">
            <label>大きさ</label>
            <input type="range" id="size" min="20" max="80" value="40">
        </div>
        <div class="emoji-set">
            <button class="emoji-btn active" data-emoji="🌊">🌊</button>
            <button class="emoji-btn" data-emoji="⭐">⭐</button>
            <button class="emoji-btn" data-emoji="🔥">🔥</button>
            <button class="emoji-btn" data-emoji="💫">💫</button>
            <button class="emoji-btn" data-emoji="🌈">🌈</button>
        </div>
        <button id="randomize">🎲 ランダム</button>
    </div>

    <button class="fullscreen-btn" id="fullscreen">⛶</button>

    <div class="info">タップして波を追加 • 動いて楽しもう</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];
        let particles = [];
        let time = 0;

        let currentEmoji = '🌊';
        let waveCount = 5;
        let speedMultiplier = 5;
        let baseSize = 40;

        // 絵文字パーティクル
        class Particle {
            constructor(x, y, emoji) {
                this.x = x;
                this.y = y;
                this.emoji = emoji;
                this.size = baseSize * (0.5 + Math.random() * 0.5);
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.opacity = 1;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
            }

            update() {
                this.angle += this.rotationSpeed;
                this.speedX *= 0.99;
                this.speedY *= 0.99;
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                this.opacity = this.life;
                this.size *= 0.99;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.opacity;
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.emoji, 0, 0);
                ctx.restore();
            }
        }

        // 波のクラス
        class Wave {
            constructor(yOffset, amplitude, frequency, speed, emoji) {
                this.yOffset = yOffset;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.speed = speed;
                this.emoji = emoji;
                this.phase = Math.random() * Math.PI * 2;
            }

            getY(x, t) {
                return this.yOffset + 
                       Math.sin(x * this.frequency + t * this.speed + this.phase) * this.amplitude;
            }

            draw(t) {
                ctx.save();
                ctx.font = `${baseSize}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                for (let x = 0; x < width; x += baseSize * 1.5) {
                    const y = this.getY(x, t);
                    const waveY = Math.sin(x * this.frequency * 0.5 + t * this.speed) * 0.3;
                    const scale = 0.8 + waveY * 0.4;
                    const rotation = Math.sin(x * this.frequency + t * this.speed) * 0.3;

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(rotation);
                    ctx.scale(scale, scale);
                    ctx.globalAlpha = 0.7;
                    ctx.fillText(this.emoji, 0, 0);
                    ctx.restore();
                }

                ctx.restore();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createWaves() {
            waves = [];
            for (let i = 0; i < waveCount; i++) {
                const yOffset = height * (0.2 + 0.6 * (i / (waveCount - 1)));
                const amplitude = 30 + Math.random() * 40;
                const frequency = 0.005 + Math.random() * 0.01;
                const speed = (0.5 + Math.random() * 1) * (speedMultiplier / 5);
                waves.push(new Wave(yOffset, amplitude, frequency, speed, currentEmoji));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.016 * speedMultiplier;

            // 波を描画
            waves.forEach(wave => wave.draw(time));

            // パーティクルを更新・描画
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        // タッチ/クリックでパーティクル追加
        function addParticle(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(x, y, currentEmoji));
            }
        }

        canvas.addEventListener('click', (e) => {
            addParticle(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addParticle(touch.clientX, touch.clientY);
        });

        // コントロール
        document.getElementById('waveCount').addEventListener('input', (e) => {
            waveCount = parseInt(e.target.value);
            createWaves();
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speedMultiplier = parseInt(e.target.value);
            waves.forEach(wave => {
                w.speed = (0.5 + Math.random() * 1) * (speedMultiplier / 5);
            });
        });

        document.getElementById('size').addEventListener('input', (e) => {
            baseSize = parseInt(e.target.value);
        });

        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentEmoji = btn.dataset.emoji;
                waves.forEach(wave => wave.emoji = currentEmoji);
            });
        });

        document.getElementById('randomize').addEventListener('click', () => {
            document.getElementById('waveCount').value = Math.floor(Math.random() * 10) + 1;
            document.getElementById('speed').value = Math.floor(Math.random() * 10) + 1;
            document.getElementById('size').value = Math.floor(Math.random() * 60) + 20;
            
            waveCount = parseInt(document.getElementById('waveCount').value);
            speedMultiplier = parseInt(document.getElementById('speed').value);
            baseSize = parseInt(document.getElementById('size').value);
            
            const emojis = ['🌊', '⭐', '🔥', '💫', '🌈', '🌸', '🎵', '💎', '🦋', '🌺'];
            currentEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            document.querySelectorAll('.emoji-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.emoji === currentEmoji);
            });
            
            createWaves();
        });

        // フルスクリーン
        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        window.addEventListener('resize', () => {
            resize();
            createWaves();
        });

        resize();
        createWaves();
        animate();
    </script>
</body>
</html>
