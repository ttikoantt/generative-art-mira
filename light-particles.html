<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光の粒子 - Light Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls button.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .info {
            position: fixed;
            top: 50px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <canvas id="trailCanvas"></canvas>

    <div class="title">✨ 光の粒子</div>
    <div class="info">クリック/タップで爆発</div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="controls">
        <button id="mode1" class="active">螺旋</button>
        <button id="mode2">波動</button>
        <button id="mode3">渦</button>
        <button id="mode4">星雲</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const trailCanvas = document.getElementById('trailCanvas');
        const ctx = canvas.getContext('2d');
        const trailCtx = trailCanvas.getContext('2d');

        let width = canvas.width = trailCanvas.width = window.innerWidth;
        let height = canvas.height = trailCanvas.height = window.innerHeight;

        let particles = [];
        let mouseX = width / 2;
        let mouseY = height / 2;
        let mode = 1;

        const colors = [
            '#00ffff', '#ff00ff', '#ffff00', '#00ff00', 
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24',
            '#6c5ce7', '#fd79a8', '#00b894', '#e17055'
        ];

        class Particle {
            constructor(x, y, isExplosion = false) {
                this.x = x;
                this.y = y;
                this.isExplosion = isExplosion;
                
                if (isExplosion) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 8 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.radius = Math.random() * 3 + 1;
                    this.life = 1;
                    this.decay = Math.random() * 0.02 + 0.01;
                } else {
                    this.angle = Math.random() * Math.PI * 2;
                    this.radius = Math.random() * 8 + 2;
                    this.speed = Math.random() * 2 + 1;
                    this.life = 1;
                    this.decay = 0.005;
                }
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.glow = Math.random() * 20 + 10;
            }

            update(time) {
                if (this.isExplosion) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.1;
                    this.vx *= 0.98;
                    this.vy *= 0.98;
                    this.life -= this.decay;
                } else {
                    switch(mode) {
                        case 1: // 螺旋
                            this.angle += 0.02;
                            const spiralX = width/2 + Math.cos(this.angle + time * 0.001) * 200;
                            const spiralY = height/2 + Math.sin(this.angle + time * 0.001) * 200;
                            this.x += (spiralX - this.x) * 0.02;
                            this.y += (spiralY - this.y) * 0.02;
                            break;
                            
                        case 2: // 波動
                            this.angle += 0.01;
                            const waveX = (this.angle * 100) % width;
                            const waveY = height/2 + Math.sin(this.angle * 3 + time * 0.002) * 150;
                            this.x += (waveX - this.x) * 0.03;
                            this.y += (waveY - this.y) * 0.03;
                            break;
                            
                        case 3: // 渦
                            this.angle += 0.03;
                            const dist = this.angle * 3;
                            const vortexX = width/2 + Math.cos(this.angle) * dist;
                            const vortexY = height/2 + Math.sin(this.angle) * dist;
                            this.x += (vortexX - this.x) * 0.02;
                            this.y += (vortexY - this.y) * 0.02;
                            break;
                            
                        case 4: // 星雲
                            this.angle += 0.005;
                            const nebulaX = width/2 + Math.cos(this.angle * 2) * 250 + Math.cos(this.angle * 5) * 50;
                            const nebulaY = height/2 + Math.sin(this.angle * 3) * 200 + Math.sin(this.angle * 7) * 50;
                            this.x += (nebulaX - this.x) * 0.01;
                            this.y += (nebulaY - this.y) * 0.01;
                            break;
                    }
                }

                return this.life > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                
                // 光の効果
                ctx.shadowBlur = this.glow;
                ctx.shadowColor = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // コア
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
                ctx.restore();
            }
        }

        function createParticles() {
            if (particles.length < 300) {
                particles.push(new Particle(
                    Math.random() * width,
                    Math.random() * height
                ));
            }
        }

        function explode(x, y) {
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(x, y, true));
            }
        }

        function animate(time) {
            // トレイル効果
            trailCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            trailCtx.fillRect(0, 0, width, height);
            
            ctx.clearRect(0, 0, width, height);

            // 新しい粒子を追加
            createParticles();

            // 粒子を更新・描画
            particles = particles.filter(p => {
                p.draw();
                return p.update(time);
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            explode(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            explode(touch.clientX, touch.clientY);
        });

        window.addEventListener('resize', () => {
            width = canvas.width = trailCanvas.width = window.innerWidth;
            height = canvas.height = trailCanvas.height = window.innerHeight;
        });

        // モード切り替え
        document.getElementById('mode1').addEventListener('click', () => setMode(1));
        document.getElementById('mode2').addEventListener('click', () => setMode(2));
        document.getElementById('mode3').addEventListener('click', () => setMode(3));
        document.getElementById('mode4').addEventListener('click', () => setMode(4));

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode${m}`).classList.add('active');
        }

        // 全画面
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 開始
        animate(0);
    </script>
</body>
</html>
