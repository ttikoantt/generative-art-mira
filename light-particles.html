<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>光の粒子シミュレーション - Light Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .controls h1 {
            font-size: 18px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            max-width: 200px;
            accent-color: #00f5ff;
        }

        .mode-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .mode-buttons button {
            padding: 8px 16px;
            border: 1px solid #00f5ff;
            background: rgba(0, 245, 255, 0.1);
            color: #00f5ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .mode-buttons button:hover,
        .mode-buttons button.active {
            background: rgba(0, 245, 255, 0.3);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 20px;
            background: rgba(0, 245, 255, 0.2);
            border: 1px solid #00f5ff;
            color: #00f5ff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(0, 245, 255, 0.3);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                padding: 10px 15px;
                font-size: 11px;
            }

            .control-group input[type="range"] {
                max-width: 150px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h1>✨ 光の粒子</h1>
        <div class="control-group">
            <label>粒子数: <span id="countLabel">200</span></label>
            <input type="range" id="particleCount" min="50" max="500" value="200">
        </div>
        <div class="control-group">
            <label>速度: <span id="speedLabel">2.0</span></label>
            <input type="range" id="speed" min="0.5" max="5" value="2" step="0.1">
        </div>
        <div class="control-group">
            <label>トレール長: <span id="trailLabel">0.1</span></label>
            <input type="range" id="trail" min="0.01" max="0.5" value="0.1" step="0.01">
        </div>
        <div class="mode-buttons">
            <button data-mode="attract" class="active">吸引</button>
            <button data-mode="repel">反発</button>
            <button data-mode="orbit">軌道</button>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreen">全画面</button>

    <div class="info">マウス/タッチで操作</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let mode = 'attract';
        let particleCount = 200;
        let speed = 2;
        let trailAlpha = 0.1;

        // ネオンカラーパレット
        const colors = [
            '#00f5ff', // シアン
            '#ff00ff', // マゼンタ
            '#00ff88', // グリーン
            '#ff0080', // ピンク
            '#80ff00', // ライム
            '#ff8000', // オレンジ
            '#8000ff', // パープル
        ];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.orbitRadius = Math.random() * 100 + 50;
            }

            update() {
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (mode === 'attract') {
                    // 吸引モード
                    const force = Math.min(100 / (distance + 1), 0.5);
                    this.vx += (dx / distance) * force * speed * 0.1;
                    this.vy += (dy / distance) * force * speed * 0.1;
                } else if (mode === 'repel') {
                    // 反発モード
                    const force = Math.min(200 / (distance + 1), 1);
                    if (distance < 200) {
                        this.vx -= (dx / distance) * force * speed * 0.15;
                        this.vy -= (dy / distance) * force * speed * 0.15;
                    }
                } else if (mode === 'orbit') {
                    // 軌道モード
                    this.angle += speed * 0.02;
                    const targetX = mouseX + Math.cos(this.angle) * this.orbitRadius;
                    const targetY = mouseY + Math.sin(this.angle) * this.orbitRadius;
                    this.vx += (targetX - this.x) * 0.02 * speed;
                    this.vy += (targetY - this.y) * 0.02 * speed;
                }

                // 抵抗
                this.vx *= 0.98;
                this.vy *= 0.98;

                // 速度制限
                const maxSpeed = speed * 3;
                const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (currentSpeed > maxSpeed) {
                    this.vx = (this.vx / currentSpeed) * maxSpeed;
                    this.vy = (this.vy / currentSpeed) * maxSpeed;
                }

                // 最小速度維持
                if (currentSpeed < 0.5) {
                    this.vx += (Math.random() - 0.5) * 0.5;
                    this.vy += (Math.random() - 0.5) * 0.5;
                }

                this.x += this.vx;
                this.y += this.vy;

                // 境界処理
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
            mouseY = height / 2;
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 80) {
                        const alpha = (1 - distance / 80) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 245, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            // トレール効果
            ctx.fillStyle = `rgba(10, 10, 15, ${trailAlpha})`;
            ctx.fillRect(0, 0, width, height);

            drawConnections();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        // コントロール
        document.getElementById('particleCount').addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            document.getElementById('countLabel').textContent = particleCount;
            initParticles();
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speedLabel').textContent = speed.toFixed(1);
        });

        document.getElementById('trail').addEventListener('input', (e) => {
            trailAlpha = parseFloat(e.target.value);
            document.getElementById('trailLabel').textContent = trailAlpha.toFixed(2);
        });

        document.querySelectorAll('.mode-buttons button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-buttons button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                mode = btn.dataset.mode;
            });
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
