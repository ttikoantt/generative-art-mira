<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光のパーティクルシステム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls h2 {
            margin-bottom: 15px;
            font-size: 18px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .control-item {
            margin-bottom: 10px;
        }

        .control-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #888;
        }

        .control-item input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #00f5ff, #ff00ff);
            border-radius: 3px;
            outline: none;
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .stats {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: #666;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00f5ff, #ff00ff);
            border: none;
            color: #000;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.5);
        }

        @media (max-width: 768px) {
            .controls {
                top: auto;
                bottom: 20px;
                left: 10px;
                right: 10px;
                padding: 15px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 10px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>✨ 光のパーティクル</h2>
        <div class="control-item">
            <label>パーティクル数: <span id="particleCountValue">50</span></label>
            <input type="range" id="particleCount" min="10" max="200" value="50">
        </div>
        <div class="control-item">
            <label>パーティクルサイズ: <span id="particleSizeValue">3</span></label>
            <input type="range" id="particleSize" min="1" max="10" value="3">
        </div>
        <div class="control-item">
            <label>トレイル長: <span id="trailLengthValue">0.95</span></label>
            <input type="range" id="trailLength" min="0.8" max="0.99" value="0.95" step="0.01">
        </div>
        <div class="control-item">
            <label>色の速度: <span id="colorSpeedValue">1</span></label>
            <input type="range" id="colorSpeed" min="0.1" max="5" value="1" step="0.1">
        </div>
        <div class="stats">
            <div>パーティクル: <span id="particleDisplay">0</span></div>
            <div>FPS: <span id="fpsDisplay">60</span></div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Settings
        let settings = {
            particleCount: 50,
            particleSize: 3,
            trailLength: 0.95,
            colorSpeed: 1
        };

        // Particles array
        let particles = [];

        // Color hue
        let hue = 0;

        // Mouse position
        let mouse = { x: width / 2, y: height / 2 };
        let isMouseDown = false;

        // FPS calculation
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;

        // Particle class
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.hue = hue + Math.random() * 60 - 30;
                this.size = settings.particleSize * (0.5 + Math.random() * 1);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off walls
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                // Apply gravity
                this.vy += 0.05;

                // Decay
                this.life -= this.decay;
            }

            draw() {
                const alpha = this.life;
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 30%, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // Create particles at position
        function createParticles(x, y, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // Update settings
        function updateSettings() {
            settings.particleCount = parseInt(document.getElementById('particleCount').value);
            settings.particleSize = parseInt(document.getElementById('particleSize').value);
            settings.trailLength = parseFloat(document.getElementById('trailLength').value);
            settings.colorSpeed = parseFloat(document.getElementById('colorSpeed').value);

            document.getElementById('particleCountValue').textContent = settings.particleCount;
            document.getElementById('particleSizeValue').textContent = settings.particleSize;
            document.getElementById('trailLengthValue').textContent = settings.trailLength;
            document.getElementById('colorSpeedValue').textContent = settings.colorSpeed;
        }

        // Event listeners
        document.getElementById('particleCount').addEventListener('input', updateSettings);
        document.getElementById('particleSize').addEventListener('input', updateSettings);
        document.getElementById('trailLength').addEventListener('input', updateSettings);
        document.getElementById('colorSpeed').addEventListener('input', updateSettings);

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            if (isMouseDown) {
                createParticles(mouse.x, mouse.y, 5);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            createParticles(mouse.x, mouse.y, 10);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            if (isMouseDown) {
                createParticles(mouse.x, mouse.y, 5);
            }
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Animation loop
        function animate() {
            // Calculate FPS
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fpsDisplay').textContent = fps;
            }

            // Clear with trail effect
            ctx.fillStyle = `rgba(0, 0, 0, ${1 - settings.trailLength})`;
            ctx.fillRect(0, 0, width, height);

            // Update color
            hue += settings.colorSpeed;

            // Auto-generate particles
            while (particles.length < settings.particleCount) {
                particles.push(new Particle());
            }

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Update particle display
            document.getElementById('particleDisplay').textContent = particles.length;

            requestAnimationFrame(animate);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Start
        animate();
    </script>
</body>
</html>
