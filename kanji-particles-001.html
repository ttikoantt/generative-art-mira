<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漢字パーティクル・アート - 夢</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
            overflow: hidden;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                padding: 0 10px;
            }

            .fullscreen-btn {
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <div class="info">マウスを動かすとパーティクルが反応します</div>
        <canvas id="canvas"></canvas>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };

        // 漢字「夢」のポイント（簡略化）
        const kanjiPoints = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initKanji();
        }

        function initKanji() {
            kanjiPoints.length = 0;
            const centerX = width / 2;
            const centerY = height / 2;
            const scale = Math.min(width, height) / 15;

            // 「夢」の文字をパーティクルで表現
            // 上部（林の部分）
            for (let i = 0; i < 30; i++) {
                kanjiPoints.push({
                    x: centerX - 2 * scale + (i % 5) * scale * 0.8,
                    y: centerY - 2.5 * scale + Math.floor(i / 5) * scale * 0.6
                });
            }

            for (let i = 0; i < 30; i++) {
                kanjiPoints.push({
                    x: centerX + scale + (i % 5) * scale * 0.8,
                    y: centerY - 2.5 * scale + Math.floor(i / 5) * scale * 0.6
                });
            }

            // 中部（夕の部分）
            for (let i = 0; i < 20; i++) {
                kanjiPoints.push({
                    x: centerX - scale + (i % 4) * scale * 0.7,
                    y: centerY - 0.5 * scale + Math.floor(i / 4) * scale * 0.5
                });
            }

            // 下部（𰃮の部分）
            for (let i = 0; i < 25; i++) {
                kanjiPoints.push({
                    x: centerX - 1.5 * scale + (i % 5) * scale * 0.75,
                    y: centerY + scale + Math.floor(i / 5) * scale * 0.6
                });
            }

            for (let i = 0; i < 25; i++) {
                kanjiPoints.push({
                    x: centerX - 1.5 * scale + (i % 5) * scale * 0.75,
                    y: centerY + 2 * scale + Math.floor(i / 5) * scale * 0.6
                });
            }

            // 各ポイントにパーティクルを生成
            particles = [];
            kanjiPoints.forEach(point => {
                particles.push(new Particle(point.x, point.y));
            });
        }

        class Particle {
            constructor(x, y) {
                this.originX = x;
                this.originY = y;
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 2;
                this.baseColor = `hsl(${Math.random() * 60 + 180}, 70%, 60%)`;
                this.vx = 0;
                this.vy = 0;
                this.friction = 0.95;
                this.ease = 0.08;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = Math.random() * 0.02 + 0.01;
                this.amplitude = Math.random() * 2 + 1;
                this.time = Math.random() * Math.PI * 2;
            }

            update() {
                this.time += 0.016;
                this.angle += this.angleSpeed;

                // 風による揺れ
                const windX = Math.cos(this.angle) * this.amplitude;
                const windY = Math.sin(this.angle * 0.7) * this.amplitude * 0.5;

                // マウスへの反応
                if (mouse.x !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        const angle = Math.atan2(dy, dx);
                        this.vx -= Math.cos(angle) * force * 2;
                        this.vy -= Math.sin(angle) * force * 2;
                    }
                }

                // 原点に戻る力
                const dx = this.originX - this.x + windX;
                const dy = this.originY - this.y + windY;
                this.vx += dx * this.ease;
                this.vy += dy * this.ease;

                // 摩擦
                this.vx *= this.friction;
                this.vy *= this.friction;

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);

                // 動きに応じて色を変化
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const hue = 200 + speed * 20 + Math.sin(this.time) * 30;
                const lightness = 60 + speed * 10;
                ctx.fillStyle = `hsla(${hue}, 70%, ${lightness}%, 0.8)`;
                ctx.fill();

                // グロー効果
                ctx.shadowBlur = this.size * 2;
                ctx.shadowColor = ctx.fillStyle;
            }
        }

        function animate() {
            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 背景のグラデーションを再描画
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, 'rgba(26, 26, 46, 0.05)');
            gradient.addColorStop(0.5, 'rgba(22, 33, 62, 0.05)');
            gradient.addColorStop(1, 'rgba(15, 52, 96, 0.05)');

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // パーティクル間の接続（近いもの同士）
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 50) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
