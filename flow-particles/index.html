<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flow Particles - ジェネレーティブ・フロー・アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                padding: 10px 16px;
            }

            .fullscreen-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    <div class="info">✨ タップ/クリックでパーティクルを追加 | Flow Particles ✨</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // パーティクル配列
        let particles = [];

        // 障害物配列
        let obstacles = [];

        // 色のパレット
        const colors = [
            '#ff6b6b', '#ee5a6f', '#f06595', '#cc5de8',
            '#845ef7', '#5c7cfa', '#339af0', '#22b8cf',
            '#20c997', '#51cf66', '#94d82d', '#fcc419',
            '#ff922b', '#ff6b6b'
        ];

        // パーティクルクラス
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height * 0.3;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * 2;
                this.radius = Math.random() * 3 + 2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 0.8;
                this.gravity = 0.15;
                this.friction = 0.99;
                this.bounce = 0.7;
                this.trail = [];
                this.maxTrail = 10;
            }

            update() {
                // 重力を適用
                this.vy += this.gravity;

                // 空気抵抗
                this.vx *= this.friction;
                this.vy *= this.friction;

                // トレイルに現在位置を追加
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // 位置を更新
                this.x += this.vx;
                this.y += this.vy;

                // 壁との衝突
                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -this.bounce;
                }
                if (this.x + this.radius > width) {
                    this.x = width - this.radius;
                    this.vx *= -this.bounce;
                }
                if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -this.bounce;
                }

                // 底との衝突
                if (this.y + this.radius > height) {
                    this.y = height - this.radius;
                    this.vy *= -this.bounce;
                    this.vx *= 0.95; // 地面摩擦

                    // 少しランダムに跳ね返る
                    if (Math.abs(this.vy) < 1) {
                        this.vy = -(Math.random() * 5 + 3);
                        this.vx = (Math.random() - 0.5) * 3;
                    }
                }

                // 障害物との衝突
                obstacles.forEach(obs => {
                    const dx = this.x - obs.x;
                    const dy = this.y - obs.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < this.radius + obs.radius) {
                        // 衝突応答
                        const angle = Math.atan2(dy, dx);
                        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);

                        this.vx = Math.cos(angle) * speed * this.bounce;
                        this.vy = Math.sin(angle) * speed * this.bounce;

                        // 重ならないように
                        const overlap = this.radius + obs.radius - dist;
                        this.x += Math.cos(angle) * overlap;
                        this.y += Math.sin(angle) * overlap;
                    }
                });

                // アルファを減少
                if (this.y > height - 10 && Math.abs(this.vy) < 0.5) {
                    this.alpha -= 0.005;
                }
            }

            draw() {
                // トレイルを描画
                this.trail.forEach((pos, i) => {
                    const ratio = i / this.maxTrail;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, this.radius * ratio, 0, Math.PI * 2);
                    ctx.fillStyle = this.color + Math.floor(this.alpha * ratio * 255).toString(16).padStart(2, '0');
                    ctx.fill();
                });

                // 本体を描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color + Math.floor(this.alpha * 255).toString(16).padStart(2, '0');
                ctx.fill();

                // 光る効果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3
                );
                gradient.addColorStop(0, this.color + '40');
                gradient.addColorStop(1, this.color + '00');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // 障害物クラス
        class Obstacle {
            constructor(x, y, radius) {
                this.x = x;
                this.y = y;
                this.radius = radius;
            }

            draw() {
                // 円形障害物
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, this.y - this.radius * 0.3, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.1)');
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0.2)');
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // 初期化
        function init() {
            obstacles = [];
            // ランダムに障害物を配置
            const numObstacles = 5;
            for (let i = 0; i < numObstacles; i++) {
                obstacles.push(new Obstacle(
                    Math.random() * (width - 100) + 50,
                    Math.random() * (height * 0.7) + height * 0.15,
                    Math.random() * 40 + 30
                ));
            }

            // 初期パーティクル
            particles = [];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    particles.push(new Particle());
                }, i * 100);
            }
        }

        // アニメーション
        function animate() {
            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 障害物を描画
            obstacles.forEach(obs => obs.draw());

            // パーティクルを更新・描画
            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();

                // 死んだパーティクルを削除
                if (particle.isDead()) {
                    particles.splice(index, 1);
                }
            });

            // パーティクルが少なくなったら追加
            if (particles.length < 30) {
                if (Math.random() < 0.1) {
                    particles.push(new Particle());
                }
            }

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            for (let i = 0; i < 10; i++) {
                particles.push(new Particle(touch.clientX, touch.clientY));
            }
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 起動
        init();
        animate();
    </script>
</body>
</html>
