<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ripple Waves - インタラクティブ波紋アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0e27;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        タップまたはクリックで波紋を作成
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="controls">
        <button onclick="clearAll()">クリア</button>
        <button onclick="toggleAutoMode()">自動モード: <span id="autoModeStatus">OFF</span></button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let ripples = [];
        let autoMode = false;
        let autoInterval;

        // Resize canvas
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        window.addEventListener('resize', resize);
        resize();

        // Ripple class
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.speed = 2 + Math.random() * 2;
                this.hue = Math.random() * 360;
                this.alpha = 1;
                this.lineWidth = 3;
                this.life = 1;
                this.decay = 0.003 + Math.random() * 0.002;
            }

            update() {
                this.radius += this.speed;
                this.life -= this.decay;
                this.alpha = this.life;
                this.lineWidth = 3 * this.life;

                // Slow down as it expands
                this.speed *= 0.995;

                return this.life > 0 && this.radius < this.maxRadius;
            }

            draw(ctx) {
                ctx.save();
                ctx.beginPath();

                // Main ripple
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // Secondary ripple (echo)
                if (this.radius > 30) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 20, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue}, 70%, 50%, ${this.alpha * 0.5})`;
                    ctx.lineWidth = this.lineWidth * 0.7;
                    ctx.stroke();
                }

                // Center glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, Math.max(this.radius - 50, 0)
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, ${this.alpha * 0.3})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 60%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, Math.max(this.radius - 50, 0), 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // Create ripple on click/tap
        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));

            // Limit number of ripples
            if (ripples.length > 50) {
                ripples.shift();
            }
        }

        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createRipple(touch.clientX, touch.clientY);
        }, { passive: false });

        // Animation loop
        function animate() {
            // Create trailing effect
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                const alive = ripple.update();
                if (alive) {
                    ripple.draw(ctx);
                }
                return alive;
            });

            // Draw interference patterns
            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            ripples.forEach((ripple, index) => {
                ripples.forEach((other, otherIndex) => {
                    if (index < otherIndex) {
                        const dx = ripple.x - other.x;
                        const dy = ripple.y - other.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < ripple.radius + other.radius &&
                            distance > Math.abs(ripple.radius - other.radius)) {
                            const intensity = (1 - distance / (ripple.radius + other.radius)) * 0.3;
                            const midX = (ripple.x + other.x) / 2;
                            const midY = (ripple.y + other.y) / 2;

                            ctx.beginPath();
                            ctx.arc(midX, midY, 5, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(255, 255, 255, ${intensity * ripple.life * other.life})`;
                            ctx.fill();
                        }
                    }
                });
            });
            ctx.restore();

            requestAnimationFrame(animate);
        }

        animate();

        // Clear all ripples
        function clearAll() {
            ripples = [];
        }

        // Toggle auto mode
        function toggleAutoMode() {
            autoMode = !autoMode;
            document.getElementById('autoModeStatus').textContent = autoMode ? 'ON' : 'OFF';

            if (autoMode) {
                autoInterval = setInterval(() => {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    createRipple(x, y);
                }, 800);
            } else {
                clearInterval(autoInterval);
            }
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Create initial ripple
        setTimeout(() => {
            createRipple(width / 2, height / 2);
        }, 500);
    </script>
</body>
</html>
