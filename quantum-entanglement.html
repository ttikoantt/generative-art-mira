<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Entanglement Visualizer | by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }

        #title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: clamp(20px, 5vw, 40px);
            text-align: center;
            opacity: 0;
            animation: fadeInOut 4s ease-in-out;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 0.8; }
        }

        .subtitle {
            font-size: clamp(12px, 3vw, 18px);
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button id="fullscreen-btn">全画面</button>
    <div id="title">
        Quantum Entanglement
        <div class="subtitle">量子もつれの可視化</div>
    </div>
    <div id="info">Drag to interact • Touch and drag</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let isDragging = false;

        // Resize canvas
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Mouse/Touch events
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Quantum particle class
        class QuantumParticle {
            constructor(x, y, color, phase = 0) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.color = color;
                this.phase = phase;
                this.amplitude = 0;
                this.trail = [];
                this.maxTrail = 30;
            }

            update(time, entangledPartner) {
                // Quantum oscillation
                this.x = this.baseX + Math.sin(time * 2 + this.phase) * 50;
                this.y = this.baseY + Math.cos(time * 1.5 + this.phase) * 30;

                // Interaction with mouse
                if (isDragging) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        const force = (200 - dist) / 200;
                        this.x += dx * force * 0.1;
                        this.y += dy * force * 0.1;
                    }
                }

                // Entanglement effect
                if (entangledPartner) {
                    const dx = entangledPartner.x - this.x;
                    const dy = entangledPartner.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // Quantum tunneling effect
                    if (dist > 100 && dist < 400) {
                        const pull = 0.02;
                        this.x += dx * pull;
                        this.y += dy * pull;
                    }
                }

                // Trail
                this.trail.unshift({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.pop();
                }
            }

            draw(ctx) {
                // Draw trail
                ctx.beginPath();
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (1 - i / this.trail.length) * 0.5;
                    const size = (1 - i / this.trail.length) * 8;
                    ctx.fillStyle = this.color.replace('1)', `${alpha})`);
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw particle
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, 30
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color.replace('1)', '0.3)'));
                gradient.addColorStop(1, this.color.replace('1)', '0)'));

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 30, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Background particles
        class BackgroundParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.pulseSpeed = Math.random() * 2 + 1;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }

            update(time) {
                this.x += this.speedX;
                this.y += this.speedY;

                // Wrap around
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Pulse opacity
                this.currentOpacity = this.opacity * (0.5 + 0.5 * Math.sin(time * this.pulseSpeed + this.pulseOffset));
            }

            draw(ctx) {
                ctx.fillStyle = `rgba(200, 220, 255, ${this.currentOpacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Create particles
        const particle1 = new QuantumParticle(
            width * 0.35, height * 0.5,
            'rgba(0, 255, 255, 1)',
            0
        );
        const particle2 = new QuantumParticle(
            width * 0.65, height * 0.5,
            'rgba(255, 0, 255, 1)',
            Math.PI
        );

        const bgParticles = [];
        for (let i = 0; i < 100; i++) {
            bgParticles.push(new BackgroundParticle());
        }

        // Wave function
        function drawWaveFunction(ctx, time) {
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.3)';
            ctx.lineWidth = 2;

            for (let y = 0; y < height; y += 40) {
                ctx.beginPath();
                for (let x = 0; x < width; x += 5) {
                    const wave1 = Math.sin(x * 0.01 + time * 3) * 20;
                    const wave2 = Math.cos(y * 0.01 + time * 2) * 20;
                    const px = x + wave1;
                    const py = y + wave2;

                    if (x === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.stroke();
            }
        }

        // Draw entanglement line
        function drawEntanglement(ctx, p1, p2) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Quantum connection
            const intensity = Math.max(0, 1 - dist / 600);

            if (intensity > 0) {
                // Main connection
                const gradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                gradient.addColorStop(0, `rgba(0, 255, 255, ${intensity * 0.5})`);
                gradient.addColorStop(0.5, `rgba(200, 100, 255, ${intensity * 0.3})`);
                gradient.addColorStop(1, `rgba(255, 0, 255, ${intensity * 0.5})`);

                ctx.strokeStyle = gradient;
                ctx.lineWidth = 3 * intensity;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);

                // Curved connection
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2 + Math.sin(performance.now() * 0.002) * 50;
                ctx.quadraticCurveTo(midX, midY, p2.x, p2.y);
                ctx.stroke();

                // Quantum particles along the line
                const numParticles = Math.floor(dist / 50);
                for (let i = 0; i < numParticles; i++) {
                    const t = (i + performance.now() * 0.001) % numParticles / numParticles;
                    const x = p1.x + (p2.x - p1.x) * t;
                    const y = p1.y + (p2.y - p1.y) * t + Math.sin(performance.now() * 0.005 + t * Math.PI * 2) * 20;

                    ctx.fillStyle = `rgba(255, 255, 255, ${intensity * 0.8})`;
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Animation loop
        let time = 0;
        function animate() {
            time += 0.016;

            // Clear with fade effect
            ctx.fillStyle = 'rgba(0, 0, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Draw wave function
            drawWaveFunction(ctx, time);

            // Update and draw background particles
            bgParticles.forEach(p => {
                p.update(time);
                p.draw(ctx);
            });

            // Update entangled particles
            particle1.baseX = width * 0.35;
            particle1.baseY = height * 0.5;
            particle2.baseX = width * 0.65;
            particle2.baseY = height * 0.5;

            particle1.update(time, particle2);
            particle2.update(time, particle1);

            // Draw entanglement
            drawEntanglement(ctx, particle1, particle2);

            // Draw particles
            particle1.draw(ctx);
            particle2.draw(ctx);

            requestAnimationFrame(animate);
        }

        // Start animation
        // Hide title after animation
        setTimeout(() => {
            document.getElementById('title').style.display = 'none';
        }, 4000);

        animate();
    </script>
</body>
</html>
