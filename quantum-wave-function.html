<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子波動関数シミュレーション | Quantum Wave Function</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            color: #0ff;
            z-index: 100;
            max-width: 280px;
        }

        .controls h2 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }

        .control-group {
            margin-bottom: 10px;
        }

        .control-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 5px;
            color: #0f0;
        }

        .control-group input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(0, 255, 255, 0.2);
            height: 6px;
            border-radius: 3px;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #0ff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px #0ff;
        }

        .btn {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin: 5px 5px 0 0;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(0, 255, 255, 0.7);
            font-size: 10px;
            text-shadow: 0 0 5px #0ff;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        @media (max-width: 600px) {
            .controls {
                max-width: 200px;
                font-size: 10px;
            }

            .controls h2 {
                font-size: 12px;
            }

            .control-group label {
                font-size: 10px;
            }

            .btn {
                font-size: 10px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>⚛️ 量子波動関数制御</h2>
        
        <div class="control-group">
            <label>波の数: <span id="waveCountValue">5</span></label>
            <input type="range" id="waveCount" min="1" max="10" value="5">
        </div>

        <div class="control-group">
            <label>干渉強度: <span id="interferenceValue">50</span></label>
            <input type="range" id="interference" min="0" max="100" value="50">
        </div>

        <div class="control-group">
            <label>時間速度: <span id="timeSpeedValue">50</span></label>
            <input type="range" id="timeSpeed" min="0" max="100" value="50">
        </div>

        <div class="control-group">
            <label>色相シフト: <span id="hueShiftValue">0</span></label>
            <input type="range" id="hueShift" min="0" max="360" value="0">
        </div>

        <button class="btn" onclick="randomize()">🎲 ランダム</button>
        <button class="btn" onclick="resetWaves()">🔄 リセット</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <div class="info">
        🌊 波動関数 ψ(x,t) = Σ A·e^(i(kx-ωt)) | ⚛️ 量子力学の美しさ
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let waves = [];
        let particles = [];

        // 制御パラメータ
        let params = {
            waveCount: 5,
            interference: 0.5,
            timeSpeed: 0.5,
            hueShift: 0
        };

        // 波のクラス
        class Wave {
            constructor() {
                this.reset();
            }

            reset() {
                this.amplitude = Math.random() * 30 + 20;
                this.frequency = Math.random() * 0.02 + 0.01;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.02 + 0.01;
                this.k = Math.random() * 2 + 1; // 波数
                this.colorHue = Math.random() * 60 + 160; // シアン〜ブルー系
            }

            getValue(x, t) {
                return this.amplitude * Math.sin(this.frequency * x + this.phase + this.speed * t);
            }
        }

        // 粒子のクラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = Math.random() * 100 + 100;
                this.maxLife = this.life;
                this.size = Math.random() * 2 + 1;
            }

            update(probability) {
                // 確率密度に基づいて動きを変える
                this.vx += (Math.random() - 0.5) * probability * 0.5;
                this.vy += (Math.random() - 0.5) * probability * 0.5;

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 3) {
                    this.vx = (this.vx / speed) * 3;
                    this.vy = (this.vy / speed) * 3;
                }

                this.x += this.vx;
                this.y += this.vy;
                this.life--;

                // 境界処理
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                if (this.life <= 0) {
                    this.reset();
                }
            }

            draw(probability) {
                const alpha = (this.life / this.maxLife) * probability * 0.8;
                const hue = (180 + probability * 60 + params.hueShift) % 360;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            createWaves();
            createParticles();
            animate();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createWaves() {
            waves = [];
            for (let i = 0; i < params.waveCount; i++) {
                waves.push(new Wave());
            }
        }

        function createParticles() {
            particles = [];
            const particleCount = Math.floor((width * height) / 10000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function calculateWaveFunction(x, y, t) {
            let real = 0;
            let imag = 0;

            for (let wave of waves) {
                const phase = wave.k * (x * 0.01 + y * 0.01) - t * wave.speed;
                real += wave.amplitude * Math.cos(phase);
                imag += wave.amplitude * Math.sin(phase);
            }

            // 確率密度 = |ψ|²
            return (real * real + imag * imag) / (waves.length * waves.length * 100);
        }

        function drawWaveField() {
            const gridSize = 20;

            for (let x = 0; x < width; x += gridSize) {
                for (let y = 0; y < height; y += gridSize) {
                    const probability = calculateWaveFunction(x, y, time);
                    const intensity = probability * params.interference * 2;
                    
                    if (intensity > 0.1) {
                        const hue = (180 + intensity * 60 + params.hueShift) % 360;
                        const alpha = Math.min(intensity * 0.3, 0.5);
                        
                        ctx.beginPath();
                        ctx.arc(x, y, gridSize * 0.4 * intensity, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
                        ctx.fill();
                    }
                }
            }
        }

        function drawInterferencePattern() {
            ctx.globalCompositeOperation = 'lighter';

            for (let particle of particles) {
                const probability = calculateWaveFunction(particle.x, particle.y, time);
                particle.update(probability);
                particle.draw(probability);
            }

            ctx.globalCompositeOperation = 'source-over';
        }

        function drawWaveLines() {
            ctx.globalCompositeOperation = 'lighter';

            for (let i = 0; i < waves.length; i++) {
                const wave = waves[i];
                ctx.beginPath();

                for (let x = 0; x < width; x += 5) {
                    const y = height / 2 + wave.getValue(x, time) * (1 + params.interference);
                    
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                const hue = (wave.colorHue + params.hueShift) % 360;
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 0.3)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            ctx.globalCompositeOperation = 'source-over';
        }

        function animate() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 波動関数場を描画
            drawWaveField();

            // 干渉パターンを描画
            drawInterferencePattern();

            // 波の線を描画
            drawWaveLines();

            // 時間を進める
            time += params.timeSpeed;

            requestAnimationFrame(animate);
        }

        function randomize() {
            params.waveCount = Math.floor(Math.random() * 10) + 1;
            params.interference = Math.random();
            params.timeSpeed = Math.random() * 2;
            params.hueShift = Math.floor(Math.random() * 360);

            document.getElementById('waveCount').value = params.waveCount;
            document.getElementById('waveCountValue').textContent = params.waveCount;
            document.getElementById('interference').value = params.interference * 100;
            document.getElementById('interferenceValue').textContent = Math.floor(params.interference * 100);
            document.getElementById('timeSpeed').value = params.timeSpeed * 50;
            document.getElementById('timeSpeedValue').textContent = Math.floor(params.timeSpeed * 50);
            document.getElementById('hueShift').value = params.hueShift;
            document.getElementById('hueShiftValue').textContent = params.hueShift;

            createWaves();
        }

        function resetWaves() {
            params.waveCount = 5;
            params.interference = 0.5;
            params.timeSpeed = 0.5;
            params.hueShift = 0;

            document.getElementById('waveCount').value = params.waveCount;
            document.getElementById('waveCountValue').textContent = params.waveCount;
            document.getElementById('interference').value = params.interference * 100;
            document.getElementById('interferenceValue').textContent = Math.floor(params.interference * 100);
            document.getElementById('timeSpeed').value = params.timeSpeed * 100;
            document.getElementById('timeSpeedValue').textContent = Math.floor(params.timeSpeed * 100);
            document.getElementById('hueShift').value = params.hueShift;
            document.getElementById('hueShiftValue').textContent = params.hueShift;

            createWaves();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            resize();
            createParticles();
        });

        document.getElementById('waveCount').addEventListener('input', (e) => {
            params.waveCount = parseInt(e.target.value);
            document.getElementById('waveCountValue').textContent = params.waveCount;
            createWaves();
        });

        document.getElementById('interference').addEventListener('input', (e) => {
            params.interference = parseInt(e.target.value) / 100;
            document.getElementById('interferenceValue').textContent = e.target.value;
        });

        document.getElementById('timeSpeed').addEventListener('input', (e) => {
            params.timeSpeed = parseInt(e.target.value) / 50;
            document.getElementById('timeSpeedValue').textContent = e.target.value;
        });

        document.getElementById('hueShift').addEventListener('input', (e) => {
            params.hueShift = parseInt(e.target.value);
            document.getElementById('hueShiftValue').textContent = params.hueShift;
        });

        // タッチ操作対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        init();
    </script>
</body>
</html>
