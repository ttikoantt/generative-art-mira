<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ff88, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>✨ Particle Flow Field</h1>
        <p>パーティクルがノイズに従って流れます</p>
        <p>マウス/タッチで干渉できます</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField = [];
        let rows, cols;
        const scale = 20;
        let mouseX = 0, mouseY = 0;
        let mouseInfluence = 150;

        // 色のパレット
        const colors = [
            '#00ff88',
            '#00ffff',
            '#ff00ff',
            '#ffff00',
            '#ff6600',
            '#0088ff'
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            rows = Math.floor(height / scale);
            cols = Math.floor(width / scale);
            initFlowField();
        }

        // Simplex Noiseの簡易実装
        const noise = {
            seed: Math.random(),
            noise2D: function(x, y) {
                const sin = Math.sin(x * 12.9898 + y * 78.233 + this.seed);
                return (sin * 43758.5453) % 1;
            }
        };

        function initFlowField() {
            flowField = [];
            let zOff = 0;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const angle = noise.noise2D(x * 0.1, y * 0.1 + zOff) * Math.PI * 4;
                    flowField.push(angle);
                }
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.ax = 0;
                this.ay = 0;
                this.maxSpeed = 3;
                this.maxForce = 0.2;
                this.size = Math.random() * 2 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 0.8;
                this.life = Math.random() * 200 + 100;
                this.age = 0;
            }

            update() {
                this.age++;

                // フローフィールドの角度を取得
                const col = Math.floor(this.x / scale);
                const row = Math.floor(this.y / scale);
                const index = col + row * cols;

                if (index >= 0 && index < flowField.length) {
                    let angle = flowField[index];

                    // マウスの影響
                    const dx = this.x - mouseX;
                    const dy = this.y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < mouseInfluence) {
                        const force = (mouseInfluence - dist) / mouseInfluence;
                        angle += Math.atan2(dy, dx) * force * 2;
                    }

                    const fx = Math.cos(angle) * 0.5;
                    const fy = Math.sin(angle) * 0.5;

                    this.ax += fx;
                    this.ay += fy;
                }

                this.vx += this.ax;
                this.vy += this.ay;

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.maxSpeed) {
                    this.vx = (this.vx / speed) * this.maxSpeed;
                    this.vy = (this.vy / speed) * this.maxSpeed;
                }

                this.x += this.vx;
                this.y += this.vy;

                this.ax = 0;
                this.ay = 0;

                // 画面外に出たら反対側から
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // 寿命
                this.alpha = 0.8 * (1 - this.age / this.life);

                if (this.age >= this.life) {
                    this.reset();
                }
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.age = 0;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function init() {
            particles = [];
            const particleCount = Math.floor((width * height) / 4000);

            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        let trailAlpha = 0.05;

        function animate() {
            // トレイル効果
            ctx.fillStyle = `rgba(0, 0, 0, ${trailAlpha})`;
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            resize();
            init();
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // 初期化
        resize();
        init();
        animate();

        // マウス位置初期化
        mouseX = width / 2;
        mouseY = height / 2;
    </script>
</body>
</html>
