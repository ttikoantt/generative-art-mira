<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: #0f0;
            font-size: 12px;
            z-index: 100;
            border: 1px solid #0f0;
        }

        .controls h3 {
            margin-bottom: 10px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }

        .controls button {
            background: transparent;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 8px 15px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }

        .controls button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 10px;
            color: #0f0;
            font-size: 11px;
            border: 1px solid #0f0;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 100;
            font-size: 12px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }

        @media (max-width: 768px) {
            .controls {
                font-size: 10px;
                padding: 10px;
            }

            .info {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h3>🌊 Particle Flow Field</h3>
        <button onclick="resetFlow()">Reset Flow</button>
        <button onclick="changeColors()">Change Colors</button>
        <button onclick="toggleTrails()">Toggle Trails</button>
        <button onclick="changeSpeed()">Change Speed</button>
    </div>

    <div class="info">
        Particles: <span id="particleCount">0</span> |
        FPS: <span id="fps">0</span>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField = [];
        let cols, rows;
        const scale = 20;
        let animationId;

        // 設定
        let colorScheme = 0;
        let showTrails = true;
        let speedMultiplier = 1;

        // カラースキーム
        const colorSchemes = [
            ['#00ff00', '#00cc00', '#009900', '#00ff88', '#00ff44'], // グリーン
            ['#ff0080', '#ff0040', '#ff80c0', '#ff40a0', '#ffc0e0'], // ピンク
            ['#00ffff', '#00cccc', '#009999', '#80ffff', '#40ffff'], // シアン
            ['#ffff00', '#ffcc00', '#ff9900', '#ffcc80', '#ffff80'], // イエロー
            ['#ff00ff', '#cc00cc', '#990099', '#ff80ff', '#ff40ff'], // マゼンタ
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.floor(width / scale);
            rows = Math.floor(height / scale);
            initFlowField();
        }

        function initFlowField() {
            flowField = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const angle = (Math.cos(x * 0.1) + Math.sin(y * 0.1)) * Math.PI;
                    flowField.push(angle);
                }
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 2 + 1;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                this.color = colorSchemes[colorScheme][Math.floor(Math.random() * 5)];
            }

            update() {
                // フロー場から角度を取得
                const x = Math.floor(this.x / scale);
                const y = Math.floor(this.y / scale);
                const index = x + y * cols;

                if (index >= 0 && index < flowField.length) {
                    const angle = flowField[index];
                    this.vx += Math.cos(angle) * 0.5;
                    this.vy += Math.sin(angle) * 0.5;
                }

                // 速度を制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 3) {
                    this.vx = (this.vx / speed) * 3;
                    this.vy = (this.vy / speed) * 3;
                }

                this.x += this.vx * speedMultiplier;
                this.y += this.vy * speedMultiplier;
                this.life--;

                // 境界チェック
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height || this.life <= 0) {
                    this.reset();
                }

                // マウスインタラクション
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    const force = (100 - dist) / 100;
                    this.vx += (dx / dist) * force * 0.5;
                    this.vy += (dy / dist) * force * 0.5;
                }
            }

            draw() {
                const alpha = this.life / this.maxLife;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        const mouse = { x: -1000, y: -1000 };

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        function init() {
            particles = [];
            for (let i = 0; i < 2000; i++) {
                particles.push(new Particle());
            }
        }

        let lastTime = 0;
        let frameCount = 0;
        let fps = 0;

        function animate(currentTime) {
            // FPS計算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = fps;
                document.getElementById('particleCount').textContent = particles.length;
            }

            // 背景をクリア（トレイル効果）
            if (showTrails) {
                ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(0, 0, width, height);
            }

            // パーティクルを更新
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            animationId = requestAnimationFrame(animate);
        }

        // コントロール関数
        function resetFlow() {
            initFlowField();
            particles.forEach(p => p.reset());
        }

        function changeColors() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            particles.forEach(p => {
                p.color = colorSchemes[colorScheme][Math.floor(Math.random() * 5)];
            });
        }

        function toggleTrails() {
            showTrails = !showTrails;
        }

        function changeSpeed() {
            speedMultiplier = speedMultiplier === 1 ? 2 : speedMultiplier === 2 ? 0.5 : 1;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resize();
        init();
        animate(0);

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
