<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Flow Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Touch/Move to interact • Particles follow flow field</div>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let particles = [];
        let flowField = [];
        let rows, cols;
        const scale = 20;
        const numParticles = 2000;
        let mouse = { x: null, y: null, radius: 150 };
        let hue = 0;

        // Simplex-like noise function (simplified)
        function noise(x, y) {
            const X = Math.floor(x) & 255;
            const Y = Math.floor(y) & 255;
            x -= Math.floor(x);
            y -= Math.floor(y);
            
            const u = fade(x);
            const v = fade(y);
            
            const a = grad(X, Y, x, y);
            const b = grad(X + 1, Y, x - 1, y);
            const ab = lerp(u, a, b);
            
            const c = grad(X, Y + 1, x, y - 1);
            const d = grad(X + 1, Y + 1, x - 1, y - 1);
            const cd = lerp(u, c, d);
            
            return lerp(v, ab, cd);
        }

        function fade(t) {
            return t * t * t * (t * (t * 6 - 15) + 10);
        }

        function lerp(t, a, b) {
            return a + t * (b - a);
        }

        function grad(x, y, x2, y2) {
            const hash = (x * 374761393 + y * 668265263) & 0x7fffffff;
            const h = hash / 0x7fffffff;
            const angle = h * Math.PI * 2;
            return Math.cos(angle) * x2 + Math.sin(angle) * y2;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.ax = 0;
                this.ay = 0;
                this.maxSpeed = 3;
                this.history = [];
                this.maxHistory = 10;
                this.hueOffset = Math.random() * 60 - 30;
                this.size = Math.random() * 2 + 1;
            }

            follow(flowField) {
                const x = Math.floor(this.x / scale);
                const y = Math.floor(this.y / scale);
                const index = x + y * cols;
                
                if (flowField[index]) {
                    this.ax = flowField[index].x * 0.5;
                    this.ay = flowField[index].y * 0.5;
                }
            }

            update() {
                // Mouse interaction
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < mouse.radius) {
                        const force = (mouse.radius - distance) / mouse.radius;
                        this.ax -= (dx / distance) * force * 2;
                        this.ay -= (dy / distance) * force * 2;
                    }
                }

                this.vx += this.ax;
                this.vy += this.ay;
                
                // Limit speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.maxSpeed) {
                    this.vx = (this.vx / speed) * this.maxSpeed;
                    this.vy = (this.vy / speed) * this.maxSpeed;
                }

                this.x += this.vx;
                this.y += this.vy;
                
                this.ax = 0;
                this.ay = 0;

                // History for trails
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }

                // Wrap around
                if (this.x < 0) {
                    this.x = width;
                    this.history = [];
                }
                if (this.x > width) {
                    this.x = 0;
                    this.history = [];
                }
                if (this.y < 0) {
                    this.y = height;
                    this.history = [];
                }
                if (this.y > height) {
                    this.y = 0;
                    this.history = [];
                }
            }

            draw() {
                const h = (hue + this.hueOffset + this.x / width * 60) % 360;
                const s = 70;
                const l = 60;
                
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${h}, ${s}%, ${l}%, 0.8)`;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                
                if (this.history.length > 1) {
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let i = 1; i < this.history.length; i++) {
                        ctx.lineTo(this.history[i].x, this.history[i].y);
                    }
                }
                
                ctx.stroke();
            }
        }

        function init() {
            resize();
            
            // Create flow field
            flowField = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const angle = noise(x * 0.1, y * 0.1) * Math.PI * 4;
                    flowField.push({
                        x: Math.cos(angle),
                        y: Math.sin(angle)
                    });
                }
            }

            // Create particles
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.floor(width / scale) + 1;
            rows = Math.floor(height / scale) + 1;
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update hue for color cycling
            hue += 0.5;

            // Update and draw particles
            particles.forEach(particle => {
                particle.follow(flowField);
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', () => {
            resize();
            init();
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '元に戻す';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面';
            }
        });

        // Initialize and start
        init();
        animate();
    </script>
</body>
</html>
