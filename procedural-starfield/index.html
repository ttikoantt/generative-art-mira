<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロシージャル星空 - Procedural Starfield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                bottom: 60px;
            }

            .controls {
                top: 10px;
                right: 10px;
                flex-direction: column;
            }

            button {
                padding: 8px 15px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div id="starCount">Stars: 0</div>
        <div id="fps">FPS: 0</div>
        <div>クリックで星を追加 / Click to add stars</div>
    </div>

    <div class="controls">
        <button id="slowBtn">遅く / Slower</button>
        <button id="fastBtn">速く / Faster</button>
        <button id="resetBtn">リセット / Reset</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面 / Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        let speed = 2;
        let lastTime = 0;
        let frameCount = 0;
        let fps = 0;

        // 星の色のパレット
        const starColors = [
            '#ffffff', // 白
            '#fffaf0', // 花白
            '#f0f8ff', // 淡青
            '#fffacd', // 淡黄
            '#ffe4b5', // 薄橙
            '#e6e6fa', // 淡紫
        ];

        class Star {
            constructor() {
                this.reset();
                this.z = Math.random() * 1000; // 最初は奥から
            }

            reset() {
                this.x = (Math.random() - 0.5) * canvas.width * 2;
                this.y = (Math.random() - 0.5) * canvas.height * 2;
                this.z = 1000;
                this.color = starColors[Math.floor(Math.random() * starColors.length)];
                this.size = Math.random() * 2 + 0.5;
            }

            update(dt) {
                this.z -= speed * dt * 60;

                if (this.z <= 0) {
                    this.reset();
                }
            }

            draw() {
                const sx = (this.x / this.z) * 500 + canvas.width / 2;
                const sy = (this.y / this.z) * 500 + canvas.height / 2;
                const size = (1 - this.z / 1000) * this.size * 3;

                if (sx < 0 || sx > canvas.width || sy < 0 || sy > canvas.height) {
                    return;
                }

                const brightness = 1 - this.z / 1000;

                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = brightness;
                ctx.fill();

                // 流れる跡（トレイル）
                if (speed > 1) {
                    const trailLength = speed * 2;
                    const tx = (this.x / (this.z + trailLength)) * 500 + canvas.width / 2;
                    const ty = (this.y / (this.z + trailLength)) * 500 + canvas.height / 2;

                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(tx, ty);
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = size;
                    ctx.globalAlpha = brightness * 0.3;
                    ctx.stroke();
                }

                ctx.globalAlpha = 1;
            }
        }

        function initStars(count = 500) {
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push(new Star());
            }
        }

        function addStars(count = 50) {
            for (let i = 0; i < count; i++) {
                stars.push(new Star());
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animate(currentTime) {
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            // FPS計算
            frameCount++;
            if (frameCount % 30 === 0) {
                fps = Math.round(1 / dt);
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }

            // 背景をクリア（グラデーション）
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            gradient.addColorStop(0, '#0a0a20');
            gradient.addColorStop(1, '#000005');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 中心の光
            const centerGlow = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, 200
            );
            centerGlow.addColorStop(0, 'rgba(100, 150, 255, 0.05)');
            centerGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = centerGlow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星を更新・描画
            stars.forEach(star => {
                star.update(dt);
                star.draw();
            });

            // 星の数を更新
            document.getElementById('starCount').textContent = `Stars: ${stars.length}`;

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('click', () => {
            addStars(50);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            addStars(50);
        });

        document.getElementById('slowBtn').addEventListener('click', () => {
            speed = Math.max(0.5, speed - 0.5);
        });

        document.getElementById('fastBtn').addEventListener('click', () => {
            speed = Math.min(10, speed + 0.5);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            speed = 2;
            initStars(500);
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        initStars(500);
        requestAnimationFrame(animate);
    </script>
</body>
</html>
