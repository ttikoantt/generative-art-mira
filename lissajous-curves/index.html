<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lissajous Curves - Mathematical Beauty</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border: 1px solid #0ff;
            border-radius: 8px;
            max-width: 250px;
        }

        .controls h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .controls p {
            margin: 5px 0;
            font-size: 12px;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            color: #0ff;
            border: 1px solid #0ff;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            font-size: 12px;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border: 1px solid #0ff;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h3>🎨 Lissajous Curves</h3>
        <p>A: <span id="a-value">3</span></p>
        <p>B: <span id="b-value">2</span></p>
        <p>δ: <span id="delta-value">π/2</span></p>
        <p style="margin-top: 10px;">Click to randomize</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="info">x = sin(at + δ), y = sin(bt)</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let a = 3, b = 2, delta = Math.PI / 2;
        let time = 0;
        let curves = [];
        const numCurves = 5;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function initCurves() {
            curves = [];
            for (let i = 0; i < numCurves; i++) {
                curves.push({
                    a: a + i * 0.5,
                    b: b + i * 0.3,
                    delta: delta + i * 0.2,
                    hue: (i * 360 / numCurves) % 360,
                    phase: i * 0.1,
                    speed: 0.002 + i * 0.001,
                    points: [],
                    maxPoints: 2000
                });
            }
        }

        function updateInfo() {
            document.getElementById('a-value').textContent = a.toFixed(1);
            document.getElementById('b-value').textContent = b.toFixed(1);
            document.getElementById('delta-value').textContent = (delta / Math.PI).toFixed(2) + 'π';
        }

        function randomize() {
            a = Math.floor(Math.random() * 8) + 1;
            b = Math.floor(Math.random() * 8) + 1;
            delta = Math.random() * Math.PI * 2;
            time = 0;
            initCurves();
            updateInfo();
        }

        canvas.addEventListener('click', randomize);

        function draw() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            const scale = Math.min(width, height) * 0.35;
            const t = time;

            curves.forEach((curve, index) => {
                const { a, b, delta, hue, phase, speed, maxPoints } = curve;

                // Add new point
                for (let i = 0; i < 10; i++) {
                    const localT = t + i * 0.01;
                    const x = Math.sin(a * localT + delta + phase);
                    const y = Math.sin(b * localT + phase);

                    curve.points.push({
                        x: centerX + x * scale,
                        y: centerY + y * scale,
                        age: 0
                    });
                }

                // Remove old points
                if (curve.points.length > maxPoints) {
                    curve.points.splice(0, curve.points.length - maxPoints);
                }

                // Draw curve
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 0.8)`;
                ctx.lineWidth = 2;

                for (let i = 1; i < curve.points.length; i++) {
                    const p1 = curve.points[i - 1];
                    const p2 = curve.points[i];
                    const alpha = i / curve.points.length;

                    ctx.beginPath();
                    ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${alpha})`;
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                }

                // Slowly rotate parameters
                curve.phase += speed;
                curve.hue = (curve.hue + 0.1) % 360;
            });

            time += 0.02;
            requestAnimationFrame(draw);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
        initCurves();
        updateInfo();
        draw();

        window.addEventListener('resize', resize);
    </script>
</body>
</html>
