<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Audio Reactive Particles | Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .ui {
            position: relative;
            z-index: 10;
            text-align: center;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        p {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            color: #000;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 0.8rem;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .controls {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: none;
            gap: 15px;
        }

        .controls.active {
            display: flex;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui" id="start-ui">
        <h1>🎵 Audio Reactive Particles</h1>
        <p>音楽に合わせて踊るパーティクルアート</p>
        <button class="btn" id="start-btn">🎤 マイクを開始</button>
    </div>

    <div class="controls" id="controls">
        <button class="control-btn" id="color-btn">🎨 色を変える</button>
        <button class="control-btn" id="reset-btn">🔄 リセット</button>
    </div>

    <p class="info">音に反応してパーティクルが動きます</p>
    <button class="fullscreen-btn" id="fullscreen-btn">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startUi = document.getElementById('start-ui');
        const controls = document.getElementById('controls');
        const colorBtn = document.getElementById('color-btn');
        const resetBtn = document.getElementById('reset-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let width, height;
        let particles = [];
        let audioContext, analyser, microphone, dataArray;
        let isRunning = false;
        let colorScheme = 0;
        let audioLevel = 0;

        const colorSchemes = [
            { primary: [0, 255, 255], secondary: [0, 128, 255] },
            { primary: [255, 0, 255], secondary: [128, 0, 255] },
            { primary: [255, 200, 0], secondary: [255, 100, 0] },
            { primary: [0, 255, 128], secondary: [0, 128, 255] }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 3 + 1;
                this.life = 1;
                this.hue = Math.random() * 360;
            }

            update(level) {
                const force = level * 0.5;
                const angle = Math.random() * Math.PI * 2;

                this.vx += Math.cos(angle) * force;
                this.vy += Math.sin(angle) * force;

                this.vx *= 0.95;
                this.vy *= 0.95;

                this.x += this.vx;
                this.y += this.vy;

                const distFromBase = Math.hypot(this.x - this.baseX, this.y - this.baseY);
                const returnForce = distFromBase * 0.001;
                this.x += (this.baseX - this.x) * returnForce;
                this.y += (this.baseY - this.y) * returnForce;
            }

            draw() {
                const scheme = colorSchemes[colorScheme];
                const alpha = this.life * (0.3 + audioLevel * 0.7);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );

                gradient.addColorStop(0, `rgba(${scheme.primary.join(',')}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${scheme.secondary.join(',')}, ${alpha * 0.5})`);
                gradient.addColorStop(1, `rgba(${scheme.secondary.join(',')}, 0)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(800, (width * height) / 1000);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }

        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isRunning = true;
                startUi.style.display = 'none';
                controls.classList.add('active');
                animate();
            } catch (err) {
                alert('マイクにアクセスできませんでした。ブラウザの設定を確認してください。');
                console.error(err);
            }
        }

        function animate() {
            if (!isRunning) return;

            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            audioLevel = sum / dataArray.length / 255;

            particles.forEach(particle => {
                particle.update(audioLevel);
                particle.draw();
            });

            drawConnections();

            requestAnimationFrame(animate);
        }

        function drawConnections() {
            const scheme = colorSchemes[colorScheme];
            ctx.strokeStyle = `rgba(${scheme.primary.join(',')}, ${0.1 * audioLevel})`;
            ctx.lineWidth = 0.5;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.hypot(dx, dy);

                    if (dist < 80 * (1 + audioLevel)) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function changeColor() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        }

        function reset() {
            initParticles();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 元に戻す';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        }

        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        startBtn.addEventListener('click', startAudio);
        colorBtn.addEventListener('click', changeColor);
        resetBtn.addEventListener('click', reset);
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        resize();
        initParticles();
    </script>
</body>
</html>
