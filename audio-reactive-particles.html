<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Reactive Particles - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .description {
            color: #888;
            margin-bottom: 20px;
            text-align: center;
            max-width: 600px;
        }

        canvas {
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
            max-width: 100%;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            color: #fff;
            font-weight: bold;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #888;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .description {
                font-size: 0.9rem;
            }

            .btn {
                padding: 8px 16px;
                font-size: 12px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎵 Audio Reactive Particles</h1>
        <p class="description">マウスを動かしてパーティクルを操作しよう</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button class="btn" onclick="changeMode('wave')">🌊 Wave</button>
            <button class="btn" onclick="changeMode('spiral')">🌀 Spiral</button>
            <button class="btn" onclick="changeMode('explosion')">💥 Explosion</button>
            <button class="btn" onclick="changeMode('galaxy')">🌌 Galaxy</button>
            <button class="btn" onclick="toggleColors()">🎨 Colors</button>
        </div>
    </div>

    <div class="info">Created by Mira | 2026-03-06</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let mode = 'wave';
        let colorScheme = 0;
        let animationId;

        function resize() {
            canvas.width = Math.min(window.innerWidth - 40, 800);
            canvas.height = Math.min(window.innerHeight - 300, 600);
        }

        window.addEventListener('resize', resize);
        resize();

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        }, { passive: false });

        const colorSchemes = [
            ['#00f5ff', '#ff00ff', '#ffff00', '#00ff00'],
            ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4'],
            ['#667eea', '#764ba2', '#f093fb', '#4facfe'],
            ['#fa709a', '#fee140', '#ff0844', '#ffb199']
        ];

        class Particle {
            constructor(x, y) {
                this.x = x || canvas.width / 2;
                this.y = y || canvas.height / 2;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.color = colorSchemes[colorScheme][Math.floor(Math.random() * 4)];
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                switch(mode) {
                    case 'wave':
                        this.x += this.speedX;
                        this.y += Math.sin(this.x * 0.02 + Date.now() * 0.002) * 2;
                        break;
                    case 'spiral':
                        this.angle += this.angleSpeed;
                        this.x += Math.cos(this.angle) * 2;
                        this.y += Math.sin(this.angle) * 2;
                        break;
                    case 'explosion':
                        this.x += this.speedX * 3;
                        this.y += this.speedY * 3;
                        break;
                    case 'galaxy':
                        const dx = mouseX - this.x;
                        const dy = mouseY - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > 50) {
                            this.x += dx * 0.01;
                            this.y += dy * 0.01;
                        }
                        this.angle += this.angleSpeed;
                        break;
                }

                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function addParticle(x, y) {
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles = particles.filter(p => p.life > 0);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Add particles around mouse
            if (mouseX && mouseY) {
                addParticle(mouseX, mouseY);
            }

            animationId = requestAnimationFrame(animate);
        }

        function changeMode(newMode) {
            mode = newMode;
            particles = [];
        }

        function toggleColors() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            particles.forEach(p => {
                p.color = colorSchemes[colorScheme][Math.floor(Math.random() * 4)];
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        animate();
    </script>
</body>
</html>
