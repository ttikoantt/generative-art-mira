<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
        }
        .controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .controls button:active {
            transform: scale(0.95);
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
            }
            .controls {
                bottom: 10px;
            }
            .controls button {
                padding: 10px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <div>🌊 Particle Flow</div>
        <div>マウスでエリアをドラッグ</div>
    </div>
    <div class="controls">
        <button id="flowBtn">🌊 フロー</button>
        <button id="spiralBtn">🌀 スパイラル</button>
        <button id="explosionBtn">💥 爆発</button>
        <button id="rainbowBtn">🌈 レインボー</button>
    </div>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        const particleCount = 500;
        let mouse = { x: width / 2, y: height / 2, pressed: false };
        let flowMode = 'flow'; // flow, spiral, explosion, rainbow
        let hueOffset = 0;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 2 + 1;
                this.hue = Math.random() * 60 + 180; // Cyan to Blue
                this.life = 1;
                this.maxLife = Math.random() * 200 + 100;
                this.age = 0;
            }

            update() {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);

                let speed;
                if (mouse.pressed) {
                    speed = Math.max(0, 150 - dist) / 10;
                } else {
                    speed = Math.max(0, 200 - dist) / 30;
                }

                if (flowMode === 'flow') {
                    this.vx += Math.cos(angle) * speed * 0.5;
                    this.vy += Math.sin(angle) * speed * 0.5;
                    this.vx += Math.sin(this.y * 0.01) * 0.3;
                    this.vy += Math.cos(this.x * 0.01) * 0.3;
                } else if (flowMode === 'spiral') {
                    const spiralAngle = angle + Math.PI / 2;
                    this.vx += Math.cos(spiralAngle) * speed;
                    this.vy += Math.sin(spiralAngle) * speed;
                } else if (flowMode === 'explosion') {
                    this.vx += Math.cos(angle) * speed * 2;
                    this.vy += Math.sin(angle) * speed * 2;
                } else if (flowMode === 'rainbow') {
                    this.vx += Math.cos(angle) * speed * 0.5;
                    this.vy += Math.sin(angle) * speed * 0.5;
                    this.hue = (this.hue + 2 + hueOffset) % 360;
                }

                this.vx *= 0.95;
                this.vy *= 0.95;

                this.x += this.vx;
                this.y += this.vy;

                this.age++;
                if (this.age > this.maxLife || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw() {
                const alpha = 1 - (this.age / this.maxLife);
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const size = this.size + speed * 0.5;

                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${alpha})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            hueOffset = (hueOffset + 0.5) % 360;

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousedown', () => mouse.pressed = true);
        canvas.addEventListener('mouseup', () => mouse.pressed = false);
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.pressed = true;
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => mouse.pressed = false);

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        document.getElementById('flowBtn').addEventListener('click', () => flowMode = 'flow');
        document.getElementById('spiralBtn').addEventListener('click', () => flowMode = 'spiral');
        document.getElementById('explosionBtn').addEventListener('click', () => flowMode = 'explosion');
        document.getElementById('rainbowBtn').addEventListener('click', () => flowMode = 'rainbow');

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
