<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Dreams - 流体の夢</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>Fluid Dreams</h1>
        <p>マウス/タッチで流体を操ってください</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 粒子クラス
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.003 + Math.random() * 0.005;
                this.hue = hue || Math.random() * 360;
                this.size = Math.random() * 3 + 2;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${this.hue}, 70%, 60%)`;
                ctx.shadowColor = `hsl(${this.hue}, 70%, 60%)`;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 流体クラス
        class FluidPoint {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.hue = Math.random() * 360;
            }

            update(targetX, targetY) {
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0) {
                    this.vx += (dx / dist) * 0.1;
                    this.vy += (dy / dist) * 0.1;
                }

                this.vx *= 0.95;
                this.vy *= 0.95;
                this.x += this.vx;
                this.y += this.vy;
                this.hue += 0.5;
            }

            draw() {
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const alpha = Math.min(speed * 0.3, 0.8);

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.shadowColor = `hsl(${this.hue}, 80%, 60%)`;
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3 + speed * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        let particles = [];
        let fluidPoints = [];
        let mouseX = width / 2;
        let mouseY = height / 2;
        let isMouseDown = false;
        let hue = 0;

        // 流体ポイントを初期化
        const numPoints = 200;
        for (let i = 0; i < numPoints; i++) {
            fluidPoints.push(new FluidPoint(
                Math.random() * width,
                Math.random() * height
            ));
        }

        // イベントリスナー
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            if (isMouseDown) {
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(mouseX, mouseY, hue));
                }
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;

            if (isMouseDown) {
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(mouseX, mouseY, hue));
                }
            }
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function animate() {
            // 背景を半透明でクリア（トレイル効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            hue += 0.5;

            // 流体ポイントを更新
            fluidPoints.forEach(point => {
                const targetX = isMouseDown ? mouseX : width / 2 + Math.sin(Date.now() * 0.001 + point.hue * 0.1) * 200;
                const targetY = isMouseDown ? mouseY : height / 2 + Math.cos(Date.now() * 0.0013 + point.hue * 0.1) * 200;
                point.update(targetX, targetY);
                point.draw();
            });

            // 粒子を更新
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 自動的に粒子を生成
            if (!isMouseDown && Math.random() > 0.7) {
                particles.push(new Particle(
                    width / 2 + Math.sin(Date.now() * 0.002) * 100,
                    height / 2 + Math.cos(Date.now() * 0.0023) * 100,
                    hue
                ));
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
