<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Text Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #fff;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #00ffff;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #00ffff, #0080ff);
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <div class="input-group">
            <input type="text" id="textInput" value="MIRA" placeholder="テキストを入力">
            <button id="updateBtn">更新</button>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };
        let text = 'MIRA';
        let fontSize = 150;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 画面サイズに応じてフォントサイズ調整
            fontSize = Math.min(canvas.width, canvas.height) * 0.2;
            if (fontSize < 60) fontSize = 60;
            if (fontSize > 200) fontSize = 200;

            initParticles();
        }

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.targetX = x;
                this.targetY = y;
                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 3 + 1;
                this.hue = Math.random() * 60 + 180; // 青〜紫
            }

            update() {
                // ターゲット位置への力
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                let distToTarget = Math.sqrt(dx * dx + dy * dy);

                // マウスからの力
                let dxMouse = this.x - mouse.x;
                let dyMouse = this.y - mouse.y;
                let distToMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

                if (distToMouse < mouse.radius) {
                    let force = (mouse.radius - distToMouse) / mouse.radius;
                    let angle = Math.atan2(dyMouse, dxMouse);
                    this.vx += Math.cos(angle) * force * 2;
                    this.vy += Math.sin(angle) * force * 2;
                }

                // ターゲットへ戻る力
                if (distToTarget > 1) {
                    let springForce = distToTarget * 0.01;
                    let angle = Math.atan2(dy, dx);
                    this.vx += Math.cos(angle) * springForce;
                    this.vy += Math.sin(angle) * springForce;
                }

                // 減速
                this.vx *= 0.92;
                this.vy *= 0.92;

                this.x += this.vx;
                this.y += this.vy;

                // 色の更新
                let speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                this.hue = 180 + speed * 10;
            }

            draw() {
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];

            // オフスクリーンキャンバスでテキストを描画
            let offCanvas = document.createElement('canvas');
            let offCtx = offCanvas.getContext('2d');
            offCanvas.width = canvas.width;
            offCanvas.height = canvas.height;

            offCtx.fillStyle = '#fff';
            offCtx.font = `bold ${fontSize}px Arial`;
            offCtx.textAlign = 'center';
            offCtx.textBaseline = 'middle';
            offCtx.fillText(text, canvas.width / 2, canvas.height / 2);

            // ピクセルデータを取得
            let imageData = offCtx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;

            // ピクセルをスキャンしてパーティクル作成
            let gap = 6;
            for (let y = 0; y < canvas.height; y += gap) {
                for (let x = 0; x < canvas.width; x += gap) {
                    let index = (y * canvas.width + x) * 4;
                    if (data[index + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            // トレイル効果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // テキスト更新
        document.getElementById('updateBtn').addEventListener('click', () => {
            text = document.getElementById('textInput').value.toUpperCase();
            initParticles();
        });

        document.getElementById('textInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                text = document.getElementById('textInput').value.toUpperCase();
                initParticles();
            }
        });

        // 全画面
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
