<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interference Waves - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        button {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            z-index: 100;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                padding: 0 20px;
            }

            button {
                padding: 10px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Interference Waves - Click to add wave sources</div>
    <div class="controls">
        <button onclick="reset()">Reset</button>
        <button onclick="randomize()">Randomize</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let sources = [];
        let time = 0;
        let animationId;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function init() {
            sources = [];
            // 3つの波源を初期配置
            sources.push({ x: width * 0.3, y: height * 0.3, frequency: 2 + Math.random() * 2, amplitude: 1 });
            sources.push({ x: width * 0.7, y: height * 0.3, frequency: 2 + Math.random() * 2, amplitude: 1 });
            sources.push({ x: width * 0.5, y: height * 0.7, frequency: 2 + Math.random() * 2, amplitude: 1 });
        }

        function reset() {
            init();
        }

        function randomize() {
            sources = [];
            const count = 2 + Math.floor(Math.random() * 3); // 2-4 sources
            for (let i = 0; i < count; i++) {
                sources.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    frequency: 1.5 + Math.random() * 2.5,
                    amplitude: 0.8 + Math.random() * 0.4
                });
            }
        }

        function draw() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;
            const scale = 4; // パフォーマンス向上のためのスケール

            for (let y = 0; y < height; y += scale) {
                for (let x = 0; x < width; x += scale) {
                    let totalWave = 0;

                    // 各波源からの波の重ね合わせ
                    for (const source of sources) {
                        const dx = x - source.x;
                        const dy = y - source.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const wave = Math.sin(distance * 0.02 * source.frequency - time * 2) * source.amplitude;
                        totalWave += wave;
                    }

                    // 波の高さを色に変換
                    const intensity = (totalWave / sources.length + 1) / 2; // 0-1
                    const hue = (intensity * 60 + time * 20) % 360;
                    const saturation = 80;
                    const lightness = 20 + intensity * 60;

                    // HSL to RGB
                    const hslToRgb = (h, s, l) => {
                        s /= 100;
                        l /= 100;
                        const a = s * Math.min(l, 1 - l);
                        const f = n => {
                            const k = (n + h / 30) % 12;
                            return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                        };
                        return [f(0), f(8), f(4)];
                    };

                    const rgb = hslToRgb(hue, saturation, lightness);

                    // スケール分のピクセルを埋める
                    for (let dy = 0; dy < scale && y + dy < height; dy++) {
                        for (let dx = 0; dx < scale && x + dx < width; dx++) {
                            const idx = ((y + dy) * width + (x + dx)) * 4;
                            data[idx] = rgb[0] * 255;
                            data[idx + 1] = rgb[1] * 255;
                            data[idx + 2] = rgb[2] * 255;
                            data[idx + 3] = 255;
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);

            // 波源を描画
            for (const source of sources) {
                ctx.beginPath();
                ctx.arc(source.x, source.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(source.x, source.y, 12, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.stroke();
            }

            time += 0.016;
            animationId = requestAnimationFrame(draw);
        }

        // クリックで波源を追加
        canvas.addEventListener('click', (e) => {
            sources.push({
                x: e.clientX,
                y: e.clientY,
                frequency: 1.5 + Math.random() * 2.5,
                amplitude: 0.8 + Math.random() * 0.4
            });
        });

        window.addEventListener('resize', () => {
            resize();
            if (sources.length === 0) {
                init();
            }
        });

        resize();
        init();
        draw();
    </script>
</body>
</html>
