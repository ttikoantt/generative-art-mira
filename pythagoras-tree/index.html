<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythagoras Tree - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 20px;
        }

        canvas {
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            max-width: 100%;
            height: auto;
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Pythagoras Tree</h1>
        <p class="subtitle">ピタゴラスの木 フラクタル</p>

        <canvas id="canvas" width="900" height="700"></canvas>

        <div class="controls">
            <button onclick="regenerate()">🔄 新しい木</button>
            <button onclick="changeDepth()">📊 深さ変更</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>
        </div>

        <p class="info">クリックで角度を変更 | スペースで新しい木</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let depth = 10;
        let angle = Math.PI / 6;
        let size = 150;
        let colorHue = 0;

        function drawTree(x, y, length, angle, currentDepth) {
            if (currentDepth === 0) return;

            const endX = x + length * Math.cos(angle);
            const endY = y - length * Math.sin(angle);

            // 色のグラデーション
            const hue = (colorHue + (depth - currentDepth) * 20) % 360;
            const saturation = 70 + (depth - currentDepth) * 3;
            const lightness = 40 + (depth - currentDepth) * 5;

            ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            ctx.lineWidth = currentDepth * 0.8;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 新しい枝の長さと角度
            const newLength = length * 0.7;
            const leftAngle = angle + angle + Math.random() * 0.1 - 0.05;
            const rightAngle = angle - angle + Math.random() * 0.1 - 0.05;

            drawTree(endX, endY, newLength, leftAngle, currentDepth - 1);
            drawTree(endX, endY, newLength, rightAngle, currentDepth - 1);
        }

        function draw() {
            ctx.fillStyle = '#0a0820';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startX = canvas.width / 2;
            const startY = canvas.height - 50;

            drawTree(startX, startY, size, Math.PI / 2, depth);
        }

        function regenerate() {
            colorHue = Math.random() * 360;
            draw();
        }

        function changeDepth() {
            depth = depth >= 12 ? 8 : depth + 1;
            draw();
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                canvas.requestFullscreen();
            }
        }

        // クリックで角度変更
        canvas.addEventListener('click', () => {
            angle = Math.random() * Math.PI / 3 + Math.PI / 12;
            draw();
        });

        // スペースで新しい木
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                regenerate();
            }
        });

        // 初期描画
        regenerate();
    </script>
</body>
</html>
