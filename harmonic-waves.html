<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonic Waves - Mathematical Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 5s ease infinite;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.1);
        }

        @keyframes gradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
            z-index: 10;
        }

        .control-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .control-btn:active {
            transform: translateY(0);
        }

        .info {
            position: absolute;
            top: 70px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 250px;
        }

        .info p {
            margin: 5px 0;
            opacity: 0.9;
        }

        .info strong {
            color: #4ecdc4;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 1.2rem;
                top: 10px;
            }

            .info {
                display: none;
            }

            .controls {
                bottom: 10px;
                gap: 8px;
            }

            .control-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">Harmonic Waves</h1>
        <canvas id="canvas"></canvas>
        <div class="info">
            <p><strong>Waves:</strong> <span id="waveCount">3</span></p>
            <p><strong>Speed:</strong> <span id="speedValue">1.0x</span></p>
            <p><strong>Amplitude:</strong> <span id="ampValue">100</span></p>
            <p style="margin-top: 10px; font-size: 0.75rem; opacity: 0.7;">
                Click to change color scheme<br>
                Move mouse to influence waves
            </p>
        </div>
        <div class="controls">
            <button class="control-btn" onclick="addWave()">+ Wave</button>
            <button class="control-btn" onclick="removeWave()">- Wave</button>
            <button class="control-btn" onclick="changeSpeed()">Speed</button>
            <button class="control-btn" onclick="toggleAnimation()">Pause</button>
            <button class="control-btn" onclick="resetCanvas()">Reset</button>
            <button class="control-btn" onclick="fullscreen()">⛶ Full</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let animationId;
        let isPaused = false;
        let mouseX = 0;
        let mouseY = 0;

        // Wave parameters
        let waves = [];
        let speedMultiplier = 1.0;
        let amplitude = 100;

        // Color schemes
        const colorSchemes = [
            ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4'],
            ['#f093fb', '#f5576c', '#4facfe', '#00f2fe'],
            ['#a8edea', '#fed6e3', '#d299c2', '#fef9d7'],
            ['#ffecd2', '#fcb69f', '#ee9ca7', '#ffdde1'],
            ['#667eea', '#764ba2', '#f093fb', '#f5576c']
        ];
        let currentScheme = 0;

        function resize() {
            const maxWidth = Math.min(window.innerWidth - 40, 900);
            const maxHeight = Math.min(window.innerHeight - 180, 700);
            width = canvas.width = maxWidth;
            height = canvas.height = maxHeight;
        }

        function initWaves() {
            waves = [];
            for (let i = 0; i < 3; i++) {
                waves.push({
                    frequency: 0.01 + i * 0.005,
                    phase: i * Math.PI / 3,
                    amplitude: amplitude * (1 - i * 0.2),
                    speed: 0.02 + i * 0.01,
                    color: colorSchemes[currentScheme][i % colorSchemes[currentScheme].length]
                });
            }
            updateInfo();
        }

        function addWave() {
            if (waves.length < 8) {
                const i = waves.length;
                waves.push({
                    frequency: 0.01 + i * 0.005,
                    phase: i * Math.PI / 3,
                    amplitude: amplitude * (1 - i * 0.15),
                    speed: 0.02 + i * 0.01,
                    color: colorSchemes[currentScheme][i % colorSchemes[currentScheme].length]
                });
                updateInfo();
            }
        }

        function removeWave() {
            if (waves.length > 1) {
                waves.pop();
                updateInfo();
            }
        }

        function changeSpeed() {
            speedMultiplier = speedMultiplier >= 2.0 ? 0.5 : speedMultiplier + 0.5;
            document.getElementById('speedValue').textContent = speedMultiplier.toFixed(1) + 'x';
        }

        function toggleAnimation() {
            isPaused = !isPaused;
            const btn = event.target;
            btn.textContent = isPaused ? 'Play' : 'Pause';
        }

        function resetCanvas() {
            initWaves();
            speedMultiplier = 1.0;
            document.getElementById('speedValue').textContent = '1.0x';
            currentScheme = 0;
        }

        function fullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function updateInfo() {
            document.getElementById('waveCount').textContent = waves.length;
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const time = Date.now() * 0.001;
            const mouseInfluence = (mouseX / width - 0.5) * 2;

            waves.forEach((wave, index) => {
                ctx.beginPath();
                ctx.moveTo(0, height / 2);

                for (let x = 0; x < width; x++) {
                    const y = height / 2 +
                        Math.sin(x * wave.frequency + wave.phase + time * wave.speed * speedMultiplier * 5) *
                        wave.amplitude *
                        (1 + mouseInfluence * 0.3) +
                        Math.cos(x * wave.frequency * 0.5 + time * wave.speed * speedMultiplier * 3) *
                        wave.amplitude * 0.5;

                    ctx.lineTo(x, y);
                }

                ctx.strokeStyle = wave.color;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 15;
                ctx.shadowColor = wave.color;
                ctx.stroke();
            });

            // Draw intersection points
            waves.forEach((wave, i) => {
                for (let j = i + 1; j < waves.length; j++) {
                    for (let x = 0; x < width; x += 20) {
                        const y1 = height / 2 +
                            Math.sin(x * wave.frequency + wave.phase + time * wave.speed * speedMultiplier * 5) *
                            wave.amplitude * (1 + mouseInfluence * 0.3);
                        const y2 = height / 2 +
                            Math.sin(x * waves[j].frequency + waves[j].phase + time * waves[j].speed * speedMultiplier * 5) *
                            waves[j].amplitude * (1 + mouseInfluence * 0.3);

                        if (Math.abs(y1 - y2) < 5) {
                            ctx.beginPath();
                            ctx.arc(x, y1, 4, 0, Math.PI * 2);
                            ctx.fillStyle = '#fff';
                            ctx.shadowBlur = 20;
                            ctx.shadowColor = '#fff';
                            ctx.fill();
                        }
                    }
                }
            });

            if (!isPaused) {
                animationId = requestAnimationFrame(draw);
            }
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('click', () => {
            currentScheme = (currentScheme + 1) % colorSchemes.length;
            waves.forEach((wave, i) => {
                wave.color = colorSchemes[currentScheme][i % colorSchemes[currentScheme].length];
            });
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            currentScheme = (currentScheme + 1) % colorSchemes.length;
            waves.forEach((wave, i) => {
                wave.color = colorSchemes[currentScheme][i % colorSchemes[currentScheme].length];
            });
        });

        window.addEventListener('resize', resize);

        // Initialize
        resize();
        initWaves();
        draw();
    </script>
</body>
</html>
