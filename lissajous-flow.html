<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lissajous Flow - Interactive Mathematical Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
            user-select: none;
        }

        .params {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
        }

        .params div {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">マウスを動かしてパラメータを変化させてください</div>

    <div class="params">
        <div>周波数 A: <span id="freqA">3</span></div>
        <div>周波数 B: <span id="freqB">2</span></div>
        <div>位相差: <span id="phase">90</span>°</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;

        // パラメータ
        let freqA = 3;  // x方向の周波数
        let freqB = 2;  // y方向の周波数
        let phase = Math.PI / 2;  // 位相差
        let time = 0;  // 時間変数

        // マウス位置
        let mouseX = 0;
        let mouseY = 0;

        // キャンバスサイズ設定
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        // リサージュ図形を描画
        function drawLissajous(a, b, delta, color, scale, alpha) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = alpha;

            const points = 1000;
            for (let i = 0; i <= points; i++) {
                const t = (i / points) * Math.PI * 2;
                const x = Math.sin(a * t + delta) * scale;
                const y = Math.cos(b * t) * scale;

                if (i === 0) {
                    ctx.moveTo(centerX + x, centerY + y);
                } else {
                    ctx.lineTo(centerX + x, centerY + y);
                }
            }

            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        // HSLをRGB文字列に変換
        function hslToRgb(h, s, l) {
            return `hsl(${h}, ${s}%, ${l}%)`;
        }

        // アニメーションループ
        function animate() {
            // 背景を半透明で塗りつぶして軌跡効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // マウス位置からパラメータを計算
            const targetFreqA = 1 + (mouseX / width) * 8;  // 1-9
            const targetFreqB = 1 + (mouseY / height) * 8;  // 1-9

            // パラメータを滑らかに変化
            freqA += (targetFreqA - freqA) * 0.05;
            freqB += (targetFreqB - freqB) * 0.05;
            phase += 0.01;  // 位相を時間と共に変化
            time += 0.005;

            // 複数のリサージュ図形を重ねて描画
            const layers = 5;
            for (let i = 0; i < layers; i++) {
                const layerPhase = phase + (i * Math.PI / layers);
                const layerScale = Math.min(width, height) * 0.35 * (1 + i * 0.1);

                // 色のグラデーション
                const hue = (time * 50 + i * 30) % 360;
                const color = hslToRgb(hue, 70, 55);

                // 半透明で重ねる
                drawLissajous(freqA, freqB, layerPhase, color, layerScale, 0.3);
            }

            // メインの図形（太くて明るい）
            const mainScale = Math.min(width, height) * 0.35;
            const mainHue = (time * 50) % 360;
            const mainColor = hslToRgb(mainHue, 80, 60);
            drawLissajous(freqA, freqB, phase, mainColor, mainScale, 0.8);

            // パラメータ表示を更新
            document.getElementById('freqA').textContent = freqA.toFixed(2);
            document.getElementById('freqB').textContent = freqB.toFixed(2);
            document.getElementById('phase').textContent = Math.round((phase % (2 * Math.PI)) * 180 / Math.PI);

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        // 初期化
        resize();
        mouseX = width * 0.4;  // デフォルト位置
        mouseY = height * 0.3;
        animate();
    </script>
</body>
</html>
