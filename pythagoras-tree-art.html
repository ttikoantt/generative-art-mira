<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pythagoras Tree Art | Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #0c0c0c 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.8);
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }

        canvas {
            border: 2px solid rgba(138, 43, 226, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
            background: rgba(0, 0, 0, 0.5);
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        .controls {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: clamp(0.9rem, 2vw, 1rem);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-fullscreen {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .info {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.8rem, 1.5vw, 0.9rem);
            margin-top: 1rem;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Pythagoras Tree Art</h1>
        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
        <div class="controls">
            <button class="btn" onclick="changeStyle()">Style Change</button>
            <button class="btn" onclick="toggleAnimation()">Pause/Play</button>
            <button class="btn btn-fullscreen" onclick="toggleFullscreen()">Fullscreen</button>
        </div>
        <p class="info">ピタゴラスの木 - 数学的な美しさを再帰的なフラクタル構造で表現</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.6, 600);
            canvas.width = size;
            canvas.height = size;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let animationId;
        let isAnimating = true;
        let time = 0;
        let styleIndex = 0;

        const colorSchemes = [
            { name: 'Sunset', start: '#ff6b6b', end: '#feca57' },
            { name: 'Ocean', start: '#00d2d3', end: '#54a0ff' },
            { name: 'Forest', start: '#26de81', end: '#20bf6b' },
            { name: 'Cosmic', start: '#a29bfe', end: '#fd79a8' },
            { name: 'Fire', start: '#ff9f43', end: '#ee5a24' }
        ];

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function interpolateColor(color1, color2, factor) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + (c2.r - c1.r) * factor);
            const g = Math.round(c1.g + (c2.g - c1.g) * factor);
            const b = Math.round(c1.b + (c2.b - c1.b) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function drawTree(x, y, length, angle, depth, maxDepth) {
            if (depth > maxDepth) return;

            const endX = x + length * Math.cos(angle);
            const endY = y - length * Math.sin(angle);

            // 色を計算
            const scheme = colorSchemes[styleIndex];
            const colorFactor = depth / maxDepth;
            const baseColor = interpolateColor(scheme.start, scheme.end, colorFactor);

            // 太さを計算
            const lineWidth = Math.max(1, (maxDepth - depth) * 1.5);

            // 枝を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = baseColor;
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            ctx.shadowBlur = depth === 0 ? 0 : 10;
            ctx.shadowColor = baseColor;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 風の効果
            const windEffect = Math.sin(time * 0.02 + depth * 0.5) * 0.05;

            // 左の枝
            const newLength = length * 0.7;
            const leftAngle = angle + Math.PI / 4 + windEffect;
            drawTree(endX, endY, newLength, leftAngle, depth + 1, maxDepth);

            // 右の枝
            const rightAngle = angle - Math.PI / 4 + windEffect;
            drawTree(endX, endY, newLength, rightAngle, depth + 1, maxDepth);
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startX = canvas.width / 2;
            const startY = canvas.height * 0.9;
            const initialLength = canvas.height * 0.2;
            const maxDepth = 10;

            drawTree(startX, startY, initialLength, Math.PI / 2, 0, maxDepth);

            if (isAnimating) {
                time++;
            }
        }

        function animate() {
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function changeStyle() {
            styleIndex = (styleIndex + 1) % colorSchemes.length;
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // タッチ操作対応
        let lastTouch = 0;
        canvas.addEventListener('touchstart', (e) => {
            lastTouch = Date.now();
        });

        canvas.addEventListener('touchend', (e) => {
            if (Date.now() - lastTouch < 300) {
                changeStyle();
            }
        });

        // クリック操作対応
        canvas.addEventListener('click', () => {
            changeStyle();
        });

        // 初期化
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        animate();
    </script>
</body>
</html>
