<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>生命の森 - Forest of Life</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .control-btn:hover {
            transform: scale(1.05);
            background: rgba(102, 126, 234, 1);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="info">🌱 セルをクリックして生命を誕生させます</div>
    <div class="stats">Generation: <span id="generation">0</span> | Population: <span id="population">0</span></div>
    
    <div class="controls">
        <button class="control-btn" id="playBtn">▶️ 開始</button>
        <button class="control-btn" id="stepBtn">⏭️ 1ステップ</button>
        <button class="control-btn" id="clearBtn">🗑️ クリア</button>
        <button class="control-btn" id="randomBtn">🎲 ランダム</button>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const generationEl = document.getElementById('generation');
        const populationEl = document.getElementById('population');
        const playBtn = document.getElementById('playBtn');
        const stepBtn = document.getElementById('stepBtn');
        const clearBtn = document.getElementById('clearBtn');
        const randomBtn = document.getElementById('randomBtn');

        let width, height;
        let cellSize = 8;
        let cols, rows;
        let grid = [];
        let isPlaying = false;
        let animationId = null;
        let generation = 0;
        let lastUpdateTime = 0;
        const updateInterval = 100; // Update every 100ms

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.ceil(width / cellSize);
            rows = Math.ceil(height / cellSize);
            initGrid();
        }

        function initGrid() {
            grid = new Array(cols).fill(null).map(() => new Array(rows).fill(0));
            generation = 0;
            updateStats();
        }

        function randomize() {
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    grid[i][j] = Math.random() > 0.7 ? 1 : 0;
                }
            }
            generation = 0;
            updateStats();
        }

        function countNeighbors(x, y) {
            let sum = 0;
            for (let i = -1; i < 2; i++) {
                for (let j = -1; j < 2; j++) {
                    const col = (x + i + cols) % cols;
                    const row = (y + j + rows) % rows;
                    sum += grid[col][row];
                }
            }
            sum -= grid[x][y];
            return sum;
        }

        function update() {
            const nextGrid = new Array(cols).fill(null).map(() => new Array(rows).fill(0));

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const state = grid[i][j];
                    const neighbors = countNeighbors(i, j);

                    if (state === 0 && neighbors === 3) {
                        nextGrid[i][j] = 1;
                    } else if (state === 1 && (neighbors < 2 || neighbors > 3)) {
                        nextGrid[i][j] = 0;
                    } else {
                        nextGrid[i][j] = state;
                    }
                }
            }

            grid = nextGrid;
            generation++;
            updateStats();
        }

        function updateStats() {
            generationEl.textContent = generation;
            
            let population = 0;
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    population += grid[i][j];
                }
            }
            populationEl.textContent = population;
        }

        function draw() {
            // Background with fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 1)';
            ctx.fillRect(0, 0, width, height);

            // Draw grid
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    if (grid[i][j] === 1) {
                        const x = i * cellSize;
                        const y = j * cellSize;
                        
                        // Calculate color based on position and time
                        const hue = (generation * 0.5 + i * 2 + j * 2) % 360;
                        
                        // Cell glow
                        const gradient = ctx.createRadialGradient(
                            x + cellSize / 2, y + cellSize / 2, 0,
                            x + cellSize / 2, y + cellSize / 2, cellSize
                        );
                        
                        gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, 1)`);
                        gradient.addColorStop(0.5, `hsla(${hue}, 100%, 50%, 0.6)`);
                        gradient.addColorStop(1, `hsla(${hue}, 100%, 30%, 0)`);
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x - 2, y - 2, cellSize + 4, cellSize + 4);
                        
                        // Cell core
                        ctx.fillStyle = `hsla(${hue}, 100%, 90%, 0.9)`;
                        ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
                    }
                }
            }
        }

        function animate(currentTime) {
            if (!isPlaying) return;
            
            animationId = requestAnimationFrame(animate);
            
            if (currentTime - lastUpdateTime > updateInterval) {
                update();
                lastUpdateTime = currentTime;
            }
            
            draw();
        }

        // Event listeners
        window.addEventListener('resize', resize);
        resize();

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize);
            const y = Math.floor((e.clientY - rect.top) / cellSize);
            
            if (x >= 0 && x < cols && y >= 0 && y < rows) {
                grid[x][y] = grid[x][y] === 0 ? 1 : 0;
                updateStats();
                draw();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let touch of e.touches) {
                const x = Math.floor((touch.clientX - rect.left) / cellSize);
                const y = Math.floor((touch.clientY - rect.top) / cellSize);
                
                if (x >= 0 && x < cols && y >= 0 && y < rows) {
                    grid[x][y] = grid[x][y] === 0 ? 1 : 0;
                }
            }
            updateStats();
            draw();
        }, { passive: false });

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '⏸️ 停止' : '▶️ 開始';
            
            if (isPlaying) {
                lastUpdateTime = performance.now();
                animate(lastUpdateTime);
            } else {
                cancelAnimationFrame(animationId);
            }
        });

        stepBtn.addEventListener('click', () => {
            if (!isPlaying) {
                update();
                draw();
            }
        });

        clearBtn.addEventListener('click', () => {
            initGrid();
            draw();
        });

        randomBtn.addEventListener('click', () => {
            randomize();
            draw();
        });

        // Initial draw
        draw();
    </script>
</body>
</html>
