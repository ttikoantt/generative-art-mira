<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>生命の森 - Forest of Life</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .control-btn:hover {
            transform: scale(1.05);
            background: rgba(102, 126, 234, 1);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="info">🌱 セルをクリックして生命を誕生させます</div>
    <div class="stats">Generation: <span id="generation">0</span> | Population: <span id="population">0</span> | Species: <span id="species">0</span></div>
    
    <div class="controls">
        <button class="control-btn" id="playBtn">▶️ 開始</button>
        <button class="control-btn" id="stepBtn">⏭️ 1ステップ</button>
        <button class="control-btn" id="clearBtn">🗑️ クリア</button>
        <button class="control-btn" id="randomBtn">🎲 ランダム</button>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const generationEl = document.getElementById('generation');
        const populationEl = document.getElementById('population');
        const speciesEl = document.getElementById('species');
        const playBtn = document.getElementById('playBtn');
        const stepBtn = document.getElementById('stepBtn');
        const clearBtn = document.getElementById('clearBtn');
        const randomBtn = document.getElementById('randomBtn');

        let width, height;
        let cellSize = 8;
        let cols, rows;
        let grid = [];
        let isPlaying = false;
        let animationId = null;
        let generation = 0;
        let lastUpdateTime = 0;
        const updateInterval = 100;

        // Species types
        const speciesTypes = [
            { hue: 0, name: 'Red' },
            { hue: 120, name: 'Green' },
            { hue: 240, name: 'Blue' },
            { hue: 60, name: 'Yellow' },
            { hue: 300, name: 'Purple' }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.ceil(width / cellSize);
            rows = Math.ceil(height / cellSize);
            initGrid();
        }

        function initGrid() {
            grid = new Array(cols).fill(null).map(() => new Array(rows).fill(null));
            generation = 0;
            updateStats();
        }

        function randomize() {
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    if (Math.random() > 0.7) {
                        const species = speciesTypes[Math.floor(Math.random() * speciesTypes.length)];
                        grid[i][j] = {
                            alive: true,
                            age: 0,
                            species: species
                        };
                    }
                }
            }
            generation = 0;
            updateStats();
        }

        function countNeighbors(x, y) {
            let sum = 0;
            let speciesCount = {};
            
            speciesTypes.forEach(s => speciesCount[s.name] = 0);
            
            for (let i = -1; i < 2; i++) {
                for (let j = -1; j < 2; j++) {
                    const col = (x + i + cols) % cols;
                    const row = (y + j + rows) % rows;
                    const cell = grid[col][row];
                    
                    if (cell && cell.alive) {
                        sum++;
                        speciesCount[cell.species.name]++;
                    }
                }
            }
            
            if (grid[x][y] && grid[x][y].alive) {
                sum--;
                speciesCount[grid[x][y].species.name]--;
            }
            
            return { sum, speciesCount };
        }

        function update() {
            const nextGrid = new Array(cols).fill(null).map(() => new Array(rows).fill(null));

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const cell = grid[i][j];
                    const { sum, speciesCount } = countNeighbors(i, j);
                    
                    if (cell && cell.alive) {
                        // Survival rules
                        if (sum < 2 || sum > 3) {
                            // Death
                            nextGrid[i][j] = { alive: false, age: 0, species: cell.species };
                        } else {
                            // Survival and age
                            nextGrid[i][j] = {
                                alive: true,
                                age: cell.age + 1,
                                species: cell.species
                            };
                            
                            // Evolution: older cells can mutate
                            if (cell.age > 50 && Math.random() < 0.01) {
                                const newSpecies = speciesTypes[Math.floor(Math.random() * speciesTypes.length)];
                                nextGrid[i][j].species = newSpecies;
                            }
                        }
                    } else {
                        // Birth rules
                        if (sum === 3) {
                            // Determine species based on neighbors
                            let maxCount = 0;
                            let dominantSpecies = speciesTypes[0];
                            
                            for (const [name, count] of Object.entries(speciesCount)) {
                                if (count > maxCount) {
                                    maxCount = count;
                                    dominantSpecies = speciesTypes.find(s => s.name === name);
                                }
                            }
                            
                            nextGrid[i][j] = {
                                alive: true,
                                age: 0,
                                species: dominantSpecies
                            };
                        }
                    }
                }
            }

            grid = nextGrid;
            generation++;
            updateStats();
        }

        function updateStats() {
            generationEl.textContent = generation;
            
            let population = 0;
            const speciesSet = new Set();
            
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const cell = grid[i][j];
                    if (cell && cell.alive) {
                        population++;
                        speciesSet.add(cell.species.name);
                    }
                }
            }
            
            populationEl.textContent = population;
            speciesEl.textContent = speciesSet.size;
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 15, 1)';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const cell = grid[i][j];
                    if (cell && cell.alive) {
                        const x = i * cellSize;
                        const y = j * cellSize;
                        
                        // Calculate size based on age
                        const ageSize = Math.min(cell.age / 50, 1);
                        const size = cellSize * (0.8 + ageSize * 0.4);
                        
                        // Calculate alpha based on age
                        const alpha = 0.5 + Math.min(ageSize, 0.5);
                        
                        // Cell glow
                        const gradient = ctx.createRadialGradient(
                            x + cellSize / 2, y + cellSize / 2, 0,
                            x + cellSize / 2, y + cellSize / 2, size
                        );
                        
                        const hue = (cell.species.hue + generation * 0.2 + i * 2 + j * 2) % 360;
                        
                        gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, ${alpha})`);
                        gradient.addColorStop(0.5, `hsla(${hue}, 100%, 50%, ${alpha * 0.6})`);
                        gradient.addColorStop(1, `hsla(${hue}, 100%, 30%, 0)`);
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x - 2, y - 2, size + 4, size + 4);
                        
                        // Cell core
                        ctx.fillStyle = `hsla(${hue}, 100%, 90%, ${alpha * 0.9})`;
                        ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
                        
                        // Age indicator
                        if (cell.age > 30) {
                            ctx.strokeStyle = `hsla(${hue}, 100%, 80%, 0.3)`;
                            ctx.lineWidth = 1;
                            ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);
                        }
                    }
                }
            }
        }

        function animate(currentTime) {
            if (!isPlaying) return;
            
            animationId = requestAnimationFrame(animate);
            
            if (currentTime - lastUpdateTime > updateInterval) {
                update();
                lastUpdateTime = currentTime;
            }
            
            draw();
        }

        window.addEventListener('resize', resize);
        resize();

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize);
            const y = Math.floor((e.clientY - rect.top) / cellSize);
            
            if (x >= 0 && x < cols && y >= 0 && y < rows) {
                const cell = grid[x][y];
                if (cell && cell.alive) {
                    grid[x][y] = { alive: false, age: 0, species: cell.species };
                } else {
                    const species = speciesTypes[Math.floor(Math.random() * speciesTypes.length)];
                    grid[x][y] = { alive: true, age: 0, species: species };
                }
                updateStats();
                draw();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let touch of e.touches) {
                const x = Math.floor((touch.clientX - rect.left) / cellSize);
                const y = Math.floor((touch.clientY - rect.top) / cellSize);
                
                if (x >= 0 && x < cols && y >= 0 && y < rows) {
                    const cell = grid[x][y];
                    if (cell && cell.alive) {
                        grid[x][y] = { alive: false, age: 0, species: cell.species };
                    } else {
                        const species = speciesTypes[Math.floor(Math.random() * speciesTypes.length)];
                        grid[x][y] = { alive: true, age: 0, species: species };
                    }
                }
            }
            updateStats();
            draw();
        }, { passive: false });

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '⏸️ 停止' : '▶️ 開始';
            
            if (isPlaying) {
                lastUpdateTime = performance.now();
                animate(lastUpdateTime);
            } else {
                cancelAnimationFrame(animationId);
            }
        });

        stepBtn.addEventListener('click', () => {
            if (!isPlaying) {
                update();
                draw();
            }
        });

        clearBtn.addEventListener('click', () => {
            initGrid();
            draw();
        });

        randomBtn.addEventListener('click', () => {
            randomize();
            draw();
        });

        draw();
    </script>
</body>
</html>
