<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>生命の森 - Forest of Life</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stats {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .environment {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .control-btn:hover {
            transform: scale(1.05);
            background: rgba(102, 126, 234, 1);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="info">🌱 緑: 植物産者 | 🦁 赤: 捕食者 | 🟡 黄: 雑食</div>
    <div class="stats">Generation: <span id="generation">0</span> | Population: <span id="population">0</span> | Energy: <span id="energy">0</span></div>
    <div class="environment">🌸 季節: <span id="season">春</span> | 🌡️ 温度: <span id="temperature">20</span>°C | 💧 湿度: <span id="humidity">50</span>%</div>
    
    <div class="controls">
        <button class="control-btn" id="playBtn">▶️ 開始</button>
        <button class="control-btn" id="stepBtn">⏭️ 1ステップ</button>
        <button class="control-btn" id="clearBtn">🗑️ クリア</button>
        <button class="control-btn" id="randomBtn">🎲 ランダム</button>
    </div>
    
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const generationEl = document.getElementById('generation');
        const populationEl = document.getElementById('population');
        const energyEl = document.getElementById('energy');
        const seasonEl = document.getElementById('season');
        const temperatureEl = document.getElementById('temperature');
        const humidityEl = document.getElementById('humidity');
        const playBtn = document.getElementById('playBtn');
        const stepBtn = document.getElementById('stepBtn');
        const clearBtn = document.getElementById('clearBtn');
        const randomBtn = document.getElementById('randomBtn');

        let width, height;
        let cellSize = 8;
        let cols, rows;
        let grid = [];
        let isPlaying = false;
        let animationId = null;
        let generation = 0;
        let lastUpdateTime = 0;
        const updateInterval = 100;

        // Environment variables
        let season = 0; // 0: Spring, 1: Summer, 2: Fall, 3: Winter
        let temperature = 20;
        let humidity = 50;
        let seasonTimer = 0;
        const seasonDuration = 500; // Generations per season

        const seasonNames = ['春', '夏', '秋', '冬'];

        // Species types with ecosystem roles
        const speciesTypes = [
            { hue: 120, name: 'Producer', role: 'producer', energyGain: 2 },
            { hue: 0, name: 'Predator', role: 'predator', energyGain: -1 },
            { hue: 60, name: 'Omnivore', role: 'omnivore', energyGain: 0 }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.ceil(width / cellSize);
            rows = Math.ceil(height / cellSize);
            initGrid();
        }

        function initGrid() {
            grid = new Array(cols).fill(null).map(() => new Array(rows).fill(null));
            generation = 0;
            season = 0;
            temperature = 20;
            humidity = 50;
            seasonTimer = 0;
            updateStats();
        }

        function randomize() {
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    if (Math.random() > 0.7) {
                        const species = speciesTypes[Math.floor(Math.random() * speciesTypes.length)];
                        grid[i][j] = {
                            alive: true,
                            age: 0,
                            energy: 50,
                            species: species
                        };
                    }
                }
            }
            generation = 0;
            updateStats();
        }

        function updateEnvironment() {
            seasonTimer++;
            
            // Change season
            if (seasonTimer >= seasonDuration) {
                seasonTimer = 0;
                season = (season + 1) % 4;
            }
            
            // Temperature based on season
            const baseTemps = [15, 30, 20, 5];
            const tempVariation = Math.sin(generation * 0.1) * 5;
            temperature = Math.round(baseTemps[season] + tempVariation);
            
            // Humidity based on season
            const baseHumidity = [60, 40, 50, 70];
            const humidityVariation = Math.cos(generation * 0.15) * 10;
            humidity = Math.round(baseHumidity[season] + humidityVariation);
            
            seasonEl.textContent = seasonNames[season];
            temperatureEl.textContent = temperature;
            humidityEl.textContent = humidity;
        }

        function getEnvironmentMultiplier() {
            let multiplier = 1;
            
            // Temperature effects
            if (temperature < 10) multiplier *= 0.7; // Cold
            else if (temperature > 35) multiplier *= 0.8; // Hot
            else if (temperature >= 20 && temperature <= 25) multiplier *= 1.2; // Optimal
            
            // Humidity effects
            if (humidity < 30) multiplier *= 0.8; // Dry
            else if (humidity > 80) multiplier *= 0.9; // Too wet
            else if (humidity >= 50 && humidity <= 60) multiplier *= 1.1; // Optimal
            
            // Season effects
            if (season === 0) multiplier *= 1.3; // Spring: growth
            else if (season === 1) multiplier *= 1.1; // Summer: active
            else if (season === 2) multiplier *= 0.9; // Fall: decline
            else if (season === 3) multiplier *= 0.6; // Winter: dormancy
            
            return multiplier;
        }

        function countNeighbors(x, y) {
            let neighbors = {
                total: 0,
                producers: 0,
                predators: 0,
                omnivores: 0
            };
            
            for (let i = -1; i < 2; i++) {
                for (let j = -1; j < 2; j++) {
                    if (i === 0 && j === 0) continue;
                    
                    const col = (x + i + cols) % cols;
                    const row = (y + j + rows) % rows;
                    const cell = grid[col][row];
                    
                    if (cell && cell.alive) {
                        neighbors.total++;
                        
                        if (cell.species.role === 'producer') neighbors.producers++;
                        else if (cell.species.role === 'predator') neighbors.predators++;
                        else if (cell.species.role === 'omnivore') neighbors.omnivores++;
                    }
                }
            }
            
            return neighbors;
        }

        function update() {
            const nextGrid = new Array(cols).fill(null).map(() => new Array(rows).fill(null));
            const envMultiplier = getEnvironmentMultiplier();
            
            updateEnvironment();

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const cell = grid[i][j];
                    const neighbors = countNeighbors(i, j);
                    
                    if (cell && cell.alive) {
                        let energyChange = cell.species.energyGain * envMultiplier;
                        
                        // Producers benefit from good conditions
                        if (cell.species.role === 'producer') {
                            if (season === 0 && humidity >= 50) energyChange += 2;
                            if (season === 3) energyChange -= 1;
                        }
                        
                        // Predation
                        if (cell.species.role === 'predator') {
                            if (neighbors.producers > 0) {
                                energyChange += neighbors.producers * 3;
                            }
                        } else if (cell.species.role === 'omnivore') {
                            if (neighbors.producers > 0) {
                                energyChange += neighbors.producers * 2;
                            }
                        }
                        
                        cell.energy += energyChange;
                        
                        // Survival check
                        if (cell.energy <= 0 || neighbors.total < 2 || neighbors.total > 3) {
                            nextGrid[i][j] = {
                                alive: false,
                                age: 0,
                                energy: 0,
                                species: cell.species
                            };
                        } else {
                            nextGrid[i][j] = {
                                alive: true,
                                age: cell.age + 1,
                                energy: Math.min(cell.energy, 100),
                                species: cell.species
                            };
                            
                            // Reproduction
                            const reproductionThreshold = season === 0 ? 60 : 80;
                            if (cell.energy >= reproductionThreshold && neighbors.total < 3) {
                                const dirs = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                                for (const [dx, dy] of dirs) {
                                    const nx = (i + dx + cols) % cols;
                                    const ny = (j + dy + rows) % rows;
                                    
                                    if (!nextGrid[nx][ny] || !nextGrid[nx][ny].alive) {
                                        nextGrid[nx][ny] = {
                                            alive: true,
                                            age: 0,
                                            energy: 40,
                                            species: cell.species
                                        };
                                        cell.energy -= 40;
                                        break;
                                    }
                                }
                            }
                        }
                    } else {
                        // Birth
                        if (neighbors.total === 3) {
                            let newSpecies = speciesTypes[0];
                            if (neighbors.predators > neighbors.producers) {
                                newSpecies = speciesTypes[Math.floor(Math.random() * speciesTypes.length)];
                            }
                            
                            nextGrid[i][j] = {
                                alive: true,
                                age: 0,
                                energy: 50 * envMultiplier,
                                species: newSpecies
                            };
                        }
                    }
                }
            }

            grid = nextGrid;
            generation++;
            updateStats();
        }

        function updateStats() {
            generationEl.textContent = generation;
            
            let population = 0;
            let totalEnergy = 0;
            
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const cell = grid[i][j];
                    if (cell && cell.alive) {
                        population++;
                        totalEnergy += cell.energy;
                    }
                }
            }
            
            populationEl.textContent = population;
            energyEl.textContent = Math.round(totalEnergy / Math.max(population, 1));
        }

        function draw() {
            // Background based on season
            const bgColors = [
                'rgba(20, 30, 20, 1)',   // Spring: greenish
                'rgba(30, 30, 20, 1)',   // Summer: yellowish
                'rgba(30, 20, 15, 1)',   // Fall: brownish
                'rgba(15, 20, 30, 1)'    // Winter: bluish
            ];
            
            ctx.fillStyle = bgColors[season];
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const cell = grid[i][j];
                    if (cell && cell.alive) {
                        const x = i * cellSize;
                        const y = j * cellSize;
                        
                        const energySize = Math.min(cell.energy / 100, 1);
                        const size = cellSize * (0.6 + energySize * 0.6);
                        const alpha = 0.4 + energySize * 0.5;
                        
                        const gradient = ctx.createRadialGradient(
                            x + cellSize / 2, y + cellSize / 2, 0,
                            x + cellSize / 2, y + cellSize / 2, size
                        );
                        
                        const hue = (cell.species.hue + generation * 0.2 + i + j) % 360;
                        
                        gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, ${alpha})`);
                        gradient.addColorStop(0.5, `hsla(${hue}, 100%, 50%, ${alpha * 0.6})`);
                        gradient.addColorStop(1, `hsla(${hue}, 100%, 30%, 0)`);
                        
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x - 2, y - 2, size + 4, size + 4);
                        
                        ctx.fillStyle = `hsla(${hue}, 100%, 90%, ${alpha * 0.9})`;
                        ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
                        
                        if (cell.energy > 70) {
                            ctx.strokeStyle = `hsla(${hue}, 100%, 80%, 0.5)`;
                            ctx.lineWidth = 1;
                            ctx.strokeRect(x + 1, y + 1, size - 2, size - 2);
                        }
                    }
                }
            }
        }

        function animate(currentTime) {
            if (!isPlaying) return;
            
            animationId = requestAnimationFrame(animate);
            
            if (currentTime - lastUpdateTime > updateInterval) {
                update();
                lastUpdateTime = currentTime;
            }
            
            draw();
        }

        window.addEventListener('resize', resize);
        resize();

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / cellSize);
            const y = Math.floor((e.clientY - rect.top) / cellSize);
            
            if (x >= 0 && x < cols && y >= 0 && y < rows) {
                const cell = grid[x][y];
                if (cell && cell.alive) {
                    grid[x][y] = { alive: false, age: 0, energy: 0, species: cell.species };
                } else {
                    const species = speciesTypes[Math.floor(Math.random() * speciesTypes.length)];
                    grid[x][y] = { alive: true, age: 0, energy: 50, species: species };
                }
                updateStats();
                draw();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let touch of e.touches) {
                const x = Math.floor((touch.clientX - rect.left) / cellSize);
                const y = Math.floor((touch.clientY - rect.top) / cellSize);
                
                if (x >= 0 && x < cols && y >= 0 && y < rows) {
                    const cell = grid[x][y];
                    if (cell && cell.alive) {
                        grid[x][y] = { alive: false, age: 0, energy: 0, species: cell.species };
                    } else {
                        const species = speciesTypes[Math.floor(Math.random() * speciesTypes.length)];
                        grid[x][y] = { alive: true, age: 0, energy: 50, species: species };
                    }
                }
            }
            updateStats();
            draw();
        }, { passive: false });

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '⏸️ 停止' : '▶️ 開始';
            
            if (isPlaying) {
                lastUpdateTime = performance.now();
                animate(lastUpdateTime);
            } else {
                cancelAnimationFrame(animationId);
            }
        });

        stepBtn.addEventListener('click', () => {
            if (!isPlaying) {
                update();
                draw();
            }
        });

        clearBtn.addEventListener('click', () => {
            initGrid();
            draw();
        });

        randomBtn.addEventListener('click', () => {
            randomize();
            draw();
        });

        draw();
    </script>
</body>
</html>
