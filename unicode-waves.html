<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode Waves - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="info">
        Unicode Waves by Mira | 2026
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Unicode symbols from various categories
        const symbols = [
            'вША', 'вШБ', 'вШВ', 'вШГ', 'вШЕ', 'вШЖ', 'вШЙ', 'вШК', 'вШЛ', 'вШМ', 'вШН',
            'вЩИ', 'вЩЙ', 'вЩК', 'вЩЛ', 'вЩМ', 'вЩН', 'вЩО', 'вЩП', 'вЩР', 'вЩС', 'вЩТ', 'вЩУ',
            'вЩ†', 'вЩ°', 'вЩҐ', 'вЩ£', 'вЩ§', 'вЩ•', 'вЩ¶', 'вЩІ', 'вЪА', 'вЪБ', 'вЪВ', 'вЪГ', 'вЪД',
            'вЪ°', 'вШД', 'вШЃ', 'вШѓ', 'вШЄ', 'вШє', 'вШЇ', 'вШї', 'вШЉ', 'вШљ', 'вШЊ',
            'вЩА', 'вЩБ', 'вЩВ', 'вЩГ', 'вЩД', 'вЩЕ', 'вЩЖ', 'вЩЗ', 'вЩИ', 'вЩ®', 'вЩ©', 'вЩ™',
            'вЪА', 'вЪБ', 'вЪВ', 'вЪГ', 'вЪД', 'вЪЕ', 'вЪР', 'вЪС', 'вЪТ', 'вЪУ', 'вЪФ',
            'вЪШ', 'вЪЩ', 'вЪЪ', 'вЪЫ', 'вЪЬ', 'вЪЭ', 'вЪ†', 'вЪ°', 'вЪҐ', 'вЪ£', 'вЪ§', 'вЪ•',
            'вЬИ', 'вЬЙ', 'вЬК', 'вЬЛ', 'вЬМ', 'вЬН', 'вЬО', 'вЬП', 'вЬР', 'вЬС', 'вЬТ',
            'вЬУ', 'вЬФ', 'вЬХ', 'вЬЦ', 'вЬЧ', 'вЬШ', 'вЬЩ', 'вЬЪ', 'вЬЫ', 'вЬЬ', 'вЬЭ',
            'вЬ†', 'вЬ°', 'вЬҐ', 'вЬ£', 'вЬ§', 'вЬ•', 'вЬ¶', 'вЬІ', 'вШЕ', 'вШЖ', 'вЬ©', 'вЬ™',
            'вЪЫ', 'вЪЬ', 'вЪЭ', 'вЪЮ', 'вЪЯ', 'вЪ†', 'вЪ°', 'вЪҐ', 'вЪ£', 'вЪ§', 'вЪ•',
            'вЬ∞', 'вЬ±', 'вЬ≤', 'вЬ≥', 'вЬі', 'вЬµ', 'вЬґ', 'вЬЈ', 'вЬЄ', 'вЬє', 'вЬЇ',
            'вЭА', 'вЭБ', 'вЭВ', 'вЭГ', 'вЭД', 'вЭЕ', 'вЭЖ', 'вЭЗ', 'вЭИ', 'вЭЙ', 'вЭК',
            'вЭЛ', 'вЭМ', 'вЭН', 'вЭО', 'вЭП', 'вЭР', 'вЭС', 'вЭТ', 'вЭУ', 'вЭФ', 'вЭХ',
            'вЭЦ', 'вЭЧ', 'вЭШ', 'вЭЩ', 'вЭЪ', 'вЭЫ', 'вЭЬ', 'вЭЭ', 'вЭЮ', 'вЭЯ', 'вЭ†',
            'вЭ°', 'вЭҐ', 'вЭ£', 'вЭ§', 'вЭ•', 'вЭ¶', 'вЭІ', 'вЭ®', 'вЭ©', 'вЭ™', 'вЭЂ',
            'вЭђ', 'вЭ≠', 'вЭЃ', 'вЭѓ', 'вЭ∞', 'вЭ±', 'вЭ≤', 'вЭ≥', 'вЭі', 'вЭµ', 'вЭґ',
            'вЭЈ', 'вЭЄ', 'вЭє', 'вЭЇ', 'вЭї', 'вЭЉ', 'вЭљ', 'вЭЊ', 'вЭњ', 'вЮА', 'вЮБ',
            'вЮВ', 'вЮГ', 'вЮД', 'вЮЕ', 'вЮЖ', 'вЮЗ', 'вЮИ', 'вЮЙ', 'вЮК', 'вЮЛ', 'вЮМ',
            'вЮН', 'вЮО', 'вЮП', 'вЮР', 'вЮС', 'вЮТ', 'вЮУ', 'вЮФ', 'вЮХ', 'вЮЦ', 'вЮЧ',
            'вЮШ', 'вЮЩ', 'вЮЪ', 'вЮЫ', 'вЮЬ', 'вЮЭ', 'вЮЮ', 'вЮЯ', 'вЮ†', 'вЮ°', 'вЮҐ',
            'вЮ£', 'вЮ§', 'вЮ•', 'вЮ¶', 'вЮІ', 'вЮ®', 'вЮ©', 'вЮ™', 'вЮЂ', 'вЮђ', 'вЮ≠',
            'вЮЃ', 'вЮѓ', 'вЮ∞', 'вЮ±', 'вЮ≤', 'вЮ≥', 'вЮі', 'вЮµ', 'вЮґ', 'вЮЈ', 'вЮЄ',
            'вЮє', 'вЮЇ', 'вЮї', 'вЮЉ', 'вЮљ', 'вЮЊ', 'вЮњ'
        ];

        let time = 0;
        let animationId;

        function resize() {
            const container = document.querySelector('.container');
            const size = Math.min(container.clientWidth, 600);
            canvas.width = size;
            canvas.height = size;
        }

        function draw() {
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;

            // Clear with fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            const gridSize = 40;
            const rows = Math.ceil(height / gridSize);
            const cols = Math.ceil(width / gridSize);

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = col * gridSize + gridSize / 2;
                    const y = row * gridSize + gridSize / 2;

                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);

                    // Wave parameters
                    const wave1 = Math.sin(dist * 0.02 - time * 2);
                    const wave2 = Math.cos(angle * 3 + time);
                    const wave3 = Math.sin(dist * 0.01 + time * 1.5);

                    const combined = (wave1 + wave2 + wave3) / 3;

                    // Select symbol based on wave value
                    const symbolIndex = Math.floor(
                        ((combined + 1) / 2) * symbols.length
                    ) % symbols.length;

                    // Color based on position and wave
                    const hue = (dist * 0.3 + time * 50) % 360;
                    const saturation = 60 + combined * 20;
                    const lightness = 50 + combined * 15;
                    const alpha = 0.3 + combined * 0.4;

                    ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
                    ctx.font = `${20 + combined * 8}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(combined * Math.PI * 0.25);
                    ctx.fillText(symbols[symbolIndex], 0, 0);
                    ctx.restore();
                }
            }

            time += 0.016;
            animationId = requestAnimationFrame(draw);
        }

        resize();
        window.addEventListener('resize', resize);
        draw();
    </script>
</body>
</html>
