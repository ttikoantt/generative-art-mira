<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Geometry - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.8);
        }

        .info p {
            margin: 2px 0;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <h1>Morning Geometry</h1>
        <p>Move your mouse to wake up the tiles</p>
        <p>Each tile breathes at its own rhythm</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let tiles = [];
        let mouseX = -1000;
        let mouseY = -1000;
        let time = 0;

        // Hexagon tile class
        class HexTile {
            constructor(q, r, x, y, size) {
                this.q = q;  // axial coordinates
                this.r = r;
                this.x = x;  // pixel position (center)
                this.y = y;
                this.size = size;
                this.baseHue = 220 + Math.random() * 60;  // purple to blue range
                this.hueOffset = Math.random() * 360;
                this.breathSpeed = 0.0005 + Math.random() * 0.001;
                this.breathPhase = Math.random() * Math.PI * 2;
                this.awakening = 0;  // 0 to 1
                this.lastAwakening = 0;
                this.neighbors = [];
            }

            update(t, mouseX, mouseY) {
                // Breathing effect
                this.breathPhase += this.breathSpeed;

                // Distance to mouse
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Awakening based on mouse proximity
                const targetAwakening = Math.max(0, 1 - dist / 250);
                this.awakening += (targetAwakening - this.awakening) * 0.1;

                // Spread awakening to neighbors
                if (this.awakening > 0.3) {
                    for (let neighbor of this.neighbors) {
                        const spread = (this.awakening - 0.3) * 0.3;
                        neighbor.awakening = Math.min(1, neighbor.awakening + spread);
                    }
                }

                // Decay
                this.awakening *= 0.995;
            }

            draw(ctx, t) {
                const breath = Math.sin(this.breathPhase) * 0.5 + 0.5;
                const size = this.size * (0.85 + breath * 0.15 + this.awakening * 0.2);

                // Color calculation
                const baseSat = 30 + breath * 30;
                const sat = baseSat + this.awakening * 60;
                const light = 10 + breath * 20 + this.awakening * 50;
                const alpha = 0.3 + breath * 0.2 + this.awakening * 0.5;

                const hue = (this.baseHue + this.awakening * 40 + breath * 20) % 360;

                ctx.save();
                ctx.translate(this.x, this.y);

                // Glow effect for awakened tiles
                if (this.awakening > 0.2) {
                    const glowSize = size * (1 + this.awakening * 2);
                    const gradient = ctx.createRadialGradient(0, 0, size * 0.5, 0, 0, glowSize);
                    gradient.addColorStop(0, `hsla(${hue}, ${sat}%, ${light + 20}%, ${alpha * this.awakening * 0.5})`);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    this.drawHexagon(ctx, glowSize);
                    ctx.fill();
                }

                // Main hexagon
                ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
                ctx.beginPath();
                this.drawHexagon(ctx, size);
                ctx.fill();

                // Inner highlight for awakened tiles
                if (this.awakening > 0.4) {
                    ctx.strokeStyle = `hsla(${hue}, ${sat + 20}%, ${light + 30}%, ${this.awakening * 0.6})`;
                    ctx.lineWidth = 1 + this.awakening * 2;
                    ctx.beginPath();
                    this.drawHexagon(ctx, size * 0.7);
                    ctx.stroke();
                }

                ctx.restore();
            }

            drawHexagon(ctx, size) {
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i - Math.PI / 6;
                    const x = Math.cos(angle) * size;
                    const y = Math.sin(angle) * size;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
            }
        }

        function init() {
            resize();

            const hexSize = 40;
            const hexWidth = hexSize * Math.sqrt(3);
            const hexHeight = hexSize * 2;
            const vertDist = hexHeight * 0.75;

            const cols = Math.ceil(width / hexWidth) + 2;
            const rows = Math.ceil(height / vertDist) + 2;

            tiles = [];

            // Create hexagonal grid
            for (let row = -1; row < rows; row++) {
                for (let col = -1; col < cols; col++) {
                    const xOffset = (row % 2) * (hexWidth / 2);
                    const x = col * hexWidth + xOffset;
                    const y = row * vertDist;

                    // Axial coordinates for neighbor lookup
                    const q = col - Math.floor(row / 2);
                    const r = row;

                    tiles.push(new HexTile(q, r, x, y, hexSize));
                }
            }

            // Build neighbor connections
            for (let tile of tiles) {
                for (let other of tiles) {
                    if (tile === other) continue;

                    // Hex distance in axial coordinates
                    const dq = tile.q - other.q;
                    const dr = tile.r - other.r;
                    const dist = (Math.abs(dq) + Math.abs(dq + dr) + Math.abs(dr)) / 2;

                    if (dist === 1) {
                        tile.neighbors.push(other);
                    }
                }
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            // Clear with dark background
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, width, height);

            time += 1;

            // Update and draw tiles
            for (let tile of tiles) {
                tile.update(time, mouseX, mouseY);
            }

            // Sort by awakening for proper layering
            tiles.sort((a, b) => a.awakening - b.awakening);

            for (let tile of tiles) {
                tile.draw(ctx, time);
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', () => {
            resize();
            init();
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        canvas.addEventListener('touchend', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        // Start
        init();
        animate();
    </script>
</body>
</html>
