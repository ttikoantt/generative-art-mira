<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>インタラクティブ波紋パーティクル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        
        canvas {
            display: block;
            cursor: pointer;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">クリック/タップで波紋を広げる</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let ripples = [];
        let particles = [];
        let hue = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        resize();
        window.addEventListener('resize', resize);
        
        class Ripple {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.hue = hue;
                this.alpha = 1;
                this.speed = 3;
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                this.speed *= 0.995;
                return this.alpha > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, ${this.alpha * 0.5})`;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }
        
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.size = Math.random() * 3 + 1;
                this.hue = hue + Math.random() * 60 - 30;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 3 + 1;
                this.friction = 0.98;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.life})`;
                ctx.fill();
            }
        }
        
        function createRipple(x, y) {
            ripples.push(new Ripple(x, y, hue));
            
            // パーティクル生成
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, hue));
            }
            
            hue += 15;
        }
        
        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createRipple(touch.clientX, touch.clientY);
        });
        
        // 自動生成（一定間隔で）
        setInterval(() => {
            if (Math.random() > 0.5) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                createRipple(x, y);
            }
        }, 2000);
        
        function animate() {
            // フェード効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 波紋更新
            ripples = ripples.filter(ripple => {
                ripple.draw();
                return ripple.update();
            });
            
            // パーティクル更新
            particles = particles.filter(particle => {
                particle.draw();
                return particle.update();
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
        
        // 初期波紋
        setTimeout(() => {
            createRipple(width / 2, height / 2);
        }, 500);
    </script>
</body>
</html>
