<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Ripples - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(138, 43, 226, 0.3);
            border: 1px solid rgba(138, 43, 226, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(138, 43, 226, 0.5);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                padding: 15px 25px;
                font-size: 16px;
            }

            .info {
                font-size: 10px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="info">
        Cosmic Ripples | Move mouse/touch to interact
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;

        // Cosmic color palette
        const colors = [
            { r: 138, g: 43, b: 226 },   // Blue Violet
            { r: 75, g: 0, b: 130 },      // Indigo
            { r: 147, g: 112, b: 219 },   // Medium Purple
            { r: 186, g: 85, b: 211 },    // Medium Orchid
            { r: 255, g: 20, b: 147 },    // Deep Pink
            { r: 0, g: 191, b: 255 },     // Deep Sky Blue
            { r: 72, g: 61, b: 139 }      // Dark Slate Blue
        ];

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 200 + 100;
                this.speed = Math.random() * 2 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 1;
                this.lineWidth = Math.random() * 3 + 1;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);

                // Add organic wobble
                this.wobble = Math.sin(this.radius * 0.05) * 10;
            }

            draw() {
                if (this.alpha <= 0) return;

                ctx.save();
                ctx.beginPath();

                // Draw wavy circle
                for (let angle = 0; angle < Math.PI * 2; angle += 0.1) {
                    const wobbleRadius = this.radius + Math.sin(angle * 6 + this.radius * 0.02) * this.wobble;
                    const x = this.x + Math.cos(angle) * wobbleRadius;
                    const y = this.y + Math.sin(angle) * wobbleRadius;

                    if (angle === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.closePath();

                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.5})`;
                ctx.stroke();
                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.alpha = Math.random();
                this.direction = Math.random() > 0.5 ? 1 : -1;
            }

            update() {
                this.alpha += this.twinkleSpeed * this.direction;

                if (this.alpha >= 1) {
                    this.alpha = 1;
                    this.direction = -1;
                } else if (this.alpha <= 0.2) {
                    this.alpha = 0.2;
                    this.direction = 1;
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
                ctx.restore();
            }
        }

        const ripples = [];
        const stars = [];

        // Create stars
        for (let i = 0; i < 150; i++) {
            stars.push(new Star());
        }

        let autoRippleTimer = 0;
        let autoRippleInterval = 60;

        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw stars
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // Update and draw ripples
            ripples.forEach((ripple, index) => {
                ripple.update();
                ripple.draw();

                if (ripple.isDead()) {
                    ripples.splice(index, 1);
                }
            });

            // Auto create ripples
            autoRippleTimer++;
            if (autoRippleTimer >= autoRippleInterval) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                ripples.push(new Ripple(x, y));
                autoRippleTimer = 0;
                autoRippleInterval = Math.random() * 40 + 20;
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            if (Math.random() > 0.8) {
                ripples.push(new Ripple(mouseX, mouseY));
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;

            if (Math.random() > 0.7) {
                ripples.push(new Ripple(mouseX, mouseY));
            }
        });

        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    ripples.push(new Ripple(e.clientX, e.clientY));
                }, i * 100);
            }
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start animation
        animate();
    </script>
</body>
</html>
