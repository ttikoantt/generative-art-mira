<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Particles Art - 量子粒子アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        
        button {
            background: rgba(100, 100, 255, 0.3);
            border: 1px solid rgba(100, 100, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
        
        button:hover {
            background: rgba(100, 100, 255, 0.5);
        }
        
        #fullscreen {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <h2>⚛️ Quantum Particles Art</h2>
        <p>量子もつれを表現したパーティクルシステム</p>
    </div>
    
    <div id="controls">
        <button onclick="addEntangledPair()">量子ペア追加</button>
        <button onclick="resetArt()">リセット</button>
    </div>
    
    <button id="fullscreen" onclick="toggleFullscreen()">全画面</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        // 量子粒子ペアの配列
        let entangledPairs = [];
        
        // マウス/タッチ位置
        let mouse = { x: width / 2, y: height / 2 };
        
        // 色相
        let hue = 0;
        
        // 量子粒子クラス
        class QuantumParticle {
            constructor(x, y, pairId, isPrimary) {
                this.x = x;
                this.y = y;
                this.pairId = pairId;
                this.isPrimary = isPrimary;
                this.partner = null;
                
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                
                this.radius = Math.random() * 3 + 2;
                this.hue = hue + Math.random() * 30;
                
                // 量子もつれの強さ
                this.entanglementStrength = 0.02;
                
                // 量子状態
                this.phase = Math.random() * Math.PI * 2;
                this.phaseSpeed = 0.02 + Math.random() * 0.02;
                
                // 発光
                this.glowIntensity = 0.5 + Math.random() * 0.5;
            }
            
            update(partners) {
                // 位相を更新
                this.phase += this.phaseSpeed;
                
                // 量子もつれによる引き合い
                if (this.partner) {
                    const dx = this.partner.x - this.x;
                    const dy = this.partner.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 0) {
                        const force = Math.min(dist * this.entanglementStrength, 5);
                        this.vx += (dx / dist) * force * 0.1;
                        this.vy += (dy / dist) * force * 0.1;
                    }
                    
                    // 量子もつれの線を描画
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.partner.x, this.partner.y);
                    
                    const gradient = ctx.createLinearGradient(this.x, this.y, this.partner.x, this.partner.y);
                    gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, 0.3)`);
                    gradient.addColorStop(0.5, `hsla(${(this.hue + 180) % 360}, 100%, 70%, 0.5)`);
                    gradient.addColorStop(1, `hsla(${this.partner.hue}, 100%, 60%, 0.3)`);
                    
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                // マウスへの反応
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    this.vx -= (dx / dist) * force * 0.5;
                    this.vy -= (dy / dist) * force * 0.5;
                }
                
                // 位置を更新
                this.x += this.vx;
                this.y += this.vy;
                
                // 速度を減衰
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                // 境界で反転
                if (this.x < 0 || this.x > width) this.vx *= -0.8;
                if (this.y < 0 || this.y > height) this.vy *= -0.8;
                
                // 画面内に保つ
                this.x = Math.max(0, Math.min(width, this.x));
                this.y = Math.max(0, Math.min(height, this.y));
            }
            
            draw() {
                // 量子の波動を表現する振動
                const vibration = Math.sin(this.phase) * 2;
                const radius = this.radius + vibration;
                
                // 発光効果
                const glowSize = radius * 4;
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, glowSize
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${this.glowIntensity})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${this.glowIntensity * 0.3})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 30%, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 粒子本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, 0.9)`;
                ctx.fill();
            }
        }
        
        // 量子ペアを追加
        function addEntangledPair() {
            const x1 = Math.random() * width;
            const y1 = Math.random() * height;
            const x2 = Math.random() * width;
            const y2 = Math.random() * height;
            
            const pairId = entangledPairs.length;
            
            const particle1 = new QuantumParticle(x1, y1, pairId, true);
            const particle2 = new QuantumParticle(x2, y2, pairId, false);
            
            // 互いにパートナーを設定
            particle1.partner = particle2;
            particle2.partner = particle1;
            
            // 反対の色相
            particle2.hue = (particle1.hue + 180) % 360;
            
            entangledPairs.push([particle1, particle2]);
            
            hue = (hue + 45) % 360;
        }
        
        // リセット
        function resetArt() {
            entangledPairs = [];
            hue = 0;
            
            // 初期ペアを追加
            for (let i = 0; i < 3; i++) {
                addEntangledPair();
            }
        }
        
        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // アニメーション
        function animate() {
            // 半透明の背景でトレイル効果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 全ての粒子を更新・描画
            entangledPairs.forEach(pair => {
                pair.forEach(particle => {
                    particle.update();
                    particle.draw();
                });
            });
            
            // 背景の微かな光
            const time = Date.now() * 0.001;
            for (let i = 0; i < 5; i++) {
                const x = width / 2 + Math.cos(time + i * 0.5) * width * 0.3;
                const y = height / 2 + Math.sin(time + i * 0.7) * height * 0.3;
                const size = 100 + Math.sin(time + i) * 50;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
                gradient.addColorStop(0, `hsla(${(hue + i * 30) % 360}, 50%, 30%, 0.05)`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            requestAnimationFrame(animate);
        }
        
        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // タップで量子ペアを追加
        canvas.addEventListener('click', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // タップ位置に量子ペアを追加
            const pairId = entangledPairs.length;
            
            const offsetX = (Math.random() - 0.5) * 100;
            const offsetY = (Math.random() - 0.5) * 100;
            
            const particle1 = new QuantumParticle(e.clientX + offsetX, e.clientY + offsetY, pairId, true);
            const particle2 = new QuantumParticle(e.clientX - offsetX, e.clientY - offsetY, pairId, false);
            
            particle1.partner = particle2;
            particle2.partner = particle1;
            particle2.hue = (particle1.hue + 180) % 360;
            
            entangledPairs.push([particle1, particle2]);
            
            hue = (hue + 45) % 360;
        });
        
        // 初期化
        resetArt();
        animate();
    </script>
</body>
</html>
