<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfield Generator | Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a0a2e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        canvas {
            border: 2px solid rgba(100, 100, 255, 0.3);
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.3);
            max-width: 95vw;
            max-height: 70vh;
        }

        h1 {
            color: #88ccff;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #2a2a5a, #1a1a3a);
            color: #88ccff;
            border: 2px solid rgba(100, 100, 255, 0.3);
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        button:hover {
            background: linear-gradient(135deg, #3a3a6a, #2a2a4a);
            border-color: rgba(100, 150, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(100, 100, 255, 0.3);
        }

        .info {
            color: #6699cc;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(100, 100, 255, 0.3);
            color: #88ccff;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2rem;
            }
            
            button {
                padding: 10px 18px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">🌟 Fullscreen</button>

    <div class="container">
        <h1>✨ Starfield Generator</h1>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button onclick="generateNew()">🌠 Generate New</button>
            <button onclick="addShootingStar()">💫 Add Shooting Star</button>
            <button onclick="toggleAnimation()">⏸️ Toggle Animation</button>
        </div>
        <div class="info" id="info">Click 'Generate New' to create a unique starfield</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        let width = Math.min(800, window.innerWidth - 40);
        let height = Math.min(600, window.innerHeight - 250);
        canvas.width = width;
        canvas.height = height;

        let stars = [];
        let shootingStars = [];
        let animationEnabled = true;
        let animationId;

        // 星を生成
        function generateStars(count = 200) {
            stars = [];
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2.5 + 0.5,
                    brightness: Math.random() * 0.7 + 0.3,
                    twinkleSpeed: Math.random() * 0.02 + 0.01,
                    twinklePhase: Math.random() * Math.PI * 2,
                    color: getRandomStarColor()
                });
            }
        }

        // 星の色をランダムに
        function getRandomStarColor() {
            const colors = [
                { r: 255, g: 255, b: 255 },  // 白
                { r: 200, g: 220, b: 255 },  // 青白
                { r: 255, g: 240, b: 200 },  // 黄白
                { r: 180, g: 200, b: 255 },  // 青
                { r: 255, g: 200, b: 180 }   // 赤
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 流れ星を追加
        function addShootingStar() {
            const startX = Math.random() * width;
            const startY = Math.random() * height * 0.5;

            shootingStars.push({
                x: startX,
                y: startY,
                length: Math.random() * 60 + 40,
                speed: Math.random() * 8 + 6,
                angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3,
                life: 1,
                trail: []
            });

            info.textContent = '✨ Shooting star added!';
        }

        // 描画
        function draw() {
            // 背景グラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#0f0f25');
            gradient.addColorStop(1, '#1a1a35');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 星を描画
            const time = Date.now() * 0.001;
            stars.forEach(star => {
                const twinkle = Math.sin(time * star.twinkleSpeed * 100 + star.twinklePhase) * 0.3 + 0.7;
                const alpha = star.brightness * twinkle;

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${alpha})`;
                ctx.fill();

                // 光る効果
                if (star.size > 1.5) {
                    const glowGradient = ctx.createRadialGradient(
                        star.x, star.y, 0,
                        star.x, star.y, star.size * 3
                    );
                    glowGradient.addColorStop(0, `rgba(${star.color.r}, ${star.color.g}, ${star.color.b}, ${alpha * 0.3})`);
                    glowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    ctx.fillStyle = glowGradient;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size * 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // 流れ星を描画
            shootingStars = shootingStars.filter(ss => {
                ss.x += Math.cos(ss.angle) * ss.speed;
                ss.y += Math.sin(ss.angle) * ss.speed;
                ss.life -= 0.02;

                if (ss.life > 0 && ss.x < width + 100 && ss.y < height + 100) {
                    // トレイルを描画
                    const trailLength = ss.length * ss.life;
                    for (let i = 0; i < trailLength; i++) {
                        const tx = ss.x - Math.cos(ss.angle) * i;
                        const ty = ss.y - Math.sin(ss.angle) * i;
                        const alpha = (1 - i / trailLength) * ss.life * 0.8;

                        ctx.beginPath();
                        ctx.arc(tx, ty, 2 * (1 - i / trailLength) + 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.fill();
                    }

                    // 先端の光
                    ctx.beginPath();
                    ctx.arc(ss.x, ss.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${ss.life})`;
                    ctx.fill();

                    return true;
                }
                return false;
            });
        }

        // アニメーション
        function animate() {
            draw();
            animationId = requestAnimationFrame(animate);
        }

        // 新しい星空を生成
        function generateNew() {
            const starCount = Math.floor(Math.random() * 150) + 150;
            generateStars(starCount);
            info.textContent = `✨ Generated ${starCount} unique stars`;
        }

        // アニメーション切り替え
        function toggleAnimation() {
            animationEnabled = !animationEnabled;
            if (animationEnabled) {
                animate();
                info.textContent = '▶️ Animation resumed';
            } else {
                cancelAnimationFrame(animationId);
                info.textContent = '⏸️ Animation paused';
            }
        }

        // 全画面切り替え
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        generateStars(200);
        animate();
    </script>
</body>
</html>
