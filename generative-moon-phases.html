<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Moon Phases - 月の満ち欠けアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        /* 星空の背景 */
        #stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            color: #f5f5dc;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            font-weight: 300;
            letter-spacing: 3px;
        }

        .subtitle {
            color: rgba(245, 245, 220, 0.7);
            font-size: 1rem;
            margin-bottom: 2rem;
            font-style: italic;
        }

        /* 月のコンテナ */
        .moon-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 2rem;
            cursor: grab;
            touch-action: none;
        }

        .moon-container:active {
            cursor: grabbing;
        }

        /* 月のベース */
        .moon {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                #f5f5dc 0%, 
                #d4d4aa 40%, 
                #c0c090 70%,
                #a0a070 100%);
            box-shadow: 
                0 0 60px rgba(255, 255, 200, 0.4),
                0 0 120px rgba(255, 255, 200, 0.2),
                inset -20px -20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        /* クレーター */
        .crater {
            position: absolute;
            background: radial-gradient(circle, 
                rgba(160, 160, 112, 0.6) 0%, 
                rgba(160, 160, 112, 0.3) 50%,
                transparent 100%);
            border-radius: 50%;
        }

        /* 影のレイヤー */
        .shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at var(--shadow-x, 50%) 50%, 
                transparent 0%, 
                transparent 35%,
                rgba(0, 0, 0, 0.85) 50%,
                rgba(0, 0, 0, 0.95) 100%);
            transition: all 0.3s ease;
        }

        /* スライダー */
        .phase-control {
            width: 320px;
            margin: 0 auto 1rem;
        }

        .phase-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: linear-gradient(to right, 
                rgba(245, 245, 220, 0.2) 0%, 
                rgba(245, 245, 220, 0.4) 50%,
                rgba(245, 245, 220, 0.2) 100%);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .phase-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #f5f5dc, #d4d4aa);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 200, 0.5);
            transition: transform 0.2s ease;
        }

        .phase-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .phase-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #f5f5dc, #d4d4aa);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(255, 255, 200, 0.5);
        }

        /* フェーズ情報 */
        .phase-info {
            color: #f5f5dc;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .phase-name {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }

        .phase-percentage {
            font-size: 1rem;
            opacity: 0.7;
        }

        /* フェーズマーカー */
        .phase-markers {
            display: flex;
            justify-content: space-between;
            width: 320px;
            margin: 0 auto;
            padding: 0 5px;
        }

        .marker {
            color: rgba(245, 245, 220, 0.5);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .marker:hover {
            color: rgba(245, 245, 220, 1);
            transform: scale(1.2);
        }

        /* 全画面ボタン */
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(245, 245, 220, 0.1);
            border: 1px solid rgba(245, 245, 220, 0.3);
            color: #f5f5dc;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(245, 245, 220, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .moon-container {
                width: 250px;
                height: 250px;
            }

            .phase-control {
                width: 280px;
            }

            .phase-markers {
                width: 280px;
            }
        }
    </style>
</head>
<body>
    <div id="stars"></div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🌙 月の満ち欠け</h1>
        <p class="subtitle">Generative Moon Phases</p>

        <div class="moon-container" id="moonContainer">
            <div class="moon" id="moon">
                <!-- クレーター -->
                <div class="crater" style="width: 40px; height: 40px; top: 80px; left: 90px;"></div>
                <div class="crater" style="width: 25px; height: 25px; top: 150px; left: 180px;"></div>
                <div class="crater" style="width: 30px; height: 30px; top: 200px; left: 100px;"></div>
                <div class="crater" style="width: 20px; height: 20px; top: 120px; left: 220px;"></div>
                <div class="crater" style="width: 35px; height: 35px; top: 180px; left: 200px;"></div>
                <div class="crater" style="width: 15px; height: 15px; top: 100px; left: 140px;"></div>
                <div class="crater" style="width: 22px; height: 22px; top: 230px; left: 160px;"></div>
            </div>
            <div class="shadow" id="shadow"></div>
        </div>

        <div class="phase-info">
            <div class="phase-name" id="phaseName">満月</div>
            <div class="phase-percentage" id="phasePercentage">照明: 100%</div>
        </div>

        <div class="phase-control">
            <input type="range" class="phase-slider" id="phaseSlider" min="0" max="100" value="0">
        </div>

        <div class="phase-markers">
            <span class="marker" data-phase="0">🌕</span>
            <span class="marker" data-phase="12.5">🌖</span>
            <span class="marker" data-phase="25">🌗</span>
            <span class="marker" data-phase="37.5">🌘</span>
            <span class="marker" data-phase="50">🌑</span>
            <span class="marker" data-phase="62.5">🌒</span>
            <span class="marker" data-phase="75">🌓</span>
            <span class="marker" data-phase="87.5">🌔</span>
            <span class="marker" data-phase="100">🌕</span>
        </div>
    </div>

    <script>
        // 星を生成
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numStars = 200;

            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.animationDelay = Math.random() * 5 + 's';
                starsContainer.appendChild(star);
            }
        }

        // フェーズ名を取得
        function getPhaseName(phase) {
            if (phase <= 6) return '満月';
            if (phase <= 18) return '十三夜月';
            if (phase <= 31) return '下弦の月';
            if (phase <= 43) return '二十日月';
            if (phase <= 56) return '新月';
            if (phase <= 68) return '三日月';
            if (phase <= 81) return '上弦の月';
            if (phase <= 93) return '十日夜の月';
            return '満月';
        }

        // フェーズを更新
        function updatePhase(phase) {
            const shadow = document.getElementById('shadow');
            const phaseName = document.getElementById('phaseName');
            const phasePercentage = document.getElementById('phasePercentage');
            const moon = document.getElementById('moon');

            // フェーズは0-100（0=満月、50=新月、100=満月）
            const normalizedPhase = phase / 100;

            // 影の位置を計算
            let shadowX, rotation, scale;

            if (normalizedPhase <= 0.5) {
                // 満月 → 新月
                shadowX = 50 - (normalizedPhase * 100);
                rotation = 0;
                scale = 1;
            } else {
                // 新月 → 満月
                shadowX = -50 + ((normalizedPhase - 0.5) * 100);
                rotation = 0;
                scale = 1;
            }

            shadow.style.setProperty('--shadow-x', shadowX + '%');
            moon.style.transform = `scale(${scale})`;

            // フェーズ名と照明率を更新
            const illumination = Math.round(100 - Math.abs(normalizedPhase * 200 - 100));
            phaseName.textContent = getPhaseName(phase);
            phasePercentage.textContent = `照明: ${illumination}%`;
        }

        // スライダー
        const phaseSlider = document.getElementById('phaseSlider');
        phaseSlider.addEventListener('input', (e) => {
            updatePhase(parseInt(e.target.value));
        });

        // マーカークリック
        document.querySelectorAll('.marker').forEach(marker => {
            marker.addEventListener('click', () => {
                const phase = parseFloat(marker.dataset.phase);
                phaseSlider.value = phase;
                updatePhase(phase);
            });
        });

        // ドラッグ操作
        const moonContainer = document.getElementById('moonContainer');
        let isDragging = false;
        let startX;

        moonContainer.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            const currentPhase = parseInt(phaseSlider.value);
            const newPhase = Math.max(0, Math.min(100, currentPhase - deltaX / 5));
            phaseSlider.value = newPhase;
            updatePhase(newPhase);
            startX = e.clientX;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // タッチ操作
        moonContainer.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            const currentPhase = parseInt(phaseSlider.value);
            const newPhase = Math.max(0, Math.min(100, currentPhase - deltaX / 5));
            phaseSlider.value = newPhase;
            updatePhase(newPhase);
            startX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        createStars();
        updatePhase(0);
    </script>
</body>
</html>
