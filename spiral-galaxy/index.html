<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiral Galaxy - 渦巻く銀河</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #a78bfa, #ec4899, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .info h1 {
                font-size: 18px;
            }
            .info p {
                font-size: 12px;
            }
            .fullscreen-btn {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>🌌 Spiral Galaxy</h1>
        <p>渦巻く銀河 - クリックで新しい星を生成</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let stars = [];
        let rotation = 0;
        let time = 0;

        const colors = [
            { r: 167, g: 139, b: 250 },  // Purple
            { r: 236, g: 72, b: 153 },   // Pink
            { r: 244, g: 114, b: 182 },  // Light Pink
            { r: 96, g: 165, b: 250 },   // Blue
            { r: 168, g: 85, b: 247 },   // Violet
            { r: 234, g: 179, b: 8 },    // Amber
            { r: 52, g: 211, b: 153 }    // Emerald
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Star {
            constructor(angle, distance) {
                this.angle = angle;
                this.distance = distance;
                this.size = Math.random() * 2 + 0.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.speed = Math.random() * 0.002 + 0.001;
                this.brightness = Math.random() * 0.5 + 0.5;
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
                this.twinkleOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.angle += this.speed;
                this.brightness = 0.5 + 0.5 * Math.sin(time * this.twinkleSpeed + this.twinkleOffset);
            }

            draw() {
                const x = centerX + Math.cos(this.angle + rotation) * this.distance;
                const y = centerY + Math.sin(this.angle + rotation) * this.distance * 0.4;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size * 2);
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.brightness})`);
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.brightness * 0.5})`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);

                ctx.beginPath();
                ctx.arc(x, y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function createGalaxy() {
            stars = [];

            // 渦巻き腕を作成（3本）
            for (let arm = 0; arm < 3; arm++) {
                for (let i = 0; i < 400; i++) {
                    const progress = i / 400;
                    const angle = (arm * Math.PI * 2 / 3) + (progress * Math.PI * 4);
                    const distance = progress * Math.min(width, height) * 0.45;

                    // 渦巻きの周囲に星を散りばめる
                    for (let j = 0; j < 3; j++) {
                        const spreadAngle = angle + (Math.random() - 0.5) * 0.8;
                        const spreadDistance = distance + (Math.random() - 0.5) * 50;

                        if (spreadDistance > 20) {
                            stars.push(new Star(spreadAngle, spreadDistance));
                        }
                    }
                }
            }

            // 中心の密集した星々
            for (let i = 0; i < 300; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 80;
                stars.push(new Star(angle, distance));
            }

            // 背景の散在する星
            for (let i = 0; i < 200; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = 150 + Math.random() * Math.min(width, height) * 0.4;
                const star = new Star(angle, distance);
                star.size = Math.random() * 1.5 + 0.3;
                stars.push(star);
            }
        }

        function drawBackground() {
            // 深い宇宙の背景グラデーション
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height) * 0.7);
            gradient.addColorStop(0, '#0f0a1e');
            gradient.addColorStop(0.5, '#050810');
            gradient.addColorStop(1, '#000000');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        function animate() {
            drawBackground();

            time++;
            rotation += 0.001;

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('click', (e) => {
            // クリック位置に新しい星を追加
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            for (let i = 0; i < 20; i++) {
                const angle = Math.atan2(clickY - centerY, clickX - centerX);
                const distance = Math.sqrt(Math.pow(clickX - centerX, 2) + Math.pow(clickY - centerY, 2));
                const newAngle = angle + (Math.random() - 0.5) * 0.5;
                const newDistance = distance + (Math.random() - 0.5) * 30;

                if (newDistance > 20) {
                    const star = new Star(newAngle, Math.max(20, newDistance));
                    star.size = Math.random() * 3 + 1;
                    star.brightness = 1;
                    stars.push(star);
                }
            }

            // 星が増えすぎたら古いものを削除
            if (stars.length > 5000) {
                stars = stars.slice(-4000);
            }
        });

        window.addEventListener('resize', () => {
            resize();
            createGalaxy();
        });

        resize();
        createGalaxy();
        animate();
    </script>
</body>
</html>
