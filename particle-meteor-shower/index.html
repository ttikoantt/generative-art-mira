<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パーティクル流星群 - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        #fullscreenBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            #info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }

            #fullscreenBtn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">流星群アニメーション</div>
    <button id="fullscreenBtn">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let meteors = [];
        let stars = [];

        // 色パレット（美しい流星の色）
        const colors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24',
            '#6c5ce7', '#fd79a8', '#00b894', '#e17055',
            '#74b9ff', '#a29bfe', '#ffeaa7', '#55efc4'
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.7,
                    size: Math.random() * 2 + 0.5,
                    opacity: Math.random() * 0.8 + 0.2,
                    twinkle: Math.random() * 0.02 + 0.01
                });
            }
        }

        class Meteor {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width * 1.5 - width * 0.25;
                this.y = Math.random() * height * 0.3 - 50;
                this.speed = Math.random() * 8 + 6;
                this.size = Math.random() * 3 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.trail = [];
                this.trailLength = Math.floor(Math.random() * 40) + 30;
                this.opacity = 1;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.01;
            }

            update() {
                // トレイルに現在の位置を追加
                this.trail.push({ x: this.x, y: this.y, opacity: this.opacity });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }

                // 移動
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.angle += this.rotationSpeed;

                // 徐々に消える
                if (this.y > height * 0.6) {
                    this.opacity = Math.max(0, this.opacity - 0.02);
                }

                // 画面外に出たらリセット
                if (this.x > width + 100 || this.y > height + 100 || this.opacity <= 0) {
                    this.reset();
                    // 画面外からスタート
                    this.x = Math.random() * width * 0.5 - 100;
                    this.y = -50;
                }
            }

            draw() {
                // トレイルを描画
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const progress = i / this.trail.length;
                    const trailOpacity = progress * t.opacity * 0.8;
                    const trailSize = this.size * progress;

                    ctx.beginPath();
                    ctx.arc(t.x, t.y, trailSize, 0, Math.PI * 2);
                    ctx.fillStyle = this.hexToRgba(this.color, trailOpacity);
                    ctx.fill();
                }

                // メインの流星を描画
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, this.hexToRgba(this.color, this.opacity));
                gradient.addColorStop(0.5, this.hexToRgba(this.color, this.opacity * 0.5));
                gradient.addColorStop(1, this.hexToRgba(this.color, 0));

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 明るい中心
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba('#ffffff', this.opacity);
                ctx.fill();
            }

            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }

        function initMeteors() {
            meteors = [];
            for (let i = 0; i < 15; i++) {
                const meteor = new Meteor();
                meteor.x = Math.random() * width;
                meteor.y = Math.random() * height;
                meteors.push(meteor);
            }
        }

        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 星を描画
            stars.forEach(star => {
                star.opacity += star.twinkle;
                if (star.opacity > 1 || star.opacity < 0.2) {
                    star.twinkle *= -1;
                }

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });
        }

        function animate() {
            drawBackground();

            // 流星を更新・描画
            meteors.forEach(meteor => {
                meteor.update();
                meteor.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        window.addEventListener('resize', resize);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        resize();
        initMeteors();
        animate();

        // タッチデバイスでのダブルタップで全画面
        let lastTap = 0;
        document.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                toggleFullscreen();
            }
            lastTap = currentTime;
        });
    </script>
</body>
</html>
