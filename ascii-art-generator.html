<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .upload-area {
            border: 2px dashed #444;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.05);
        }

        .upload-area.dragover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
        }

        input[type="file"] {
            display: none;
        }

        .settings {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d9ff;
            cursor: pointer;
        }

        select {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: #eee;
            font-family: inherit;
        }

        .char-set-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .char-set-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #222;
            color: #eee;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }

        .char-set-btn:hover {
            background: #333;
            border-color: #00d9ff;
        }

        .char-set-btn.active {
            background: #00d9ff;
            border-color: #00d9ff;
            color: #000;
        }

        .preview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .preview-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            min-height: 300px;
        }

        .preview-box h3 {
            margin-bottom: 10px;
            font-size: 1rem;
            color: #aaa;
        }

        #originalImage {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        #asciiOutput {
            font-size: 8px;
            line-height: 0.6;
            white-space: pre;
            overflow-x: auto;
            background: #000;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #000;
            font-weight: bold;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-secondary {
            background: #333;
            color: #eee;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.active {
            border-color: #fff;
            box-shadow: 0 0 10px currentColor;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            color: #000;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .preview {
                grid-template-columns: 1fr;
            }

            #asciiOutput {
                font-size: 4px;
                line-height: 0.5;
            }

            h1 {
                font-size: 1.5rem;
            }
        }

        .loading {
            text-align: center;
            color: #00d9ff;
            font-size: 1.2rem;
            padding: 40px;
        }

        .info {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 ASCII Art Generator</h1>
        <p class="subtitle">画像をアスキーアートに変換 | by Mira</p>

        <div class="info">
            💡 ヒント: 画像をドラッグ＆ドロップするか、クリックしてアップロードしてください
        </div>

        <div class="controls">
            <div class="upload-area" id="uploadArea">
                <p>📁 画像をここにドロップ または クリックして選択</p>
                <input type="file" id="imageInput" accept="image/*">
            </div>

            <div class="settings">
                <div class="setting-group">
                    <label>幅: <span id="widthValue">100</span>文字</label>
                    <input type="range" id="width" min="30" max="200" value="100">
                </div>

                <div class="setting-group">
                    <label>文字セット</label>
                    <div class="char-set-buttons">
                        <button class="char-set-btn active" data-set="standard">標準</button>
                        <button class="char-set-btn" data-set="simple">シンプル</button>
                        <button class="char-set-btn" data-set="detailed">詳細</button>
                        <button class="char-set-btn" data-set="blocks">ブロック</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label>色</label>
                    <div class="color-picker">
                        <div class="color-option active" data-color="mono" style="background: #fff;"></div>
                        <div class="color-option" data-color="green" style="background: #0f0;"></div>
                        <div class="color-option" data-color="amber" style="background: #ff0;"></div>
                        <div class="color-option" data-color="cyan" style="background: #0ff;"></div>
                        <div class="color-option" data-color="magenta" style="background: #f0f;"></div>
                        <div class="color-option" data-color="original" style="background: linear-gradient(45deg, red, blue);"></div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="convertBtn">変換</button>
                <button class="btn btn-secondary" id="copyBtn">コピー</button>
                <button class="btn btn-secondary" id="downloadBtn">ダウンロード</button>
            </div>
        </div>

        <div class="preview">
            <div class="preview-box">
                <h3>📷 元の画像</h3>
                <div id="originalPreview"></div>
            </div>
            <div class="preview-box">
                <h3>🎨 ASCIIアート</h3>
                <div id="asciiOutput">画像をアップロードしてください...</div>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <script>
        const CHAR_SETS = {
            standard: '@%#*+=-:. ',
            simple: '@#*-. ',
            detailed: '$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,"^`\'. ',
            blocks: '█▓▒░ '
        };

        let currentImage = null;
        let currentCharSet = 'standard';
        let currentColor = 'mono';

        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const widthSlider = document.getElementById('width');
        const widthValue = document.getElementById('widthValue');
        const convertBtn = document.getElementById('convertBtn');
        const copyBtn = document.getElementById('copyBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const asciiOutput = document.getElementById('asciiOutput');
        const originalPreview = document.getElementById('originalPreview');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // Upload area click
        uploadArea.addEventListener('click', () => imageInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        // File input
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        // Width slider
        widthSlider.addEventListener('input', (e) => {
            widthValue.textContent = e.target.value;
        });

        // Character set buttons
        document.querySelectorAll('.char-set-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.char-set-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCharSet = btn.dataset.set;
            });
        });

        // Color options
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
                option.classList.add('active');
                currentColor = option.dataset.color;
            });
        });

        // Load image
        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    originalPreview.innerHTML = `<img id="originalImage" src="${e.target.result}" alt="Original">`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Convert to ASCII
        convertBtn.addEventListener('click', () => {
            if (!currentImage) {
                alert('画像をアップロードしてください');
                return;
            }

            asciiOutput.innerHTML = '<div class="loading">変換中...</div>';

            setTimeout(() => {
                const width = parseInt(widthSlider.value);
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');

                const aspectRatio = currentImage.height / currentImage.width;
                const height = Math.floor(width * aspectRatio * 0.5); // 0.5 for character aspect ratio

                canvas.width = width;
                canvas.height = height;

                ctx.drawImage(currentImage, 0, 0, width, height);
                const imageData = ctx.getImageData(0, 0, width, height);

                const chars = CHAR_SETS[currentCharSet];
                let ascii = '';

                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const i = (y * width + x) * 4;
                        const r = imageData.data[i];
                        const g = imageData.data[i + 1];
                        const b = imageData.data[i + 2];

                        const brightness = (r + g + b) / 3;
                        const charIndex = Math.floor((brightness / 255) * (chars.length - 1));
                        const char = chars[charIndex];

                        if (currentColor === 'original') {
                            ascii += `<span style="color: rgb(${r},${g},${b})">${char}</span>`;
                        } else if (currentColor === 'mono') {
                            ascii += char;
                        } else {
                            const colors = {
                                green: '#0f0',
                                amber: '#ff0',
                                cyan: '#0ff',
                                magenta: '#f0f'
                            };
                            ascii += `<span style="color: ${colors[currentColor]}">${char}</span>`;
                        }
                    }
                    ascii += '\n';
                }

                asciiOutput.innerHTML = `<pre style="margin: 0;">${ascii}</pre>`;
            }, 100);
        });

        // Copy to clipboard
        copyBtn.addEventListener('click', () => {
            const text = asciiOutput.innerText;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = 'コピー済み!';
                setTimeout(() => {
                    copyBtn.textContent = 'コピー';
                }, 2000);
            });
        });

        // Download
        downloadBtn.addEventListener('click', () => {
            const text = asciiOutput.innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ascii-art.txt';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Fullscreen
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
