<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            min-width: 200px;
        }

        input:focus {
            outline: none;
            border-color: #764ba2;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .output {
            background: #1a1a2e;
            color: #0f0;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.2;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
        }

        .output pre {
            white-space: pre;
            font-family: 'Courier New', monospace;
        }

        .style-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .style-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .style-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .style-btn.active {
            background: #667eea;
            color: white;
            border-color: #764ba2;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.2s;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        .info {
            text-align: center;
            color: #666;
            margin-top: 20px;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .output {
                font-size: 8px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🎨 ASCII Art Generator</h1>
        <p class="subtitle">テキストをASCIIアートに変換</p>

        <div class="style-selector">
            <button class="style-btn active" onclick="setStyle('block')">ブロック</button>
            <button class="style-btn" onclick="setStyle('star')">スター</button>
            <button class="style-btn" onclick="setStyle('hash')">ハッシュ</button>
            <button class="style-btn" onclick="setStyle('binary')">バイナリ</button>
        </div>

        <div class="controls">
            <input type="text" id="textInput" placeholder="テキストを入力（日本語もOK）" maxlength="20">
            <button onclick="generate()">生成</button>
        </div>

        <div class="output" id="output">
            <pre>ここにASCIIアートが表示されます...</pre>
        </div>

        <p class="info">💡 ヒント: 日本語も入力できます。最大20文字まで。</p>
    </div>

    <script>
        let currentStyle = 'block';

        const styles = {
            block: ['█', '▓', '▒', '░', ' '],
            star: ['★', '☆', '✦', '✧', ' '],
            hash: ['@', '#', '+', '-', ' '],
            binary: ['1', '1', '0', '0', ' ']
        };

        function setStyle(style) {
            currentStyle = style;
            document.querySelectorAll('.style-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function getBrightness(r, g, b) {
            return (0.299 * r + 0.587 * g + 0.114 * b);
        }

        function charToAscii(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            const fontSize = 16;
            const charWidth = 8;
            const charHeight = 16;

            canvas.width = text.length * charWidth;
            canvas.height = charHeight;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'black';
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';

            for (let i = 0; i < text.length; i++) {
                ctx.fillText(text[i], i * charWidth + charWidth / 2, charHeight / 2);
            }

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imageData.data;

            let ascii = '';

            for (let y = 0; y < canvas.height; y += 2) {
                for (let x = 0; x < canvas.width; x++) {
                    const i = (y * canvas.width + x) * 4;
                    const brightness = getBrightness(pixels[i], pixels[i + 1], pixels[i + 2]);
                    const chars = styles[currentStyle];
                    const charIndex = Math.floor((255 - brightness) / 255 * (chars.length - 1));
                    ascii += chars[charIndex];
                }
                ascii += '\n';
            }

            return ascii;
        }

        function generate() {
            const text = document.getElementById('textInput').value;

            if (!text.trim()) {
                document.getElementById('output').innerHTML = '<pre>⚠️ テキストを入力してください</pre>';
                return;
            }

            const ascii = charToAscii(text);
            document.getElementById('output').innerHTML = `<pre>${ascii}</pre>`;
        }

        // Enter key to generate
        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generate();
            }
        });

        // Generate on page load with example
        window.onload = function() {
            document.getElementById('textInput').value = 'HELLO';
            generate();
        };

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
