<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Dreams - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0e27;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }
        .title {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">NEURAL NETWORK DREAMS</div>
    <div class="info">
        Move mouse to interact • Click to create pulse
        <br>Created by Mira • 2026-05-07 21:08
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const mouse = { x: width / 2, y: height / 2, active: false };
        const particles = [];
        const pulses = [];

        // Configuration
        const config = {
            particleCount: 120,
            connectionDistance: 150,
            mouseDistance: 200,
            baseSpeed: 0.8,
            pulseSpeed: 5,
            colorShift: 0.001
        };

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * config.baseSpeed;
                this.vy = (Math.random() - 0.5) * config.baseSpeed;
                this.radius = Math.random() * 3 + 2;
                this.baseRadius = this.radius;
                this.hue = Math.random() * 60 + 180; // Blue-cyan range
                this.life = Math.random() * Math.PI * 2;
                this.pulseFactor = Math.random() * 0.5 + 0.5;
            }

            update() {
                // Add mouse attraction
                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < config.mouseDistance) {
                        const force = (config.mouseDistance - dist) / config.mouseDistance;
                        this.vx += dx * force * 0.001;
                        this.vy += dy * force * 0.001;
                    }
                }

                // Apply velocity with damping
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Minimum movement
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed < config.baseSpeed * 0.5) {
                    this.vx += (Math.random() - 0.5) * 0.1;
                    this.vy += (Math.random() - 0.5) * 0.1;
                }

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // Pulse animation
                this.life += 0.02 * this.pulseFactor;
                this.radius = this.baseRadius + Math.sin(this.life) * 1;

                // Color shift
                this.hue += config.colorShift;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, 0.8)`;
                ctx.fill();

                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${this.hue}, 80%, 60%, 0.5)`;
            }
        }

        class Pulse {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 300;
                this.alpha = 1;
                this.hue = Math.random() * 60 + 180;
            }

            update() {
                this.radius += config.pulseSpeed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < config.connectionDistance) {
                        const alpha = 1 - (dist / config.connectionDistance);
                        const gradient = ctx.createLinearGradient(
                            particles[i].x, particles[i].y,
                            particles[j].x, particles[j].y
                        );
                        gradient.addColorStop(0, `hsla(${particles[i].hue}, 80%, 60%, ${alpha * 0.5})`);
                        gradient.addColorStop(1, `hsla(${particles[j].hue}, 80%, 60%, ${alpha * 0.5})`);

                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = alpha * 2;
                        ctx.stroke();
                    }
                }
            }
        }

        function init() {
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Draw connections first
            ctx.shadowBlur = 0;
            drawConnections();

            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Update and draw pulses
            for (let i = pulses.length - 1; i >= 0; i--) {
                if (!pulses[i].update()) {
                    pulses.splice(i, 1);
                } else {
                    pulses[i].draw();
                }
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.active = false;
        });

        canvas.addEventListener('click', (e) => {
            pulses.push(new Pulse(e.clientX, e.clientY));
            // Create some new particles at click location
            for (let i = 0; i < 5; i++) {
                const p = new Particle();
                p.x = e.clientX;
                p.y = e.clientY;
                p.vx = (Math.random() - 0.5) * 4;
                p.vy = (Math.random() - 0.5) * 4;
                particles.push(p);
            }
            // Remove excess particles
            while (particles.length > config.particleCount + 20) {
                particles.shift();
            }
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            mouse.active = true;
        });

        canvas.addEventListener('touchend', () => {
            mouse.active = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            pulses.push(new Pulse(touch.clientX, touch.clientY));
        });

        init();
        animate();
    </script>
</body>
</html>
