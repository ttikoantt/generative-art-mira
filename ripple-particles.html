<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Particles - 波紋パーティクル</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }
        #fullscreen:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">クリック/タップで波紋を作成</div>
    <button id="fullscreen">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        // 波紋クラス
        class Ripple {
            constructor(x, y, isAuto = false) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 150 + Math.random() * 100;
                this.speed = 2 + Math.random() * 2;
                this.opacity = 1;
                this.lineWidth = 2 + Math.random() * 2;
                this.hue = isAuto ? 200 + Math.random() * 40 : 160 + Math.random() * 80;
                this.rings = 3 + Math.floor(Math.random() * 3);
                this.delays = [];
                for (let i = 0; i < this.rings; i++) {
                    this.delays.push(i * 15);
                }
            }

            update() {
                this.radius += this.speed;
                this.opacity = 1 - (this.radius / this.maxRadius);
            }

            draw() {
                for (let i = 0; i < this.rings; i++) {
                    const ringRadius = Math.max(0, this.radius - this.delays[i]);
                    if (ringRadius > 0 && ringRadius < this.maxRadius) {
                        const ringOpacity = Math.max(0, this.opacity * (1 - i / this.rings));
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, ringRadius, 0, Math.PI * 2);
                        ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, ${ringOpacity})`;
                        ctx.lineWidth = this.lineWidth;
                        ctx.stroke();
                    }
                }
            }

            isDead() {
                return this.radius >= this.maxRadius;
            }
        }

        let ripples = [];
        let autoDropCount = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function createRipple(x, y, isAuto = false) {
            ripples.push(new Ripple(x, y, isAuto));
        }

        function animate() {
            // 半透明の黒でフェード
            ctx.fillStyle = 'rgba(0, 0, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 自動で波紋を作成
            if (Math.random() < 0.02) {
                createRipple(
                    100 + Math.random() * (width - 200),
                    100 + Math.random() * (height - 200),
                    true
                );
            }

            // 波紋を更新・描画
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createRipple(touch.clientX, touch.clientY);
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
