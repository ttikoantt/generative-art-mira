<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Pulse Grid - Retro Future</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .controls button {
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px #0ff;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 0, 255, 0.2);
            border: 2px solid #f0f;
            color: #f0f;
            padding: 10px 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 20px #f0f;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 12px;
            text-shadow: 0 0 10px #0ff;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>NEON PULSE GRID</div>
        <div id="fps">FPS: 60</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>

    <div class="controls">
        <button onclick="changePalette('cyan-magenta')">CYAN-MAGENTA</button>
        <button onclick="changePalette('sunset')">SUNSET</button>
        <button onclick="changePalette('matrix')">MATRIX</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;

        // Grid settings
        const gridSize = 50;
        let gridPoints = [];

        // Current palette
        let palette = {
            primary: '#0ff',
            secondary: '#f0f',
            bg: '#000',
            fog: '#000022'
        };

        const palettes = {
            'cyan-magenta': {
                primary: '#0ff',
                secondary: '#f0f',
                bg: '#000',
                fog: '#000022'
            },
            'sunset': {
                primary: '#ff6b00',
                secondary: '#ff0080',
                bg: '#0a0010',
                fog: '#1a0020'
            },
            'matrix': {
                primary: '#00ff00',
                secondary: '#003300',
                bg: '#000',
                fog: '#001100'
            }
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initGrid();
        }

        function initGrid() {
            gridPoints = [];
            const cols = Math.ceil(width / gridSize) + 2;
            const rows = Math.ceil(height / gridSize) + 2;

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    gridPoints.push({
                        x: (x - 1) * gridSize,
                        y: (y - 1) * gridSize,
                        baseX: (x - 1) * gridSize,
                        baseY: (y - 1) * gridSize,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }
        }

        function changePalette(name) {
            palette = palettes[name];
        }

        function drawGrid() {
            // Background with gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, palette.bg);
            gradient.addColorStop(1, palette.fog);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Update and draw grid
            ctx.lineWidth = 1;

            // Draw vertical lines
            for (let i = 0; i < gridPoints.length; i++) {
                const p = gridPoints[i];

                // Animate point position
                p.x = p.baseX + Math.sin(time + p.phase) * 5;
                p.y = p.baseY + Math.cos(time * 0.5 + p.phase) * 3;
            }

            // Draw horizontal lines with perspective effect
            const cols = Math.ceil(width / gridSize) + 2;
            const rows = Math.ceil(height / gridSize) + 2;

            for (let y = 0; y < rows - 1; y++) {
                ctx.beginPath();
                for (let x = 0; x < cols - 1; x++) {
                    const i = y * cols + x;
                    const p = gridPoints[i];

                    if (x === 0) {
                        ctx.moveTo(p.x, p.y);
                    } else {
                        ctx.lineTo(p.x, p.y);
                    }
                }

                // Fade based on distance
                const fade = 1 - (y / rows) * 0.7;
                const alpha = fade * 0.5;

                ctx.strokeStyle = palette.primary + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                ctx.stroke();
            }

            // Draw vertical lines
            for (let x = 0; x < cols - 1; x++) {
                ctx.beginPath();
                for (let y = 0; y < rows - 1; y++) {
                    const i = y * cols + x;
                    const p = gridPoints[i];

                    if (y === 0) {
                        ctx.moveTo(p.x, p.y);
                    } else {
                        ctx.lineTo(p.x, p.y);
                    }
                }

                const fade = 1 - (x / cols) * 0.5;
                const alpha = fade * 0.3;

                ctx.strokeStyle = palette.secondary + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                ctx.stroke();
            }

            // Draw glowing intersection points
            for (let i = 0; i < gridPoints.length; i += 3) {
                const p = gridPoints[i];
                const distance = Math.sqrt(p.x * p.x + p.y * p.y);
                const fade = Math.max(0, 1 - distance / (Math.max(width, height) * 0.7));

                if (fade > 0.1) {
                    const size = 2 + Math.sin(time * 2 + p.phase) * 1;
                    const alpha = fade * 0.8;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = palette.primary + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                    ctx.fill();

                    // Glow effect
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = palette.primary + Math.floor(alpha * 50).toString(16).padStart(2, '0');
                    ctx.fill();
                }
            }
        }

        // Floating particles
        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                size: Math.random() * 2 + 1
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;

                const pulse = Math.sin(time * 3 + p.x * 0.01) * 0.5 + 0.5;
                const alpha = pulse * 0.7;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = palette.secondary + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                ctx.fill();
            });
        }

        // Scanline effect
        let scanlineY = 0;

        function drawScanline() {
            scanlineY = (scanlineY + 2) % height;

            const gradient = ctx.createLinearGradient(0, scanlineY, 0, scanlineY + 50);
            gradient.addColorStop(0, palette.primary + '00');
            gradient.addColorStop(0.5, palette.primary + '15');
            gradient.addColorStop(1, palette.primary + '00');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, scanlineY, width, 50);
        }

        let lastTime = 0;
        let frameCount = 0;
        let fps = 60;

        function animate(currentTime) {
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }

            time += 0.02;

            drawGrid();
            drawParticles();
            drawScanline();

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        resize();
        animate(0);
    </script>
</body>
</html>
