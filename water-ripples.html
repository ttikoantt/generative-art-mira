<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Water Ripples - Interactive Ripple Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c1445 0%, #1a237e 50%, #0d47a1 100%);
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #e3f2fd;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.5rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: #90caf9;
            text-align: center;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        #canvas {
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            cursor: pointer;
            touch-action: none;
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: rgba(255,255,255,0.15);
            color: #e3f2fd;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Water Ripples</h1>
        <p class="subtitle">タップやクリックで水紋を広げよう</p>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button class="btn" onclick="clearRipples()">クリア</button>
            <button class="btn" onclick="randomRipple()">ランダム</button>
            <button class="btn" onclick="toggleAuto()">自動: <span id="autoStatus">OFF</span></button>
        </div>
    </div>
    <p class="info">タップまたはクリックして水紋を作成</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        const size = Math.min(window.innerWidth - 40, 500);
        canvas.width = size;
        canvas.height = size;

        // Ripple system
        const ripples = [];
        const maxRipples = 20;
        let autoMode = false;
        let autoInterval = null;

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = size * 0.4;
                this.speed = 2 + Math.random() * 1.5;
                this.alpha = 1;
                this.lineWidth = 3;
                this.color = this.getRandomColor();
            }

            getRandomColor() {
                const colors = [
                    'rgba(100, 181, 246, ',  // Light blue
                    'rgba(79, 195, 247, ',   // Blue
                    'rgba(41, 182, 246, ',   // Light blue 2
                    'rgba(2, 119, 189, ',    // Deep blue
                    'rgba(187, 222, 251, ',  // Very light blue
                    'rgba(255, 255, 255, ',  // White
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                this.lineWidth = 3 * this.alpha;
                return this.alpha > 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color + this.alpha + ')';
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // Inner ripple
                if (this.radius > 20) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                    ctx.strokeStyle = this.color + (this.alpha * 0.5) + ')';
                    ctx.lineWidth = this.lineWidth * 0.5;
                    ctx.stroke();
                }

                // Center glow
                const glowSize = 10 * (1 - this.radius / this.maxRadius);
                if (glowSize > 0) {
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, glowSize
                    );
                    gradient.addColorStop(0, this.color + this.alpha + ')');
                    gradient.addColorStop(1, this.color + '0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function addRipple(x, y) {
            ripples.push(new Ripple(x, y));
            if (ripples.length > maxRipples) {
                ripples.shift();
            }
        }

        function clearRipples() {
            ripples.length = 0;
        }

        function randomRipple() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            addRipple(x, y);
        }

        function toggleAuto() {
            autoMode = !autoMode;
            document.getElementById('autoStatus').textContent = autoMode ? 'ON' : 'OFF';

            if (autoMode) {
                autoInterval = setInterval(() => {
                    randomRipple();
                }, 800);
            } else {
                clearInterval(autoInterval);
            }
        }

        function draw() {
            // Clear with gradient background
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            gradient.addColorStop(0, '#1a237e');
            gradient.addColorStop(0.5, '#0d47a1');
            gradient.addColorStop(1, '#0c1445');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw ripples
            for (let i = ripples.length - 1; i >= 0; i--) {
                if (!ripples[i].update()) {
                    ripples.splice(i, 1);
                } else {
                    ripples[i].draw();
                }
            }

            requestAnimationFrame(draw);
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            addRipple(x, y);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let touch of e.touches) {
                const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
                const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
                addRipple(x, y);
            }
        }, { passive: false });

        // Start animation
        draw();

        // Initial ripples
        setTimeout(() => addRipple(canvas.width / 2, canvas.height / 2), 500);
    </script>
</body>
</html>
