<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Ripples - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px #0ff;
            pointer-events: none;
            z-index: 10;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 2px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            z-index: 10;
        }
        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px #0ff;
        }
    </style>
</head>
<body>
    <div class="info">クリックまたはタップで波紋を発生</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let ripples = [];

        // ネオンカラーのパレット
        const neonColors = [
            { r: 0, g: 255, b: 255 },    // シアン
            { r: 255, g: 0, b: 255 },    // マゼンタ
            { r: 255, g: 0, b: 128 },    // ピンク
            { r: 0, g: 255, b: 128 },    // スプリンググリーン
            { r: 128, g: 0, b: 255 },    // パープル
            { r: 255, g: 255, b: 0 },    // イエロー
            { r: 0, g: 128, b: 255 },    // スカイブルー
            { r: 255, g: 128, b: 0 }     // オレンジ
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 200 + 150;
                this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                this.alpha = 1;
                this.lineWidth = Math.random() * 5 + 3;
                this.speed = Math.random() * 2 + 2;
                this.decay = Math.random() * 0.01 + 0.005;
            }

            update() {
                this.radius += this.speed;
                this.alpha -= this.decay;
                return this.alpha > 0 && this.radius < this.maxRadius;
            }

            draw(ctx) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.shadowColor = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.shadowBlur = 20;
                ctx.stroke();

                // 内側の輝き
                if (this.alpha > 0.5) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.3})`;
                    ctx.lineWidth = this.lineWidth * 0.5;
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        function createRipple(x, y) {
            // メインの波紋
            ripples.push(new Ripple(x, y));

            // 小さな追加波紋
            setTimeout(() => {
                ripples.push(new Ripple(x, y));
            }, 100);
            setTimeout(() => {
                ripples.push(new Ripple(x, y));
            }, 200);
        }

        function animate() {
            // フェードアウト効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 波紋を更新・描画
            ripples = ripples.filter(ripple => {
                const alive = ripple.update();
                if (alive) {
                    ripple.draw(ctx);
                }
                return alive;
            });

            // 自動的に新しい波紋を追加
            if (Math.random() < 0.02 && ripples.length < 5) {
                const x = Math.random() * width;
                const y = Math.random() * height;
                createRipple(x, y);
            }

            requestAnimationFrame(animate);
        }

        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;
            createRipple(x, y);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        animate();

        // 初期の波紋を生成
        setTimeout(() => {
            createRipple(width / 2, height / 2);
        }, 500);
    </script>
</body>
</html>
