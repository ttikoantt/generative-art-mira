<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>サクラダンス | Sakura Dance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffb7c5;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 183, 197, 0.5);
            z-index: 100;
            pointer-events: none;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 183, 197, 0.7);
            font-size: 14px;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 183, 197, 0.2);
            border: 2px solid #ffb7c5;
            color: #ffb7c5;
            padding: 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 183, 197, 0.4);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 18px;
                top: 15px;
            }

            .info {
                font-size: 12px;
                bottom: 15px;
            }

            .fullscreen-btn {
                top: 15px;
                right: 15px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🌸 サクラダンス</div>
    <canvas id="canvas"></canvas>
    <div class="info">タップすると新しい花びらが舞います</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let petals = [];
        let mouseX = 0, mouseY = 0;

        // 桜の花びらクラス
        class SakuraPetal {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || -50;
                this.size = Math.random() * 15 + 10;
                this.speedX = Math.random() * 2 - 1;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
                this.swayAmount = Math.random() * 2 + 1;
                this.time = Math.random() * Math.PI * 2;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.petalType = Math.floor(Math.random() * 3); // 3種類の花びら
                
                // 色のバリエーション
                const colors = [
                    { r: 255, g: 183, b: 197 }, // ピンク
                    { r: 255, g: 192, b: 203 }, // 薄いピンク
                    { r: 255, g: 160, b: 180 }, // 濃いピンク
                    { r: 255, g: 200, b: 210 }, // 非常に薄いピンク
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.time += this.swaySpeed;
                
                // 風に乗って左右に揺れる
                this.x += this.speedX + Math.sin(this.time) * this.swayAmount;
                this.y += this.speedY;
                this.rotation += this.rotationSpeed;

                // 画面外に出たらリセット
                if (this.y > height + 50) {
                    this.y = -50;
                    this.x = Math.random() * width;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                // 花びらの形
                ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.beginPath();

                if (this.petalType === 0) {
                    // 標準的な花びら
                    ctx.ellipse(0, 0, this.size / 2, this.size, 0, 0, Math.PI * 2);
                } else if (this.petalType === 1) {
                    // 先が尖った花びら
                    ctx.moveTo(0, -this.size);
                    ctx.bezierCurveTo(this.size / 2, -this.size / 2, this.size / 2, this.size / 2, 0, this.size);
                    ctx.bezierCurveTo(-this.size / 2, this.size / 2, -this.size / 2, -this.size / 2, 0, -this.size);
                } else {
                    // ハート型
                    const s = this.size / 2;
                    ctx.moveTo(0, s);
                    ctx.bezierCurveTo(-s, -s / 2, -s * 1.5, -s, 0, -s * 0.5);
                    ctx.bezierCurveTo(s * 1.5, -s, s, -s / 2, 0, s);
                }

                ctx.fill();

                // 花びらの vein（葉脈）
                ctx.strokeStyle = `rgba(255, 150, 170, 0.3)`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -this.size / 2);
                ctx.lineTo(0, this.size / 2);
                ctx.stroke();

                ctx.restore();
            }
        }

        // 初期化
        function init() {
            resize();
            // 初期の花びらを生成
            for (let i = 0; i < 50; i++) {
                const petal = new SakuraPetal();
                petal.y = Math.random() * height;
                petals.push(petal);
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 花びらを追加
        function addPetals(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    petals.push(new SakuraPetal(
                        x + (Math.random() - 0.5) * 100,
                        y + (Math.random() - 0.5) * 100
                    ));
                }, i * 50);
            }
        }

        // 最大花びら数を制限
        function limitPetals() {
            while (petals.length > 150) {
                petals.shift();
            }
        }

        // 背景を描画（月と星）
        function drawBackground() {
            // 月
            ctx.fillStyle = 'rgba(255, 250, 240, 0.1)';
            ctx.beginPath();
            ctx.arc(width * 0.8, height * 0.15, 40, 0, Math.PI * 2);
            ctx.fill();

            // 月のグロー
            const gradient = ctx.createRadialGradient(
                width * 0.8, height * 0.15, 30,
                width * 0.8, height * 0.15, 80
            );
            gradient.addColorStop(0, 'rgba(255, 250, 240, 0.2)');
            gradient.addColorStop(1, 'rgba(255, 250, 240, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(width * 0.8, height * 0.15, 80, 0, Math.PI * 2);
            ctx.fill();
        }

        // アニメーションループ
        function animate() {
            // キャンバスをクリア（トレイル効果）
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 背景を描画
            drawBackground();

            // 花びらを更新・描画
            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            // 花びら数を制限
            limitPetals();

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            addPetals(e.clientX, e.clientY, 8);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addPetals(touch.clientX, touch.clientY, 8);
        });

        // マウス移動で少し花びらを追加
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // ランダムに追加（動きに反応）
            if (Math.random() < 0.02) {
                addPetals(mouseX, mouseY, 1);
            }
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 開始
        init();
        animate();
    </script>
</body>
</html>
