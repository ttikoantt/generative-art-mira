<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            touch-action: none;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 10;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">タップして花火を打ち上げる</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        let particles = [];
        let fireworks = [];
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // タッチ/クリックイベント
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            createFirework(e.clientX, height * 0.8, e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createFirework(touch.clientX, height * 0.8, touch.clientX, touch.clientY);
        });
        
        function randomColor() {
            const colors = [
                '#ff0080', '#ff8000', '#80ff00', '#00ff80',
                '#0080ff', '#8000ff', '#ff0040', '#ff4080',
                '#ffff00', '#00ffff', '#ff00ff', '#ffffff'
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 3 + 2;
                this.gravity = 0.05;
            }
            
            update() {
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        class Firework {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                this.color = randomColor();
                
                const angle = Math.atan2(targetY - startY, targetX - startX);
                const distance = Math.sqrt((targetX - startX) ** 2 + (targetY - startY) ** 2);
                const speed = distance / 40;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.particles = [];
                this.exploded = false;
                this.trail = [];
            }
            
            update() {
                if (!this.exploded) {
                    this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                    if (this.trail.length > 10) this.trail.shift();
                    
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    // ターゲットに近づいたら爆発
                    const dist = Math.sqrt((this.targetX - this.x) ** 2 + (this.targetY - this.y) ** 2);
                    if (dist < 20 || this.y < this.targetY) {
                        this.explode();
                    }
                }
                
                this.particles = this.particles.filter(p => p.alpha > 0);
                this.particles.forEach(p => p.update());
                
                this.trail.forEach(t => t.alpha -= 0.1);
                this.trail = this.trail.filter(t => t.alpha > 0);
            }
            
            explode() {
                this.exploded = true;
                const count = 80 + Math.random() * 40;
                for (let i = 0; i < count; i++) {
                    this.particles.push(new Particle(this.x, this.y, this.color));
                }
            }
            
            draw() {
                // トレイルを描画
                this.trail.forEach(t => {
                    ctx.save();
                    ctx.globalAlpha = t.alpha * 0.5;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
                
                // 花火本体を描画
                if (!this.exploded) {
                    ctx.save();
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                
                this.particles.forEach(p => p.draw());
            }
            
            isDead() {
                return this.exploded && this.particles.length === 0;
            }
        }
        
        function createFirework(startX, startY, targetX, targetY) {
            fireworks.push(new Firework(startX, startY, targetX, targetY));
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            fireworks = fireworks.filter(f => !f.isDead());
            fireworks.forEach(f => {
                f.update();
                f.draw();
            });
            
            // 自動的に花火を打ち上げ
            if (Math.random() < 0.02) {
                const x = Math.random() * width * 0.8 + width * 0.1;
                const y = Math.random() * height * 0.5 + height * 0.1;
                createFirework(x, height * 0.9, x, y);
            }
            
            requestAnimationFrame(animate);
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        animate();
    </script>
</body>
</html>
