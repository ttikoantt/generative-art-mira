<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Aurora - デジタルオーロラ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(100, 255, 200, 0.5);
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .title {
                font-size: 12px;
                top: 15px;
            }

            .fullscreen-btn {
                bottom: 15px;
                right: 15px;
                padding: 8px 16px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>
    <div class="title">Digital Aurora</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');

        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        // Aurora wave parameters
        class AuroraWave {
            constructor(yOffset, color, speed, amplitude) {
                this.yOffset = yOffset;
                this.color = color;
                this.speed = speed;
                this.amplitude = amplitude;
                this.phase = Math.random() * Math.PI * 2;
                this.points = [];
            }

            update(time) {
                this.points = [];
                const segments = Math.floor(width / 5);

                for (let i = 0; i <= segments; i++) {
                    const x = (i / segments) * width;
                    const normalizedX = i / segments;

                    // Primary wave
                    const y1 = Math.sin(normalizedX * 3 + this.phase + time * this.speed) * this.amplitude;
                    // Secondary wave for complexity
                    const y2 = Math.sin(normalizedX * 7 + this.phase * 1.5 + time * this.speed * 1.3) * this.amplitude * 0.5;
                    // Tertiary wave for detail
                    const y3 = Math.cos(normalizedX * 11 - time * this.speed * 0.7) * this.amplitude * 0.3;

                    const y = this.yOffset + y1 + y2 + y3;
                    this.points.push({ x, y });
                }
            }

            draw(ctx) {
                if (this.points.length < 2) return;

                // Create gradient for this wave
                const gradient = ctx.createLinearGradient(0, this.yOffset - this.amplitude, 0, this.yOffset + this.amplitude);
                gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
                gradient.addColorStop(0.5, this.color);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.beginPath();
                ctx.moveTo(this.points[0].x, height);
                ctx.lineTo(this.points[0].x, this.points[0].y);

                for (let i = 1; i < this.points.length; i++) {
                    const xc = (this.points[i].x + this.points[i - 1].x) / 2;
                    const yc = (this.points[i].y + this.points[i - 1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i - 1].x, this.points[i - 1].y, xc, yc);
                }

                ctx.lineTo(this.points[this.points.length - 1].x, this.points[this.points.length - 1].y);
                ctx.lineTo(this.points[this.points.length - 1].x, height);
                ctx.closePath();
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // Create multiple aurora waves
        const waves = [
            new AuroraWave(height * 0.3, 'rgba(100, 255, 200, 0.15)', 0.0003, 80),
            new AuroraWave(height * 0.35, 'rgba(150, 200, 255, 0.12)', 0.0004, 100),
            new AuroraWave(height * 0.4, 'rgba(200, 150, 255, 0.1)', 0.00025, 120),
            new AuroraWave(height * 0.45, 'rgba(100, 255, 150, 0.08)', 0.00035, 90),
            new AuroraWave(height * 0.5, 'rgba(255, 200, 255, 0.06)', 0.0002, 110),
        ];

        // Stars background
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 1.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.phase = Math.random() * Math.PI * 2;
            }

            update() {
                this.phase += this.twinkleSpeed;
            }

            draw(ctx, time) {
                const twinkle = Math.sin(this.phase) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.8})`;
                ctx.fill();
            }
        }

        const stars = Array.from({ length: 150 }, () => new Star());

        // Animation loop
        let startTime = Date.now();

        function animate() {
            const time = Date.now() - startTime;

            // Clear with gradient sky
            const skyGradient = ctx.createLinearGradient(0, 0, 0, height);
            skyGradient.addColorStop(0, '#0a0a1a');
            skyGradient.addColorStop(0.5, '#0f1525');
            skyGradient.addColorStop(1, '#1a2030');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, width, height);

            // Draw stars
            stars.forEach(star => {
                star.update();
                star.draw(ctx, time);
            });

            // Draw aurora waves
            waves.forEach(wave => {
                wave.update(time);
                wave.draw(ctx);
            });

            // Add subtle glow effect
            ctx.globalCompositeOperation = 'lighter';
            waves.forEach(wave => {
                wave.draw(ctx);
            });
            ctx.globalCompositeOperation = 'source-over';

            requestAnimationFrame(animate);
        }

        animate();

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Handle resize
        window.addEventListener('resize', () => {
            resize();
            waves.forEach(wave => {
                wave.yOffset = height * (wave.yOffset / height);
            });
            stars.forEach(star => star.reset());
        });
    </script>
</body>
</html>
