<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Particle Symphony</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="info">
        Move mouse to create geometric patterns<br>
        Click to change color scheme
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">Fullscreen</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let particles = [];
        let hue = 0;
        let colorScheme = 0;

        const colorSchemes = [
            (h) => `hsl(${h}, 70%, 50%)`,
            (h) => `hsl(${h + 180}, 70%, 50%)`,
            (h) => `hsl(${(h * 2) % 360}, 80%, 60%)`,
            (h) => `hsl(${360 - h}, 70%, 50%)`
        ];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.1;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
                this.hueOffset = Math.random() * 60;
            }

            update() {
                this.angle += this.spin;
                
                // Orbital motion
                const radius = 50 + Math.sin(Date.now() * 0.001 + this.hueOffset) * 20;
                this.x = this.baseX + Math.cos(this.angle) * radius;
                this.y = this.baseY + Math.sin(this.angle) * radius;
                
                // Attraction to mouse
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    this.baseX += dx * force * 0.02;
                    this.baseY += dy * force * 0.02;
                }

                this.life -= this.decay;
            }

            draw() {
                const currentHue = (hue + this.hueOffset) % 360;
                ctx.fillStyle = colorSchemes[colorScheme](currentHue);
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createGeometricPattern(cx, cy) {
            const numPoints = 6;
            const radius = 100;
            
            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 2;
                const x = cx + Math.cos(angle) * radius;
                const y = cy + Math.sin(angle) * radius;
                particles.push(new Particle(x, y));
            }
            
            // Create inner pattern
            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 2 + Math.PI / 6;
                const x = cx + Math.cos(angle) * radius * 0.5;
                const y = cy + Math.sin(angle) * radius * 0.5;
                particles.push(new Particle(x, y));
            }
        }

        function connectParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 100) {
                        const alpha = (1 - dist / 100) * particles[i].life * 0.3;
                        const currentHue = (hue + particles[i].hueOffset) % 360;
                        ctx.strokeStyle = colorSchemes[colorScheme](currentHue);
                        ctx.globalAlpha = alpha;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Create new pattern periodically
            if (Math.random() < 0.05) {
                createGeometricPattern(
                    Math.random() * width,
                    Math.random() * height
                );
            }

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            connectParticles();
            hue += 0.5;

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            // Burst of particles
            for (let i = 0; i < 20; i++) {
                const angle = (i / 20) * Math.PI * 2;
                const x = mouseX + Math.cos(angle) * 50;
                const y = mouseY + Math.sin(angle) * 50;
                particles.push(new Particle(x, y));
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            for (let i = 0; i < 20; i++) {
                const angle = (i / 20) * Math.PI * 2;
                const x = mouseX + Math.cos(angle) * 50;
                const y = mouseY + Math.sin(angle) * 50;
                particles.push(new Particle(x, y));
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Initial pattern
        createGeometricPattern(width / 2, height / 2);

        animate();
    </script>
</body>
</html>
