<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Garden - ジェネレーティブ・フラクタルガーデン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        #canvas {
            border: 2px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
            cursor: pointer;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: #a0a0a0;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(233, 69, 96, 0.8);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.8rem;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>🌸 Fractal Garden</h1>
        <p class="subtitle">フラクタル幾何学で生成する美しい庭園</p>

        <canvas id="canvas" width="800" height="600"></canvas>

        <div class="controls">
            <button onclick="generateNewTree()">🌳 新しい木</button>
            <button onclick="toggleWind()">💨 風: ON/OFF</button>
            <button onclick="changeSeason()">🍂 季節を変える</button>
        </div>

        <p class="info">キャンバスをクリックして新しい木を生成</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let windEnabled = true;
        let windTime = 0;
        let currentSeason = 'spring';
        let trees = [];

        // 季節のカラーパレット
        const seasons = {
            spring: {
                sky: ['#87CEEB', '#E0F6FF'],
                trunk: '#8B4513',
                flowers: ['#FF69B4', '#FFB6C1', '#FF1493', '#FF69B4', '#FFC0CB'],
                leaves: ['#90EE90', '#98FB98', '#00FA9A', '#7CFC00']
            },
            summer: {
                sky: ['#1E90FF', '#87CEEB'],
                trunk: '#654321',
                flowers: ['#FFD700', '#FFA500', '#FF6347'],
                leaves: ['#228B22', '#2E8B57', '#32CD32', '#00FF00']
            },
            autumn: {
                sky: ['#FF8C00', '#FFD700'],
                trunk: '#8B4513',
                flowers: ['#FF6347', '#FF4500', '#DC143C'],
                leaves: ['#FF8C00', '#FF6347', '#FF4500', '#DAA520']
            },
            winter: {
                sky: ['#B0C4DE', '#E6E6FA'],
                trunk: '#4A4A4A',
                flowers: ['#FFFFFF', '#F0F8FF', '#E6E6FA'],
                leaves: ['#FFFFFF', '#F0F8FF', '#E6E6FA']
            }
        };

        class Tree {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.seed = Math.random() * 1000;
                this.branches = [];
                this.generate();
            }

            generate() {
                this.branches = [];
                this.generateBranch(this.x, this.y, -90, 120, 0);
            }

            generateBranch(x, y, angle, length, depth) {
                if (depth > 10 || length < 5) return;

                const rad = (angle * Math.PI) / 180;
                const windOffset = windEnabled ? Math.sin(windTime + depth * 0.5) * (depth * 0.5) : 0;
                const endX = x + Math.cos(rad + windOffset * 0.02) * length;
                const endY = y + Math.sin(rad + windOffset * 0.02) * length;

                this.branches.push({
                    x1: x,
                    y1: y,
                    x2: endX,
                    y2: endY,
                    depth: depth,
                    length: length
                });

                const pseudoRandom = (this.seed + depth * 100) % 1;
                const branchCount = depth < 3 ? 2 : (pseudoRandom > 0.5 ? 2 : 3);

                for (let i = 0; i < branchCount; i++) {
                    const newAngle = angle + (Math.random() - 0.5) * 60;
                    const newLength = length * (0.6 + Math.random() * 0.2);
                    this.generateBranch(endX, endY, newAngle, newLength, depth + 1);
                }
            }

            draw() {
                const season = seasons[currentSeason];

                this.branches.forEach(branch => {
                    const gradient = ctx.createLinearGradient(
                        branch.x1, branch.y1, branch.x2, branch.y2
                    );

                    const width = Math.max(1, (10 - branch.depth) * 1.5);
                    gradient.addColorStop(0, season.trunk);
                    gradient.addColorStop(1, season.trunk);

                    ctx.beginPath();
                    ctx.moveTo(branch.x1, branch.y1);
                    ctx.lineTo(branch.x2, branch.y2);
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.stroke();

                    // 葉や花を描画
                    if (branch.depth > 6) {
                        this.drawFoliage(branch.x2, branch.y2, branch.depth);
                    }
                });
            }

            drawFoliage(x, y, depth) {
                const season = seasons[currentSeason];
                const pseudoRandom = (this.seed + depth * 100) % 1;

                if (pseudoRandom > 0.6) {
                    const flowerColor = season.flowers[Math.floor(Math.random() * season.flowers.length)];
                    const leafColor = season.leaves[Math.floor(Math.random() * season.leaves.length)];

                    ctx.beginPath();
                    const radius = 3 + Math.random() * 4;
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fillStyle = pseudoRandom > 0.8 ? flowerColor : leafColor;
                    ctx.fill();

                    // 花びらの効果
                    if (pseudoRandom > 0.85) {
                        for (let i = 0; i < 5; i++) {
                            const angle = (i * 72 * Math.PI) / 180;
                            const px = x + Math.cos(angle) * radius * 0.5;
                            const py = y + Math.sin(angle) * radius * 0.5;
                            ctx.beginPath();
                            ctx.arc(px, py, radius * 0.6, 0, Math.PI * 2);
                            ctx.fillStyle = flowerColor;
                            ctx.globalAlpha = 0.6;
                            ctx.fill();
                            ctx.globalAlpha = 1;
                        }
                    }
                }
            }
        }

        function init() {
            canvas.width = Math.min(window.innerWidth - 40, 800);
            canvas.height = Math.min(window.innerHeight - 200, 600);

            // 初期の木を生成
            trees.push(new Tree(canvas.width / 2, canvas.height - 50));

            animate();
        }

        function animate() {
            const season = seasons[currentSeason];

            // 背景グラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, season.sky[0]);
            gradient.addColorStop(1, season.sky[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 地面
            ctx.fillStyle = currentSeason === 'winter' ? '#F0F8FF' : '#8FBC8F';
            ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

            if (windEnabled) {
                windTime += 0.02;
            }

            trees.forEach(tree => tree.draw());

            requestAnimationFrame(animate);
        }

        function generateNewTree() {
            const x = Math.random() * (canvas.width - 200) + 100;
            const y = canvas.height - 50;
            trees = [new Tree(x, y)];
        }

        function toggleWind() {
            windEnabled = !windEnabled;
        }

        function changeSeason() {
            const seasonList = ['spring', 'summer', 'autumn', 'winter'];
            const currentIndex = seasonList.indexOf(currentSeason);
            currentSeason = seasonList[(currentIndex + 1) % seasonList.length];
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (y > canvas.height - 100) {
                trees.push(new Tree(x, canvas.height - 50));
                if (trees.length > 5) {
                    trees.shift();
                }
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチイベント対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            if (y > canvas.height - 100) {
                trees.push(new Tree(x, canvas.height - 50));
                if (trees.length > 5) {
                    trees.shift();
                }
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = Math.min(window.innerWidth - 40, 800);
            canvas.height = Math.min(window.innerHeight - 200, 600);
        });

        init();
    </script>
</body>
</html>
