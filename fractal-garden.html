<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラクタルガーデン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 20px;
            color: #fff;
            z-index: 10;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .header p {
            font-size: 1rem;
            color: #a0a0a0;
        }

        #canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 15px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 217, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 217, 255, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn.secondary:hover {
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .controls {
                padding: 15px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="header">
        <h1>🌿 フラクタルガーデン</h1>
        <p>クリックで植物を植えよう</p>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="btn" onclick="generateGarden()">🌱 新しいガーデン</button>
        <button class="btn" onclick="addRandomPlant()">🌸 ランダムに追加</button>
        <button class="btn secondary" onclick="clearCanvas()">🗑️ クリア</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズを設定
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 900);
            const maxHeight = Math.min(window.innerHeight - 200, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            redrawPlants();
        });

        // 植物のリスト
        let plants = [];

        // 色のパレット
        const colors = [
            { main: '#00ff88', accent: '#00d9ff' },
            { main: '#ff6b6b', accent: '#feca57' },
            { main: '#a29bfe', accent: '#fd79a8' },
            { main: '#fdcb6e', accent: '#e17055' },
            { main: '#00b894', accent: '#00cec9' },
            { main: '#e84393', accent: '#fd79a8' },
            { main: '#74b9ff', accent: '#0984e3' },
            { main: '#ff7675', accent: '#d63031' }
        ];

        // フラクタル木を描画
        function drawTree(x, y, length, angle, depth, color) {
            if (depth === 0) return;

            const endX = x + length * Math.cos(angle);
            const endY = y + length * Math.sin(angle);

            // 色の計算
            const ratio = 1 - depth / 12;
            ctx.strokeStyle = depth > 3 ? `rgba(100, 70, 50, ${0.3 + ratio * 0.5})` : color.main;
            ctx.lineWidth = depth * 0.8;

            // 線を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 葉や花を描画
            if (depth <= 3) {
                ctx.beginPath();
                ctx.arc(endX, endY, 3 + depth * 2, 0, Math.PI * 2);
                ctx.fillStyle = depth === 1 ? color.accent : color.main;
                ctx.globalAlpha = 0.6;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // 再帰的に枝を描画
            const newLength = length * 0.75;
            const angleVariation = 0.4 + Math.random() * 0.3;

            drawTree(endX, endY, newLength, angle - angleVariation, depth - 1, color);
            drawTree(endX, endY, newLength, angle + angleVariation, depth - 1, color);

            // 小さな枝を追加
            if (depth > 5 && Math.random() > 0.5) {
                drawTree(endX, endY, newLength * 0.6, angle + angleVariation * 1.5, depth - 2, color);
            }
        }

        // ファーン（シダ植物）を描画
        function drawFern(x, y, size, rotation, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);

            for (let i = 0; i < 50; i++) {
                const t = i / 50;
                const px = size * Math.sin(t * Math.PI * 2) * (1 - t * 0.3);
                const py = -size * t * 1.5;

                ctx.beginPath();
                ctx.ellipse(px, py, size * 0.15 * (1 - t), size * 0.08 * (1 - t), t * Math.PI * 4, 0, Math.PI * 2);
                ctx.fillStyle = color.main;
                ctx.globalAlpha = 0.3 + t * 0.4;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            ctx.restore();
        }

        // スパイラル花を描画
        function drawSpiralFlower(x, y, size, color) {
            const petals = 8 + Math.floor(Math.random() * 5);

            for (let i = 0; i < petals; i++) {
                const angle = (i / petals) * Math.PI * 2;
                const petalLength = size * (0.8 + Math.random() * 0.4);

                ctx.beginPath();
                ctx.ellipse(
                    x + Math.cos(angle) * size * 0.3,
                    y + Math.sin(angle) * size * 0.3,
                    petalLength * 0.3,
                    petalLength * 0.15,
                    angle,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = color.main;
                ctx.globalAlpha = 0.7;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // 中心
            ctx.beginPath();
            ctx.arc(x, y, size * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = color.accent;
            ctx.fill();
        }

        // 植物を追加
        function addPlant(x, y) {
            const types = ['tree', 'fern', 'spiral'];
            const type = types[Math.floor(Math.random() * types.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = 30 + Math.random() * 50;

            plants.push({ type, x, y, size, color });
            drawPlant(plants[plants.length - 1]);
        }

        // 植物を描画
        function drawPlant(plant) {
            switch (plant.type) {
                case 'tree':
                    drawTree(plant.x, plant.y, plant.size * 0.5, -Math.PI / 2, 10 + Math.floor(Math.random() * 3), plant.color);
                    break;
                case 'fern':
                    drawFern(plant.x, plant.y, plant.size, Math.random() * Math.PI * 0.5 - Math.PI * 0.25, plant.color);
                    break;
                case 'spiral':
                    drawSpiralFlower(plant.x, plant.y, plant.size, plant.color);
                    break;
            }
        }

        // 全ての植物を再描画
        function redrawPlants() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            plants.forEach(plant => drawPlant(plant));
        }

        // ランダムに植物を追加
        function addRandomPlant() {
            const x = Math.random() * canvas.width;
            const y = canvas.height * 0.7 + Math.random() * canvas.height * 0.3;
            addPlant(x, y);
        }

        // ガーデンを生成
        function generateGarden() {
            clearCanvas();
            const plantCount = 8 + Math.floor(Math.random() * 7);

            for (let i = 0; i < plantCount; i++) {
                setTimeout(() => {
                    addRandomPlant();
                }, i * 100);
            }
        }

        // クリア
        function clearCanvas() {
            plants = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // キャンバスクリックで植物を追加
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addPlant(x, y);
        });

        // 全画面表示
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期ガーデンを生成
        generateGarden();
    </script>
</body>
</html>
