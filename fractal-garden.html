<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Garden - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: #00ff88;
            font-size: clamp(1.5rem, 4vw, 3rem);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            letter-spacing: 2px;
        }

        canvas {
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            background: rgba(0, 0, 0, 0.5);
            max-width: 95vw;
            max-height: 70vh;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border: 2px solid #00ff88;
            padding: 12px 24px;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            background: rgba(0, 255, 136, 0.3);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .fullscreen-btn {
            background: rgba(138, 43, 226, 0.1);
            color: #ff69b4;
            border-color: #ff69b4;
        }

        .fullscreen-btn:hover {
            background: rgba(138, 43, 226, 0.3);
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
        }

        .info {
            color: #888;
            margin-top: 15px;
            font-size: clamp(0.8rem, 1.5vw, 1rem);
        }

        @media (max-width: 768px) {
            h1 {
                margin-bottom: 15px;
            }

            canvas {
                max-height: 60vh;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 Fractal Garden 🌿</h1>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button onclick="generate()">🌳 新しいガーデン</button>
            <button onclick="toggleAnimation()" class="fullscreen-btn">⏸️ 一時停止</button>
            <button onclick="toggleFullscreen()" class="fullscreen-btn">📺 全画面</button>
        </div>
        <div class="info">
            フラクタルパターンで植物を生成 | 色彩はランダムに変化
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.95, 900);
            const maxHeight = Math.min(window.innerHeight * 0.7, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            generate();
        });

        // Animation state
        let isAnimating = true;
        let animationId;

        // Draw fractal tree
        function drawBranch(x, y, length, angle, depth, color) {
            if (depth === 0) return;

            const endX = x + length * Math.cos(angle);
            const endY = y + length * Math.sin(angle);

            // Draw branch with gradient
            const gradient = ctx.createLinearGradient(x, y, endX, endY);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, `hsl(${(depth * 30 + Date.now() / 50) % 360}, 70%, 50%)`);

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = depth * 0.8;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Draw leaves at tips
            if (depth <= 2) {
                ctx.beginPath();
                ctx.arc(endX, endY, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${(depth * 45 + Date.now() / 100) % 360}, 80%, 60%)`;
                ctx.fill();
            }

            // Recursive branching with natural spread
            const angleVariation = 0.3 + Math.random() * 0.3;
            const lengthVariation = 0.7 + Math.random() * 0.15;

            drawBranch(endX, endY, length * lengthVariation, angle - angleVariation, depth - 1, color);
            drawBranch(endX, endY, length * lengthVariation, angle + angleVariation, depth - 1, color);
        }

        // Generate multiple trees
        function generate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background gradient
            const bgGradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            bgGradient.addColorStop(0, 'rgba(10, 10, 20, 0.95)');
            bgGradient.addColorStop(1, 'rgba(30, 20, 40, 0.95)');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Generate 3-5 trees
            const numTrees = 3 + Math.floor(Math.random() * 3);
            const spacing = canvas.width / (numTrees + 1);

            for (let i = 0; i < numTrees; i++) {
                const x = spacing * (i + 1) + (Math.random() - 0.5) * 50;
                const y = canvas.height - 50 + Math.random() * 30;
                const depth = 8 + Math.floor(Math.random() * 3);
                const length = 60 + Math.random() * 30;
                const color = `hsl(${(i * 60 + Math.random() * 30) % 360}, 60%, 40%)`;

                drawBranch(x, y, length, -Math.PI / 2, depth, color);
            }
        }

        // Toggle animation
        function toggleAnimation() {
            isAnimating = !isAnimating;
            const btn = event.target;
            btn.textContent = isAnimating ? '⏸️ 一時停止' : '▶️ 再開';
        }

        // Animation loop
        function animate() {
            if (isAnimating) {
                generate();
            }
            animationId = requestAnimationFrame(animate);
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial generation
        generate();
        animate();
    </script>
</body>
</html>
