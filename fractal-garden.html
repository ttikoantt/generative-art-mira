<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Garden - L-System Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ff88, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #888;
            margin-bottom: 20px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 100%);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #ff00ff 0%, #00ffff 100%);
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            max-width: 600px;
        }

        .info strong {
            color: #00ff88;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            button {
                width: 100%;
            }
        }

        #canvas-container.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            max-width: none;
            z-index: 1000;
            border-radius: 0;
        }

        .exit-fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            padding: 10px 20px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }

        .exit-fullscreen.show {
            display: block;
        }
    </style>
</head>
<body>
    <h1>🌿 Fractal Garden</h1>
    <p class="subtitle">L-System Generative Plants</p>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <button class="exit-fullscreen" id="exitFullscreen">退出</button>

    <div class="controls">
        <button onclick="generateGarden()">🌱 新しい庭を生成</button>
        <button onclick="randomPlant()">🌲 ランダムな植物</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 全画面</button>
    </div>

    <div class="info">
        <strong>L-Systemとは：</strong>生物学者アリストライド・リンデンマイヤーが考案した、植物の成長パターンを数式で表現した仕組みです。<br>
        <strong>操作方法：</strong>「新しい庭を生成」で複数の植物、「ランダムな植物」で単一の植物を生成します。
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let width, height;

        function resize() {
            const rect = container.getBoundingClientRect();
            width = canvas.width = rect.width * window.devicePixelRatio;
            height = canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            generateGarden();
        }

        window.addEventListener('resize', resize);

        // L-Systemルールセット
        const plantTypes = [
            {
                name: 'シダ',
                axiom: 'X',
                rules: {
                    'X': 'F+[[X]-X]-F[-FX]+X',
                    'F': 'FF'
                },
                angle: 25,
                iterations: 5,
                length: 5,
                startAngle: -60,
                colors: ['#00ff88', '#00cc66', '#00ffaa']
            },
            {
                name: '木',
                axiom: 'F',
                rules: {
                    'F': 'FF+[+F-F-F]-[-F+F+F]'
                },
                angle: 25,
                iterations: 4,
                length: 8,
                startAngle: -90,
                colors: ['#8B4513', '#228B22', '#32CD32']
            },
            {
                name: '草',
                axiom: 'F',
                rules: {
                    'F': 'F[+F]F[-F]F'
                },
                angle: 25.7,
                iterations: 5,
                length: 4,
                startAngle: -90,
                colors: ['#90EE90', '#98FB98', '#00FA9A']
            },
            {
                name: '花',
                axiom: 'X',
                rules: {
                    'X': 'F+[[X]-X]-F[-FX]+X',
                    'F': 'FF'
                },
                angle: 20,
                iterations: 5,
                length: 4,
                startAngle: -60,
                colors: ['#FF69B4', '#FFB6C1', '#FFC0CB']
            },
            {
                name: 'サボテン',
                axiom: 'F',
                rules: {
                    'F': 'F[+F]F[-F][F]'
                },
                angle: 30,
                iterations: 4,
                length: 10,
                startAngle: -90,
                colors: ['#2E8B57', '#3CB371', '#98FB98']
            },
            {
                name: 'シダ変種',
                axiom: 'X',
                rules: {
                    'X': 'F-[[X]+X]+F[+FX]-X',
                    'F': 'FF'
                },
                angle: 22.5,
                iterations: 5,
                length: 5,
                startAngle: -45,
                colors: ['#00CED1', '#20B2AA', '#40E0D0']
            }
        ];

        function lsystem(axiom, rules, iterations) {
            let result = axiom;
            for (let i = 0; i < iterations; i++) {
                let next = '';
                for (let char of result) {
                    next += rules[char] || char;
                }
                result = next;
            }
            return result;
        }

        function drawPlant(x, y, instructions, plant, scale = 1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate((plant.startAngle * Math.PI) / 180);
            ctx.scale(scale, scale);

            const stack = [];
            const angleStep = (plant.angle * Math.PI) / 180;
            const length = plant.length;
            const colors = plant.colors;
            const colorIndex = Math.floor(Math.random() * colors.length);
            ctx.strokeStyle = colors[colorIndex];
            ctx.lineWidth = 1.5;

            let currentLength = length;
            let depth = 0;

            for (let i = 0; i < instructions.length; i++) {
                const char = instructions[i];

                switch (char) {
                    case 'F':
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(0, -currentLength);
                        ctx.stroke();
                        ctx.translate(0, -currentLength);
                        break;
                    case '+':
                        ctx.rotate(angleStep);
                        break;
                    case '-':
                        ctx.rotate(-angleStep);
                        break;
                    case '[':
                        stack.push({
                            transform: ctx.getTransform(),
                            length: currentLength,
                            depth: depth
                        });
                        depth++;
                        currentLength *= 0.8;
                        ctx.lineWidth = Math.max(0.5, ctx.lineWidth * 0.8);
                        break;
                    case ']':
                        const state = stack.pop();
                        if (state) {
                            ctx.setTransform(state.transform);
                            currentLength = state.length;
                            depth = state.depth;
                        }
                        break;
                }
            }

            ctx.restore();
        }

        function generateGarden() {
            ctx.clearRect(0, 0, width, height);

            // 背景グラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(0.5, '#0f1a2e');
            gradient.addColorStop(1, '#0a1a0a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 地面
            ctx.fillStyle = '#1a3a1a';
            ctx.fillRect(0, height - 50, width, 50);

            // 複数の植物を生成
            const numPlants = Math.floor(Math.random() * 3) + 3;
            const positions = [];

            for (let i = 0; i < numPlants; i++) {
                const x = Math.random() * (width - 100) + 50;
                const plantIndex = Math.floor(Math.random() * plantTypes.length);
                const plant = plantTypes[plantIndex];

                const instructions = lsystem(plant.axiom, plant.rules, plant.iterations);
                const scale = Math.random() * 0.5 + 0.5;

                // 少しずつ前後に配置
                positions.push({ x, plant, instructions, scale, order: Math.random() });
            }

            // 前から順に描画
            positions.sort((a, b) => a.order - b.order);

            positions.forEach(({ x, plant, instructions, scale }) => {
                const y = height - 50 + (Math.random() * 20 - 10);
                drawPlant(x / window.devicePixelRatio, y / window.devicePixelRatio, instructions, plant, scale);
            });
        }

        function randomPlant() {
            ctx.clearRect(0, 0, width, height);

            // 背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#1a0a2e');
            gradient.addColorStop(1, '#0a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            const plant = plantTypes[Math.floor(Math.random() * plantTypes.length)];
            const instructions = lsystem(plant.axiom, plant.rules, plant.iterations);
            const scale = Math.min(width, height) / 600;

            drawPlant(
                (width / 2) / window.devicePixelRatio,
                (height - 100) / window.devicePixelRatio,
                instructions,
                plant,
                scale
            );
        }

        function toggleFullscreen() {
            container.classList.toggle('fullscreen');
            document.getElementById('exitFullscreen').classList.toggle('show');
            if (container.classList.contains('fullscreen')) {
                resize();
            }
        }

        document.getElementById('exitFullscreen').addEventListener('click', () => {
            container.classList.remove('fullscreen');
            document.getElementById('exitFullscreen').classList.remove('show');
            resize();
        });

        // 初期化
        setTimeout(resize, 100);
    </script>
</body>
</html>
