<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Garden - フラクタルガーデン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #7b68ee;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(123, 104, 238, 0.5);
        }

        .subtitle {
            color: #9b8bfc;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        #canvas {
            border: 2px solid rgba(123, 104, 238, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(123, 104, 238, 0.2);
            background: rgba(10, 10, 26, 0.8);
            cursor: pointer;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #9b8bfc;
            font-size: 0.9rem;
        }

        button {
            background: linear-gradient(135deg, #7b68ee, #9b8bfc);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(123, 104, 238, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(123, 104, 238, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(123, 104, 238, 0.8);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(155, 139, 252, 0.9);
            transform: scale(1.1);
        }

        input[type="range"] {
            width: 120px;
            accent-color: #7b68ee;
        }

        .info {
            margin-top: 20px;
            color: #6b5bdc;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .controls {
                flex-direction: column;
            }

            input[type="range"] {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">⛶</button>

    <div class="container">
        <h1>🌸 Fractal Garden</h1>
        <p class="subtitle">フラクタルガーデン - 数学的な美しさ</p>

        <canvas id="canvas" width="800" height="600"></canvas>

        <div class="controls">
            <div class="control-group">
                <label>再帰レベル:</label>
                <input type="range" id="depth" min="4" max="10" value="7">
                <span id="depthValue">7</span>
            </div>

            <div class="control-group">
                <label>角度:</label>
                <input type="range" id="angle" min="10" max="45" value="25">
                <span id="angleValue">25°</span>
            </div>

            <div class="control-group">
                <label>風の強さ:</label>
                <input type="range" id="wind" min="0" max="100" value="30">
                <span id="windValue">30%</span>
            </div>

            <button onclick="generateGarden()">🌱 新しいガーデン</button>
            <button onclick="toggleAnimation()">⏯️ アニメーション</button>
        </div>

        <div class="info">
            <p>キャンバスをクリックで新しい位置に植物を生成</p>
            <p>フラクタルの幾何学で自然を表現 - 数学的な美しさを楽しみましょう</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let plants = [];
        let animationId = null;
        let isAnimating = true;
        let time = 0;

        // 色のパレット（桜、紫藤、萩、梅）
        const colorPalettes = [
            { base: '#ffb7c5', dark: '#ff69b4', light: '#ffc0cb' }, // 桜
            { base: '#9370db', dark: '#8a2be2', light: '#dda0dd' }, // 紫藤
            { base: '#da70d6', dark: '#ba55d3', light: '#ee82ee' }, // 萩
            { base: '#ffc0cb', dark: '#ff1493', light: '#ffb6c1' }, // 梅
        ];

        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(800, window.innerWidth - 40);
            const maxHeight = Math.min(600, window.innerHeight - 300);

            canvas.width = maxWidth;
            canvas.height = maxHeight;
            generateGarden();
        }

        function drawBranch(x, y, length, angle, depth, palette, wind) {
            if (depth === 0 || length < 2) return;

            const endX = x + length * Math.cos(angle);
            const endY = y + length * Math.sin(angle);

            // 色を深さで変化
            const colorIntensity = depth / 10;
            ctx.strokeStyle = depth > 3 ? palette.dark : palette.base;
            ctx.lineWidth = depth * 0.8;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 花びら（葉っぱ）を描画
            if (depth <= 2) {
                const petalSize = 3 + Math.random() * 3;
                ctx.fillStyle = palette.light;
                ctx.globalAlpha = 0.7;
                ctx.beginPath();
                ctx.arc(endX, endY, petalSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            // 風の影響（時間によって角度が変わる）
            const windAngle = wind * Math.sin(time * 0.02 + depth * 0.5) * 0.01;

            const newLength = length * 0.75;
            const angleSpread = (Math.random() * 0.3 + 0.2);

            drawBranch(endX, endY, newLength, angle - angleSpread + windAngle, depth - 1, palette, wind);
            drawBranch(endX, endY, newLength, angle + angleSpread + windAngle, depth - 1, palette, wind);

            // 時々3本目の枝
            if (Math.random() > 0.5 && depth > 4) {
                drawBranch(endX, endY, newLength * 0.8, angle + windAngle * 0.5, depth - 1, palette, wind);
            }
        }

        function generateGarden() {
            const depth = parseInt(document.getElementById('depth').value);
            const baseAngle = parseInt(document.getElementById('angle').value) * Math.PI / 180;
            const wind = parseInt(document.getElementById('wind').value);

            plants = [];

            // 複数の植物を生成
            const numPlants = 3 + Math.floor(Math.random() * 3);
            for (let i = 0; i < numPlants; i++) {
                const x = (canvas.width / (numPlants + 1)) * (i + 1);
                const y = canvas.height;
                const length = 80 + Math.random() * 40;
                const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
                const angleOffset = (Math.random() - 0.5) * 0.3;

                plants.push({ x, y, length, angle: -Math.PI / 2 + angleOffset, depth, palette, wind });
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            plants.forEach(plant => {
                drawBranch(
                    plant.x,
                    plant.y,
                    plant.length,
                    plant.angle,
                    plant.depth,
                    plant.palette,
                    plant.wind
                );
            });
        }

        function animate() {
            if (!isAnimating) return;

            time++;
            draw();
            animationId = requestAnimationFrame(animate);
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            } else {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // スライダーの値表示更新
        document.getElementById('depth').addEventListener('input', (e) => {
            document.getElementById('depthValue').textContent = e.target.value;
        });

        document.getElementById('angle').addEventListener('input', (e) => {
            document.getElementById('angleValue').textContent = e.target.value + '°';
        });

        document.getElementById('wind').addEventListener('input', (e) => {
            document.getElementById('windValue').textContent = e.target.value + '%';
        });

        // キャンバスクリックで新しい植物を追加
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const depth = parseInt(document.getElementById('depth').value);
            const wind = parseInt(document.getElementById('wind').value);
            const length = 60 + Math.random() * 30;
            const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];

            plants.push({ x, y, length, angle: -Math.PI / 2, depth, palette, wind });
            draw();
        });

        // タッチ操作対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            const depth = parseInt(document.getElementById('depth').value);
            const wind = parseInt(document.getElementById('wind').value);
            const length = 60 + Math.random() * 30;
            const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];

            plants.push({ x, y, length, angle: -Math.PI / 2, depth, palette, wind });
            draw();
        });

        window.addEventListener('resize', resizeCanvas);

        // 初期化
        resizeCanvas();
        animate();
    </script>
</body>
</html>
