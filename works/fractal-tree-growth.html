<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Growth - 自然な成長アニメーション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            backdrop-filter: blur(10px);
            max-width: 280px;
        }

        .controls h2 {
            margin-bottom: 15px;
            font-size: 18px;
            color: #00ff88;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
        }

        .control-group .value {
            display: inline-block;
            margin-left: 10px;
            font-size: 14px;
            color: #00ff88;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-grow {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            font-weight: bold;
        }

        .btn-reset {
            background: linear-gradient(135deg, #ff4757, #ff3344);
            color: #fff;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.3);
        }

        .stats {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 12px;
            color: #888;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff88;
            border: 2px solid #00ff88;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        @media (max-width: 768px) {
            .controls {
                top: auto;
                bottom: 20px;
                left: 10px;
                right: 10px;
                max-width: none;
                padding: 15px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas"></canvas>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

        <div class="controls">
            <h2>🌳 フラクタルツリー</h2>

            <div class="control-group">
                <label>成長速度</label>
                <input type="range" id="growthSpeed" min="0.1" max="3" step="0.1" value="1">
                <span class="value" id="growthSpeedValue">1.0</span>
            </div>

            <div class="control-group">
                <label>枝の角度</label>
                <input type="range" id="branchAngle" min="10" max="60" step="1" value="25">
                <span class="value" id="branchAngleValue">25°</span>
            </div>

            <div class="control-group">
                <label>風の強さ</label>
                <input type="range" id="windStrength" min="0" max="100" step="1" value="30">
                <span class="value" id="windStrengthValue">30</span>
            </div>

            <div class="control-group">
                <label>深さ</label>
                <input type="range" id="depth" min="5" max="14" step="1" value="10">
                <span class="value" id="depthValue">10</span>
            </div>

            <div class="button-group">
                <button class="btn-grow" onclick="growTree()">成長</button>
                <button class="btn-reset" onclick="resetTree()">リセット</button>
            </div>

            <div class="stats">
                <div>枝の数: <span id="branchCount">0</span></div>
                <div>成長率: <span id="growthPercent">0</span>%</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let tree;
        let growthSpeed = 1;
        let branchAngle = 25;
        let windStrength = 30;
        let maxDepth = 10;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Branch {
            constructor(x, y, angle, length, depth, maxDepth) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.targetLength = length;
                this.currentLength = 0;
                this.depth = depth;
                this.maxDepth = maxDepth;
                this.children = [];
                this.grown = false;
                this.growthComplete = false;
            }

            grow(speed) {
                if (this.growthComplete) return true;

                this.currentLength += (this.targetLength - this.currentLength) * 0.02 * speed;

                if (this.currentLength >= this.targetLength * 0.99) {
                    this.currentLength = this.targetLength;
                    this.growthComplete = true;

                    if (this.depth < this.maxDepth) {
                        const endX = this.x + Math.cos(this.angle) * this.currentLength;
                        const endY = this.y - Math.sin(this.angle) * this.currentLength;

                        const leftAngle = this.angle + (branchAngle * Math.PI / 180);
                        const rightAngle = this.angle - (branchAngle * Math.PI / 180);

                        const leftLength = this.targetLength * 0.75;
                        const rightLength = this.targetLength * 0.75;

                        this.children.push(new Branch(endX, endY, leftAngle, leftLength, this.depth + 1, this.maxDepth));
                        this.children.push(new Branch(endX, endY, rightAngle, rightLength, this.depth + 1, this.maxDepth));
                    }
                }

                return this.growthComplete && this.children.every(c => c.grow(speed));
            }

            draw(ctx, time) {
                const windEffect = Math.sin(time * 0.002 + this.depth * 0.5) * (windStrength / 1000) * (this.depth / this.maxDepth);
                const swayAngle = this.angle + windEffect;

                const endX = this.x + Math.cos(swayAngle) * this.currentLength;
                const endY = this.y - Math.sin(swayAngle) * this.currentLength;

                // 枝の太さを深さに応じて変化
                const thickness = Math.max(0.5, (this.maxDepth - this.depth + 1) * 0.8);

                // 色を深さに応じてグラデーション
                const hue = 30 + (this.depth / this.maxDepth) * 40; // 茶色から緑へ
                const lightness = 30 + (this.depth / this.maxDepth) * 40;

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = `hsl(${hue}, 70%, ${lightness}%)`;
                ctx.lineWidth = thickness;
                ctx.lineCap = 'round';
                ctx.stroke();

                // 葉を描画（最深レベルのみ）
                if (this.depth === this.maxDepth && this.currentLength > this.targetLength * 0.5) {
                    const leafSize = 4 * (this.currentLength / this.targetLength);
                    const leafHue = 100 + Math.sin(time * 0.001 + this.x * 0.1) * 30; // 緑の変化

                    ctx.beginPath();
                    ctx.arc(endX, endY, leafSize, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${leafHue}, 70%, 50%, 0.7)`;
                    ctx.fill();
                }

                this.children.forEach(child => child.draw(ctx, time));
            }

            countBranches() {
                return 1 + this.children.reduce((sum, c) => sum + c.countBranches(), 0);
            }
        }

        function createTree() {
            const startX = width / 2;
            const startY = height;
            const initialLength = Math.min(height * 0.2, 150);

            tree = new Branch(startX, startY, Math.PI / 2, initialLength, 0, maxDepth);
        }

        function growTree() {
            createTree();
        }

        function resetTree() {
            tree = null;
            document.getElementById('branchCount').textContent = '0';
            document.getElementById('growthPercent').textContent = '0';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time++;

            if (tree) {
                if (!tree.grown) {
                    tree.grown = tree.grow(growthSpeed);
                }

                // 背景をクリアして再描画
                ctx.fillStyle = 'rgba(26, 26, 46, 1)';
                ctx.fillRect(0, 0, width, height);

                tree.draw(ctx, time);

                // 統計更新
                const branchCount = tree.countBranches();
                const growthPercent = Math.round((tree.currentLength / tree.targetLength) * 100);
                document.getElementById('branchCount').textContent = branchCount.toLocaleString();
                document.getElementById('growthPercent').textContent = Math.min(growthPercent, 100);
            }

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        document.getElementById('growthSpeed').addEventListener('input', (e) => {
            growthSpeed = parseFloat(e.target.value);
            document.getElementById('growthSpeedValue').textContent = growthSpeed.toFixed(1);
        });

        document.getElementById('branchAngle').addEventListener('input', (e) => {
            branchAngle = parseInt(e.target.value);
            document.getElementById('branchAngleValue').textContent = branchAngle + '°';
        });

        document.getElementById('windStrength').addEventListener('input', (e) => {
            windStrength = parseInt(e.target.value);
            document.getElementById('windStrengthValue').textContent = windStrength;
        });

        document.getElementById('depth').addEventListener('input', (e) => {
            maxDepth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = maxDepth;
        });

        window.addEventListener('resize', () => {
            resize();
            if (!tree) createTree();
        });

        // 初期化
        resize();
        createTree();
        animate();
    </script>
</body>
</html>
