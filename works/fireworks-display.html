<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .fullscreen-btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Tap or click to launch fireworks!</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // Particle class for firework explosion
        class Particle {
            constructor(x, y, color, velocity) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = velocity;
                this.alpha = 1;
                this.decay = 0.015 + Math.random() * 0.01;
                this.size = 2 + Math.random() * 2;
            }
            
            update() {
                this.velocity.x *= 0.99;
                this.velocity.y *= 0.99;
                this.velocity.y += 0.02;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
            
            isDead() {
                return this.alpha <= 0;
            }
        }
        
        // Firework rocket class
        class Firework {
            constructor(x, targetY) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.velocity = { x: 0, y: -12 - Math.random() * 4 };
                this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
                this.trail = [];
                this.exploded = false;
            }
            
            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 20) this.trail.shift();
                
                this.trail.forEach(t => t.alpha -= 0.05);
                
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.velocity.y += 0.15;
                
                if (this.velocity.y >= 0 || this.y <= this.targetY) {
                    this.explode();
                }
            }
            
            draw() {
                // Draw trail
                this.trail.forEach(t => {
                    ctx.save();
                    ctx.globalAlpha = t.alpha;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                });
                
                // Draw rocket
                if (!this.exploded) {
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            }
            
            explode() {
                this.exploded = true;
                const particleCount = 80 + Math.random() * 60;
                
                for (let i = 0; i < particleCount; i++) {
                    const angle = (Math.PI * 2 / particleCount) * i;
                    const speed = 2 + Math.random() * 6;
                    const velocity = {
                        x: Math.cos(angle) * speed,
                        y: Math.sin(angle) * speed
                    };
                    particles.push(new Particle(this.x, this.y, this.color, velocity));
                }
                
                // Secondary explosion with different color
                const secondaryColor = `hsl(${(Math.random() * 360 + 180) % 360}, 80%, 60%)`;
                for (let i = 0; i < particleCount / 2; i++) {
                    const angle = (Math.PI * 2 / (particleCount / 2)) * i;
                    const speed = 1 + Math.random() * 3;
                    const velocity = {
                        x: Math.cos(angle) * speed,
                        y: Math.sin(angle) * speed
                    };
                    particles.push(new Particle(this.x, this.y, secondaryColor, velocity));
                }
            }
        }
        
        let fireworks = [];
        let particles = [];
        
        // Auto launch fireworks
        function autoLaunch() {
            if (Math.random() < 0.03) {
                const x = Math.random() * width;
                const targetY = height * 0.2 + Math.random() * height * 0.3;
                fireworks.push(new Firework(x, targetY));
            }
        }
        
        // Launch on click/touch
        function launchFirework(x, y) {
            const targetY = y;
            fireworks.push(new Firework(x, targetY));
        }
        
        canvas.addEventListener('click', (e) => {
            launchFirework(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            launchFirework(touch.clientX, touch.clientY);
        });
        
        // Animation loop
        function animate() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // Update and draw fireworks
            fireworks = fireworks.filter(fw => !fw.exploded);
            fireworks.forEach(fw => {
                fw.update();
                fw.draw();
            });
            
            // Update and draw particles
            particles = particles.filter(p => !p.isDead());
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            autoLaunch();
            
            requestAnimationFrame(animate);
        }
        
        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        // Start animation
        animate();
    </script>
</body>
</html>
