<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree - 風に揺れるフラクタルツリー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #eee;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .canvas-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #fractalCanvas {
            width: 100%;
            height: 500px;
            display: block;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 150px;
        }

        label {
            font-size: 0.85rem;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 50%;
            cursor: pointer;
        }

        .info {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            #fractalCanvas {
                height: 350px;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 Fractal Tree</h1>
        <p class="subtitle">風に揺れるフラクタルツリー - 自然の美しさを再帰で表現</p>

        <div class="canvas-wrapper">
            <canvas id="fractalCanvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>再帰の深さ: <span id="depthValue">10</span></label>
                <input type="range" id="depth" min="5" max="14" value="10">
            </div>
            <div class="control-group">
                <label>枝の角度: <span id="angleValue">25</span>°</label>
                <input type="range" id="angle" min="10" max="45" value="25">
            </div>
            <div class="control-group">
                <label>風の強さ: <span id="windValue">1.0</span></label>
                <input type="range" id="wind" min="0" max="3" step="0.1" value="1.0">
            </div>
            <div class="control-group">
                <label>成長速度: <span id="speedValue">1.0</span>x</label>
                <input type="range" id="speed" min="0.1" max="2" step="0.1" value="1.0">
            </div>
        </div>

        <p class="info">
            再帰的な関数呼び出しで自然な木の成長をシミュレートしています。<br>
            風の効果で動的に揺れる様子をお楽しみください。
        </p>
    </div>

    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');

        let depth = 10;
        let angle = 25;
        let windStrength = 1.0;
        let growthSpeed = 1.0;
        let time = 0;
        let growth = 0;

        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
        }

        function drawBranch(x, y, length, angle, depth) {
            if (depth === 0 || length < 2) return;

            const endX = x + Math.cos(angle) * length;
            const endY = y - Math.sin(angle) * length;

            // 色を深度に応じて変化
            const hue = 120 + (10 - depth) * 8;
            const lightness = 30 + depth * 4;
            ctx.strokeStyle = `hsl(${hue}, 70%, ${lightness}%)`;
            ctx.lineWidth = depth * 0.8;
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 風の影響を計算
            const windEffect = Math.sin(time * 0.02 + depth * 0.5) * windStrength * 0.02 * (10 - depth);

            const newLength = length * 0.75;
            const angleRad = (angle * Math.PI) / 180;
            const leftAngle = angle + angleRad + windEffect;
            const rightAngle = angle - angleRad + windEffect;

            drawBranch(endX, endY, newLength, leftAngle, depth - 1);
            drawBranch(endX, endY, newLength, rightAngle, depth - 1);
        }

        function draw() {
            // 背景をクリア
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 地面を描画
            const gradient = ctx.createLinearGradient(0, canvas.height - 50, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(34, 139, 34, 0.3)');
            gradient.addColorStop(1, 'rgba(34, 139, 34, 0.6)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // 木を描画（成長アニメーション付き）
            const treeHeight = 120 * growth;
            drawBranch(
                canvas.width / 2,
                canvas.height - 50,
                treeHeight,
                Math.PI / 2,
                Math.floor(depth * growth)
            );

            time++;
            growth = Math.min(1, growth + 0.005 * growthSpeed);

            requestAnimationFrame(draw);
        }

        // イベントリスナー
        document.getElementById('depth').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = depth;
            growth = 0.3; // 再成長
        });

        document.getElementById('angle').addEventListener('input', (e) => {
            angle = parseInt(e.target.value);
            document.getElementById('angleValue').textContent = angle;
        });

        document.getElementById('wind').addEventListener('input', (e) => {
            windStrength = parseFloat(e.target.value);
            document.getElementById('windValue').textContent = windStrength.toFixed(1);
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            growthSpeed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = growthSpeed.toFixed(1);
        });

        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        draw();
    </script>
</body>
</html>
