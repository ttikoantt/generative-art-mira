<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Field with Attractors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.6;
            pointer-events: none;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info h1 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #0ff;
        }

        .info p {
            margin: 5px 0;
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <h1>🌀 Particle Flow Field</h1>
        <p>Attractors: 5</p>
        <p>Particles: 2000</p>
        <p>Click & drag attractors</p>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let attractors = [];
        let dragging = null;

        // Particle class
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.life = 1;
                this.maxLife = 200 + Math.random() * 200;
                this.age = 0;
                this.history = [];
            }

            update() {
                // Calculate attraction force from all attractors
                for (let attr of attractors) {
                    const dx = attr.x - this.x;
                    const dy = attr.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 5) {
                        const force = attr.strength / (dist * dist);
                        const angle = Math.atan2(dy, dx);

                        this.vx += Math.cos(angle) * force;
                        this.vy += Math.sin(angle) * force;
                    }
                }

                // Add some noise
                this.vx += (Math.random() - 0.5) * 0.5;
                this.vy += (Math.random() - 0.5) * 0.5;

                // Limit velocity
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 3) {
                    this.vx = (this.vx / speed) * 3;
                    this.vy = (this.vy / speed) * 3;
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Store history
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > 20) {
                    this.history.shift();
                }

                // Age
                this.age++;
                this.life = 1 - (this.age / this.maxLife);

                // Reset if dead or out of bounds
                if (this.age >= this.maxLife || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw() {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);
                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }

                // Find closest attractor for color
                let closestAttr = attractors[0];
                let minDist = Infinity;
                for (let attr of attractors) {
                    const dx = attr.x - this.x;
                    const dy = attr.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < minDist) {
                        minDist = dist;
                        closestAttr = attr;
                    }
                }

                ctx.strokeStyle = `rgba(${closestAttr.r}, ${closestAttr.g}, ${closestAttr.b}, ${this.life * 0.6})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        // Attractor class
        class Attractor {
            constructor(x, y, r, g, b) {
                this.x = x;
                this.y = y;
                this.r = r;
                this.g = g;
                this.b = b;
                this.strength = 500 + Math.random() * 1000;
                this.radius = 15;
            }

            draw() {
                // Glow effect
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 3);
                gradient.addColorStop(0, `rgba(${this.r}, ${this.g}, ${this.b}, 0.3)`);
                gradient.addColorStop(0.5, `rgba(${this.r}, ${this.g}, ${this.b}, 0.1)`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${this.r}, ${this.g}, ${this.b})`;
                ctx.fill();

                // Border
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            contains(x, y) {
                const dx = this.x - x;
                const dy = this.y - y;
                return Math.sqrt(dx * dx + dy * dy) < this.radius + 10;
            }
        }

        function init() {
            resize();

            // Create attractors
            const colors = [
                { r: 255, g: 100, b: 100 },  // Red
                { r: 100, g: 255, b: 100 },  // Green
                { r: 100, g: 100, b: 255 },  // Blue
                { r: 255, g: 255, b: 100 },  // Yellow
                { r: 255, g: 100, b: 255 }   // Magenta
            ];

            for (let i = 0; i < 5; i++) {
                const x = width * (0.2 + 0.15 * i);
                const y = height * (0.3 + 0.4 * Math.sin(i));
                attractors.push(new Attractor(x, y, colors[i].r, colors[i].g, colors[i].b));
            }

            // Create particles
            for (let i = 0; i < 2000; i++) {
                particles.push(new Particle());
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            for (let particle of particles) {
                particle.update();
                particle.draw();
            }

            // Draw attractors
            for (let attr of attractors) {
                attr.draw();
            }

            requestAnimationFrame(animate);
        }

        // Mouse/touch events
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function handleStart(e) {
            e.preventDefault();
            const pos = getPos(e);
            for (let attr of attractors) {
                if (attr.contains(pos.x, pos.y)) {
                    dragging = attr;
                    break;
                }
            }
        }

        function handleMove(e) {
            e.preventDefault();
            if (dragging) {
                const pos = getPos(e);
                dragging.x = pos.x;
                dragging.y = pos.y;
            }
        }

        function handleEnd(e) {
            e.preventDefault();
            dragging = null;
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('mouseleave', handleEnd);

        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        canvas.addEventListener('touchend', handleEnd, { passive: false });

        window.addEventListener('resize', resize);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
        animate();
    </script>
</body>
</html>
