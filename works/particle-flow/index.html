<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
        }

        .info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .control-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">マウス/タッチを動かしてパーティクルを操作</div>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <button class="control-btn" onclick="changeMode('flow')">Flow</button>
            <button class="control-btn" onclick="changeMode('explosion')">Explosion</button>
            <button class="control-btn" onclick="changeMode('orbit')">Orbit</button>
            <button class="control-btn" onclick="changeMode('wave')">Wave</button>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: 0, y: 0, active: false };
        let mode = 'flow';

        const PALETTE = [
            '#00d4ff', '#0099ff', '#0066ff',
            '#00ffcc', '#00ff99', '#00ff66',
            '#ff00ff', '#ff66ff', '#ffccff',
            '#ff6600', '#ff9900', '#ffcc00'
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = 2 + Math.random() * 4;
                this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
                this.baseSize = this.size;
                this.angle = Math.random() * Math.PI * 2;
                this.angularVelocity = (Math.random() - 0.5) * 0.1;
            }

            update() {
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (mouse.active) {
                    switch(mode) {
                        case 'flow':
                            const force = Math.max(0, 1 - dist / 300);
                            this.vx += (dx / dist) * force * 0.5;
                            this.vy += (dy / dist) * force * 0.5;
                            break;
                        case 'explosion':
                            if (dist < 150) {
                                const repel = (1 - dist / 150) * 3;
                                this.vx -= (dx / dist) * repel;
                                this.vy -= (dy / dist) * repel;
                            }
                            break;
                        case 'orbit':
                            const orbitForce = Math.max(0, 1 - dist / 200);
                            const angle = Math.atan2(dy, dx);
                            this.vx += Math.cos(angle + Math.PI / 2) * orbitForce * 0.5;
                            this.vy += Math.sin(angle + Math.PI / 2) * orbitForce * 0.5;
                            this.vx += (dx / dist) * orbitForce * 0.2;
                            this.vy += (dy / dist) * orbitForce * 0.2;
                            break;
                        case 'wave':
                            const waveDist = Math.sin(this.x * 0.02 + Date.now() * 0.002) * 50;
                            this.vy += waveDist * 0.01;
                            break;
                    }
                }

                this.vx *= 0.98;
                this.vy *= 0.98;

                this.x += this.vx;
                this.y += this.vy;

                this.angle += this.angularVelocity;
                this.size = this.baseSize * (0.5 + Math.sin(this.angle) * 0.5);

                this.life -= this.decay;

                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life * 0.8;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function init() {
            resize();
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            particles = particles.filter(p => p.life > 0);

            while (particles.length < 150) {
                particles.push(new Particle());
            }

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (mouse.active) {
                ctx.save();
                ctx.shadowBlur = 30;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        function changeMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.control-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            mouse.active = true;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            mouse.active = true;
        }, { passive: false });

        canvas.addEventListener('mouseleave', () => {
            mouse.active = false;
        });

        canvas.addEventListener('touchend', () => {
            mouse.active = false;
        });

        window.addEventListener('resize', resize);

        init();
        animate();

        // 初期モードをアクティブに
        document.querySelector('.control-btn').classList.add('active');
    </script>
</body>
</html>
