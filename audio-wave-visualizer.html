<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Wave Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
            margin-bottom: 10px;
        }

        .canvas-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5),
                        inset 0 0 60px rgba(100, 200, 255, 0.1);
        }

        #visualizer {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .status {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            text-align: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .canvas-wrapper {
                aspect-ratio: 4/3;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🎵 Audio Wave Visualizer</h1>

        <div class="canvas-wrapper">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startAudio()">開始</button>
            <button id="stopBtn" onclick="stopAudio()" style="display: none;">停止</button>
            <button onclick="setMode('waveform')" class="mode-btn active" data-mode="waveform">波形</button>
            <button onclick="setMode('frequency')" class="mode-btn" data-mode="frequency">周波数</button>
            <button onclick="setMode('circular')" class="mode-btn" data-mode="circular">円形</button>
        </div>

        <div class="status" id="status">「開始」ボタンをクリックしてマイクを有効にしてください</div>
    </div>

    <script>
        let audioContext;
        let analyser;
        let microphone;
        let isRunning = false;
        let animationId;
        let currentMode = 'waveform';
        let hue = 0;

        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth * window.devicePixelRatio;
            canvas.height = wrapper.clientHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function startAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;

                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                isRunning = true;
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'inline-block';
                document.getElementById('status').textContent = '🎤 音声を可視化中...';

                visualize();
            } catch (err) {
                console.error('マイクアクセスエラー:', err);
                document.getElementById('status').textContent = '❌ マイクへのアクセスが許可されていません';
            }
        }

        function stopAudio() {
            if (audioContext) {
                audioContext.close();
            }
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            isRunning = false;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('status').textContent = '「開始」ボタンをクリックしてマイクを有効にしてください';

            // Clear canvas
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width / window.devicePixelRatio, canvas.height / window.devicePixelRatio);
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
        }

        function visualize() {
            if (!isRunning) return;

            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;

            // Clear with fade effect
            ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
            ctx.fillRect(0, 0, width, height);

            hue = (hue + 0.5) % 360;

            if (currentMode === 'waveform') {
                drawWaveform(width, height);
            } else if (currentMode === 'frequency') {
                drawFrequency(width, height);
            } else if (currentMode === 'circular') {
                drawCircular(width, height);
            }

            animationId = requestAnimationFrame(visualize);
        }

        function drawWaveform(width, height) {
            const bufferLength = analyser.fftSize;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteTimeDomainData(dataArray);

            ctx.lineWidth = 3;
            ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;

            ctx.beginPath();

            const sliceWidth = width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * height / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.lineTo(width, height / 2);
            ctx.stroke();
        }

        function drawFrequency(width, height) {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const barWidth = width / bufferLength * 2.5;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * height;

                const gradient = ctx.createLinearGradient(x, height, x, height - barHeight);
                gradient.addColorStop(0, `hsl(${hue + i * 0.5}, 100%, 50%)`);
                gradient.addColorStop(1, `hsl(${hue + i * 0.5 + 60}, 100%, 70%)`);

                ctx.fillStyle = gradient;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${hue + i * 0.5}, 100%, 50%)`;

                ctx.fillRect(x, height - barHeight, barWidth, barHeight);

                x += barWidth + 1;
            }
        }

        function drawCircular(width, height) {
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) / 4;

            for (let i = 0; i < bufferLength; i++) {
                const amplitude = dataArray[i] / 255;
                const angle = (i / bufferLength) * Math.PI * 2;

                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + amplitude * 200);
                const y2 = centerY + Math.sin(angle) * (radius + amplitude * 200);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);

                const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
                gradient.addColorStop(0, `hsla(${hue + i * 0.5}, 100%, 50%, 0.8)`);
                gradient.addColorStop(1, `hsla(${hue + i * 0.5 + 60}, 100%, 70%, 0.2)`);

                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${hue + i * 0.5}, 100%, 50%)`;
                ctx.stroke();
            }

            // Center circle
            const averageAmplitude = dataArray.reduce((a, b) => a + b, 0) / bufferLength / 255;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * averageAmplitude * 0.5, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${averageAmplitude * 0.5})`;
            ctx.shadowBlur = 30;
            ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
            ctx.fill();
        }

        function toggleFullscreen() {
            const wrapper = document.querySelector('.canvas-wrapper');
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
