<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮遊する球体 | Floating Orbs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">Floating Orbs - クリックで追加</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        const orbs = [];

        // 色のパレット
        const colors = [
            { base: '#ff6b9d', glow: '#ff6b9d' },
            { base: '#c44dff', glow: '#c44dff' },
            { base: '#4d79ff', glow: '#4d79ff' },
            { base: '#4dffea', glow: '#4dffea' },
            { base: '#ffd84d', glow: '#ffd84d' },
            { base: '#ff4d6a', glow: '#ff4d6a' }
        ];

        class Orb {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.radius = Math.random() * 40 + 20;
                this.baseRadius = this.radius;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                this.alpha = 0.6 + Math.random() * 0.4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.pulse += this.pulseSpeed;

                // 壁で反射
                if (this.x < this.radius || this.x > width - this.radius) {
                    this.vx *= -1;
                }
                if (this.y < this.radius || this.y > height - this.radius) {
                    this.vy *= -1;
                }

                // パルス効果
                this.radius = this.baseRadius + Math.sin(this.pulse) * 5;

                // 画面内に保つ
                this.x = Math.max(this.radius, Math.min(width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));
            }

            draw() {
                // グロー効果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 3
                );
                gradient.addColorStop(0, this.color.glow + Math.floor(this.alpha * 255).toString(16).padStart(2, '0'));
                gradient.addColorStop(0.3, this.color.glow + '40');
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // 球体本体
                const orbGradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, this.y - this.radius * 0.3, 0,
                    this.x, this.y, this.radius
                );
                orbGradient.addColorStop(0, '#ffffff');
                orbGradient.addColorStop(0.3, this.color.base);
                orbGradient.addColorStop(1, this.color.base + '40');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = orbGradient;
                ctx.fill();
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            for (let i = 0; i < 8; i++) {
                orbs.push(new Orb());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            orbs.forEach(orb => {
                orb.update();
                orb.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // クリックで新しい球体を追加
        canvas.addEventListener('click', (e) => {
            orbs.push(new Orb(e.clientX, e.clientY));
            if (orbs.length > 20) {
                orbs.shift();
            }
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            orbs.push(new Orb(touch.clientX, touch.clientY));
            if (orbs.length > 20) {
                orbs.shift();
            }
        });

        window.addEventListener('resize', resize);

        init();
        animate();
    </script>
</body>
</html>
