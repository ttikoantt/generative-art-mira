<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Interactive Audio Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 10, 15, 0.95);
            transition: opacity 0.5s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay h1 {
            color: #00ffcc;
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 1rem;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }

        .overlay p {
            color: #888;
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 2rem;
            text-align: center;
            max-width: 600px;
            padding: 0 1rem;
        }

        .start-btn {
            padding: 1rem 3rem;
            font-size: clamp(1rem, 3vw, 1.2rem);
            background: linear-gradient(135deg, #00ffcc, #00ccff);
            border: none;
            border-radius: 50px;
            color: #0a0a0f;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }

        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.5);
        }

        .info {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            color: #00ffcc;
            font-size: clamp(0.6rem, 1.5vw, 0.8rem);
            text-align: center;
            opacity: 0.7;
        }

        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 10;
            padding: 0.5rem 1rem;
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid #00ffcc;
            border-radius: 20px;
            color: #00ffcc;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 204, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="overlay" id="overlay">
        <h1>🎵 Audio Visualizer</h1>
        <p>マイクへのアクセスを許可すると、音声に反応して美しいビジュアルが生成されます</p>
        <button class="start-btn" id="startBtn">開始する</button>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>

    <div class="info">音に合わせて動きます • マウス操作でインタラクション</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let audioContext;
        let analyser;
        let microphone;
        let dataArray;
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let isRunning = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        class Particle {
            constructor(x, y, energy) {
                this.x = x;
                this.y = y;
                this.energy = energy;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 1 + Math.random() * 3 + energy * 5;
                this.size = 2 + Math.random() * 3 + energy * 5;
                this.hue = (energy * 360 + Date.now() * 0.1) % 360;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.angle += 0.02;
                this.life -= this.decay;
                this.size *= 0.99;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, 1)`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 60%, 1)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 512;
                microphone.connect(analyser);

                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                isRunning = true;
                overlay.classList.add('hidden');
                animate();
            } catch (err) {
                alert('マイクへのアクセスができませんでした。ブラウザの設定を確認してください。');
                console.error(err);
            }
        }

        function drawVisuals() {
            if (!analyser) return;

            analyser.getByteFrequencyData(dataArray);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.min(canvas.width, canvas.height) * 0.4;

            // 背景を半透明でフェード
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 平均エネルギー計算
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const avgEnergy = sum / dataArray.length / 255;

            // 円形の波形
            for (let i = 0; i < dataArray.length; i++) {
                const angle = (i / dataArray.length) * Math.PI * 2;
                const energy = dataArray[i] / 255;
                const radius = maxRadius * 0.5 + energy * maxRadius * 0.5;

                const x1 = centerX + Math.cos(angle) * (maxRadius * 0.3);
                const y1 = centerY + Math.sin(angle) * (maxRadius * 0.3);
                const x2 = centerX + Math.cos(angle) * radius;
                const y2 = centerY + Math.sin(angle) * radius;

                const hue = (energy * 360 + i * 2 + Date.now() * 0.05) % 360;

                ctx.save();
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${0.5 + energy * 0.5})`;
                ctx.lineWidth = 2 + energy * 3;
                ctx.shadowBlur = 10 + energy * 20;
                ctx.shadowColor = `hsla(${hue}, 100%, 60%, 1)`;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                ctx.restore();

                // エネルギーが高いときパーティクル生成
                if (energy > 0.7 && Math.random() > 0.7) {
                    particles.push(new Particle(x2, y2, energy));
                }
            }

            // マウス周辺のインタラクション
            const mouseEnergy = avgEnergy * 100;
            if (mouseEnergy > 10) {
                for (let i = 0; i < 3; i++) {
                    const offsetX = (Math.random() - 0.5) * mouseEnergy * 2;
                    const offsetY = (Math.random() - 0.5) * mouseEnergy * 2;
                    particles.push(new Particle(mouseX + offsetX, mouseY + offsetY, avgEnergy));
                }
            }

            // 中心の輝き
            ctx.save();
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, maxRadius * 0.5);
            gradient.addColorStop(0, `hsla(${(Date.now() * 0.1) % 360}, 100%, 70%, ${0.5 + avgEnergy * 0.5})`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, maxRadius * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function animate() {
            if (!isRunning) return;

            drawVisuals();

            // パーティクル更新
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', startAudio);

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // パフォーマンスのためにパーティクル数を制限
        setInterval(() => {
            if (particles.length > 500) {
                particles = particles.slice(-500);
            }
        }, 1000);
    </script>
</body>
</html>
