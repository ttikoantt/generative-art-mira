<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Fractals - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #e0e0e0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 20px 0;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
        }

        #canvas {
            display: block;
            background: #0a0e27;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .info {
            text-align: center;
            color: #a0a0a0;
            margin: 15px 0;
            font-size: 0.9rem;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(102, 126, 234, 0.8);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            z-index: 1000;
            font-size: 1.5rem;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(102, 126, 234, 1);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .canvas-wrapper {
                width: 100% !important;
            }

            #canvas {
                width: 100% !important;
                height: auto !important;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="container">
        <h1>✨ Geometric Fractals ✨</h1>

        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <button class="btn" onclick="changePattern('spiral')">🌀 Spiral</button>
            <button class="btn" onclick="changePattern('tree')">🌳 Tree</button>
            <button class="btn" onclick="changePattern('sierpinski')">🔺 Sierpinski</button>
            <button class="btn" onclick="changePattern('koch')">❄️ Koch</button>
            <button class="btn" onclick="randomize()">🎲 Random</button>
        </div>

        <p class="info">クリックでアニメーション切り替え | 各ボタンでフラクタルパターン変更</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvasサイズ設定
        function resizeCanvas() {
            const wrapper = document.querySelector('.canvas-wrapper');
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const size = Math.min(maxWidth, window.innerHeight - 300);

            canvas.width = size;
            canvas.height = size;
            wrapper.style.width = size + 'px';
            wrapper.style.height = size + 'px';
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let currentPattern = 'spiral';
        let animationFrame = 0;
        let isAnimating = true;

        // 色パレット
        const palettes = [
            ['#667eea', '#764ba2', '#f093fb', '#4facfe'],
            ['#fa709a', '#fee140', '#fa709a', '#c471ed'],
            ['#a8edea', '#fed6e3', '#d299c2', '#fef9d7'],
            ['#667eea', '#764ba2', '#f093fb', '#5ee7df'],
        ];

        let currentPalette = 0;
        let hueOffset = 0;

        function getColor(depth, maxDepth) {
            const palette = palettes[currentPalette];
            const index = Math.floor((depth / maxDepth) * palette.length);
            return palette[Math.min(index, palette.length - 1)];
        }

        function draw() {
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            hueOffset += 0.5;

            switch (currentPattern) {
                case 'spiral':
                    drawSpiral();
                    break;
                case 'tree':
                    drawTree();
                    break;
                case 'sierpinski':
                    drawSierpinski();
                    break;
                case 'koch':
                    drawKoch();
                    break;
            }

            animationFrame++;
            if (isAnimating) {
                requestAnimationFrame(draw);
            }
        }

        // スパイラルフラクタル
        function drawSpiral() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = canvas.width * 0.4;

            for (let i = 0; i < 6; i++) {
                const startAngle = (i * Math.PI / 3) + (animationFrame * 0.01);

                ctx.beginPath();
                for (let j = 0; j < 200; j++) {
                    const angle = startAngle + (j * 0.1);
                    const radius = (j / 200) * maxRadius;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    if (j === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                const hue = (hueOffset + i * 60) % 360;
                ctx.strokeStyle = `hsl(${hue}, 70%, 60%)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // フラクタルツリー
        function drawTree() {
            const startX = canvas.width / 2;
            const startY = canvas.height * 0.9;

            function branch(x, y, length, angle, depth) {
                if (depth > 8 || length < 2) return;

                const endX = x + Math.cos(angle) * length;
                const endY = y - Math.sin(angle) * length;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(endX, endY);

                const hue = (hueOffset + depth * 30) % 360;
                ctx.strokeStyle = `hsl(${hue}, 70%, ${50 + depth * 5}%)`;
                ctx.lineWidth = Math.max(1, 8 - depth);
                ctx.stroke();

                const swing = Math.sin(animationFrame * 0.02 + depth) * 0.1;
                branch(endX, endY, length * 0.7, angle + 0.5 + swing, depth + 1);
                branch(endX, endY, length * 0.7, angle - 0.5 + swing, depth + 1);
            }

            branch(startX, startY, canvas.height * 0.25, Math.PI / 2, 0);
        }

        // シェルピンスキー三角形
        function drawSierpinski() {
            function drawTriangle(x, y, size, depth) {
                if (depth > 6) return;

                const height = size * Math.sqrt(3) / 2;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + size, y);
                ctx.lineTo(x + size / 2, y - height);
                ctx.closePath();

                const hue = (hueOffset + depth * 40) % 360;
                ctx.fillStyle = `hsla(${hue}, 70%, 50%, 0.3)`;
                ctx.fill();

                ctx.strokeStyle = `hsl(${hue}, 70%, 60%)`;
                ctx.lineWidth = 1;
                ctx.stroke();

                const pulse = Math.sin(animationFrame * 0.03) * 5;
                const newSize = size / 2 + pulse;

                drawTriangle(x, y, newSize, depth + 1);
                drawTriangle(x + size / 2, y, newSize, depth + 1);
                drawTriangle(x + size / 4, y - height / 2, newSize, depth + 1);
            }

            const size = canvas.width * 0.8;
            const startX = (canvas.width - size) / 2;
            const startY = canvas.height * 0.8;

            drawTriangle(startX, startY, size, 0);
        }

        // コッホ曲線
        function drawKoch() {
            function koch(x1, y1, x2, y2, depth) {
                if (depth > 5) {
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    return;
                }

                const dx = x2 - x1;
                const dy = y2 - y1;

                const x3 = x1 + dx / 3;
                const y3 = y1 + dy / 3;
                const x5 = x1 + 2 * dx / 3;
                const y5 = y1 + 2 * dy / 3;

                const x4 = x3 + (dx / 3) * Math.cos(-Math.PI / 3) - (dy / 3) * Math.sin(-Math.PI / 3);
                const y4 = y3 + (dx / 3) * Math.sin(-Math.PI / 3) + (dy / 3) * Math.cos(-Math.PI / 3);

                const hue = (hueOffset + depth * 50) % 360;
                ctx.strokeStyle = `hsl(${hue}, 70%, 60%)`;
                ctx.lineWidth = 1;

                koch(x1, y1, x3, y3, depth + 1);
                koch(x3, y3, x4, y4, depth + 1);
                koch(x4, y4, x5, y5, depth + 1);
                koch(x5, y5, x2, y2, depth + 1);
            }

            const margin = 50;
            const rotation = (animationFrame * 0.005) % (Math.PI * 2);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation);

            const size = canvas.width * 0.7;

            for (let i = 0; i < 3; i++) {
                const angle = (i * 2 * Math.PI / 3);
                const x1 = Math.cos(angle) * size / 2;
                const y1 = Math.sin(angle) * size / 2;
                const x2 = Math.cos(angle + 2 * Math.PI / 3) * size / 2;
                const y2 = Math.sin(angle + 2 * Math.PI / 3) * size / 2;

                koch(x1, y1, x2, y2, 0);
            }

            ctx.restore();
        }

        function changePattern(pattern) {
            currentPattern = pattern;
            currentPalette = Math.floor(Math.random() * palettes.length);
            isAnimating = true;
        }

        function randomize() {
            const patterns = ['spiral', 'tree', 'sierpinski', 'koch'];
            currentPattern = patterns[Math.floor(Math.random() * patterns.length)];
            currentPalette = Math.floor(Math.random() * palettes.length);
        }

        canvas.addEventListener('click', () => {
            isAnimating = !isAnimating;
            if (isAnimating) draw();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // アニメーション開始
        draw();
    </script>
</body>
</html>
