<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poetry Visualizer | ジェネレーティブ・ポエトリー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            transition: background 2s ease;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .poem-line {
            position: absolute;
            color: rgba(255, 255, 255, 0);
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: fadeInOut 8s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }

        .poem-line:hover {
            transform: scale(1.1);
            color: rgba(255, 255, 255, 0.9) !important;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translateY(20px);
                color: rgba(255, 255, 255, 0);
            }
            20% {
                opacity: 1;
                color: rgba(255, 255, 255, 0.9);
            }
            80% {
                opacity: 1;
                color: rgba(255, 255, 255, 0.9);
            }
            100% {
                opacity: 0;
                transform: translateY(-20px);
                color: rgba(255, 255, 255, 0);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 0 0 60px rgba(100, 200, 255, 0.6); }
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* モバイル対応 */
        @media (max-width: 768px) {
            .poem-line {
                font-size: 1.2rem;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.8rem;
            }
        }

        /* 全画面ボタン */
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="info">Generative Poetry Visualizer</div>

    <div class="container" id="container"></div>

    <div class="controls">
        <button class="btn" onclick="generateNewPoem()">✨ 新しい詩</button>
        <button class="btn" onclick="toggleAnimation()">⏯️ アニメーション</button>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">⛶</button>

    <script>
        const poems = [
            {
                lines: [
                    "静寂の中で",
                    "光が踊る",
                    "時が止まる"
                ],
                colors: ["#ff6b6b", "#4ecdc4", "#45b7d1"]
            },
            {
                lines: [
                    "風が運ぶ言葉",
                    "空に溶けていく",
                    "星が見守る"
                ],
                colors: ["#f9ca24", "#6c5ce7", "#a29bfe"]
            },
            {
                lines: [
                    "夢の跡を辿り",
                    "希望を見つける",
                    "明日へ続く"
                ],
                colors: ["#fd79a8", "#00b894", "#e17055"]
            },
            {
                lines: [
                    "深淵を覗き",
                    "光を見つけた",
                    "魂が歌う"
                ],
                colors: ["#74b9ff", "#55a3ff", "#0984e3"]
            },
            {
                lines: [
                    "刹那の輝き",
                    "永遠を探して",
                    "今を生きる"
                ],
                colors: ["#fab1a0", "#ffeaa7", "#81ecec"]
            },
            {
                lines: [
                    "音のない世界で",
                    "心が響く",
                    "愛が生まれる"
                ],
                colors: ["#fdcb6e", "#e84393", "#00cec9"]
            },
            {
                lines: [
                    "星屑のダンス",
                    "宇宙の呼吸",
                    "命のリズム"
                ],
                colors: ["#a29bfe", "#6c5ce7", "#dfe6e9"]
            },
            {
                lines: [
                    "影と光の間で",
                    "真実を見つめ",
                    "自分になる"
                ],
                colors: ["#b2bec3", "#636e72", "#2d3436"]
            }
        ];

        const backgrounds = [
            "linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)",
            "linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)",
            "linear-gradient(135deg, #000428 0%, #004e92 100%)",
            "linear-gradient(135deg, #200122 0%, #6f0000 100%)",
            "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)",
            "linear-gradient(135deg, #141e30 0%, #243b55 100%)",
            "linear-gradient(135deg, #1f1c2c 0%, #928dab 100%)",
            "linear-gradient(135deg, #000000 0%, #434343 100%)"
        ];

        let currentPoem = null;
        let animationEnabled = true;
        let animationFrameId = null;

        function getRandomPoem() {
            return poems[Math.floor(Math.random() * poems.length)];
        }

        function getRandomBackground() {
            return backgrounds[Math.floor(Math.random() * backgrounds.length)];
        }

        function createPoemLine(text, index, total, colors) {
            const line = document.createElement('div');
            line.className = 'poem-line';
            line.textContent = text;

            // ランダム位置（画面内）
            const maxX = window.innerWidth * 0.8;
            const maxY = window.innerHeight * 0.7;
            const x = Math.random() * maxX + window.innerWidth * 0.1;
            const y = Math.random() * maxY + window.innerHeight * 0.15;

            line.style.left = `${x}px`;
            line.style.top = `${y}px`;

            // アニメーション遅延
            line.style.animationDelay = `${index * 2}s`;

            // カラー
            const colorIndex = index % colors.length;
            line.style.color = colors[colorIndex];

            // フロートアニメーション追加
            line.style.animation += `, float ${3 + Math.random() * 2}s ease-in-out infinite`;
            line.style.animationDelay = `${index * 2}s, ${Math.random() * 2}s`;

            // パルスエフェクト
            setTimeout(() => {
                line.style.animation += `, pulse ${2 + Math.random() * 2}s ease-in-out infinite`;
            }, 2000);

            // クリックで新しい詩
            line.addEventListener('click', generateNewPoem);

            return line;
        }

        function clearContainer() {
            const container = document.getElementById('container');
            container.innerHTML = '';
        }

        function generateNewPoem() {
            if (!animationEnabled) return;

            clearContainer();

            currentPoem = getRandomPoem();
            const container = document.getElementById('container');

            // 背景変更
            document.body.style.background = getRandomBackground();

            // 詩の行を生成
            currentPoem.lines.forEach((line, index) => {
                const lineElement = createPoemLine(
                    line,
                    index,
                    currentPoem.lines.length,
                    currentPoem.colors
                );
                container.appendChild(lineElement);
            });
        }

        function toggleAnimation() {
            animationEnabled = !animationEnabled;

            const lines = document.querySelectorAll('.poem-line');
            lines.forEach(line => {
                if (animationEnabled) {
                    line.style.animationPlayState = 'running';
                } else {
                    line.style.animationPlayState = 'paused';
                }
            });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Fullscreen error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        window.addEventListener('load', () => {
            generateNewPoem();
        });

        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            // リサイズ時に再生成
            if (animationEnabled) {
                generateNewPoem();
            }
        });
    </script>
</body>
</html>
