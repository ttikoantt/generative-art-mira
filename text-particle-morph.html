<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Particle Morph - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        canvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.5);
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        input[type="text"] {
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
            outline: none;
            width: 250px;
        }

        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.6);
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.3);
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .info {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            canvas {
                height: 300px !important;
            }

            input[type="text"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text Particle Morph</h1>
        <p class="subtitle">テキストがパーティクルに変形する魔法</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <input type="text" id="textInput" placeholder="テキストを入力..." value="MIRA">
            <button id="morphBtn">変形</button>
            <button id="explodeBtn">爆発</button>
            <button id="resetBtn">リセット</button>
        </div>

        <p class="info">🖱️ マウス/タッチでパーティクルを操作</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas
        function resizeCanvas() {
            const container = document.querySelector('.container');
            const maxWidth = Math.min(window.innerWidth - 40, 1000);
            const aspectRatio = 4 / 5;
            canvas.width = maxWidth;
            canvas.height = Math.min(maxWidth * aspectRatio, window.innerHeight - 280);
        }
        resizeCanvas();
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        let particles = [];
        let mouse = { x: null, y: null, radius: 100 };
        let animationId;
        let currentText = 'MIRA';

        // Color palette
        const colors = [
            '#FF6B9D', '#C44CFF', '#6B8EFF', '#4CFFD6', '#FFE66B'
        ];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.size = Math.random() * 3 + 1;
                this.baseX = x;
                this.baseY = y;
                this.density = Math.random() * 30 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.vx = 0;
                this.vy = 0;
                this.friction = 0.9;
                this.ease = 0.1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                // Mouse interaction
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const forceDirectionX = dx / distance;
                    const forceDirectionY = dy / distance;
                    const maxDistance = mouse.radius;
                    const force = (maxDistance - distance) / maxDistance;

                    if (distance < maxDistance) {
                        const directionX = forceDirectionX * force * this.density;
                        const directionY = forceDirectionY * force * this.density;
                        this.vx -= directionX;
                        this.vy -= directionY;
                    }
                }

                // Return to origin
                const dx = this.baseX - this.x;
                const dy = this.baseY - this.y;
                this.vx += dx * this.ease;
                this.vy += dy * this.ease;

                // Apply friction
                this.vx *= this.friction;
                this.vy *= this.friction;

                // Update position
                this.x += this.vx;
                this.y += this.vy;
            }

            explode() {
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 20 + 10;
                this.vx = Math.cos(angle) * force;
                this.vy = Math.sin(angle) * force;
            }
        }

        function getTextCoordinates(text) {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;

            const fontSize = Math.min(canvas.width / (text.length * 0.8), 150);
            tempCtx.font = `bold ${fontSize}px Arial, sans-serif`;
            tempCtx.fillStyle = 'white';
            tempCtx.textAlign = 'center';
            tempCtx.textBaseline = 'middle';
            tempCtx.fillText(text, canvas.width / 2, canvas.height / 2);

            const imageData = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
            const coordinates = [];

            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    const alpha = imageData.data[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        coordinates.push({ x, y });
                    }
                }
            }

            return coordinates;
        }

        function initParticles() {
            particles = [];
            const coordinates = getTextCoordinates(currentText);
            const maxParticles = 3000;
            const step = Math.ceil(coordinates.length / maxParticles);

            for (let i = 0; i < coordinates.length; i += step) {
                particles.push(new Particle(coordinates[i].x, coordinates[i].y));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw connections between nearby particles
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 30) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouse.x = (e.clientX - rect.left) * scaleX;
            mouse.y = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const touch = e.touches[0];
            mouse.x = (touch.clientX - rect.left) * scaleX;
            mouse.y = (touch.clientY - rect.top) * scaleY;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Button events
        document.getElementById('morphBtn').addEventListener('click', () => {
            const input = document.getElementById('textInput');
            if (input.value.trim()) {
                currentText = input.value.toUpperCase();
                initParticles();
            }
        });

        document.getElementById('explodeBtn').addEventListener('click', () => {
            particles.forEach(particle => particle.explode());
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            particles.forEach(particle => {
                particle.baseX = particle.originX;
                particle.baseY = particle.originY;
                particle.vx = 0;
                particle.vy = 0;
            });
        });

        // Enter key for morph
        document.getElementById('textInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const input = document.getElementById('textInput');
                if (input.value.trim()) {
                    currentText = input.value.toUpperCase();
                    initParticles();
                }
            }
        });

        // Start
        initParticles();
        animate();
    </script>
</body>
</html>
