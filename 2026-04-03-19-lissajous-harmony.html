<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lissajous Harmony - 音楽的な調和の視覚化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .controls h2 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #0ff;
        }

        .control-group {
            margin-bottom: 8px;
        }

        .control-group label {
            font-size: 11px;
            display: block;
            margin-bottom: 3px;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 150px;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 11px;
            color: #666;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.4);
        }

        @media (max-width: 600px) {
            .controls {
                top: 60px;
                left: 10px;
                right: 10px;
                padding: 10px;
            }

            .control-group input[type="range"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🎵 Lissajous Harmony</h2>
        <div class="control-group">
            <label>周波数比X: <span id="ratioXVal">3</span></label>
            <input type="range" id="ratioX" min="1" max="8" value="3" step="1">
        </div>
        <div class="control-group">
            <label>周波数比Y: <span id="ratioYVal">2</span></label>
            <input type="range" id="ratioY" min="1" max="8" value="2" step="1">
        </div>
        <div class="control-group">
            <label>曲線数: <span id="curvesVal">5</span></label>
            <input type="range" id="curves" min="1" max="10" value="5" step="1">
        </div>
        <div class="control-group">
            <label>回転速度: <span id="speedVal">1.0</span></label>
            <input type="range" id="speed" min="0.1" max="3" value="1.0" step="0.1">
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <div class="info">
        数学と音楽の調和 - Lissajous曲線の美しさ
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY, scale;

        // パラメータ
        let ratioX = 3;
        let ratioY = 2;
        let numCurves = 5;
        let rotationSpeed = 1.0;

        // 時間
        let time = 0;

        // 音楽的な調和の周波数比
        const harmonicRatios = [
            { x: 2, y: 1, name: "オクターヴ (2:1)" },
            { x: 3, y: 2, name: "完全五度 (3:2)" },
            { x: 4, y: 3, name: "完全四度 (4:3)" },
            { x: 5, y: 4, name: "長三度 (5:4)" },
            { x: 6, y: 5, name: "短三度 (6:5)" },
            { x: 5, y: 3, name: "長六度 (5:3)" },
            { x: 8, y: 5, name: "短六度 (8:5)" }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            scale = Math.min(width, height) * 0.35;
        }

        function lissajous(t, a, b, delta, phase) {
            const x = Math.sin(a * t + delta);
            const y = Math.sin(b * t + phase);
            return { x, y };
        }

        function drawLissajousCurve(a, b, phaseOffset, hue, thickness) {
            ctx.beginPath();
            ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.8)`;
            ctx.lineWidth = thickness;

            const points = 500;
            for (let i = 0; i <= points; i++) {
                const t = (i / points) * Math.PI * 2;
                const delta = time * rotationSpeed;

                const pos = lissajous(t, a, b, delta, phaseOffset);
                const x = centerX + pos.x * scale;
                const y = centerY + pos.y * scale;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();
        }

        function drawGlowingDots(a, b) {
            const dotCount = 8;
            for (let i = 0; i < dotCount; i++) {
                const t = (i / dotCount) * Math.PI * 2 + time * rotationSpeed * 0.5;
                const delta = time * rotationSpeed;
                const phaseOffset = (i / dotCount) * Math.PI * 2;

                const pos = lissajous(t, a, b, delta, phaseOffset);
                const x = centerX + pos.x * scale;
                const y = centerY + pos.y * scale;
                const hue = (time * 20 + i * (360 / dotCount)) % 360;

                // 光る点
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.9)`;
                ctx.fill();

                // グロー効果
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 20);
                gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, 0.3)`);
                gradient.addColorStop(1, `hsla(${hue}, 100%, 70%, 0)`);
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, scale * 1.5);
            gradient.addColorStop(0, '#000033');
            gradient.addColorStop(0.5, '#000011');
            gradient.addColorStop(1, '#000000');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 薄いグリッド
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        function drawTitle() {
            ctx.font = 'bold 16px Courier New';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.textAlign = 'center';
            ctx.fillText('Lissajous Harmony', centerX, 30);
        }

        function animate() {
            drawBackground();

            // 複数のLissajous曲線を描画
            for (let i = 0; i < numCurves; i++) {
                const phaseOffset = (i / numCurves) * Math.PI * 2;
                const hue = (time * 15 + i * (360 / numCurves)) % 360;
                const thickness = 2 - (i / numCurves) * 1;

                drawLissajousCurve(ratioX, ratioY, phaseOffset, hue, thickness);
            }

            // 光る点を描画
            drawGlowingDots(ratioX, ratioY);

            drawTitle();

            time += 0.016;
            requestAnimationFrame(animate);
        }

        // イベントリスナー
        document.getElementById('ratioX').addEventListener('input', (e) => {
            ratioX = parseInt(e.target.value);
            document.getElementById('ratioXVal').textContent = ratioX;
        });

        document.getElementById('ratioY').addEventListener('input', (e) => {
            ratioY = parseInt(e.target.value);
            document.getElementById('ratioYVal').textContent = ratioY;
        });

        document.getElementById('curves').addEventListener('input', (e) => {
            numCurves = parseInt(e.target.value);
            document.getElementById('curvesVal').textContent = numCurves;
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            rotationSpeed = parseFloat(e.target.value);
            document.getElementById('speedVal').textContent = rotationSpeed.toFixed(1);
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
