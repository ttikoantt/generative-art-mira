<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Wave Interference Art | 波の干渉アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 300px;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #startBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        #startBtn:active {
            transform: scale(0.95);
        }

        #startBtn.running {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .slider-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }

        .slider-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        #fullscreenBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #fullscreenBtn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            text-align: left;
            pointer-events: none;
        }

        #info h1 {
            font-size: 24px;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #info p {
            font-size: 11px;
            opacity: 0.7;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div id="info">
        <h1>Wave Interference</h1>
        <p>波と光の干渉パターン</p>
    </div>

    <button id="fullscreenBtn">⛶</button>

    <div id="controls">
        <button id="startBtn">🎵 Start Audio</button>

        <div class="slider-group">
            <label>
                <span>Wave Speed</span>
                <span id="speedValue">1.0x</span>
            </label>
            <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1">
        </div>

        <div class="slider-group">
            <label>
                <span>Frequency</span>
                <span id="freqValue">5</span>
            </label>
            <input type="range" id="frequency" min="1" max="10" step="0.5" value="5">
        </div>

        <div class="slider-group">
            <label>
                <span>Particles</span>
                <span id="particleValue">150</span>
            </label>
            <input type="range" id="particles" min="50" max="300" step="10" value="150">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let animationId;
        let audioContext, analyser, microphone;
        let audioData;
        let isRunning = false;
        let time = 0;

        // Settings
        let waveSpeed = 1;
        let frequency = 5;
        let particleCount = 150;

        // Wave sources
        const sources = [];
        const particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class WaveSource {
            constructor(x, y, phase) {
                this.x = x;
                this.y = y;
                this.phase = phase;
                this.amplitude = 100;
            }

            update(t) {
                // Oscillate amplitude with audio data
                if (audioData) {
                    const avg = audioData.reduce((a, b) => a + b, 0) / audioData.length;
                    this.amplitude = 50 + avg * 0.5;
                }
            }

            getWaveAt(px, py, t) {
                const dist = Math.sqrt((px - this.x) ** 2 + (py - this.y) ** 2);
                const wave = Math.sin(dist * frequency * 0.01 - t * waveSpeed * 2 + this.phase);
                return wave * this.amplitude / (1 + dist * 0.002);
            }
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 3 + 1;
                this.hue = Math.random() * 60 + 240; // Blue to purple
                this.life = Math.random() * 100 + 100;
                this.maxLife = this.life;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;

                if (this.life <= 0 ||
                    this.x < 0 || this.x > width ||
                    this.y < 0 || this.y > height) {
                    this.reset();
                }

                // Calculate wave interference at particle position
                let interference = 0;
                sources.forEach(source => {
                    interference += source.getWaveAt(this.x, this.y, time);
                });

                // Modify particle behavior based on interference
                this.vx += interference * 0.0001;
                this.vy += interference * 0.0001;

                // Damping
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Color based on interference
                const intensity = Math.abs(interference) * 0.1;
                this.hue = 240 + intensity * 60;
            }

            draw() {
                const alpha = (this.life / this.maxLife) * 0.8;
                const brightness = 50 + Math.abs(sources[0]?.getWaveAt(this.x, this.y, time) || 0) * 0.5;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, ${brightness}%, ${alpha})`;
                ctx.fill();
            }
        }

        function init() {
            resize();

            // Create wave sources
            sources.length = 0;
            sources.push(new WaveSource(width * 0.3, height * 0.5, 0));
            sources.push(new WaveSource(width * 0.7, height * 0.5, Math.PI));
            sources.push(new WaveSource(width * 0.5, height * 0.3, Math.PI * 0.5));
            sources.push(new WaveSource(width * 0.5, height * 0.7, Math.PI * 1.5));

            // Create particles
            particles.length = 0;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function drawWaveField() {
            // Sample wave field at grid points
            const step = 20;
            for (let x = 0; x < width; x += step) {
                for (let y = 0; y < height; y += step) {
                    let totalWave = 0;
                    sources.forEach(source => {
                        totalWave += source.getWaveAt(x, y, time);
                    });

                    const intensity = (totalWave + 200) / 400;
                    const hue = 250 + intensity * 40;
                    const alpha = intensity * 0.15;

                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, 70%, ${30 + intensity * 40}%, ${alpha})`;
                    ctx.fill();
                }
            }
        }

        function drawConnections() {
            // Draw lines between nearby particles
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80) {
                        const alpha = (1 - dist / 80) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(150, 100, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            time += 0.016;

            // Clear with fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update audio data
            if (analyser) {
                analyser.getByteFrequencyData(audioData);
            }

            // Update sources
            sources.forEach(source => source.update(time));

            // Draw wave field
            drawWaveField();

            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Draw connections
            drawConnections();

            animationId = requestAnimationFrame(animate);
        }

        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                audioData = new Uint8Array(analyser.frequencyBinCount);

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);

                isRunning = true;
                document.getElementById('startBtn').textContent = '🎵 Running...';
                document.getElementById('startBtn').classList.add('running');
            } catch (err) {
                console.log('Audio access denied, using visual-only mode');
                isRunning = true;
                document.getElementById('startBtn').textContent = '🎵 Visual Mode';
                document.getElementById('startBtn').classList.add('running');
            }
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!isRunning) {
                startAudio();
            }
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            waveSpeed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = waveSpeed.toFixed(1) + 'x';
        });

        document.getElementById('frequency').addEventListener('input', (e) => {
            frequency = parseFloat(e.target.value);
            document.getElementById('freqValue').textContent = frequency;
        });

        document.getElementById('particles').addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            document.getElementById('particleValue').textContent = particleCount;

            // Adjust particle array
            while (particles.length < particleCount) {
                particles.push(new Particle());
            }
            while (particles.length > particleCount) {
                particles.pop();
            }
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        // Initialize and start
        init();
        animate();
    </script>
</body>
</html>
