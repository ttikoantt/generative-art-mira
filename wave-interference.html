<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>波の干渉パターン - Wave Interference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: #fff;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            font-size: 12px;
            color: #888;
        }
        input[type="range"] {
            width: 100px;
            accent-color: #00ffff;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 1px solid #333;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1000;
        }
        .fullscreen-btn:hover {
            background: rgba(0,255,255,0.2);
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">クリックで波源を追加・移動</div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="controls">
        <div class="control-group">
            <label>周波数</label>
            <input type="range" id="frequency" min="1" max="10" value="3" step="0.5">
        </div>
        <div class="control-group">
            <label>速度</label>
            <input type="range" id="speed" min="1" max="5" value="2" step="0.5">
        </div>
        <div class="control-group">
            <label>波源数</label>
            <input type="range" id="sourceCount" min="1" max="5" value="3" step="1">
        </div>
        <div class="control-group">
            <label>明るさ</label>
            <input type="range" id="brightness" min="50" max="255" value="180">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let sources = [];

        // 設定
        let settings = {
            frequency: 3,
            speed: 2,
            sourceCount: 3,
            brightness: 180
        };

        // コントロール
        document.getElementById('frequency').addEventListener('input', (e) => {
            settings.frequency = parseFloat(e.target.value);
        });
        document.getElementById('speed').addEventListener('input', (e) => {
            settings.speed = parseFloat(e.target.value);
        });
        document.getElementById('sourceCount').addEventListener('input', (e) => {
            settings.sourceCount = parseInt(e.target.value);
            updateSources();
        });
        document.getElementById('brightness').addEventListener('input', (e) => {
            settings.brightness = parseInt(e.target.value);
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            updateSources();
        }

        function updateSources() {
            while (sources.length < settings.sourceCount) {
                sources.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    phase: Math.random() * Math.PI * 2
                });
            }
            while (sources.length > settings.sourceCount) {
                sources.pop();
            }
        }

        function draw() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;
            const freq = settings.frequency;
            const spd = settings.speed;
            const brightness = settings.brightness;

            // 解像度を下げて処理（パフォーマンス対策）
            const scale = 2;
            const scaledWidth = Math.ceil(width / scale);
            const scaledHeight = Math.ceil(height / scale);

            for (let py = 0; py < scaledHeight; py++) {
                for (let px = 0; px < scaledWidth; px++) {
                    const x = px * scale;
                    const y = py * scale;

                    let value = 0;

                    // すべての波源からの波を重ね合わせ
                    for (const source of sources) {
                        const dx = x - source.x;
                        const dy = y - source.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const wave = Math.sin(distance * 0.02 * freq - time * spd + source.phase);
                        value += wave;
                    }

                    // 正規化して色を計算
                    value = value / sources.length;
                    const intensity = (value + 1) / 2; // 0-1に正規化

                    // 色の計算（サイケデリックな配色）
                    const r = Math.floor(brightness * (0.5 + 0.5 * Math.sin(intensity * Math.PI)));
                    const g = Math.floor(brightness * (0.5 + 0.5 * Math.sin(intensity * Math.PI + 2)));
                    const b = Math.floor(brightness * (0.5 + 0.5 * Math.sin(intensity * Math.PI + 4)));

                    // スケールされた領域に色を適用
                    for (let sy = 0; sy < scale && y + sy < height; sy++) {
                        for (let sx = 0; sx < scale && x + sx < width; sx++) {
                            const idx = ((y + sy) * width + (x + sx)) * 4;
                            data[idx] = r;
                            data[idx + 1] = g;
                            data[idx + 2] = b;
                            data[idx + 3] = 255;
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);

            // 波源を表示
            for (const source of sources) {
                ctx.beginPath();
                ctx.arc(source.x, source.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(source.x, source.y, 15, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.stroke();
            }
        }

        function animate() {
            time += 0.05;
            draw();
            requestAnimationFrame(animate);
        }

        // クリックで波源を移動
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 最も近い波源を見つけて移動
            let minDist = Infinity;
            let minIdx = 0;
            sources.forEach((s, i) => {
                const dist = Math.sqrt((s.x - x) ** 2 + (s.y - y) ** 2);
                if (dist < minDist) {
                    minDist = dist;
                    minIdx = i;
                }
            });

            if (minDist < 100) {
                sources[minIdx].x = x;
                sources[minIdx].y = y;
            }
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            let minDist = Infinity;
            let minIdx = 0;
            sources.forEach((s, i) => {
                const dist = Math.sqrt((s.x - x) ** 2 + (s.y - y) ** 2);
                if (dist < minDist) {
                    minDist = dist;
                    minIdx = i;
                }
            });

            if (minDist < 100) {
                sources[minIdx].x = x;
                sources[minIdx].y = y;
            }
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
