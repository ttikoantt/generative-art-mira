<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Quantum Wave Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            border-radius: 25px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>量子波動関数の可視化</div>
        <div style="margin-top: 5px; font-size: 10px;">マウス/タッチで波動のパラメータを操作</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="changeMode('wave')">波動</button>
        <button class="btn" onclick="changeMode('particle')">粒子</button>
        <button class="btn" onclick="changeMode('interference')">干渉</button>
    </div>

    <button class="btn fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let mouseX = 0, mouseY = 0;
        let mode = 'wave';
        let time = 0;

        // 波動のパラメータ
        const waves = [];
        const particles = [];
        const waveCount = 5;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        }

        function initWaves() {
            waves.length = 0;
            for (let i = 0; i < waveCount; i++) {
                waves.push({
                    frequency: 0.01 + Math.random() * 0.02,
                    amplitude: 50 + Math.random() * 100,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.02 + Math.random() * 0.03,
                    color: `hsl(${180 + i * 30}, 100%, 60%)`
                });
            }
        }

        function initParticles() {
            particles.length = 0;
            const particleCount = 200;
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: 1 + Math.random() * 3,
                    color: `hsla(${180 + Math.random() * 60}, 100%, 60%, 0.8)`
                });
            }
        }

        function drawWaveMode() {
            // 背景を少し残す
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // マウスの影響を計算
            const mouseInfluence = Math.sin(time * 0.02) * 50;

            waves.forEach((wave, index) => {
                ctx.beginPath();
                ctx.strokeStyle = wave.color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = wave.color;

                const centerY = height / 2 + (index - waveCount / 2) * 50;

                for (let x = 0; x < width; x++) {
                    // 基本波動
                    let y = Math.sin(x * wave.frequency + wave.phase + time * wave.speed) * wave.amplitude;

                    // マウスの影響
                    const dx = x - mouseX;
                    const dist = Math.abs(dx);
                    const mouseEffect = Math.exp(-dist / 200) * mouseInfluence;

                    // 他の波との干渉
                    waves.forEach((other, otherIndex) => {
                        if (otherIndex !== index) {
                            y += Math.sin(x * other.frequency * 2 + time * 0.5) * wave.amplitude * 0.3;
                        }
                    });

                    ctx.lineTo(x, centerY + y + mouseEffect);
                }

                ctx.stroke();
            });

            // 波の位相を更新
            waves.forEach(wave => {
                wave.phase += wave.speed;
            });
        }

        function drawParticleMode() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                // 位置を更新
                p.x += p.vx;
                p.y += p.vy;

                // マウスの引力
                const dx = mouseX - p.x;
                const dy = mouseY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 200) {
                    p.vx += dx / dist * 0.1;
                    p.vy += dy / dist * 0.1;
                }

                // 境界で跳ね返る
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                // 速度制限
                const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                if (speed > 3) {
                    p.vx = p.vx / speed * 3;
                    p.vy = p.vy / speed * 3;
                }

                // 粒子を描画
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.fill();
            });
        }

        function drawInterferenceMode() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
            ctx.fillRect(0, 0, width, height);

            const spacing = 4;

            for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                    // 波源1（マウス位置）
                    const dx1 = x - mouseX;
                    const dy1 = y - mouseY;
                    const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
                    const wave1 = Math.sin(dist1 * 0.05 - time * 0.1);

                    // 波源2（画面中央）
                    const dx2 = x - width / 2;
                    const dy2 = y - height / 2;
                    const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
                    const wave2 = Math.sin(dist2 * 0.05 - time * 0.08);

                    // 干渉
                    const interference = (wave1 + wave2) / 2;

                    // 色を計算
                    const hue = 180 + interference * 60;
                    const lightness = 30 + interference * 20;
                    const alpha = 0.5 + interference * 0.5;

                    ctx.fillStyle = `hsla(${hue}, 100%, ${lightness}%, ${alpha})`;
                    ctx.fillRect(x, y, spacing - 1, spacing - 1);
                }
            }
        }

        function animate() {
            time++;

            if (mode === 'wave') {
                drawWaveMode();
            } else if (mode === 'particle') {
                if (particles.length === 0) initParticles();
                drawParticleMode();
            } else if (mode === 'interference') {
                drawInterferenceMode();
            }

            requestAnimationFrame(animate);
        }

        function changeMode(newMode) {
            mode = newMode;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            if (mode === 'particle' && particles.length === 0) {
                initParticles();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        initParticles();
        mouseX = width / 2;
        mouseY = height / 2;
        animate();
    </script>
</body>
</html>
