<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fluid Particles - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: #00ffcc;
            font-size: 12px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            z-index: 100;
        }

        .controls button {
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 15px;
            margin: 5px 5px 5px 0;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: rgba(0, 255, 204, 0.4);
        }

        .info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.8);
            padding: 15px;
            border-radius: 10px;
            color: #00ffcc;
            font-size: 12px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 204, 0.2);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 204, 0.4);
        }

        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                padding: 10px;
                font-size: 10px;
            }

            .info {
                bottom: 10px;
                right: 10px;
                padding: 10px;
                font-size: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <div style="margin-bottom: 8px;">🎨 Fluid Particles</div>
        <button onclick="resetParticles()">Reset</button>
        <button onclick="toggleMode()">Change Mode</button>
        <button onclick="changePalette()">Change Colors</button>
    </div>

    <div class="info">
        <div id="stats">Particles: 0</div>
        <div style="margin-top: 5px; font-size: 10px; color: #666;">
            Click/Touch to attract particles
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;

        // Color palettes
        const palettes = [
            ['#00ffcc', '#00ccff', '#ff00cc', '#ffcc00'],
            ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24'],
            ['#a29bfe', '#6c5ce7', '#fd79a8', '#e84393'],
            ['#00b894', '#00cec9', '#6c5ce7', '#e84393']
        ];
        let currentPalette = 0;

        let mode = 0; // 0: flow field, 1: vortex, 2: explosion

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.002 + Math.random() * 0.003;
                this.color = palettes[currentPalette][Math.floor(Math.random() * palettes[currentPalette].length)];
                this.size = 2 + Math.random() * 3;
            }

            update() {
                // Flow field based on position
                const angle = Math.sin(this.x * 0.01) * Math.cos(this.y * 0.01) * Math.PI * 2;

                if (mode === 0) {
                    // Flow field mode
                    this.vx += Math.cos(angle) * 0.1;
                    this.vy += Math.sin(angle) * 0.1;
                } else if (mode === 1) {
                    // Vortex mode
                    const dx = width/2 - this.x;
                    const dy = height/2 - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const angle2 = Math.atan2(dy, dx) + Math.PI/2;
                    this.vx += Math.cos(angle2) * 0.3;
                    this.vy += Math.sin(angle2) * 0.3;
                    this.vx += dx * 0.0001;
                    this.vy += dy * 0.0001;
                } else if (mode === 2) {
                    // Explosion mode
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 200) {
                        const force = (200 - dist) / 200;
                        this.vx -= (dx / dist) * force * 0.5;
                        this.vy -= (dy / dist) * force * 0.5;
                    }
                }

                // Mouse attraction
                if (isMouseDown) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 300 && dist > 10) {
                        const force = 0.3;
                        this.vx += (dx / dist) * force;
                        this.vy += (dy / dist) * force;
                    }
                }

                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;

                // Damping
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Decrease life
                this.life -= this.decay;

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 300; i++) {
                particles.push(new Particle(
                    Math.random() * width,
                    Math.random() * height
                ));
            }
        }

        function resetParticles() {
            initParticles();
        }

        function toggleMode() {
            mode = (mode + 1) % 3;
            const modeNames = ['Flow Field', 'Vortex', 'Explosion'];
            console.log(`Mode: ${modeNames[mode]}`);
        }

        function changePalette() {
            currentPalette = (currentPalette + 1) % palettes.length;
            particles.forEach(p => {
                p.color = palettes[currentPalette][Math.floor(Math.random() * palettes[currentPalette].length)];
            });
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();

                // Respawn dead particles
                if (particle.life <= 0) {
                    particles[index] = new Particle(
                        Math.random() * width,
                        Math.random() * height
                    );
                }
            });

            // Update stats
            document.getElementById('stats').textContent = `Particles: ${particles.length}`;

            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', () => isMouseDown = true);
        canvas.addEventListener('mouseup', () => isMouseDown = false);
        canvas.addEventListener('mouseleave', () => isMouseDown = false);

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => isMouseDown = false);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
