<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Particles - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 15px;
            }

            .fullscreen-btn {
                top: 15px;
                right: 15px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Fluid Particles - Move your mouse or touch to interact</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };

        // 色のパレット（グラデーション用）
        const colors = [
            { r: 79, g: 172, b: 254 },   // 青
            { r: 161, g: 140, b: 209 },  // 紫
            { r: 251, g: 194, b: 235 },  // ピンク
            { r: 255, g: 218, b: 193 },  // ピーチ
            { r: 181, g: 234, b: 215 }   // ミント
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 3 + 1;
                this.density = Math.random() * 30 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = Math.random() * 0.5 + 0.5;
                this.velocity = { x: 0, y: 0 };
                this.friction = 0.95;
            }

            update() {
                // マウスとの距離を計算
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let force = (mouse.radius - distance) / mouse.radius;
                let directionX = dx / distance;
                let directionY = dy / distance;

                // マウスに反応して動く
                if (distance < mouse.radius) {
                    let forceX = directionX * force * this.density;
                    let forceY = directionY * force * this.density;
                    this.velocity.x -= forceX;
                    this.velocity.y -= forceY;
                }

                // 流体のような動き
                let angle = Math.atan2(this.y - height / 2, this.x - width / 2);
                let flowForce = 0.3;
                this.velocity.x += Math.cos(angle + Date.now() * 0.001) * flowForce;
                this.velocity.y += Math.sin(angle + Date.now() * 0.001) * flowForce;

                // 摩擦を適用
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;

                // 位置を更新
                this.x += this.velocity.x;
                this.y += this.velocity.y;

                // 元の位置に戻ろうとする力
                let returnForce = 0.02;
                this.x += (this.baseX - this.x) * returnForce;
                this.y += (this.baseY - this.y) * returnForce;

                // 色の変化
                this.color.r = Math.min(255, Math.max(0, this.color.r + Math.sin(Date.now() * 0.002) * 0.5));
                this.color.g = Math.min(255, Math.max(0, this.color.g + Math.cos(Date.now() * 0.003) * 0.5));
                this.color.b = Math.min(255, Math.max(0, this.color.b + Math.sin(Date.now() * 0.001) * 0.5));
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.fill();

                // グロー効果
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0.5)`;
            }
        }

        function initParticles() {
            particles = [];
            let numberOfParticles = (width * height) / 3000;

            for (let i = 0; i < numberOfParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // 半透明で塗りつぶしてトレイル効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 近くのパーティクルを線で繋ぐ
            connectParticles();

            requestAnimationFrame(animate);
        }

        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a + 1; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 80) {
                        let opacity = (1 - distance / 80) * 0.3;
                        ctx.strokeStyle = `rgba(161, 140, 209, ${opacity})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resize();
        animate();
    </script>
</body>
</html>
