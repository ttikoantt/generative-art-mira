<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Ripple Art - 音声で波紋を描く</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7c3aed, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
        }

        .subtitle {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: #a0a0a0;
            margin-bottom: 30px;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #startBtn {
            background: linear-gradient(45deg, #00d4ff, #7c3aed);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        #startBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.6);
        }

        #startBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #stopBtn {
            background: linear-gradient(45deg, #ff006e, #ff4d6d);
            color: white;
            box-shadow: 0 5px 20px rgba(255, 0, 110, 0.4);
        }

        #stopBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 0, 110, 0.6);
        }

        #stopBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .volume-meter {
            font-size: 0.9rem;
            color: #00d4ff;
        }

        .ripple-count {
            font-size: 0.9rem;
            color: #7c3aed;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 20px;
                padding: 0 20px;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }

            .info {
                top: 10px;
                right: 10px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="container">
        <h1>Voice Ripple Art</h1>
        <p class="subtitle">マイクに向かって話しかけると、音声で波紋が描かれます</p>
    </div>

    <div class="info">
        <div class="volume-meter">音量: <span id="volumeValue">0</span>%</div>
        <div class="ripple-count">波紋: <span id="rippleCount">0</span></div>
    </div>

    <div class="controls">
        <button id="startBtn">🎤 開始</button>
        <button id="stopBtn" disabled>⏹️ 停止</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const volumeValue = document.getElementById('volumeValue');
        const rippleCount = document.getElementById('rippleCount');

        let audioContext;
        let analyser;
        let microphone;
        let isListening = false;
        let ripples = [];
        let animationId;

        // キャンバスサイズ設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 波紋クラス
        class Ripple {
            constructor(x, y, volume) {
                this.x = x;
                this.y = y;
                this.radius = 10;
                this.maxRadius = Math.max(canvas.width, canvas.height) * 0.4;
                this.volume = volume;
                this.alpha = 1;
                this.hue = (Date.now() / 10) % 360;
                this.speed = 2 + (volume / 100) * 3;
            }

            update() {
                this.radius += this.speed;
                this.alpha -= 0.003;
                this.hue += 0.5;
            }

            draw() {
                if (this.alpha <= 0) return;

                ctx.save();
                ctx.globalAlpha = this.alpha;

                // メインの波紋
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                ctx.lineWidth = 3 + (this.volume / 100) * 5;
                ctx.stroke();

                // 内側の波紋
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue + 30}, 70%, 50%, ${this.alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // 外側の波紋
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 1.3, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue - 30}, 90%, 70%, ${this.alpha * 0.3})`;
                ctx.lineWidth = 1;
                ctx.stroke();

                // 中心の光
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 0.3);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 50%, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0 || this.radius >= this.maxRadius;
            }
        }

        // マイク開始
        async function startMicrophone() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);

                analyser.fftSize = 256;
                microphone.connect(analyser);

                isListening = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;

                animate();
                detectVoice();
            } catch (err) {
                console.error('マイクアクセスエラー:', err);
                alert('マイクへのアクセスが許可されていません。ブラウザの設定を確認してください。');
            }
        }

        // 音声検出
        function detectVoice() {
            if (!isListening) return;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            // 平均音量計算
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const average = sum / dataArray.length;
            const volume = Math.min(100, (average / 128) * 100);

            volumeValue.textContent = Math.round(volume);

            // 音量がしきい値を超えたら波紋生成
            if (volume > 10) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                ripples.push(new Ripple(x, y, volume));
                rippleCount.textContent = ripples.length;
            }

            requestAnimationFrame(detectVoice);
        }

        // アニメーション
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 波紋の更新と描画
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            rippleCount.textContent = ripples.length;

            if (isListening) {
                animationId = requestAnimationFrame(animate);
            }
        }

        // マイク停止
        function stopMicrophone() {
            isListening = false;
            if (audioContext) {
                audioContext.close();
            }
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // イベントリスナー
        startBtn.addEventListener('click', startMicrophone);
        stopBtn.addEventListener('click', stopMicrophone);

        // 背景アニメーション（待機時）
        function idleAnimation() {
            if (isListening) return;

            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 装飾的な粒子
            const time = Date.now() * 0.001;
            for (let i = 0; i < 5; i++) {
                const x = (Math.sin(time + i) * 0.5 + 0.5) * canvas.width;
                const y = (Math.cos(time * 0.7 + i * 0.5) * 0.5 + 0.5) * canvas.height;
                const radius = 2 + Math.sin(time * 2 + i) * 1;
                const hue = (time * 20 + i * 30) % 360;

                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 70%, 60%, 0.3)`;
                ctx.fill();
            }

            requestAnimationFrame(idleAnimation);
        }
        idleAnimation();
    </script>
</body>
</html>
