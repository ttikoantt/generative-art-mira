<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(0,255,255,0.5);
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        .fullscreen-btn:hover {
            background: rgba(0,255,255,0.4);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                bottom: 10px;
                right: 10px;
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <div>🌀 Particle Flow Vortex</div>
        <div id="stats"></div>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statsDiv = document.getElementById('stats');

        let width, height, centerX, centerY;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 200 + 50;
                this.speed = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 3 + 1;
                this.hue = Math.random() * 60 + 150;
                this.alpha = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.angle += this.speed;
                this.radius += Math.sin(time * 0.001 + this.angle) * 0.5;
                this.hue += 0.1;
                this.alpha = 0.3 + Math.sin(time * 0.002 + this.angle * 2) * 0.3;
            }

            draw() {
                const x = centerX + Math.cos(this.angle) * this.radius;
                const y = centerY + Math.sin(this.angle) * this.radius * (0.6 + Math.sin(time * 0.001) * 0.2);

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size * 2);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 60%, ${this.alpha})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 40%, 0)`);

                ctx.beginPath();
                ctx.arc(x, y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = [];
            const particleCount = Math.min(800, (width * height) / 1000);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            time++;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Draw vortex center
            const centerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 50);
            centerGradient.addColorStop(0, `hsla(${(time * 0.5) % 360}, 80%, 60%, 0.8)`);
            centerGradient.addColorStop(0.5, `hsla(${(time * 0.5 + 60) % 360}, 80%, 40%, 0.3)`);
            centerGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fillStyle = centerGradient;
            ctx.fill();

            // Update stats
            if (time % 60 === 0) {
                statsDiv.textContent = `${particles.length} particles`;
            }

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Touch support
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        init();
        animate();
    </script>
</body>
</html>
