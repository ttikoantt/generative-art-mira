<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Wave Interactive - 数式の波</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5, #f953c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .subtitle {
            font-size: 1rem;
            color: #a8a8a8;
            margin-bottom: 20px;
        }

        .canvas-container {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        canvas {
            border-radius: 10px;
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: #a8a8a8;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        .info {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .formula {
            font-size: 1.2rem;
            color: #00d2ff;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🌊 Math Wave Interactive</h1>
        <p class="subtitle">数式の美しさをインタラクティブに体験</p>

        <div class="canvas-container">
            <canvas id="waveCanvas"></canvas>
        </div>

        <div class="controls">
            <button onclick="changeWaveType('sine')">正弦波</button>
            <button onclick="changeWaveType('cosine')">余弦波</button>
            <button onclick="changeWaveType('complex')">複合波</button>
            <button onclick="changeWaveType('harmonic')">調和波</button>
            <button onclick="togglePause()">一時停止/再生</button>
            <button onclick="resetWaves()">リセット</button>
        </div>

        <div class="info">
            <div class="formula" id="formulaDisplay">y = A·sin(ωx + φ)</div>
            <div id="waveInfo">正弦波: クリックで波を追加</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');

        // レスポンシブキャンバス
        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 300, 500);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 波の設定
        let waves = [];
        let waveType = 'sine';
        let isPaused = false;
        let time = 0;

        const colors = [
            'rgba(0, 210, 255, 0.8)',
            'rgba(58, 123, 213, 0.8)',
            'rgba(249, 83, 198, 0.8)',
            'rgba(0, 255, 127, 0.8)',
            'rgba(255, 165, 0, 0.8)'
        ];

        const formulas = {
            sine: 'y = A·sin(ωx + φ)',
            cosine: 'y = A·cos(ωx + φ)',
            complex: 'y = Σ A_i·sin(ω_i·x + φ_i)',
            harmonic: 'y = Σ (A/n)·sin(n·ω·x)'
        };

        const infoText = {
            sine: '正弦波: 最も基本的な周期的関数',
            cosine: '余弦波: 正弦波をπ/2ずらしたもの',
            complex: '複合波: 複数の波を重ね合わせ',
            harmonic: '調和波: 倍数周波数の合成'
        };

        // 初期波を追加
        function addWave(x = null, y = null) {
            const amplitude = 30 + Math.random() * 50;
            const frequency = 0.01 + Math.random() * 0.03;
            const phase = Math.random() * Math.PI * 2;
            const speed = 0.02 + Math.random() * 0.03;

            waves.push({
                amplitude,
                frequency,
                phase,
                speed,
                color: colors[waves.length % colors.length],
                startX: x || canvas.width / 2,
                startY: y || canvas.height / 2
            });

            if (waves.length > 10) {
                waves.shift();
            }
        }

        // 初期化
        for (let i = 0; i < 3; i++) {
            addWave();
        }

        function changeWaveType(type) {
            waveType = type;
            document.getElementById('formulaDisplay').textContent = formulas[type];
            document.getElementById('waveInfo').textContent = infoText[type];
        }

        function togglePause() {
            isPaused = !isPaused;
        }

        function resetWaves() {
            waves = [];
            time = 0;
            for (let i = 0; i < 3; i++) {
                addWave();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // クリックで波を追加
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addWave(x, y);
        });

        // 波を描画
        function drawWave(wave) {
            ctx.beginPath();
            ctx.strokeStyle = wave.color;
            ctx.lineWidth = 2;

            for (let x = 0; x < canvas.width; x++) {
                let y;

                switch (waveType) {
                    case 'sine':
                        y = wave.amplitude * Math.sin(wave.frequency * x + wave.phase + time);
                        break;
                    case 'cosine':
                        y = wave.amplitude * Math.cos(wave.frequency * x + wave.phase + time);
                        break;
                    case 'complex':
                        y = wave.amplitude * Math.sin(wave.frequency * x + wave.phase + time) +
                            (wave.amplitude / 2) * Math.sin(2 * wave.frequency * x + time);
                        break;
                    case 'harmonic':
                        const n = 3;
                        y = 0;
                        for (let i = 1; i <= n; i++) {
                            y += (wave.amplitude / i) * Math.sin(i * wave.frequency * x + time);
                        }
                        break;
                }

                const screenY = canvas.height / 2 + y;

                if (x === 0) {
                    ctx.moveTo(x, screenY);
                } else {
                    ctx.lineTo(x, screenY);
                }
            }

            ctx.stroke();
        }

        // アニメーション
        function animate() {
            ctx.fillStyle = 'rgba(15, 12, 41, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!isPaused) {
                time += 0.05;
            }

            waves.forEach(wave => {
                drawWave(wave);
            });

            // 中心線
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            requestAnimationFrame(animate);
        }

        animate();

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            addWave(x, y);
        });
    </script>
</body>
</html>
