<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ripple Harmonics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 100%);
            min-height: 100vh;
            overflow: hidden;
            color: white;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #info h1 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00d4ff, #ff00ff, #ffff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #info p {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        #fullscreen-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        #fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            #info h1 {
                font-size: 1rem;
            }
            #info p {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <button id="fullscreen-btn">⛶ 全画面</button>

    <div id="info">
        <h1>🌊 Ripple Harmonics</h1>
        <p>Tap or click to create ripples</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        let width, height;
        let ripples = [];
        let time = 0;
        let autoRippleTimer = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.speed = 2 + Math.random() * 2;
                this.life = 1;
                this.decay = 0.008 + Math.random() * 0.004;
                this.colorHue = Math.random() * 360;
                this.waves = 3 + Math.floor(Math.random() * 4);
                this.amplitude = 10 + Math.random() * 20;
            }

            update() {
                this.radius += this.speed;
                this.life -= this.decay;
                this.colorHue += 0.5;
            }

            draw() {
                const alpha = this.life * 0.6;

                for (let w = 0; w < this.waves; w++) {
                    const waveRadius = this.radius - w * 30;
                    if (waveRadius > 0) {
                        const waveAlpha = alpha * (1 - w / this.waves);
                        const hue = (this.colorHue + w * 30) % 360;

                        ctx.beginPath();
                        
                        // Wavy circle
                        for (let angle = 0; angle <= Math.PI * 2; angle += 0.05) {
                            const waveOffset = Math.sin(angle * 8 + time * 3 + w) * this.amplitude * this.life;
                            const r = waveRadius + waveOffset;
                            const x = this.x + Math.cos(angle) * r;
                            const y = this.y + Math.sin(angle) * r;
                            
                            if (angle === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }

                        ctx.closePath();
                        ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${waveAlpha})`;
                        ctx.lineWidth = 2 * this.life;
                        ctx.stroke();
                    }
                }

                // Inner glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 0.3
                );
                gradient.addColorStop(0, `hsla(${this.colorHue}, 80%, 60%, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            isDead() {
                return this.life <= 0 || this.radius > this.maxRadius;
            }
        }

        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));
            
            // Add harmonics (secondary ripples)
            setTimeout(() => {
                if (ripples.length > 0) {
                    ripples.push(new Ripple(x, y));
                }
            }, 200);
            
            setTimeout(() => {
                if (ripples.length > 0) {
                    ripples.push(new Ripple(x, y));
                }
            }, 400);
        }

        function handleInteraction(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            createRipple(x, y);
        }

        canvas.addEventListener('click', handleInteraction);
        canvas.addEventListener('touchstart', handleInteraction, { passive: false });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '⛶ 退出';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '⛶ 全画面';
            }
        });

        function drawBackground() {
            // Dark gradient background
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height) * 0.7
            );
            gradient.addColorStop(0, '#1a1a3a');
            gradient.addColorStop(1, '#0a0a1a');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // Subtle grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;

            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        function animate() {
            time += 0.016;

            drawBackground();

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            // Auto-create ripples periodically
            autoRippleTimer++;
            if (autoRippleTimer > 180 && ripples.length < 5) {
                createRipple(
                    Math.random() * width,
                    Math.random() * height
                );
                autoRippleTimer = 0;
            }

            requestAnimationFrame(animate);
        }

        // Initial setup
        window.addEventListener('resize', resize);
        resize();

        // Create initial ripple
        setTimeout(() => {
            createRipple(width / 2, height / 2);
        }, 500);

        animate();
    </script>
</body>
</html>
