<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>フラクタルツリーアート | Fractal Tree Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            display: flex;
            flex: 1;
            height: 100%;
        }
        
        .canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            max-width: 100%;
            max-height: 100%;
        }
        
        .controls {
            width: 280px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group label {
            display: block;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }
        
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .control-group .value {
            font-size: 14px;
            color: #00ff88;
            margin-top: 5px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
        
        .title {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .title h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .mobile-toggle {
            display: none;
        }
        
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            
            .controls {
                display: none;
                width: 100%;
                height: auto;
                max-height: 50vh;
            }
            
            .controls.show {
                display: block;
            }
            
            .mobile-toggle {
                display: block;
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                border-radius: 25px;
                background: rgba(0, 255, 136, 0.9);
                color: #000;
                border: none;
                font-weight: bold;
                cursor: pointer;
                z-index: 100;
            }
        }
    </style>
</head>
<body>
    <div class="title">
        <h1>🌳 フラクタルツリーアート</h1>
    </div>
    
    <div class="container">
        <div class="canvas-container">
            <canvas id="fractalCanvas"></canvas>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
            <button class="mobile-toggle" onclick="toggleControls()">⚙️ 設定</button>
        </div>
        
        <div class="controls" id="controls">
            <div class="btn-group">
                <button class="btn-primary" onclick="drawTree()">🔄 再生成</button>
                <button class="btn-secondary" onclick="downloadImage()">💾 保存</button>
            </div>
            
            <div class="control-group">
                <label>深さ (Depth): <span id="depthValue">12</span></label>
                <input type="range" id="depth" min="5" max="15" value="12" oninput="updateControl('depth')">
            </div>
            
            <div class="control-group">
                <label>枝の角度 (Angle): <span id="angleValue">25</span>°</label>
                <input type="range" id="angle" min="10" max="45" value="25" oninput="updateControl('angle')">
            </div>
            
            <div class="control-group">
                <label>枝の長さ (Length): <span id="lengthValue">120</span></label>
                <input type="range" id="length" min="80" max="150" value="120" oninput="updateControl('length')">
            </div>
            
            <div class="control-group">
                <label>分岐率 (Ratio): <span id="ratioValue">0.75</span></label>
                <input type="range" id="ratio" min="0.5" max="0.85" step="0.01" value="0.75" oninput="updateControl('ratio')">
            </div>
            
            <div class="control-group">
                <label>色相の変化 (Hue Speed): <span id="hueValue">30</span></label>
                <input type="range" id="hue" min="10" max="60" value="30" oninput="updateControl('hue')">
            </div>
            
            <div class="control-group">
                <label>アニメーション速度 (Speed): <span id="speedValue">50</span></label>
                <input type="range" id="speed" min="10" max="100" value="50" oninput="updateControl('speed')">
            </div>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');
        
        let config = {
            depth: 12,
            angle: 25,
            length: 120,
            ratio: 0.75,
            hueSpeed: 30,
            speed: 50
        };
        
        let animationId = null;
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawTree();
        }
        
        function drawBranch(x, y, length, angle, depth, hue) {
            if (depth === 0) return;
            
            const endX = x + length * Math.cos(angle);
            const endY = y + length * Math.sin(angle);
            
            // 色を計算（深さに応じて変化）
            const colorHue = (hue + (config.depth - depth) * config.hueSpeed) % 360;
            const saturation = 70 + depth * 2;
            const lightness = 50 + depth * 2;
            
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = `hsl(${colorHue}, ${saturation}%, ${lightness}%)`;
            ctx.lineWidth = depth * 0.8;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // 枠を描画（光る効果）
            ctx.strokeStyle = `hsla(${colorHue}, ${saturation}%, ${lightness + 20}%, 0.3)`;
            ctx.lineWidth = depth * 1.5;
            ctx.stroke();
            
            // 再帰的に描画
            const newLength = length * config.ratio;
            const angleRad = config.angle * Math.PI / 180;
            
            setTimeout(() => {
                drawBranch(endX, endY, newLength, angle - angleRad, depth - 1, hue);
                drawBranch(endX, endY, newLength, angle + angleRad, depth - 1, hue);
            }, 100 - config.speed);
        }
        
        function drawTree() {
            // キャンバスをクリア
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 背景のグラデーション
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 2
            );
            gradient.addColorStop(0, 'rgba(26, 26, 46, 0.5)');
            gradient.addColorStop(1, 'rgba(10, 10, 10, 0.8)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // ツリーを描画
            const startX = canvas.width / 2;
            const startY = canvas.height;
            const startHue = Math.random() * 360;
            
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            drawBranch(startX, startY, config.length, -Math.PI / 2, config.depth, startHue);
        }
        
        function updateControl(name) {
            const input = document.getElementById(name);
            const valueEl = document.getElementById(name + 'Value');
            config[name] = parseFloat(input.value);
            valueEl.textContent = input.value;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function toggleControls() {
            const controls = document.getElementById('controls');
            controls.classList.toggle('show');
        }
        
        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'fractal-tree.png';
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // 初期化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
