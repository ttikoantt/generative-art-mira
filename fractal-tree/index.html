<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラクタルツリー | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 1rem;
            margin-bottom: 30px;
        }
        .canvas-wrapper {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        canvas {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }
        .controls {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .control-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #667eea;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: #e0e7ff;
            outline: none;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border: none;
        }
        .value-display {
            text-align: right;
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.95);
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .info {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info p {
            color: #555;
            line-height: 1.6;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            .container {
                padding: 10px;
            }
            .canvas-wrapper, .controls {
                padding: 15px;
            }
            .btn-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
        /* Fullscreen styles */
        .fullscreen-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 999;
            overflow-y: auto;
            padding: 20px;
        }
        .fullscreen-mode .fullscreen-btn {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .fullscreen-mode .canvas-wrapper {
            background: rgba(255,255,255,0.95);
        }
        .fullscreen-mode .controls {
            background: rgba(255,255,255,0.95);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面表示">⛶</button>

    <div class="container" id="mainContainer">
        <h1>🌳 フラクタルツリー</h1>
        <p class="subtitle">自然界の美しいパターンを再帰的に生成</p>

        <div class="info">
            <p>パラメータを調整して、様々な形の木を生成しよう！再帰的な分岐構造が美しいパターンを創り出します。</p>
        </div>

        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>分岐角度: <span id="angleValue">25</span>°</label>
                <input type="range" id="angle" min="10" max="60" value="25">
            </div>

            <div class="control-group">
                <label>枝の長さ: <span id="lengthValue">120</span>px</label>
                <input type="range" id="length" min="50" max="200" value="120">
            </div>

            <div class="control-group">
                <label>再帰の深さ: <span id="depthValue">10</span></label>
                <input type="range" id="depth" min="5" max="14" value="10">
            </div>

            <div class="control-group">
                <label>枝の細さ: <span id="widthValue">10</span>px</label>
                <input type="range" id="width" min="2" max="20" value="10">
            </div>

            <div class="control-group">
                <label>色相変化: <span id="hueValue">30</span></label>
                <input type="range" id="hue" min="0" max="90" value="30">
            </div>

            <div class="btn-group">
                <button class="btn-primary" onclick="generateTree()">🔄 生成</button>
                <button class="btn-secondary" onclick="randomize()">🎲 ランダム</button>
                <button class="btn-secondary" onclick="downloadImage()">💾 保存</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const mainContainer = document.getElementById('mainContainer');

        // Set canvas size
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const size = Math.min(wrapper.clientWidth - 40, 700);
            canvas.width = size;
            canvas.height = size;
            generateTree();
        }

        // Draw fractal tree
        function drawTree(startX, startY, length, angle, branchWidth, depth, hue) {
            ctx.beginPath();
            ctx.save();
            ctx.translate(startX, startY);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -length);
            
            // Color based on depth
            const currentHue = (hue + (10 - depth) * parseInt(document.getElementById('hue').value)) % 360;
            ctx.strokeStyle = `hsl(${currentHue}, 70%, ${50 + depth * 3}%)`;
            ctx.lineWidth = branchWidth;
            ctx.stroke();

            if (depth > 0) {
                const newLength = length * 0.75;
                const newWidth = branchWidth * 0.7;
                const angleOffset = parseInt(document.getElementById('angle').value);

                // Right branch
                ctx.translate(0, -length);
                drawTree(0, 0, newLength, angleOffset, newWidth, depth - 1, currentHue);

                // Left branch
                drawTree(0, 0, newLength, -angleOffset, newWidth, depth - 1, currentHue);
            }

            ctx.restore();
        }

        // Generate tree
        function generateTree() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Get parameters
            const length = parseInt(document.getElementById('length').value);
            const depth = parseInt(document.getElementById('depth').value);
            const width = parseInt(document.getElementById('width').value);

            // Draw tree
            const startX = canvas.width / 2;
            const startY = canvas.height - 20;
            drawTree(startX, startY, length, 0, width, depth, 30);
        }

        // Randomize parameters
        function randomize() {
            document.getElementById('angle').value = Math.floor(Math.random() * 50) + 10;
            document.getElementById('length').value = Math.floor(Math.random() * 150) + 50;
            document.getElementById('depth').value = Math.floor(Math.random() * 9) + 5;
            document.getElementById('width').value = Math.floor(Math.random() * 18) + 2;
            document.getElementById('hue').value = Math.floor(Math.random() * 90);

            updateDisplays();
            generateTree();
        }

        // Update value displays
        function updateDisplays() {
            document.getElementById('angleValue').textContent = document.getElementById('angle').value;
            document.getElementById('lengthValue').textContent = document.getElementById('length').value;
            document.getElementById('depthValue').textContent = document.getElementById('depth').value;
            document.getElementById('widthValue').textContent = document.getElementById('width').value;
            document.getElementById('hueValue').textContent = document.getElementById('hue').value;
        }

        // Download image
        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'fractal-tree.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Toggle fullscreen
        function toggleFullscreen() {
            mainContainer.classList.toggle('fullscreen-mode');
            setTimeout(resizeCanvas, 100);
        }

        // Event listeners
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', () => {
                updateDisplays();
                generateTree();
            });
        });

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        updateDisplays();
    </script>
</body>
</html>
