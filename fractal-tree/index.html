<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        canvas {
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 20px;
            cursor: pointer;
            z-index: 1000;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            canvas {
                max-width: 95vw;
                max-height: 60vh;
            }

            .controls {
                flex-direction: column;
            }

            input[type="range"] {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🌳 Fractal Tree</h1>
        <p class="subtitle">クリックで新しい木を生成</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <div class="control-group">
                <label>枝の角度: <span id="angleValue">25</span>°</label>
                <input type="range" id="angle" min="10" max="45" value="25">
            </div>

            <div class="control-group">
                <label>深さ: <span id="depthValue">10</span></label>
                <input type="range" id="depth" min="5" max="14" value="10">
            </div>

            <div class="control-group">
                <label>枝の長さ: <span id="lengthValue">120</span></label>
                <input type="range" id="length" min="80" max="150" value="120">
            </div>

            <button onclick="randomize()">🎲 ランダム生成</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvas size
        function resizeCanvas() {
            const size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.6, 600);
            canvas.width = size;
            canvas.height = size;
            draw();
        }

        // Get control values
        function getControls() {
            return {
                angle: parseInt(document.getElementById('angle').value),
                depth: parseInt(document.getElementById('depth').value),
                length: parseInt(document.getElementById('length').value)
            };
        }

        // Draw fractal tree
        function drawTree(startX, startY, length, angle, depth, branchWidth) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = depth > 7 ? '#8B4513' : 
                             depth > 4 ? '#228B22' : 
                             depth > 2 ? '#32CD32' : '#90EE90';
            ctx.lineWidth = branchWidth;
            ctx.lineCap = 'round';
            ctx.shadowColor = depth > 7 ? 'rgba(139, 69, 19, 0.3)' : 'rgba(34, 139, 34, 0.3)';
            ctx.shadowBlur = 10;
            
            ctx.translate(startX, startY);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -length);
            ctx.stroke();

            if (depth > 0) {
                ctx.translate(0, -length);
                
                // Right branch
                ctx.save();
                ctx.rotate(angle * Math.PI / 180);
                drawTree(0, 0, length * 0.7, angle, depth - 1, branchWidth * 0.7);
                ctx.restore();
                
                // Left branch
                ctx.save();
                ctx.rotate(-angle * Math.PI / 180);
                drawTree(0, 0, length * 0.7, angle, depth - 1, branchWidth * 0.7);
                ctx.restore();
            }
            
            ctx.restore();
        }

        // Main draw function
        function draw() {
            const { angle, depth, length } = getControls();
            
            // Clear canvas
            ctx.fillStyle = 'rgba(10, 10, 20, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw tree from bottom center
            const startX = canvas.width / 2;
            const startY = canvas.height - 20;
            drawTree(startX, startY, length, angle, depth, 10);
        }

        // Randomize parameters
        function randomize() {
            document.getElementById('angle').value = Math.floor(Math.random() * 35) + 10;
            document.getElementById('depth').value = Math.floor(Math.random() * 9) + 5;
            document.getElementById('length').value = Math.floor(Math.random() * 70) + 80;
            updateLabels();
            draw();
        }

        // Update labels
        function updateLabels() {
            document.getElementById('angleValue').textContent = document.getElementById('angle').value;
            document.getElementById('depthValue').textContent = document.getElementById('depth').value;
            document.getElementById('lengthValue').textContent = document.getElementById('length').value;
        }

        // Event listeners
        document.getElementById('angle').addEventListener('input', () => {
            updateLabels();
            draw();
        });

        document.getElementById('depth').addEventListener('input', () => {
            updateLabels();
            draw();
        });

        document.getElementById('length').addEventListener('input', () => {
            updateLabels();
            draw();
        });

        canvas.addEventListener('click', randomize);

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initialize
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
