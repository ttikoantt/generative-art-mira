<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spirograph Pattern Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-width: 95%;
        }

        .control-btn {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 10px;
                gap: 8px;
            }

            .control-btn {
                padding: 10px 18px;
                font-size: 12px;
            }

            .info {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div id="pattern-info">Pattern: 1</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <div class="controls">
        <button class="control-btn" onclick="generatePattern()">🎨 New Pattern</button>
        <button class="control-btn" onclick="clearCanvas()">🗑️ Clear</button>
        <button class="control-btn" onclick="downloadCanvas()">💾 Save</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, centerX, centerY;
        let animationId;
        let currentPattern = 0;

        // Pattern parameters
        let R, r, d, hue;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function generatePattern() {
            currentPattern++;
            document.getElementById('pattern-info').textContent = `Pattern: ${currentPattern}`;

            // Generate random spirograph parameters
            R = Math.random() * 150 + 100;  // Outer circle radius
            r = Math.random() * 80 + 20;    // Inner circle radius
            d = Math.random() * 100 + 30;   // Distance from center
            hue = Math.random() * 360;      // Starting hue

            // Draw animated spirograph
            animateSpirograph();
        }

        function animateSpirograph() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            let t = 0;
            const points = [];
            const maxT = 100 * Math.PI; // Multiple rotations
            const speed = 0.5; // Animation speed

            // Semi-transparent black for trails
            ctx.fillStyle = 'rgba(10, 10, 15, 0.02)';
            ctx.fillRect(0, 0, width, height);

            function draw() {
                if (t >= maxT) return;

                // Draw multiple points per frame for smoother animation
                for (let i = 0; i < 10; i++) {
                    if (t >= maxT) break;

                    // Hypotrochoid formula
                    const x = centerX + (R - r) * Math.cos(t) + d * Math.cos(((R - r) / r) * t);
                    const y = centerY + (R - r) * Math.sin(t) - d * Math.sin(((R - r) / r) * t);

                    points.push({ x, y, hue: (hue + t * 10) % 360 });
                    t += speed;
                }

                // Draw curve
                if (points.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);

                    for (let i = 1; i < points.length; i++) {
                        const p = points[i];
                        ctx.strokeStyle = `hsla(${p.hue}, 70%, 60%, 0.8)`;
                        ctx.lineWidth = 2;
                        ctx.lineTo(p.x, p.y);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                    }
                }

                animationId = requestAnimationFrame(draw);
            }

            draw();
        }

        function clearCanvas() {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, width, height);
        }

        function downloadCanvas() {
            const link = document.createElement('a');
            link.download = `spirograph-${currentPattern}-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Touch interaction
        let touchX, touchY;
        canvas.addEventListener('touchstart', (e) => {
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const dx = e.touches[0].clientX - touchX;
            const dy = e.touches[0].clientY - touchY;
            d += (dx + dy) * 0.1;
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        });

        canvas.addEventListener('click', () => {
            generatePattern();
        });

        // Initialize
        window.addEventListener('resize', resize);
        resize();
        generatePattern();
    </script>
</body>
</html>
