<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Field | Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        canvas {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
        }

        .controls {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 150px;
        }

        label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 16px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }

            .controls {
                padding: 15px;
            }

            .control-group {
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <header>
        <h1>✨ Particle Flow Field</h1>
        <p class="subtitle">パーティクルがフロー場を舞う | Perlin Noise Flow Field</p>
    </header>

    <div id="canvas-container">
        <canvas id="flowCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>パーティクル数: <span id="particleCountValue">2000</span></label>
            <input type="range" id="particleCount" min="500" max="5000" value="2000" step="100">
        </div>

        <div class="control-group">
            <label>ノイズスケール: <span id="noiseScaleValue">0.01</span></label>
            <input type="range" id="noiseScale" min="0.001" max="0.05" value="0.01" step="0.001">
        </div>

        <div class="control-group">
            <label>パーティクル速度: <span id="speedValue">2</span></label>
            <input type="range" id="speed" min="0.5" max="5" value="2" step="0.1">
        </div>

        <div class="control-group">
            <label>トレイル長: <span id="trailValue">0.95</span></label>
            <input type="range" id="trail" min="0.8" max="0.99" value="0.95" step="0.01">
        </div>

        <button onclick="regenerate()">🔄 再生成</button>
    </div>

    <script>
        const canvas = document.getElementById('flowCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const size = Math.min(container.clientWidth - 40, container.clientHeight - 40, 800);
            canvas.width = size;
            canvas.height = size;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Perlin Noise implementation (simplified)
        class PerlinNoise {
            constructor() {
                this.permutation = [];
                for (let i = 0; i < 256; i++) {
                    this.permutation[i] = i;
                }
                // Shuffle
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.permutation[i], this.permutation[j]] = [this.permutation[j], this.permutation[i]];
                }
                this.permutation = [...this.permutation, ...this.permutation];
            }

            fade(t) {
                return t * t * t * (t * (t * 6 - 15) + 10);
            }

            lerp(t, a, b) {
                return a + t * (b - a);
            }

            grad(hash, x, y) {
                const h = hash & 3;
                const u = h < 2 ? x : y;
                const v = h < 2 ? y : x;
                return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
            }

            noise(x, y) {
                const X = Math.floor(x) & 255;
                const Y = Math.floor(y) & 255;

                x -= Math.floor(x);
                y -= Math.floor(y);

                const u = this.fade(x);
                const v = this.fade(y);

                const A = this.permutation[X] + Y;
                const B = this.permutation[X + 1] + Y;

                return this.lerp(v,
                    this.lerp(u, this.grad(this.permutation[A], x, y), this.grad(this.permutation[B], x - 1, y)),
                    this.lerp(u, this.grad(this.permutation[A + 1], x, y - 1), this.grad(this.permutation[B + 1], x - 1, y - 1))
                );
            }
        }

        const perlin = new PerlinNoise();

        // Particle class
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.prevX = this.x;
                this.prevY = this.y;

                // Random color from palette
                const hue = Math.random() * 60 + 240; // Blue to purple range
                this.color = `hsla(${hue}, 80%, 65%, 0.8)`;
                this.speed = Math.random() * 0.5 + 0.5;
            }

            update(noiseScale, baseSpeed) {
                this.prevX = this.x;
                this.prevY = this.y;

                const angle = perlin.noise(this.x * noiseScale, this.y * noiseScale) * Math.PI * 4;

                this.x += Math.cos(angle) * baseSpeed * this.speed;
                this.y += Math.sin(angle) * baseSpeed * this.speed;

                // Wrap around edges
                if (this.x < 0) { this.x = canvas.width; this.prevX = this.x; }
                if (this.x > canvas.width) { this.x = 0; this.prevX = this.x; }
                if (this.y < 0) { this.y = canvas.height; this.prevY = this.y; }
                if (this.y > canvas.height) { this.y = 0; this.prevY = this.y; }
            }

            draw() {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1;
                ctx.moveTo(this.prevX, this.prevY);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
            }
        }

        // Particles array
        let particles = [];
        let animationId;

        // Control values
        let particleCount = 2000;
        let noiseScale = 0.01;
        let speed = 2;
        let trail = 0.95;

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Fade effect for trails
            ctx.fillStyle = `rgba(10, 10, 15, ${1 - trail})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (const particle of particles) {
                particle.update(noiseScale, speed);
                particle.draw();
            }

            animationId = requestAnimationFrame(animate);
        }

        function regenerate() {
            cancelAnimationFrame(animationId);

            // Clear canvas
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Get control values
            particleCount = parseInt(document.getElementById('particleCount').value);
            noiseScale = parseFloat(document.getElementById('noiseScale').value);
            speed = parseFloat(document.getElementById('speed').value);
            trail = parseFloat(document.getElementById('trail').value);

            initParticles();
            animate();
        }

        // Control event listeners
        document.getElementById('particleCount').addEventListener('input', (e) => {
            document.getElementById('particleCountValue').textContent = e.target.value;
        });

        document.getElementById('noiseScale').addEventListener('input', (e) => {
            document.getElementById('noiseScaleValue').textContent = e.target.value;
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            document.getElementById('speedValue').textContent = e.target.value;
        });

        document.getElementById('trail').addEventListener('input', (e) => {
            document.getElementById('trailValue').textContent = e.target.value;
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial animation
        regenerate();
    </script>
</body>
</html>
