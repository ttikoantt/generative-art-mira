<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Waveform Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            text-align: center;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button, select, input[type="file"] {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        select {
            background: rgba(255, 255, 255, 0.15);
        }

        input[type="file"] {
            background: rgba(255, 255, 255, 0.15);
        }

        .canvas-container {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            height: 60vh;
            max-height: 600px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
        }

        canvas {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .info {
            color: #fff;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.7;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: none;
            font-size: 24px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 255, 0.2);
            color: #fff;
            padding: 10px 30px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            font-weight: bold;
            z-index: 999;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            button, select {
                padding: 10px 18px;
                font-size: 14px;
            }

            .canvas-container {
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Audio Waveform Visualizer</h1>

        <div class="controls">
            <input type="file" id="audioFile" accept="audio/*">
            <button id="micBtn">🎤 マイクで開始</button>
            <button id="demoBtn">🎹 デモ音源</button>
            <select id="visualMode">
                <option value="bars">📊 バー表示</option>
                <option value="wave">〰️ 波形</option>
                <option value="circle">⭕ 円形</option>
                <option value="particles">✨ パーティクル</option>
            </select>
        </div>

        <div class="canvas-container">
            <canvas id="visualizer"></canvas>
        </div>

        <div class="info">
            <p>ファイルをアップロードするか、マイクを使用してください</p>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    <div class="status" id="status">待機中...</div>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        let audioContext;
        let analyser;
        let dataArray;
        let source;
        let animationId;
        let visualMode = 'bars';
        let particles = [];
        let time = 0;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        // Touch tracking
        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.touches[0].clientX - rect.left;
            mouseY = e.touches[0].clientY - rect.top;
        });

        // Initialize audio
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
        }

        // Load audio file
        document.getElementById('audioFile').addEventListener('change', function(e) {
            initAudio();
            const file = e.target.files[0];
            if (file) {
                status.textContent = '読み込み中...';
                const reader = new FileReader();
                reader.onload = function(event) {
                    audioContext.decodeAudioData(event.target.result, function(buffer) {
                        if (source) source.stop();
                        source = audioContext.createBufferSource();
                        source.buffer = buffer;
                        source.connect(analyser);
                        analyser.connect(audioContext.destination);
                        source.start(0);
                        source.loop = true;
                        status.textContent = '再生中 🎵';
                        visualize();
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // Microphone input
        document.getElementById('micBtn').addEventListener('click', async function() {
            initAudio();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (source) source.disconnect();
                source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                status.textContent = 'マイク使用中 🎤';
                visualize();
            } catch (err) {
                status.textContent = 'エラー: ' + err.message;
            }
        });

        // Demo sound
        document.getElementById('demoBtn').addEventListener('click', function() {
            initAudio();
            if (source) source.stop();

            // Create oscillators for demo sound
            const osc1 = audioContext.createOscillator();
            const osc2 = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc1.type = 'sine';
            osc2.type = 'triangle';
            osc1.frequency.setValueAtTime(220, audioContext.currentTime);
            osc2.frequency.setValueAtTime(330, audioContext.currentTime);

            gain.gain.setValueAtTime(0.3, audioContext.currentTime);

            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(analyser);
            analyser.connect(audioContext.destination);

            osc1.start();
            osc2.start();

            // Modulate frequencies
            setInterval(() => {
                const freq1 = 200 + Math.sin(time * 0.001) * 100;
                const freq2 = 300 + Math.cos(time * 0.0013) * 150;
                osc1.frequency.setValueAtTime(freq1, audioContext.currentTime);
                osc2.frequency.setValueAtTime(freq2, audioContext.currentTime);
            }, 100);

            source = { stop: () => { osc1.stop(); osc2.stop(); } };
            status.textContent = 'デモ音源再生中 🎹';
            visualize();
        });

        // Visual mode selector
        document.getElementById('visualMode').addEventListener('change', function(e) {
            visualMode = e.target.value;
        });

        // Particle class
        class Particle {
            constructor(x, y, hue, size) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.size = size;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.01;
                this.size *= 0.99;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.life})`;
                ctx.fill();
            }
        }

        // Visualization
        function visualize() {
            if (animationId) cancelAnimationFrame(animationId);

            function draw() {
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                // Clear with fade effect
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                time++;

                if (visualMode === 'bars') {
                    drawBars();
                } else if (visualMode === 'wave') {
                    drawWave();
                } else if (visualMode === 'circle') {
                    drawCircle();
                } else if (visualMode === 'particles') {
                    drawParticles();
                }
            }

            draw();
        }

        function drawBars() {
            const barWidth = canvas.width / dataArray.length * 2.5;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = (dataArray[i] / 255) * canvas.height * 0.8;
                const hue = (i / dataArray.length) * 360 + time * 0.5;

                const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
                gradient.addColorStop(0, `hsla(${hue}, 100%, 50%, 0.8)`);
                gradient.addColorStop(1, `hsla(${hue + 60}, 100%, 70%, 0.8)`);

                ctx.fillStyle = gradient;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);

                // Mirror
                ctx.fillRect(x, 0, barWidth - 2, barHeight * 0.5);

                x += barWidth;
            }
        }

        function drawWave() {
            ctx.lineWidth = 3;
            ctx.beginPath();

            for (let i = 0; i < dataArray.length; i++) {
                const x = (i / dataArray.length) * canvas.width;
                const y = canvas.height / 2 + (dataArray[i] - 128) * 2;
                const hue = (i / dataArray.length) * 360 + time;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.strokeStyle = `hsl(${time % 360}, 100%, 60%)`;
            ctx.stroke();

            // Glow effect
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${time % 360}, 100%, 60%)`;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawCircle() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.3;

            for (let i = 0; i < dataArray.length; i++) {
                const angle = (i / dataArray.length) * Math.PI * 2 - Math.PI / 2;
                const barHeight = (dataArray[i] / 255) * radius;
                const hue = (i / dataArray.length) * 360 + time * 0.5;

                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                const y2 = centerY + Math.sin(angle) * (radius + barHeight);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 0.8)`;
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            // Center circle
            const avgFreq = dataArray.reduce((a, b) => a + b) / dataArray.length;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.3 + avgFreq * 0.1, 0, Math.PI * 2);
            ctx.fillStyle = `hsla(${time % 360}, 100%, 60%, 0.3)`;
            ctx.fill();
        }

        function drawParticles() {
            // Create new particles based on audio
            const avgFreq = dataArray.reduce((a, b) => a + b) / dataArray.length;
            if (avgFreq > 50) {
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle(
                        mouseX + (Math.random() - 0.5) * 100,
                        mouseY + (Math.random() - 0.5) * 100,
                        time % 360,
                        avgFreq / 10
                    ));
                }
            }

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Draw frequency circle
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            for (let i = 0; i < dataArray.length; i++) {
                const angle = (i / dataArray.length) * Math.PI * 2;
                const dist = (dataArray[i] / 255) * 200;
                const x = centerX + Math.cos(angle) * dist;
                const y = centerY + Math.sin(angle) * dist;

                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${(i / dataArray.length) * 360 + time}, 100%, 60%, 0.6)`;
                ctx.fill();
            }
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial status
        status.textContent = 'オーディオソースを選択してください';
    </script>
</body>
</html>
