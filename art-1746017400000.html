<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Midnight Starfield - 真夜中の星空</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000000;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            font-family: -apple-system, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="info">真夜中の星空 - マウス/タッチで流れ星</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let mouseX = 0, mouseY = 0;
        let shootingStars = [];

        // Canvasのサイズを設定
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 星クラス
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseRadius = Math.random() * 1.5 + 0.5;
                this.radius = this.baseRadius;
                this.baseAlpha = Math.random() * 0.6 + 0.3;
                this.alpha = this.baseAlpha;
                this.twinkleSpeed = Math.random() * 0.02 + 0.005;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.color = this.getRandomColor();
            }

            getRandomColor() {
                const colors = [
                    { h: 220, s: 20, l: 90 },  // 白がかった青
                    { h: 200, s: 30, l: 85 },  // 淡い青
                    { h: 60, s: 10, l: 95 },   // 淡い黄色
                    { h: 0, s: 0, l: 100 }     // 純白
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update(time) {
                // 瞬き効果
                this.twinklePhase += this.twinkleSpeed;
                const twinkle = Math.sin(this.twinklePhase) * 0.3 + 0.7;
                this.alpha = this.baseAlpha * twinkle;
                this.radius = this.baseRadius * (0.8 + twinkle * 0.4);
            }

            draw() {
                const { h, s, l } = this.color;
                ctx.fillStyle = `hsla(${h}, ${s}%, ${l}%, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // グロー効果
                if (this.radius > 1) {
                    ctx.fillStyle = `hsla(${h}, ${s}%, ${l}%, ${this.alpha * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // 流れ星クラス
        class ShootingStar {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height * 0.5;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3; // 45度付近
                this.speed = 8 + Math.random() * 4;
                this.length = 80 + Math.random() * 40;
                this.alpha = 1;
                this.decay = 0.015 + Math.random() * 0.01;
                this.trail = [];
            }

            update() {
                // トレイルに現在の位置を追加
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }

                // 移動
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // 減衰
                this.alpha -= this.decay;
            }

            draw() {
                // トレイルを描画
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * this.alpha * 0.5;
                    ctx.fillStyle = `rgba(255, 255, 255, ${trailAlpha})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 本体を描画
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();

                // グロー
                ctx.fillStyle = `rgba(200, 220, 255, ${this.alpha * 0.3})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0 || this.x > width || this.y > height;
            }
        }

        // 月のグロー効果
        function drawMoonGlow() {
            const moonX = width * 0.85;
            const moonY = height * 0.15;
            const moonRadius = 40;

            // 外側のグロー
            for (let i = 5; i >= 0; i--) {
                const alpha = (0.02 - i * 0.003);
                const radius = moonRadius + i * 15;
                ctx.fillStyle = `rgba(200, 210, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(moonX, moonY, radius, 0, Math.PI * 2);
                ctx.fill();
            }

            // 月本体
            const gradient = ctx.createRadialGradient(
                moonX, moonY, 0,
                moonX, moonY, moonRadius
            );
            gradient.addColorStop(0, 'rgba(240, 240, 255, 0.95)');
            gradient.addColorStop(0.7, 'rgba(220, 220, 240, 0.8)');
            gradient.addColorStop(1, 'rgba(200, 200, 230, 0.3)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        // 背景を描画（深夜のグラデーション）
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#000010');
            gradient.addColorStop(0.3, '#000015');
            gradient.addColorStop(0.7, '#000508');
            gradient.addColorStop(1, '#000808');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 星を生成
        const stars = [];
        for (let i = 0; i < 400; i++) {
            stars.push(new Star());
        }

        // アニメーションループ
        let time = 0;
        function animate() {
            // 背景を描画（残像効果なし）
            drawBackground();

            // 月を描画
            drawMoonGlow();

            // 星を更新・描画
            time++;
            stars.forEach(star => {
                star.update(time);
                star.draw();
            });

            // 流れ星を更新・描画
            shootingStars = shootingStars.filter(s => !s.isDead());
            shootingStars.forEach(s => {
                s.update();
                s.draw();
            });

            // 自動的に流れ星を生成（低確率）
            if (Math.random() < 0.003) {
                shootingStars.push(new ShootingStar());
            }

            requestAnimationFrame(animate);
        }

        // マウス/タッチイベント
        canvas.addEventListener('mousedown', (e) => {
            shootingStars.push(new ShootingStar(e.clientX, e.clientY));
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            shootingStars.push(new ShootingStar(touch.clientX, touch.clientY));
        });

        // アニメーション開始
        animate();
    </script>
</body>
</html>
