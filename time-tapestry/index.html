<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間の織物 - Time Tapestry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(100, 200, 255, 0.3);
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }

        .time {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="time" id="timeDisplay"></div>
    <div class="info">時間の織物 - Time Tapestry</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const timeDisplay = document.getElementById('timeDisplay');

        let width, height;
        let particles = [];
        let time = 0;
        let mouseX = 0, mouseY = 0;

        function resize() {
            width = canvas.width = Math.min(window.innerWidth * 0.9, 900);
            height = canvas.height = Math.min(window.innerHeight * 0.8, 700);
            initParticles();
        }

        function initParticles() {
            particles = [];
            const count = 80;

            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    baseX: Math.random() * width,
                    baseY: Math.random() * height,
                    size: Math.random() * 4 + 2,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    hue: Math.random() * 60 + 180, // 青〜紫系
                    phase: Math.random() * Math.PI * 2,
                    amplitude: Math.random() * 30 + 10
                });
            }
        }

        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            timeDisplay.textContent = `${hours}:${minutes}:${seconds}`;
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        const opacity = (1 - dist / 120) * 0.4;
                        const gradient = ctx.createLinearGradient(
                            particles[i].x, particles[i].y,
                            particles[j].x, particles[j].y
                        );
                        gradient.addColorStop(0, `hsla(${particles[i].hue}, 70%, 60%, ${opacity})`);
                        gradient.addColorStop(1, `hsla(${particles[j].hue}, 70%, 60%, ${opacity})`);

                        ctx.beginPath();
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                // 時間による動き
                p.phase += 0.01;
                p.x = p.baseX + Math.sin(p.phase + time * 0.0005) * p.amplitude;
                p.y = p.baseY + Math.cos(p.phase + time * 0.0003) * p.amplitude;

                // 色の変化
                const hueShift = Math.sin(time * 0.0002 + p.phase) * 20;
                const currentHue = p.hue + hueShift;

                // グロー効果
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 3);
                gradient.addColorStop(0, `hsla(${currentHue}, 80%, 70%, 0.8)`);
                gradient.addColorStop(0.5, `hsla(${currentHue}, 70%, 60%, 0.3)`);
                gradient.addColorStop(1, `hsla(${currentHue}, 60%, 50%, 0)`);

                ctx.beginPath();
                ctx.fillStyle = gradient;
                ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
                ctx.fill();

                // 中心の明るい点
                ctx.beginPath();
                ctx.fillStyle = `hsla(${currentHue}, 90%, 80%, 0.9)`;
                ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function draw() {
            // 背景を少し残しつつクリア
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            drawConnections();
            drawParticles();

            time++;
            updateTime();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
