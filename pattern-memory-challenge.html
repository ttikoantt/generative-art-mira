<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パターン記憶チャレンジ | Pattern Memory Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
            aspect-ratio: 1;
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.active {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .cell.correct {
            background: linear-gradient(135deg, #00ff88, #00d4ff);
            border-color: #00ff88;
            animation: pulse 0.5s;
        }

        .cell.wrong {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border-color: #ff4757;
            animation: shake 0.5s;
        }

        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .message {
            margin: 20px 0;
            font-size: 16px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .btn {
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(0, 212, 255, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 20px;
            }

            .stats {
                gap: 15px;
            }

            .stat {
                padding: 8px 15px;
            }

            .stat-value {
                font-size: 20px;
            }

            .game-board {
                gap: 8px;
            }

            .cell {
                font-size: 20px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🧠 パターン記憶チャレンジ</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">レベル</div>
                <div class="stat-value" id="level">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">最高記録</div>
                <div class="stat-value" id="highScore">0</div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="message" id="message">
            スタートボタンを押してゲームを開始！
        </div>

        <button class="btn" id="startBtn" onclick="startGame()">スタート</button>
    </div>

    <script>
        const boardSize = 16;
        let sequence = [];
        let playerSequence = [];
        let level = 1;
        let score = 0;
        let highScore = localStorage.getItem('patternMemoryHighScore') || 0;
        let isShowingSequence = false;
        let canPlay = false;

        const gameBoard = document.getElementById('gameBoard');
        const messageEl = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');

        // 初期化
        function init() {
            highScoreEl.textContent = highScore;

            for (let i = 0; i < boardSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', () => handleCellClick(i));
                gameBoard.appendChild(cell);
            }
        }

        // ゲーム開始
        function startGame() {
            level = 1;
            score = 0;
            sequence = [];
            playerSequence = [];
            updateStats();
            startBtn.disabled = true;
            nextRound();
        }

        // 次のラウンド
        function nextRound() {
            playerSequence = [];
            isShowingSequence = true;
            canPlay = false;

            messageEl.textContent = `レベル ${level}: パターンを覚えて！`;
            levelEl.textContent = level;

            // 新しいパターンを追加
            const newPattern = Math.floor(Math.random() * boardSize);
            sequence.push(newPattern);

            // シーケンスを表示
            setTimeout(() => {
                showSequence();
            }, 1000);
        }

        // シーケンスを表示
        function showSequence() {
            let i = 0;

            const interval = setInterval(() => {
                if (i >= sequence.length) {
                    clearInterval(interval);
                    isShowingSequence = false;
                    canPlay = true;
                    messageEl.textContent = 'あなたの番！順番にタップして！';
                    enableBoard();
                    return;
                }

                const cellIndex = sequence[i];
                flashCell(cellIndex);
                i++;
            }, Math.max(300, 800 - level * 30)); // レベルが上がると速くなる
        }

        // セルを光らせる
        function flashCell(index, duration = 300) {
            const cell = gameBoard.children[index];
            cell.classList.add('active');
            setTimeout(() => {
                cell.classList.remove('active');
            }, duration);
        }

        // セルクリック処理
        function handleCellClick(index) {
            if (!canPlay || isShowingSequence) return;

            const cell = gameBoard.children[index];
            if (cell.classList.contains('disabled')) return;

            playerSequence.push(index);
            flashCell(index, 200);

            // 正誤判定
            const currentIndex = playerSequence.length - 1;
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                gameOver();
                return;
            }

            // シーケンス完了判定
            if (playerSequence.length === sequence.length) {
                canPlay = false;
                disableBoard();
                score += level * 10;
                updateStats();
                messageEl.textContent = '素晴らしい！次のレベルへ！';

                setTimeout(() => {
                    level++;
                    nextRound();
                }, 1500);
            }
        }

        // ゲームオーバー
        function gameOver() {
            canPlay = false;
            disableBoard();

            // 間違ったセルを赤く表示
            const wrongCell = gameBoard.children[sequence[playerSequence.length - 1]];
            wrongCell.classList.add('wrong');

            messageEl.innerHTML = `ゲームオーバー！<br>スコア: ${score} | レベル: ${level}`;

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('patternMemoryHighScore', highScore);
                highScoreEl.textContent = highScore;
                messageEl.innerHTML += '<br>🎉 新記録達成！';
            }

            startBtn.disabled = false;
            startBtn.textContent = 'もう一度プレイ';
        }

        // ボードを有効化
        function enableBoard() {
            for (let cell of gameBoard.children) {
                cell.classList.remove('disabled');
            }
        }

        // ボードを無効化
        function disableBoard() {
            for (let cell of gameBoard.children) {
                cell.classList.add('disabled');
            }
        }

        // ステータス更新
        function updateStats() {
            levelEl.textContent = level;
            scoreEl.textContent = score;
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化実行
        init();
        disableBoard();
    </script>
</body>
</html>
