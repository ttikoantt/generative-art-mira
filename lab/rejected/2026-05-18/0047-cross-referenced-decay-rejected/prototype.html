<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cross-Referenced Decay</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#c8c8d0;font-family:monospace;overflow:hidden;height:100vh;width:100vw}#container{width:100%;height:100%;position:relative}svg{width:100%;height:100%;cursor:default}.ref-path{fill:none;stroke:#3a5a7a;stroke-width:1.5;opacity:0.7;transition:opacity 0.8s,stroke-dasharray 0.8s}.ref-path.intact{stroke-dasharray:none;opacity:0.7}.ref-path.damaged{stroke-dasharray:8 4;opacity:0.45}.ref-path.severed{stroke-dasharray:2 6;opacity:0.15}.ref-path.false-ref{stroke:#c43a6a;stroke-dasharray:4 2;opacity:0.8;animation:falsePulse 2s infinite}.node-group{cursor:pointer}.node-circle{fill:#1a1a2e;stroke:#4a6a8a;stroke-width:2;transition:fill 0.3s,stroke 0.3s}.node-circle.corrupt{stroke:#8a4a6a;fill:#1e1a24}.node-circle.revealed{stroke:#6aaa8a;fill:#1a2e1e}.node-text{fill:#888;font-size:10px;opacity:0;pointer-events:none;transition:opacity 0.5s}.node-text.visible{opacity:1}.node-label{fill:#c8c8d0;font-size:11px;text-anchor:middle;pointer-events:none}.false-indicator{fill:#c43a6a;font-size:8px;opacity:0;transition:opacity 0.3s}.false-indicator.has-false{opacity:0.9}@keyframes falsePulse{0%,100%{opacity:0.6}50%{opacity:0.9}}#hud{position:absolute;top:12px;left:12px;background:rgba(10,10,15,0.85);border:1px solid #2a2a3a;padding:10px 14px;border-radius:4px;font-size:11px;line-height:1.6;pointer-events:none;max-width:280px;z-index:10}#hud h2{font-size:13px;color:#7a9aba;margin-bottom:6px;font-weight:normal}#hud .stat{color:#888}#hud .stat span{color:#c8c8d0}#instructions{position:absolute;bottom:12px;left:12px;background:rgba(10,10,15,0.85);border:1px solid #2a2a3a;padding:8px 12px;border-radius:4px;font-size:10px;color:#666;max-width:340px;z-index:10;pointer-events:none;line-height:1.5}#drag-line{stroke:#c43a6a;stroke-width:2;stroke-dasharray:6 3;fill:none;opacity:0.7;pointer-events:none}.node-circle:hover{stroke-width:3;filter:brightness(1.3)}</style></head><body><div id="container"><div id="hud"><h2>Cross-Referenced Decay</h2><div class="stat">Nodes: <span id="stat-nodes">0</span></div><div class="stat">References: <span id="stat-refs">0</span> (intact <span id="stat-intact">0</span> / damaged <span id="stat-damaged">0</span> / severed <span id="stat-severed">0</span>)</div><div class="stat">False refs: <span id="stat-false">0</span></div><div class="stat">Revealed: <span id="stat-revealed">0</span></div></div><div id="instructions">Click node: reveal text, damage connected refs. Drag between nodes: create false reference (corrupts both). State persists in localStorage.</div><svg id="graph" xmlns="http://www.w3.org/2000/svg"><defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><g id="ref-layer"></g><line id="drag-line" x1="0" y1="0" x2="0" y2="0" style="display:none"/><g id="node-layer"></g></svg></div><script>(function(){const DRAFT_ID='cross-ref-decay-20260518';const STORAGE_KEY='mira_lab_'+DRAFT_ID;const TEXT_FRAGMENTS=['Fragment of accession log, March','Partial inventory: 4 crates of silver nitrate','...the final transfer was completed in error','Catalog reference illegible beyond this point','Notice of reclassification filed under seal','Excerpt from correspondence regarding disposal','Index entry: volumes VII through XII missing','...no record of receipt exists in this archive','Cross-reference to series 4.2.1 destroyed','Annotation: see attached damage assessment','Transfer authorization bearing [REDACTED] seal','Partial manifest: items 890-914 unaccounted','Record of inquiry dated [unknown]','Excerpt: ...subsequent loss of supporting documents','Inventory adjustment note for collection fragment','Reference to appendix now separated from binding','...the connecting thread between records is lost','Note regarding chain of custody interruption','Fragment: evidence of systematic removal found','Partial log: entries 44 through 71 excised','Cross-index to [DESTROYED] reference system','Excerpt from decommissioning order','Annotation: original reference pathway degraded'];function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h}return Math.abs(h)}function seededRandom(seed){let s=seed;return function(){s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff}}function generateGraph(){const tsHash=hashStr('2026-05-18T00:47:58+09:00');const rng=seededRandom(tsHash);const count=11+(tsHash%13);const nodes=[];const svg=document.getElementById('graph');const W=window.innerWidth;const H=window.innerHeight;const padding=80;for(let i=0;i<count;i++){const angle=(i/count)*Math.PI*2+rng()*0.5;const r=120+rng()*(Math.min(W,H)*0.3);const cx=W/2+Math.cos(angle)*r;const cy=H/2+Math.sin(angle)*r;const x=Math.max(padding,Math.min(W-padding,cx));const y=Math.max(padding,Math.min(H-padding,cy));nodes.push({id:'n'+i,x:x,y:y,text:TEXT_FRAGMENTS[i%TEXT_FRAGMENTS.length],revealed:false,corrupt:false,falseRefCount:0})}const refs=[];const allPairs=[];for(let i=0;i<count;i++){for(let j=i+1;j<count;j++){allPairs.push([i,j])}}const refCount=Math.floor(allPairs.length*(0.15+rng()*0.25));const shuffled=allPairs.sort(()=>rng()-0.5);for(let i=0;i<refCount;i++){const[a,b]=shuffled[i];refs.push({id:'r'+a+'_'+b,from:a,to:b,integrity:'intact',corruptedAt:null})}return{nodes,refs}}function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)return JSON.parse(raw)}catch(e){}return null}function saveState(state){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}function getDefaultState(){const g=generateGraph();return{draftId:DRAFT_ID,nodes:g.nodes,refs:g.refs,falseRefs:[],createdAt:new Date().toISOString()}}let state=loadState()||getDefaultState();if(!state.draftId||state.draftId!==DRAFT_ID){state=getDefaultState()}const svg=document.getElementById('graph');const refLayer=document.getElementById('ref-layer');const nodeLayer=document.getElementById('node-layer');const dragLine=document.getElementById('drag-line');let dragFrom=null;let isDragging=false;function render(){refLayer.innerHTML='';nodeLayer.innerHTML='';state.refs.forEach(r=>{const fromN=state.nodes[r.from];const toN=state.nodes[r.to];const path=document.createElementNS('http://www.w3.org/2000/svg','path');const mx=(fromN.x+toN.x)/2;const my=(fromN.y+toN.y)/2;const dx=toN.x-fromN.x;const dy=toN.y-fromN.y;const cx=mx-dy*0.15;const cy=my+dx*0.15;path.setAttribute('d',`M${fromN.x},${fromN.y} Q${cx},${cy} ${toN.x},${toN.y}`);path.setAttribute('class','ref-path '+r.integrity);path.setAttribute('data-ref-id',r.id);refLayer.appendChild(path)});state.falseRefs.forEach(fr=>{const fromN=state.nodes[fr.from];const toN=state.nodes[fr.to];const path=document.createElementNS('http://www.w3.org/2000/svg','path');const mx=(fromN.x+toN.x)/2;const dy2=(toN.y-fromN.y);const cx=(fromN.x+toN.x)/2+dy2*0.2;const cy=(fromN.y+toN.y)/2-dy2*0.1;path.setAttribute('d',`M${fromN.x},${fromN.y} Q${cx},${cy} ${toN.x},${toN.y}`);path.setAttribute('class','ref-path false-ref');refLayer.appendChild(path)});state.nodes.forEach((n,i)=>{const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('class','node-group');g.setAttribute('data-node-idx',i);g.setAttribute('transform',`translate(${n.x},${n.y})`);const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');circle.setAttribute('r','28');circle.setAttribute('class','node-circle'+(n.revealed?' revealed':'')+(n.corrupt?' corrupt':''));g.appendChild(circle);const label=document.createElementNS('http://www.w3.org/2000/svg','text');label.setAttribute('class','node-label');label.setAttribute('dy','-4');label.setAttribute('x','0');label.textContent='['+n.id+']';g.appendChild(label);const text=document.createElementNS('http://www.w3.org/2000/svg','text');text.setAttribute('class','node-text'+(n.revealed?' visible':''));text.setAttribute('x','0');text.setAttribute('y','10');text.setAttribute('text-anchor','middle');text.setAttribute('font-size','8');const displayText=n.corrupt?'██ '+n.text.substring(0,20)+'...':n.text;text.textContent=displayText;g.appendChild(text);if(n.falseRefCount>0){const fi=document.createElementNS('http://www.w3.org/2000/svg','text');fi.setAttribute('class','false-indicator has-false');fi.setAttribute('x','18');fi.setAttribute('y','-18');fi.textContent='†'.repeat(Math.min(n.falseRefCount,3));g.appendChild(fi)}nodeLayer.appendChild(g)});updateStats()}function updateStats(){const intact=state.refs.filter(r=>r.integrity==='intact').length;const damaged=state.refs.filter(r=>r.integrity==='damaged').length;const severed=state.refs.filter(r=>r.integrity==='severed').length;const revealed=state.nodes.filter(n=>n.revealed).length;document.getElementById('stat-nodes').textContent=state.nodes.length;document.getElementById('stat-refs').textContent=state.refs.length;document.getElementById('stat-intact').textContent=intact;document.getElementById('stat-damaged').textContent=damaged;document.getElementById('stat-severed').textContent=severed;document.getElementById('stat-false').textContent=state.falseRefs.length;document.getElementById('stat-revealed').textContent=revealed}function getNodeAt(x,y){for(let i=0;i<state.nodes.length;i++){const n=state.nodes[i];const dx=n.x-x;const dy=n.y-y;if(dx*dx+dy*dy<32*32)return i}return-1}function getConnectedRefs(nodeIdx){return state.refs.filter(r=>r.from===nodeIdx||r.to===nodeIdx)}function damageReference(r){if(r.integrity==='intact'){r.integrity='damaged';r.corruptedAt=Date.now()}else if(r.integrity==='damaged'){r.integrity='severed';r.corruptedAt=Date.now()}}function handleNodeClick(nodeIdx){const node=state.nodes[nodeIdx];node.revealed=!node.revealed;if(node.revealed){const refs=getConnectedRefs(nodeIdx);if(refs.length>0){const toDamage=refs[Math.floor(Math.random()*refs.length)];damageReference(toDamage)}}saveState(state);render()}function handleCreateFalseRef(fromIdx,toIdx){if(fromIdx===toIdx)return;const existing=state.falseRefs.find(fr=>(fr.from===fromIdx&&fr.to===toIdx)||(fr.from===toIdx&&fr.to===fromIdx));if(existing)return;state.falseRefs.push({from:fromIdx,to:toIdx,createdAt:Date.now()});state.nodes[fromIdx].corrupt=true;state.nodes[toIdx].corrupt=true;state.nodes[fromIdx].falseRefCount++;state.nodes[toIdx].falseRefCount++;const refsFrom=getConnectedRefs(fromIdx);const refsTo=getConnectedRefs(toIdx);if(refsFrom.length>0)damageReference(refsFrom[0]);if(refsTo.length>0)damageReference(refsTo[0]);saveState(state);render()}function getSVGPoint(e){const rect=svg.getBoundingClientRect();let cx,cy;if(e.touches&&e.touches.length>0){cx=e.touches[0].clientX;cy=e.touches[0].clientY}else if(e.changedTouches&&e.changedTouches.length>0){cx=e.changedTouches[0].clientX;cy=e.changedTouches[0].clientY}else{cx=e.clientX;cy=e.clientY}return{x:cx-rect.left,y:cy-rect.top}}svg.addEventListener('click',function(e){if(isDragging)return;const pt=getSVGPoint(e);const idx=getNodeAt(pt.x,pt.y);if(idx>=0){handleNodeClick(idx)}});let pointerStart=null;let pointerStartNode=-1;svg.addEventListener('pointerdown',function(e){const pt=getSVGPoint(e);const idx=getNodeAt(pt.x,pt.y);if(idx>=0){pointerStart={x:pt.x,y:pt.y};pointerStartNode=idx;dragFrom=state.nodes[idx];e.preventDefault()}});svg.addEventListener('pointermove',function(e){if(!dragFrom)return;const pt=getSVGPoint(e);const dx=pt.x-pointerStart.x;const dy=pt.y-pointerStart.y;if(dx*dx+dy*dy>100)isDragging=true;if(isDragging){dragLine.setAttribute('x1',dragFrom.x);dragLine.setAttribute('y1',dragFrom.y);dragLine.setAttribute('x2',pt.x);dragLine.setAttribute('y2',pt.y);dragLine.style.display='block'}});svg.addEventListener('pointerup',function(e){if(isDragging&&dragFrom){const pt=getSVGPoint(e);const idx=getNodeAt(pt.x,pt.y);if(idx>=0&&idx!==pointerStartNode){handleCreateFalseRef(pointerStartNode,idx)}}dragFrom=null;isDragging=false;pointerStart=null;pointerStartNode=-1;dragLine.style.display='none'});svg.addEventListener('touchstart',function(e){const pt=getSVGPoint(e);const idx=getNodeAt(pt.x,pt.y);if(idx>=0){pointerStart={x:pt.x,y:pt.y};pointerStartNode=idx;dragFrom=state.nodes[idx];e.preventDefault()}},{passive:false});svg.addEventListener('touchmove',function(e){if(!dragFrom)return;const pt=getSVGPoint(e);const dx=pt.x-pointerStart.x;const dy=pt.y-pointerStart.y;if(dx*dx+dy*dy>100)isDragging=true;if(isDragging){dragLine.setAttribute('x1',dragFrom.x);dragLine.setAttribute('y1',dragFrom.y);dragLine.setAttribute('x2',pt.x);dragLine.setAttribute('y2',pt.y);dragLine.style.display='block';e.preventDefault()}},{passive:false});svg.addEventListener('touchend',function(e){if(isDragging&&dragFrom){const pt=getSVGPoint(e);const idx=getNodeAt(pt.x,pt.y);if(idx>=0&&idx!==pointerStartNode){handleCreateFalseRef(pointerStartNode,idx)}}dragFrom=null;isDragging=false;pointerStart=null;pointerStartNode=-1;dragLine.style.display='none'});window.addEventListener('resize',function(){state=getDefaultState();saveState(state);render()});render()})();</script></body></html>
