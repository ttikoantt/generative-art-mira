<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archive Fragment Reassembly</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #151513;
      color: #d8d0bd;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="archive"></canvas>
  <script>
    const canvas = document.getElementById('archive');
    const ctx = canvas.getContext('2d');
    const records = Array.from({ length: 18 }, (_, index) => ({
      id: index,
      x: 0.1 + ((index * 37) % 80) / 100,
      y: 0.12 + ((index * 23) % 76) / 100,
      w: 36 + ((index * 17) % 96),
      h: 10 + ((index * 11) % 34),
      missing: index % 7 === 0,
      locked: false
    }));
    let lastPhase = -1;

    function resize() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function phaseFor(time) {
      return Math.floor((time / 1000) / 10) % 3;
    }

    function mutateForPhase(phase) {
      records.forEach((record, index) => {
        if (phase === 1 && index % 5 === 0) record.missing = true;
        if (phase === 2) {
          record.locked = index % 4 !== 0;
          record.x = 0.16 + (index % 6) * 0.11;
          record.y = 0.22 + Math.floor(index / 6) * 0.16;
        }
      });
    }

    function draw(time) {
      const phase = phaseFor(time);
      if (phase !== lastPhase) {
        mutateForPhase(phase);
        lastPhase = phase;
      }

      ctx.fillStyle = '#151513';
      ctx.fillRect(0, 0, innerWidth, innerHeight);
      ctx.fillStyle = '#a49a82';
      ctx.font = '11px ui-monospace, monospace';
      ctx.fillText('exp-2026-05-17-2000-archive-fragment-reassembly', 18, 24);
      ctx.fillText(phase === 0 ? 'index unresolved' : phase === 1 ? 'record missing' : 'partial order found', 18, 42);

      records.forEach((record, index) => {
        const jitter = phase === 0 && index % 3 === 0 ? ((Math.floor(time / 180) % 2) * 3) : 0;
        const x = Math.round(record.x * innerWidth + jitter);
        const y = Math.round(record.y * innerHeight);
        ctx.strokeStyle = record.missing ? '#403d35' : record.locked ? '#d8d0bd' : '#817867';
        ctx.lineWidth = record.locked ? 1.4 : 1;
        ctx.strokeRect(x, y, record.w, record.h);
        if (record.missing) {
          ctx.fillStyle = '#2a2823';
          ctx.fillRect(x + 4, y + 4, Math.max(6, record.w - 8), 2);
        } else {
          ctx.fillStyle = '#b9af99';
          ctx.fillText(String(record.id).padStart(3, '0'), x + 5, y + Math.min(record.h - 3, 14));
        }
      });

      requestAnimationFrame(draw);
    }

    addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
