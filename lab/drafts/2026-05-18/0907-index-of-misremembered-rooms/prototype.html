<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Index of Misremembered Rooms</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#151513; color:#d8d0bd; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    canvas { display:block; width:100vw; height:100vh; touch-action:none; }
    .meta { position:fixed; left:18px; top:16px; color:#817867; font-size:11px; line-height:1.5; max-width:560px; pointer-events:none; }
    .meta strong { color:#d8d0bd; }
  </style>
</head>
<body>
  <canvas id="map"></canvas>
  <div class="meta"><strong>Index of Misremembered Rooms</strong><br>Index of Misremembered Rooms tests whether archive loss can be felt through irreversible filing decisions instead of decorative particles.<br>Drag through rooms to redraw the custody path.</div>
  <script>
    const key = "mira-lab-index-of-misremembered-rooms-2026-05-18-0907";
    const records = [{"id":"R01","parent":2,"loss":0.942,"x":15.47,"y":44.22},{"id":"R02","parent":2,"loss":0.621,"x":76.94,"y":22.32},{"id":"R03","parent":2,"loss":0.742,"x":35.35,"y":45.86},{"id":"R04","parent":0,"loss":0.283,"x":46.92,"y":77.25},{"id":"R05","parent":1,"loss":0.571,"x":14.34,"y":76.58},{"id":"R06","parent":3,"loss":0.587,"x":56.49,"y":60.8},{"id":"R07","parent":1,"loss":0.558,"x":46.71,"y":14.51},{"id":"R08","parent":2,"loss":0.481,"x":30.25,"y":35.77},{"id":"R09","parent":2,"loss":0.442,"x":40.52,"y":23.16},{"id":"R10","parent":0,"loss":0.433,"x":26.55,"y":65.43},{"id":"R11","parent":2,"loss":0.534,"x":62.02,"y":79.97},{"id":"R12","parent":3,"loss":0.323,"x":44.77,"y":29.81},{"id":"R13","parent":3,"loss":0.641,"x":11.91,"y":48.77},{"id":"R14","parent":1,"loss":0.351,"x":35.14,"y":28.84},{"id":"R15","parent":3,"loss":0.908,"x":69.45,"y":17.96},{"id":"R16","parent":2,"loss":0.193,"x":30.2,"y":62.76},{"id":"R17","parent":3,"loss":0.676,"x":63.12,"y":74.25},{"id":"R18","parent":0,"loss":0.844,"x":30.81,"y":54.81},{"id":"R19","parent":0,"loss":0.159,"x":70.21,"y":79.78},{"id":"R20","parent":0,"loss":0.569,"x":18.99,"y":70.21},{"id":"R21","parent":0,"loss":0.102,"x":33.6,"y":38.58},{"id":"R22","parent":1,"loss":0.775,"x":22.95,"y":23.05}];
    const canvas = document.getElementById('map');
    const ctx = canvas.getContext('2d');
    const state = JSON.parse(localStorage.getItem(key) || '{"moves":0,"path":[],"recovered":[]}');
    let active = false;
    function save(){ localStorage.setItem(key, JSON.stringify(state)); }
    function resize(){
      const dpr = Math.max(1, Math.min(2, devicePixelRatio || 1));
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      draw();
    }
    function affect(x,y){
      let changed = false;
      records.forEach(record => {
        const rx = record.x / 100 * innerWidth;
        const ry = record.y / 100 * innerHeight;
        if (Math.hypot(rx - x, ry - y) < 96 && !state.recovered.includes(record.id)) {
          state.recovered.push(record.id);
          changed = true;
        }
      });
      state.path.push([Math.round(x), Math.round(y)]);
      state.path = state.path.slice(-32);
      if (changed) state.moves += 1;
      save();
      draw();
    }
    function draw(){
      ctx.fillStyle = '#151513';
      ctx.fillRect(0,0,innerWidth,innerHeight);
      ctx.strokeStyle = '#3d382f';
      ctx.lineWidth = 1;
      for (let x=80; x<innerWidth; x+=140) { ctx.beginPath(); ctx.moveTo(x,90); ctx.lineTo(x,innerHeight-40); ctx.stroke(); }
      for (let y=90; y<innerHeight; y+=120) { ctx.beginPath(); ctx.moveTo(40,y); ctx.lineTo(innerWidth-40,y); ctx.stroke(); }
      records.forEach(record => {
        const x = record.x / 100 * innerWidth;
        const y = record.y / 100 * innerHeight;
        const found = state.recovered.includes(record.id);
        ctx.strokeStyle = found ? '#9fb18e' : '#817867';
        ctx.strokeRect(x - 28, y - 12, 56, 24);
        ctx.fillStyle = found ? '#d8d0bd' : '#6f695c';
        ctx.fillText(record.id, x - 18, y + 4);
      });
      if (state.path.length > 1) {
        ctx.strokeStyle = '#b7a36f';
        ctx.lineWidth = 2;
        ctx.beginPath();
        state.path.forEach((point, index) => index ? ctx.lineTo(point[0], point[1]) : ctx.moveTo(point[0], point[1]));
        ctx.stroke();
      }
      ctx.fillStyle = '#817867';
      ctx.fillText(state.moves + ' custody recoveries', 18, innerHeight - 18);
    }
    addEventListener('resize', resize);
    canvas.addEventListener('pointerdown', event => { active = true; affect(event.clientX, event.clientY); });
    canvas.addEventListener('pointermove', event => { if (active) affect(event.clientX, event.clientY); });
    canvas.addEventListener('pointerup', event => { active = false; affect(event.clientX, event.clientY); });
    canvas.addEventListener('click', event => affect(event.clientX, event.clientY));
    resize();
  </script>
</body>
</html>
