<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Custodian Error Register</title>
  <style>
    :root { color-scheme: dark; --bg:#151513; --ink:#d8d0bd; --muted:#817867; --line:#4d463a; --found:#9fb18e; --bad:#6d5146; }
    * { box-sizing:border-box; }
    html, body { margin:0; width:100%; height:100%; background:var(--bg); color:var(--ink); font-family:ui-monospace, SFMono-Regular, Menlo, monospace; overflow:hidden; }
    main { height:100vh; padding:18px; touch-action:none; }
    h1 { margin:0 0 8px; font-size:16px; font-weight:500; }
    p { margin:0 0 16px; color:var(--muted); font-size:11px; max-width:760px; line-height:1.5; }
    table { width:100%; border-collapse:collapse; table-layout:fixed; }
    th, td { border:1px solid var(--line); padding:8px; font-size:12px; text-align:left; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    th { color:var(--muted); font-weight:500; }
    tr { transition: background 140ms linear, transform 140ms linear; cursor:crosshair; }
    tr.missing { color:#716a5b; background:#191815; }
    tr.recovered { background:#20251e; color:#e1e9d5; }
    tr.locked { outline:1px solid var(--found); transform:translateX(8px); }
    #status { position:fixed; right:18px; bottom:16px; font-size:11px; color:var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Custodian Error Register</h1>
    <p>Custodian Error Register tests whether archive loss can be felt through irreversible filing decisions instead of decorative particles. Click or scrub table rows; the register rewrites recovered custody state.</p>
    <table>
      <thead><tr><th>record</th><th>witness</th><th>damage</th><th>current filing</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </main>
  <div id="status">unchanged</div>
  <script>
    const key = "mira-lab-custodian-error-register-2026-05-18-0112";
    const records = [{"id":"R01","parent":3,"loss":0.502,"x":10.16,"y":49.46},{"id":"R02","parent":1,"loss":0.165,"x":45.71,"y":77.91},{"id":"R03","parent":2,"loss":0.163,"x":46.86,"y":79.51},{"id":"R04","parent":3,"loss":0.355,"x":63.32,"y":56.52},{"id":"R05","parent":1,"loss":0.121,"x":71.98,"y":28},{"id":"R06","parent":1,"loss":0.975,"x":44.93,"y":60.49},{"id":"R07","parent":3,"loss":0.574,"x":62.16,"y":70.66},{"id":"R08","parent":3,"loss":0.904,"x":18.75,"y":55.6},{"id":"R09","parent":2,"loss":0.51,"x":11.76,"y":12.4},{"id":"R10","parent":0,"loss":0.622,"x":58.72,"y":33.7},{"id":"R11","parent":3,"loss":0.886,"x":37.23,"y":22.55},{"id":"R12","parent":2,"loss":0.651,"x":63.93,"y":71.21},{"id":"R13","parent":2,"loss":0.179,"x":29.23,"y":62.24},{"id":"R14","parent":3,"loss":0.254,"x":74.31,"y":41.64}];
    const state = JSON.parse(localStorage.getItem(key) || '{"moves":0,"recovered":[],"locked":[]}');
    function save(){ localStorage.setItem(key, JSON.stringify(state)); }
    function alter(id, lock){
      if (!state.recovered.includes(id)) state.recovered.push(id);
      if (lock && !state.locked.includes(id)) state.locked.push(id);
      state.moves += 1;
      save();
      render();
    }
    function render(){
      const rows = document.getElementById('rows');
      rows.innerHTML = '';
      records.forEach((record, index) => {
        const tr = document.createElement('tr');
        tr.dataset.id = record.id;
        tr.className = (record.loss > 0.58 ? 'missing ' : '') + (state.recovered.includes(record.id) ? 'recovered ' : '') + (state.locked.includes(record.id) ? 'locked' : '');
        tr.innerHTML = '<td>' + record.id + '</td><td>witness-' + record.parent + '</td><td>' + Math.round(record.loss * 100) + '%</td><td>' + (state.locked.includes(record.id) ? 'locked' : state.recovered.includes(record.id) ? 'recovered' : 'misfiled') + '</td>';
        rows.appendChild(tr);
      });
      document.getElementById('status').textContent = state.moves + ' table rewrites / ' + state.recovered.length + ' recovered';
    }
    document.addEventListener('pointerdown', event => {
      const row = event.target.closest('tr[data-id]');
      if (row) alter(row.dataset.id, event.clientX > innerWidth * 0.7);
    });
    document.addEventListener('pointermove', event => {
      const row = event.target.closest('tr[data-id]');
      if (row && event.buttons) alter(row.dataset.id, event.clientY % 2 > 1);
    });
    document.addEventListener('pointerup', event => {
      const row = event.target.closest('tr[data-id]');
      if (row) row.classList.add('locked');
    });
    document.addEventListener('click', event => {
      const row = event.target.closest('tr[data-id]');
      if (row) alter(row.dataset.id, true);
    });
    render();
  </script>
</body>
</html>
