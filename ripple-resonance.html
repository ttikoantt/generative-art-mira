<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>波紋の共鳴 - Ripple Resonance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Click or tap to create ripples</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let ripples = [];
        let autoCreateTimer = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.6;
                this.speed = 2 + Math.random() * 2;
                this.hue = Math.random() * 360;
                this.lineWidth = 2 + Math.random() * 2;
                this.opacity = 0.8;
                this.decay = 0.003 + Math.random() * 0.002;
            }

            update() {
                this.radius += this.speed;
                this.opacity -= this.decay;
                this.hue += 0.2;
            }

            draw() {
                if (this.opacity <= 0) return;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, ${this.opacity})`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // 第二の波（細い）
                if (this.radius > 20) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 15, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue + 30}, 80%, 50%, ${this.opacity * 0.5})`;
                    ctx.lineWidth = this.lineWidth * 0.5;
                    ctx.stroke();
                }

                // 第三の波（さらに細い）
                if (this.radius > 40) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 30, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue + 60}, 90%, 40%, ${this.opacity * 0.3})`;
                    ctx.lineWidth = this.lineWidth * 0.3;
                    ctx.stroke();
                }
            }

            isDead() {
                return this.opacity <= 0;
            }
        }

        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));

            // 同時に小さな波紋も追加
            if (Math.random() > 0.5) {
                setTimeout(() => {
                    const offsetX = (Math.random() - 0.5) * 100;
                    const offsetY = (Math.random() - 0.5) * 100;
                    ripples.push(new Ripple(x + offsetX, y + offsetY));
                }, 100);
            }
        }

        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                createRipple(touch.clientX, touch.clientY);
            }
        });

        function animate() {
            // 黒背景でフェード（残像効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 波紋を更新・描画
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            // 自動生成（時々）
            autoCreateTimer++;
            if (autoCreateTimer > 120 && ripples.length < 15) {
                if (Math.random() > 0.98) {
                    createRipple(
                        Math.random() * width,
                        Math.random() * height
                    );
                    autoCreateTimer = 0;
                }
            }

            requestAnimationFrame(animate);
        }

        // 初期の波紋をいくつか作成
        setTimeout(() => createRipple(width / 2, height / 2), 500);
        setTimeout(() => createRipple(width / 3, height / 3), 1000);
        setTimeout(() => createRipple(width * 2/3, height * 2/3), 1500);

        animate();

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
