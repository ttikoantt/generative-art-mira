<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>光の庭 - Garden of Light v3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .waveform-selector {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .waveform-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .waveform-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .waveform-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .waveform-info {
            position: fixed;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            text-align: center;
            pointer-events: none;
        }

        .stats {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .waveform-selector {
                bottom: 60px;
                flex-wrap: wrap;
                justify-content: center;
                max-width: 90vw;
            }

            .waveform-btn {
                padding: 8px 16px;
                font-size: 0.75rem;
            }

            .waveform-info {
                bottom: 110px;
                font-size: 0.7rem;
            }

            .start-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="info">🌸 タップすると光と音が広がります</div>
    <div class="waveform-info">現在の波形: <span id="waveformName">サイン波</span></div>
    <div class="waveform-selector">
        <button class="waveform-btn active" data-wave="sine">サイン波</button>
        <button class="waveform-btn" data-wave="sawtooth">ノコギリ波</button>
        <button class="waveform-btn" data-wave="triangle">三角波</button>
        <button class="waveform-btn" data-wave="square">矩形波</button>
    </div>
    <div class="stats">Ripples: <span id="rippleCount">0</span></div>
    <button class="start-btn" id="startBtn">🎵 音をオンにする</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const rippleCountEl = document.getElementById('rippleCount');
        const waveformNameEl = document.getElementById('waveformName');
        const startBtn = document.getElementById('startBtn');
        const waveformBtns = document.querySelectorAll('.waveform-btn');

        let width, height;
        let ripples = [];
        let hue = 0;
        let audioCtx = null;
        let audioEnabled = false;
        let currentWaveform = 'sine';

        // Waveform display names
        const waveformNames = {
            sine: 'サイン波（柔らかい）',
            sawtooth: 'ノコギリ波（鋭い）',
            triangle: '三角波（温かい）',
            square: '矩形波（レトロ）'
        };

        // Musical scales (pentatonic for harmony)
        const pentatonicScale = [
            261.63,  // C4
            293.66,  // D4
            329.63,  // E4
            392.00,  // G4
            440.00,  // A4
            523.25,  // C5
            587.33,  // D5
            659.25,  // E5
            783.99,  // G5
            880.00   // A5
        ];

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioEnabled = true;
            startBtn.style.display = 'none';
        }

        function playNote(hue, waveform) {
            if (!audioEnabled || !audioCtx) return;

            // Map hue to scale note
            const noteIndex = Math.floor((hue % 360) / 36) % pentatonicScale.length;
            const frequency = pentatonicScale[noteIndex];

            // Create oscillator
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = waveform;
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // Envelope - adjust for different waveforms
            let maxGain = 0.3;
            let decayTime = 1;

            if (waveform === 'square') {
                maxGain = 0.15;  // Square is louder
                decayTime = 0.5;
            } else if (waveform === 'sawtooth') {
                maxGain = 0.2;   // Sawtooth is bright
                decayTime = 0.7;
            } else if (waveform === 'triangle') {
                maxGain = 0.25;
                decayTime = 0.8;
            }

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(maxGain, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + decayTime);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + decayTime);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Ripple {
            constructor(x, y, waveform) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.hue = hue % 360;
                this.alpha = 1;
                this.waveform = waveform;
                this.speed = 3;
                hue += 30;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;

                // Adjust visual style based on waveform
                let saturation = 80;
                let lightness = 60;
                let innerRatio = 0.7;
                let outerRatio = 1.1;
                let lineWidth = 2;

                if (this.waveform === 'square') {
                    // Square: sharper, more geometric
                    innerRatio = 0.65;
                    outerRatio = 1.15;
                    lineWidth = 3;
                    lightness = 70;
                } else if (this.waveform === 'sawtooth') {
                    // Sawtooth: more intense
                    saturation = 90;
                    lightness = 55;
                    innerRatio = 0.75;
                    lineWidth = 1;
                } else if (this.waveform === 'triangle') {
                    // Triangle: softer
                    saturation = 70;
                    lightness = 65;
                    innerRatio = 0.72;
                }

                // Glow effect
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );

                gradient.addColorStop(0, `hsla(${this.hue}, ${saturation}%, ${lightness}%, 0)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, ${saturation}%, ${lightness}%, 0.3)`);
                gradient.addColorStop(1, `hsla(${this.hue}, ${saturation}%, ${lightness}%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // Inner circle
                ctx.strokeStyle = `hsla(${this.hue}, ${saturation}%, ${lightness + 10}%, ${this.alpha * 0.8})`;
                ctx.lineWidth = lineWidth;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * innerRatio, 0, Math.PI * 2);
                ctx.stroke();

                // Outer glow ring
                ctx.strokeStyle = `hsla(${this.hue}, ${saturation}%, ${lightness - 10}%, ${this.alpha * 0.3})`;
                ctx.lineWidth = lineWidth + 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * outerRatio, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        function addRipple(x, y) {
            const ripple = new Ripple(x, y, currentWaveform);
            ripples.push(ripple);
            playNote(ripple.hue, currentWaveform);

            if (ripples.length > 50) {
                ripples.shift();
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            rippleCountEl.textContent = ripples.length;

            requestAnimationFrame(animate);
        }

        // Waveform selection
        waveformBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                waveformBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentWaveform = e.target.dataset.wave;
                waveformNameEl.textContent = waveformNames[currentWaveform];
            });
        });

        // Mouse/Touch events
        canvas.addEventListener('click', (e) => {
            addRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                addRipple(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        // Start button
        startBtn.addEventListener('click', initAudio);

        // Auto ripple
        setInterval(() => {
            if (ripples.length < 3) {
                addRipple(
                    Math.random() * width,
                    Math.random() * height
                );
            }
        }, 2000);

        // Start
        animate();
    </script>
</body>
</html>
