<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Wave Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 20px;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        canvas {
            width: 100%;
            max-width: 900px;
            height: 400px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0, 217, 255, 0.2),
                        0 0 100px rgba(0, 255, 136, 0.1);
            background: rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 217, 255, 0.6);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .mode-selector {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            box-shadow: none;
        }

        .mode-btn.active {
            background: linear-gradient(45deg, #00d9ff, #00ff88);
            color: #000;
            border-color: transparent;
        }

        .mode-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
        }

        .info {
            margin-top: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            box-shadow: none;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            canvas {
                height: 300px;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>

    <div class="container">
        <h1>🎵 Audio Wave Visualizer</h1>
        <canvas id="visualizer"></canvas>

        <div class="controls">
            <button id="micBtn">🎤 マイク開始</button>
            <button id="demoBtn" disabled>🎵 デモ音声</button>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="wave">🌊 波形</button>
            <button class="mode-btn" data-mode="bars">📊 バー</button>
            <button class="mode-btn" data-mode="circle">⭕ 円形</button>
            <button class="mode-btn" data-mode="particles">✨ パーティクル</button>
        </div>

        <p class="info">マイクまたはデモ音声で美しいビジュアライゼーションを楽しもう</p>
    </div>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const micBtn = document.getElementById('micBtn');
        const demoBtn = document.getElementById('demoBtn');
        const modeBtns = document.querySelectorAll('.mode-btn');

        let audioContext;
        let analyser;
        let dataArray;
        let bufferLength;
        let source;
        let animationId;
        let currentMode = 'wave';
        let particles = [];
        let hue = 0;

        // Canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mode selection
        modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                particles = [];
            });
        });

        // Initialize Audio Context
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }

        // Microphone input
        micBtn.addEventListener('click', async () => {
            try {
                if (!audioContext) initAudio();

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                if (source) source.disconnect();
                source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);

                micBtn.textContent = '🎤 マイクON';
                demoBtn.disabled = true;

                visualize();
            } catch (err) {
                alert('マイクへのアクセスが許可されていません');
                console.error(err);
            }
        });

        // Demo audio
        demoBtn.addEventListener('click', () => {
            if (!audioContext) initAudio();

            if (source) source.disconnect();

            // Create oscillator for demo
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(analyser);
            gainNode.connect(audioContext.destination);

            // Musical sequence
            const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
            let noteIndex = 0;

            function playNote() {
                oscillator.frequency.setValueAtTime(notes[noteIndex], audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

                noteIndex = (noteIndex + 1) % notes.length;
                setTimeout(playNote, 300);
            }

            oscillator.type = 'sine';
            source = gainNode;
            oscillator.start();
            playNote();

            micBtn.disabled = true;
            visualize();
        });

        // Visualization
        function visualize() {
            if (animationId) cancelAnimationFrame(animationId);

            function draw() {
                animationId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);

                const width = canvas.width / window.devicePixelRatio;
                const height = canvas.height / window.devicePixelRatio;

                // Clear with fade effect
                ctx.fillStyle = 'rgba(10, 10, 10, 0.2)';
                ctx.fillRect(0, 0, width, height);

                hue = (hue + 0.5) % 360;

                switch(currentMode) {
                    case 'wave':
                        drawWave(width, height);
                        break;
                    case 'bars':
                        drawBars(width, height);
                        break;
                    case 'circle':
                        drawCircle(width, height);
                        break;
                    case 'particles':
                        drawParticles(width, height);
                        break;
                }
            }

            draw();
        }

        // Wave mode
        function drawWave(width, height) {
            analyser.getByteTimeDomainData(dataArray);

            ctx.lineWidth = 3;
            ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctx.shadowBlur = 20;

            ctx.beginPath();

            const sliceWidth = width / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * height) / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.lineTo(width, height / 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Bars mode
        function drawBars(width, height) {
            const barWidth = (width / bufferLength) * 2.5;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = (dataArray[i] / 255) * height * 0.8;

                const gradient = ctx.createLinearGradient(0, height - barHeight, 0, height);
                gradient.addColorStop(0, `hsl(${(hue + i) % 360}, 100%, 60%)`);
                gradient.addColorStop(1, `hsl(${(hue + i + 60) % 360}, 100%, 40%)`);

                ctx.fillStyle = gradient;
                ctx.shadowColor = `hsl(${(hue + i) % 360}, 100%, 50%)`;
                ctx.shadowBlur = 15;

                ctx.fillRect(x, height - barHeight, barWidth - 2, barHeight);
                ctx.shadowBlur = 0;

                x += barWidth;
            }
        }

        // Circle mode
        function drawCircle(width, height) {
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.25;

            for (let i = 0; i < bufferLength; i++) {
                const angle = (i / bufferLength) * Math.PI * 2;
                const amplitude = (dataArray[i] / 255) * radius;

                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + amplitude);
                const y2 = centerY + Math.sin(angle) * (radius + amplitude);

                ctx.strokeStyle = `hsl(${(hue + i * 2) % 360}, 100%, 50%)`;
                ctx.lineWidth = 2;
                ctx.shadowColor = `hsl(${(hue + i * 2) % 360}, 100%, 50%)`;
                ctx.shadowBlur = 10;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
        }

        // Particles mode
        function drawParticles(width, height) {
            const avgFrequency = dataArray.reduce((a, b) => a + b, 0) / bufferLength;
            const intensity = avgFrequency / 255;

            // Spawn particles based on audio intensity
            if (intensity > 0.3) {
                for (let i = 0; i < Math.floor(intensity * 5); i++) {
                    particles.push({
                        x: width / 2,
                        y: height / 2,
                        vx: (Math.random() - 0.5) * intensity * 10,
                        vy: (Math.random() - 0.5) * intensity * 10,
                        size: Math.random() * 5 + 2,
                        color: `hsl(${(hue + Math.random() * 60) % 360}, 100%, 50%)`,
                        life: 1
                    });
                }
            }

            // Update and draw particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.01;
                p.size *= 0.99;

                if (p.life > 0) {
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 15;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    ctx.shadowBlur = 0;
                    return true;
                }
                return false;
            });

            // Limit particles
            if (particles.length > 500) {
                particles = particles.slice(-500);
            }
        }

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
