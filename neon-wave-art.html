<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Wave Art - ネオン波アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 15px 20px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            font-family: inherit;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: scale(0.95);
        }

        #canvas {
            max-width: 100%;
            max-height: 100vh;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            z-index: 200;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .title {
                font-size: 1rem;
            }
            button {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🌊 Neon Wave Art</div>
        <div class="controls">
            <button onclick="changeColorScheme()">色変更</button>
            <button onclick="toggleSpeed()">速度変更</button>
        </div>
    </div>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;
        let speed = 1;
        let colorScheme = 0;

        const colorSchemes = [
            // ネオンブルー〜パープル
            ['#00ffff', '#0080ff', '#8000ff', '#ff00ff'],
            // ネオンピンク〜オレンジ
            ['#ff0066', '#ff3399', '#ff66cc', '#ff99ff'],
            // ネオングリーン〜シアン
            ['#00ff88', '#00ffcc', '#00ffff', '#00ccff'],
            // ネオンレッド〜イエロー
            ['#ff0044', '#ff4400', '#ff8800', '#ffcc00']
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        function getColor(intensity) {
            const scheme = colorSchemes[colorScheme];
            const index = Math.floor(intensity * scheme.length) % scheme.length;
            return scheme[index];
        }

        function drawWave(yOffset, frequency, amplitude, phase) {
            ctx.beginPath();
            ctx.moveTo(0, height / 2);

            for (let x = 0; x < width; x++) {
                const y = height / 2 + yOffset +
                    Math.sin(x * frequency + phase + time * speed) * amplitude +
                    Math.sin(x * frequency * 2 + phase * 1.5 + time * speed * 1.3) * amplitude * 0.5;
                ctx.lineTo(x, y);
            }

            const gradient = ctx.createLinearGradient(0, 0, width, 0);
            const scheme = colorSchemes[colorScheme];
            scheme.forEach((color, i) => {
                gradient.addColorStop(i / (scheme.length - 1), color);
            });

            ctx.strokeStyle = gradient;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = getColor(Math.abs(Math.sin(time * 0.5)));
            ctx.stroke();
        }

        function draw() {
            // 半透明の黒でフェード効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 複数の波を描画
            const numWaves = 5;
            for (let i = 0; i < numWaves; i++) {
                const yOffset = (i - numWaves / 2) * 40;
                const frequency = 0.005 + i * 0.002;
                const amplitude = 50 + i * 20;
                const phase = i * Math.PI / 4;
                drawWave(yOffset, frequency, amplitude, phase);
            }

            time += 0.03;
            requestAnimationFrame(draw);
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        }

        function toggleSpeed() {
            speed = speed === 1 ? 2 : speed === 2 ? 0.5 : 1;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチ操作サポート
        let touchStartX = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchEndX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    changeColorScheme();
                } else {
                    toggleSpeed();
                }
            }
        });

        draw();
    </script>
</body>
</html>
