<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petals in the Wind - 風に舞う花びら</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            height: 100vh;
        }

        h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.5);
            text-align: center;
        }

        .subtitle {
            color: #ffb6c1;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
        }

        #canvas {
            border: 2px solid rgba(255, 182, 193, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 182, 193, 0.2);
            max-width: 100%;
            cursor: pointer;
        }

        .info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            margin-top: 15px;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.8rem;
            }

            #canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Petals in the Wind 🌸</h1>
        <p class="subtitle">風に舞う花びら - マウスで風を起こそう</p>

        <canvas id="canvas" width="800" height="600"></canvas>

        <p class="info">マウスをドラッグして風を起こしてください</p>

        <div class="controls">
            <button class="btn" onclick="resetWind()">風をリセット</button>
            <button class="btn" onclick="toggleAutoWind()">自動風: <span id="autoWindStatus">ON</span></button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // 花びらの色パレット（桜色）
        const PETAL_COLORS = [
            'rgba(255, 182, 193, 0.8)',   // Light pink
            'rgba(255, 192, 203, 0.8)',   // Pink
            'rgba(255, 160, 180, 0.8)',   // Deep pink
            'rgba(255, 200, 210, 0.8)',   // Pale pink
            'rgba(255, 170, 190, 0.8)'    // Rose
        ];

        // 花びらクラス
        class Petal {
            constructor() {
                this.reset();
                this.y = Math.random() * canvas.height; // 初期位置はランダム
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.size = Math.random() * 8 + 4;
                this.color = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
                this.speedX = 0;
                this.speedY = Math.random() * 0.5 + 0.3;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.swayPhase = Math.random() * Math.PI * 2;
                this.swaySpeed = Math.random() * 0.02 + 0.01;
            }

            update(windX, windY) {
                // 風の影響
                this.speedX += windX * 0.01;
                this.speedY += windY * 0.01;

                // 自然な揺れ
                this.swayPhase += this.swaySpeed;
                this.x += Math.sin(this.swayPhase) * 0.3;

                // 速度を適用
                this.x += this.speedX;
                this.y += this.speedY;

                // 回転
                this.rotation += this.rotationSpeed;

                // 空気抵抗
                this.speedX *= 0.99;
                this.speedY *= 0.99;

                // 重力
                this.speedY += 0.02;

                // 画面外に出たらリセット
                if (this.y > canvas.height + 50 || this.x < -50 || this.x > canvas.width + 50) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 花びらの形
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.bezierCurveTo(
                    this.size, -this.size / 2,
                    this.size, this.size / 2,
                    0, this.size
                );
                ctx.bezierCurveTo(
                    -this.size, this.size / 2,
                    -this.size, -this.size / 2,
                    0, -this.size
                );

                ctx.fillStyle = this.color;
                ctx.fill();

                // 光沢
                ctx.beginPath();
                ctx.ellipse(-this.size / 4, -this.size / 4, this.size / 4, this.size / 6, Math.PI / 4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();

                ctx.restore();
            }
        }

        // 花びらを作成
        const petals = [];
        const PETAL_COUNT = 80;

        for (let i = 0; i < PETAL_COUNT; i++) {
            petals.push(new Petal());
        }

        // 風システム
        let windX = 0;
        let windY = 0;
        let autoWind = true;
        let autoWindTime = 0;

        // マウス操作
        let isMouseDown = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            const rect = canvas.getBoundingClientRect();
            lastMouseX = e.clientX - rect.left;
            lastMouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isMouseDown) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                // 風を起こす
                const dx = mouseX - lastMouseX;
                const dy = mouseY - lastMouseY;

                windX += dx * 0.05;
                windY += dy * 0.05;

                // 風の強さを制限
                windX = Math.max(-10, Math.min(10, windX));
                windY = Math.max(-10, Math.min(10, windY));

                lastMouseX = mouseX;
                lastMouseY = mouseY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            lastMouseX = touch.clientX - rect.left;
            lastMouseY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isMouseDown) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const mouseX = touch.clientX - rect.left;
                const mouseY = touch.clientY - rect.top;

                const dx = mouseX - lastMouseX;
                const dy = mouseY - lastMouseY;

                windX += dx * 0.05;
                windY += dy * 0.05;

                windX = Math.max(-10, Math.min(10, windX));
                windY = Math.max(-10, Math.min(10, windY));

                lastMouseX = mouseX;
                lastMouseY = mouseY;
            }
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        function resetWind() {
            windX = 0;
            windY = 0;
        }

        function toggleAutoWind() {
            autoWind = !autoWind;
            document.getElementById('autoWindStatus').textContent = autoWind ? 'ON' : 'OFF';
        }

        // 背景を描画
        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星を描画
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(i * 567) * 0.5 + 0.5) * canvas.width;
                const y = (Math.cos(i * 321) * 0.5 + 0.5) * canvas.height;
                const size = (Math.sin(i * 123) * 0.5 + 0.5) * 1.5 + 0.5;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // メインループ
        function animate() {
            drawBackground();

            // 自動風
            if (autoWind) {
                autoWindTime += 0.01;
                windX += Math.sin(autoWindTime) * 0.02;
                windY += Math.cos(autoWindTime * 1.3) * 0.01;
            }

            // 風を減衰
            windX *= 0.995;
            windY *= 0.995;

            // 花びらを更新・描画
            petals.forEach(petal => {
                petal.update(windX, windY);
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
