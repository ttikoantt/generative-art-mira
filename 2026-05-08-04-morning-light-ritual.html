<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Light Ritual - 朝の光の儀式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            pointer-events: none;
            z-index: 100;
            text-shadow: 0 2px 20px rgba(255, 200, 100, 0.8);
        }
    </style>
</head>
<body>
    <div class="title">MORNING LIGHT RITUAL</div>
    <div class="info">クリックで光を放つ　　Touch to create light</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let suns = [];
        let startTime = Date.now();
        let particleCount = 0;

        // 朝のカラーパレット
        const morningColors = [
            { r: 255, g: 200, b: 100 },  // 朝陽のオレンジ
            { r: 255, g: 180, b: 150 },  // 桜色
            { r: 255, g: 220, b: 180 },  // クリーム色
            { r: 255, g: 240, b: 200 },  // 白に近い黄色
            { r: 200, g: 220, b: 255 },  // 朝空の薄い青
            { r: 255, g: 255, b: 200 },  // 淡い黄色
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // 光の粒子クラス
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = 2 + Math.random() * 3;
                this.baseRadius = this.radius;
                this.life = 1;
                this.decay = 0.002 + Math.random() * 0.003;
                this.color = morningColors[Math.floor(Math.random() * morningColors.length)];
                this.trail = [];
                this.maxTrail = 8;
            }

            update() {
                // 位置を更新
                this.x += this.vx;
                this.y += this.vy;

                // 摩擦
                this.vx *= 0.99;
                this.vy *= 0.99;

                // 重力（少し上に漂う）
                this.vy -= 0.02;

                // トレイルを記録
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // ライフを減少
                this.life -= this.decay;

                // 画面外に出たら反射
                if (this.x < 0 || this.x > width) this.vx *= -0.8;
                if (this.y < 0 || this.y > height) this.vy *= -0.8;
            }

            draw() {
                const alpha = this.life;

                // トレイルを描画
                ctx.save();
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = 0; i < this.trail.length - 1; i++) {
                    const t = i / this.trail.length;
                    const trailAlpha = alpha * t * 0.5;
                    const trailWidth = this.radius * t;

                    ctx.beginPath();
                    ctx.moveTo(this.trail[i].x, this.trail[i].y);
                    ctx.lineTo(this.trail[i + 1].x, this.trail[i + 1].y);
                    ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${trailAlpha})`;
                    ctx.lineWidth = trailWidth;
                    ctx.stroke();
                }
                ctx.restore();

                // メインの粒子を描画
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';

                // グロー効果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 4
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
                ctx.fill();

                // 中心の明るい部分
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // 朝陽クラス
        class Sun {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.targetRadius = 50 + Math.random() * 30;
                this.life = 1;
                this.decay = 0.001;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.color = morningColors[Math.floor(Math.random() * 3)]; // オレンジ系
            }

            update() {
                // 半径を成長
                this.radius += (this.targetRadius - this.radius) * 0.02;

                // パルス
                this.pulsePhase += 0.03;

                // ライフを減少
                this.life -= this.decay;
            }

            draw() {
                const alpha = this.life;
                const pulse = Math.sin(this.pulsePhase) * 5;

                ctx.save();
                ctx.globalCompositeOperation = 'lighter';

                // 外側の光
                for (let i = 3; i >= 0; i--) {
                    const r = (this.radius + pulse) * (1 + i * 0.5);
                    const gradientAlpha = alpha * (0.3 - i * 0.07);

                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, r
                    );
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${gradientAlpha})`);
                    gradient.addColorStop(1, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, 0)`);

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 中心
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.8, 0, Math.PI * 2);
                ctx.fill();

                // 光線
                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`;
                ctx.lineWidth = 2;

                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2 + this.pulsePhase * 0.5;
                    const innerR = this.radius;
                    const outerR = this.radius * (1.5 + Math.sin(this.pulsePhase + i) * 0.3);

                    ctx.beginPath();
                    ctx.moveTo(
                        this.x + Math.cos(angle) * innerR,
                        this.y + Math.sin(angle) * innerR
                    );
                    ctx.lineTo(
                        this.x + Math.cos(angle) * outerR,
                        this.y + Math.sin(angle) * outerR
                    );
                    ctx.stroke();
                }

                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // 背景グラデーションを描画
        function drawBackground() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / 60000, 1); // 60秒で完全な朝に

            // 夜明けのグラデーション
            const topColor = {
                r: Math.floor(20 + progress * 135),
                g: Math.floor(20 + progress * 180),
                b: Math.floor(40 + progress * 215)
            };

            const bottomColor = {
                r: Math.floor(10 + progress * 255),
                g: Math.floor(10 + progress * 200),
                b: Math.floor(30 + progress * 150)
            };

            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, `rgb(${topColor.r}, ${topColor.g}, ${topColor.b})`);
            gradient.addColorStop(1, `rgb(${bottomColor.r}, ${bottomColor.g}, ${bottomColor.b})`);

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 早朝の雰囲気を追加
            if (progress < 1) {
                ctx.fillStyle = `rgba(100, 80, 120, ${0.1 * (1 - progress)})`;
                ctx.fillRect(0, 0, width, height);
            }
        }

        // パーティクル同士の引力
        function attractParticles() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[j].x - particles[i].x;
                    const dy = particles[j].y - particles[i].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 100 && dist > 10) {
                        const force = 0.02 * (1 - dist / 100);
                        const fx = (dx / dist) * force;
                        const fy = (dy / dist) * force;

                        particles[i].vx += fx;
                        particles[i].vy += fy;
                        particles[j].vx -= fx;
                        particles[j].vy -= fy;
                    }
                }
            }
        }

        // クリック/タップでパーティクルを追加
        function addParticles(x, y, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
            particleCount += count;

            // 50個ごとに朝陽を出現
            if (particleCount >= 50) {
                suns.push(new Sun(x, y));
                particleCount = 0;
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            addParticles(e.clientX, e.clientY, 15);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (const touch of e.touches) {
                addParticles(touch.clientX, touch.clientY, 10);
            }
        });

        // マウス移動で微量のパーティクル
        let lastMouseX = 0, lastMouseY = 0;
        canvas.addEventListener('mousemove', (e) => {
            if (Math.random() < 0.3) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        // メインループ
        function animate() {
            // 背景を描画
            drawBackground();

            // パーティクル同士の引力
            if (particles.length > 0) {
                attractParticles();
            }

            // パーティクルを更新・描画
            particles = particles.filter(p => !p.isDead());
            for (const p of particles) {
                p.update();
                p.draw();
            }

            // 朝陽を更新・描画
            suns = suns.filter(s => !s.isDead());
            for (const sun of suns) {
                sun.update();
                sun.draw();
            }

            requestAnimationFrame(animate);
        }

        // 開始時に少しパーティクルを出す
        setTimeout(() => {
            addParticles(width * 0.5, height * 0.3, 20);
        }, 1000);

        // アニメーション開始
        animate();
    </script>
</body>
</html>
