<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>風に揺れるフラクタル樹木</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a1628 0%, #1a3a5c 50%, #2d5a3d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 100%;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            margin-bottom: 20px;
        }

        canvas {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 100%;
            height: auto;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            canvas {
                max-height: 60vh;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌳 風に揺れるフラクタル樹木</h1>
        <p class="subtitle">風の強さ: <span id="wind-strength">1.0</span></p>
        <canvas id="canvas" width="800" height="600"></canvas>
        <div class="controls">
            <button onclick="changeWind()">風を変える</button>
            <button onclick="changeSeason()">季節を変える</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let windStrength = 1.0;
        let time = 0;
        let season = 0; // 0: 春, 1: 夏, 2: 秋, 3: 冬

        const seasons = [
            { name: '春', leafColor: [255, 182, 193], sky: ['#0a1628', '#1a3a5c', '#2d5a3d'] },
            { name: '夏', leafColor: [34, 139, 34], sky: ['#0a1628', '#1a3a5c', '#2d5a3d'] },
            { name: '秋', leafColor: [255, 140, 0], sky: ['#0a1628', '#1a3a5c', '#5a4a3d'] },
            { name: '冬', leafColor: [255, 255, 255], sky: ['#0a1628', '#1a3a5c', '#3d3d5a'] }
        ];

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const ratio = canvas.height / canvas.width;
            canvas.style.width = maxWidth + 'px';
            canvas.style.height = (maxWidth * ratio) + 'px';
        }

        function drawTree(x, y, len, angle, depth) {
            if (depth === 0) {
                // 葉を描画
                const currentSeason = seasons[season];
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${currentSeason.leafColor[0]}, ${currentSeason.leafColor[1]}, ${currentSeason.leafColor[2]}, 0.8)`;
                ctx.fill();
                return;
            }

            const endX = x + len * Math.cos(angle);
            const endY = y + len * Math.sin(angle);

            // 枝を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = `rgba(101, 67, 33, ${0.4 + depth * 0.1})`;
            ctx.lineWidth = depth * 1.5;
            ctx.stroke();

            // 風の影響
            const windEffect = Math.sin(time * 0.02 + depth * 0.5) * windStrength * 0.1;
            const angleOffset = windEffect / depth;

            // 再帰的に描画
            const newLen = len * 0.7;
            const angle1 = angle - 0.4 + angleOffset;
            const angle2 = angle + 0.4 + angleOffset;

            drawTree(endX, endY, newLen, angle1, depth - 1);
            drawTree(endX, endY, newLen, angle2, depth - 1);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 地面を描画
            ctx.fillStyle = seasons[season].sky[2];
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // 樹木を描画
            const startX = canvas.width / 2;
            const startY = canvas.height - 50;
            const initialLen = 100;
            const initialAngle = -Math.PI / 2;
            const maxDepth = 9;

            drawTree(startX, startY, initialLen, initialAngle, maxDepth);

            time++;
            requestAnimationFrame(draw);
        }

        function changeWind() {
            windStrength = Math.random() * 2 + 0.5;
            document.getElementById('wind-strength').textContent = windStrength.toFixed(1);
        }

        function changeSeason() {
            season = (season + 1) % 4;
            const currentSeason = seasons[season];

            // 背景グラデーションを更新
            document.body.style.background = `linear-gradient(to bottom, ${currentSeason.sky[0]} 0%, ${currentSeason.sky[1]} 50%, ${currentSeason.sky[2]} 100%)`;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        draw();
    </script>
</body>
</html>
