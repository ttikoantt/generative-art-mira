<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Serenity Waves</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0a1a;
        }
        canvas {
            display: block;
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="info">
        <div>Morning Serenity Waves</div>
        <div>Move mouse to create ripples</div>
        <div>Click to change color theme</div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const waves = [];
        const WAVE_COUNT = 15;
        const POINTS_PER_WAVE = 100;

        // Color themes - morning-inspired palettes
        const themes = [
            { // Dawn
                primary: [255, 140, 150],
                secondary: [255, 200, 150],
                bg: '#1a0a1a'
            },
            { // Morning Sky
                primary: [135, 206, 250],
                secondary: [255, 218, 185],
                bg: '#0a1a2a'
            },
            { // Serenity
                primary: [176, 224, 230],
                secondary: [255, 255, 224],
                bg: '#0a0a1a'
            },
            { // Aurora
                primary: [138, 43, 226],
                secondary: [0, 255, 127],
                bg: '#0a0a2a'
            },
            { // Sunrise
                primary: [255, 99, 71],
                secondary: [255, 215, 0],
                bg: '#1a1a0a'
            }
        ];

        let currentTheme = 0;
        let mouse = { x: width / 2, y: height / 2 };
        let targetMouse = { x: width / 2, y: height / 2 };
        let time = 0;

        class WavePoint {
            constructor(x, y, waveIndex) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.waveIndex = waveIndex;
                this.phase = (x / width) * Math.PI * 2;
                this.amplitude = 20 + Math.random() * 30;
                this.frequency = 0.01 + Math.random() * 0.02;
                this.phaseSpeed = 0.02 + Math.random() * 0.03;
            }

            update(mouseInfluence) {
                // Wave motion
                const waveOffset = Math.sin(this.phase + time * this.phaseSpeed) * this.amplitude;
                const waveOffset2 = Math.cos(this.phase * 2 + time * this.phaseSpeed * 1.3) * (this.amplitude * 0.5);

                // Mouse influence
                const dx = this.baseX - mouseInfluence.x;
                const dy = this.baseY - mouseInfluence.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 200;
                let influence = 0;

                if (dist < maxDist) {
                    influence = (1 - dist / maxDist) * 50;
                    const angle = Math.atan2(dy, dx);
                    this.x = this.baseX + Math.cos(angle) * influence;
                    this.y = this.baseY + Math.sin(angle) * influence + waveOffset + waveOffset2;
                } else {
                    this.x = this.baseX;
                    this.y = this.baseY + waveOffset + waveOffset2;
                }
            }

            draw(ctx, color1, color2, alpha) {
                const theme = themes[currentTheme];
                const t = this.waveIndex / WAVE_COUNT;
                const r = Math.floor(theme.primary[0] * (1 - t) + theme.secondary[0] * t);
                const g = Math.floor(theme.primary[1] * (1 - t) + theme.secondary[1] * t);
                const b = Math.floor(theme.primary[2] * (1 - t) + theme.secondary[2] * t);

                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.6})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2 + this.waveIndex * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Wave {
            constructor(index, y) {
                this.index = index;
                this.points = [];
                this.y = y;

                for (let i = 0; i <= POINTS_PER_WAVE; i++) {
                    const x = (i / POINTS_PER_WAVE) * width;
                    this.points.push(new WavePoint(x, y, index));
                }
            }

            update() {
                this.points.forEach(point => point.update(mouse));
            }

            draw(ctx) {
                const theme = themes[currentTheme];
                const alpha = 0.3 + (this.index / WAVE_COUNT) * 0.7;

                // Draw smooth curve through points
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);

                for (let i = 1; i < this.points.length - 1; i++) {
                    const xc = (this.points[i].x + this.points[i + 1].x) / 2;
                    const yc = (this.points[i].y + this.points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i].x, this.points[i].y, xc, yc);
                }

                ctx.lineTo(this.points[this.points.length - 1].x, this.points[this.points.length - 1].y);

                const t = this.index / WAVE_COUNT;
                const r = Math.floor(theme.primary[0] * (1 - t) + theme.secondary[0] * t);
                const g = Math.floor(theme.primary[1] * (1 - t) + theme.secondary[1] * t);
                const b = Math.floor(theme.primary[2] * (1 - t) + theme.secondary[2] * t);

                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.8})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw points
                this.points.forEach(point => point.draw(ctx, theme.primary, theme.secondary, alpha));
            }
        }

        // Initialize waves
        function initWaves() {
            waves.length = 0;
            for (let i = 0; i < WAVE_COUNT; i++) {
                const y = (height / (WAVE_COUNT + 1)) * (i + 1);
                waves.push(new Wave(i, y));
            }
        }

        initWaves();

        // Event listeners
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        });

        canvas.addEventListener('mousemove', (e) => {
            targetMouse.x = e.clientX;
            targetMouse.y = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            targetMouse.x = e.touches[0].clientX;
            targetMouse.y = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('click', () => {
            currentTheme = (currentTheme + 1) % themes.length;
        });

        // Animation loop
        function animate() {
            // Smooth mouse movement
            mouse.x += (targetMouse.x - mouse.x) * 0.1;
            mouse.y += (targetMouse.y - mouse.y) * 0.1;

            time += 1;

            // Clear with trail effect
            const theme = themes[currentTheme];
            ctx.fillStyle = theme.bg + '20';
            ctx.fillRect(0, 0, width, height);

            // Update and draw waves
            waves.forEach(wave => {
                wave.update();
                wave.draw(ctx);
            });

            // Add glow effect
            ctx.globalCompositeOperation = 'lighter';
            waves.forEach(wave => {
                const alpha = 0.1 + (wave.index / WAVE_COUNT) * 0.2;
                const t = wave.index / WAVE_COUNT;
                const r = Math.floor(theme.primary[0] * (1 - t) + theme.secondary[0] * t);
                const g = Math.floor(theme.primary[1] * (1 - t) + theme.secondary[1] * t);
                const b = Math.floor(theme.primary[2] * (1 - t) + theme.secondary[2] * t);

                ctx.beginPath();
                ctx.moveTo(wave.points[0].x, wave.points[0].y);
                for (let i = 1; i < wave.points.length - 1; i++) {
                    const xc = (wave.points[i].x + wave.points[i + 1].x) / 2;
                    const yc = (wave.points[i].y + wave.points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(wave.points[i].x, wave.points[i].y, xc, yc);
                }
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha * 0.3})`;
                ctx.lineWidth = 8;
                ctx.stroke();
            });
            ctx.globalCompositeOperation = 'source-over';

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
