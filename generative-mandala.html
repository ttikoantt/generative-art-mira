<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジェネレーティブ・マンドラ | Generative Mandala</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        #canvas-container {
            position: relative;
            display: inline-block;
            margin: 20px 0;
        }

        canvas {
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }

        input[type="range"] {
            width: 150px;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 0.9em;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 0.9em;
            }

            .controls {
                padding: 15px;
            }

            input[type="range"] {
                width: 120px;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            .control-group {
                flex: 1 1 45%;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <h1>🕉️ ジェネレーティブ・マンドラ</h1>
        <p class="subtitle">Generative Mandala</p>

        <div id="canvas-container">
            <canvas id="mandala"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>セグメント数: <span id="segmentsValue">12</span></label>
                <input type="range" id="segments" min="6" max="24" value="12">
            </div>

            <div class="control-group">
                <label>レイヤー数: <span id="layersValue">8</span></label>
                <input type="range" id="layers" min="3" max="15" value="8">
            </div>

            <div class="control-group">
                <label>複雑度: <span id="complexityValue">5</span></label>
                <input type="range" id="complexity" min="2" max="10" value="5">
            </div>

            <button onclick="generateMandala()">✨ 新規生成</button>
        </div>

        <p class="info">スライダーでパラメータを調整して、独自のマンドラを作成してください</p>
    </div>

    <script>
        const canvas = document.getElementById('mandala');
        const ctx = canvas.getContext('2d');

        // Canvas size
        const size = Math.min(window.innerWidth * 0.8, 600);
        canvas.width = size;
        canvas.height = size;

        const centerX = size / 2;
        const centerY = size / 2;
        const maxRadius = size * 0.45;

        // Color palettes
        const palettes = [
            ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe'],
            ['#fa709a', '#fee140', '#fa709a', '#f6d365', '#fda085'],
            ['#a8edea', '#fed6e3', '#ffecd2', '#fcb69f', '#ff9a9e'],
            ['#667eea', '#764ba2', '#f093fb', '#4facfe', '#00f2fe'],
            ['#ffecd2', '#fcb69f', '#ff9a9e', '#fecfef', '#fecfef'],
        ];

        let currentPalette = palettes[0];

        function getRandomColor() {
            return currentPalette[Math.floor(Math.random() * currentPalette.length)];
        }

        function drawPetal(x, y, radius, angle, complexity) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, radius);
            gradient.addColorStop(0, getRandomColor() + '80');
            gradient.addColorStop(0.5, getRandomColor() + '60');
            gradient.addColorStop(1, getRandomColor() + '20');

            ctx.fillStyle = gradient;
            ctx.beginPath();

            // Draw petal shape with varying complexity
            ctx.moveTo(0, 0);
            for (let i = 0; i <= complexity * 10; i++) {
                const t = i / (complexity * 10);
                const r = radius * Math.sin(t * Math.PI);
                const a = t * Math.PI * 2;
                const px = r * Math.cos(a) * 0.3;
                const py = r * Math.sin(a);
                ctx.lineTo(px, py);
            }

            ctx.closePath();
            ctx.fill();

            // Add glow effect
            ctx.shadowBlur = 10;
            ctx.shadowColor = getRandomColor();
            ctx.strokeStyle = getRandomColor() + '40';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.restore();
        }

        function drawLayer(layer, maxLayers, segments, complexity) {
            const layerRadius = (layer / maxLayers) * maxRadius;
            const rotationAngle = (layer * Math.PI) / (maxLayers * 2);

            for (let i = 0; i < segments; i++) {
                const angle = (i * 2 * Math.PI / segments) + rotationAngle;
                const petalSize = layerRadius * (0.3 + Math.random() * 0.4);
                const distance = layerRadius * 0.7;

                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;

                drawPetal(x, y, petalSize, angle, complexity);
            }

            // Add connecting lines
            if (layer > 1) {
                ctx.strokeStyle = getRandomColor() + '20';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let i = 0; i < segments; i++) {
                    const angle = (i * 2 * Math.PI / segments) + rotationAngle;
                    const x = centerX + Math.cos(angle) * layerRadius;
                    const y = centerY + Math.sin(angle) * layerRadius;

                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.stroke();
            }
        }

        function generateMandala() {
            // Clear canvas
            ctx.fillStyle = 'rgba(15, 23, 42, 0.95)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Get parameters
            const segments = parseInt(document.getElementById('segments').value);
            const layers = parseInt(document.getElementById('layers').value);
            const complexity = parseInt(document.getElementById('complexity').value);

            // Change palette
            currentPalette = palettes[Math.floor(Math.random() * palettes.length)];

            // Draw center
            const centerGradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 30
            );
            centerGradient.addColorStop(0, getRandomColor());
            centerGradient.addColorStop(1, getRandomColor() + '40');
            ctx.fillStyle = centerGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fill();

            // Draw layers
            for (let layer = layers; layer >= 1; layer--) {
                drawLayer(layer, layers, segments, complexity);
            }

            // Add outer glow
            ctx.shadowBlur = 20;
            ctx.shadowColor = getRandomColor();
            ctx.strokeStyle = getRandomColor() + '30';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, maxRadius * 0.95, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Update display values
        document.getElementById('segments').addEventListener('input', (e) => {
            document.getElementById('segmentsValue').textContent = e.target.value;
        });

        document.getElementById('layers').addEventListener('input', (e) => {
            document.getElementById('layersValue').textContent = e.target.value;
        });

        document.getElementById('complexity').addEventListener('input', (e) => {
            document.getElementById('complexityValue').textContent = e.target.value;
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Initial generation
        generateMandala();

        // Handle window resize
        window.addEventListener('resize', () => {
            const newSize = Math.min(window.innerWidth * 0.8, 600);
            canvas.width = newSize;
            canvas.height = newSize;
            generateMandala();
        });
    </script>
</body>
</html>
