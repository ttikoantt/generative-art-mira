<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Web - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1e 50%, #000000 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            border-radius: 12px;
            box-shadow: 0 0 60px rgba(100, 100, 255, 0.3);
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90vw;
        }

        button {
            background: rgba(100, 100, 255, 0.2);
            border: 1px solid rgba(150, 150, 255, 0.4);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        button:hover {
            background: rgba(100, 100, 255, 0.4);
            box-shadow: 0 0 20px rgba(100, 100, 255, 0.5);
        }

        button:active {
            transform: scale(0.95);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            text-align: center;
            z-index: 10;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            text-align: right;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 10px;
                gap: 8px;
            }

            button {
                padding: 10px 16px;
                font-size: 12px;
            }

            .info {
                font-size: 12px;
                top: 10px;
                padding: 0 20px;
            }

            .stats {
                top: 10px;
                right: 10px;
                font-size: 10px;
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 10px 16px;
        }
    </style>
</head>
<body>
    <div class="info">
        <strong>Cosmic Web</strong> - マウス/タッチでインタラクティブ
    </div>

    <div class="stats">
        <div>Particles: <span id="particleCount">0</span></div>
        <div>Connections: <span id="connectionCount">0</span></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="toggleAnimation()">一時停止</button>
        <button onclick="regenerate()">再生成</button>
        <button onclick="addParticles()">+粒子</button>
        <button onclick="toggleMouseTrail()">マウス軌跡: ON</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouseTrail = [];
        let isAnimating = true;
        let showMouseTrail = true;
        let animationId;

        // 設定
        const CONFIG = {
            particleCount: 100,
            connectionDistance: 120,
            particleSpeed: 0.5,
            particleSize: { min: 2, max: 5 },
            trailLength: 20,
            colors: [
                { r: 100, g: 150, b: 255 },  // 青白
                { r: 150, g: 100, b: 255 },  // 紫
                { r: 100, g: 255, b: 200 },  // 青緑
                { r: 255, g: 150, b: 100 },  // オレンジ
                { r: 255, g: 100, b: 150 }   // ピンク
            ]
        };

        let mouse = { x: null, y: null };

        // Canvasサイズ設定
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth - 40, 1200);
            canvas.height = Math.min(window.innerHeight - 140, 800);

            if (window.innerWidth > 1200) {
                canvas.width = 1000;
                canvas.height = 700;
            }

            if (window.innerWidth <= 768) {
                canvas.width = window.innerWidth - 20;
                canvas.height = window.innerHeight - 150;
            }
        }

        // 粒子クラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * CONFIG.particleSpeed * 2;
                this.vy = (Math.random() - 0.5) * CONFIG.particleSpeed * 2;
                this.size = Math.random() * (CONFIG.particleSize.max - CONFIG.particleSize.min) + CONFIG.particleSize.min;
                this.color = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
                this.alpha = Math.random() * 0.5 + 0.5;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulseOffset = Math.random() * Math.PI * 2;
            }

            update(time) {
                this.x += this.vx;
                this.y += this.vy;

                // 壁で反射
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= - 1;

                // パルスアニメーション
                this.currentAlpha = this.alpha * (0.7 + 0.3 * Math.sin(time * this.pulseSpeed + this.pulseOffset));

                // マウスの近くでは加速
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        const force = (150 - dist) / 150;
                        this.vx += (dx / dist) * force * 0.05;
                        this.vy += (dy / dist) * force * 0.05;
                    }

                    // 速度制限
                    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (speed > CONFIG.particleSpeed * 3) {
                        this.vx = (this.vx / speed) * CONFIG.particleSpeed * 3;
                        this.vy = (this.vy / speed) * CONFIG.particleSpeed * 3;
                    }
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.currentAlpha})`;
                ctx.fill();

                // グロー効果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.currentAlpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // 粒子を生成
        function createParticles() {
            particles = [];
            for (let i = 0; i < CONFIG.particleCount; i++) {
                particles.push(new Particle());
            }
            updateStats();
        }

        // 粒子を追加
        function addParticles() {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle());
            }
            updateStats();
        }

        // 接続を描画
        function drawConnections() {
            let connectionCount = 0;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < CONFIG.connectionDistance) {
                        connectionCount++;
                        const alpha = (1 - dist / CONFIG.connectionDistance) * 0.3;

                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(150, 150, 255, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }

            document.getElementById('connectionCount').textContent = connectionCount;
        }

        // マウス軌跡を描画
        function drawMouseTrail() {
            if (!showMouseTrail || mouseTrail.length < 2) return;

            for (let i = 1; i < mouseTrail.length; i++) {
                const alpha = i / mouseTrail.length;
                ctx.beginPath();
                ctx.moveTo(mouseTrail[i - 1].x, mouseTrail[i - 1].y);
                ctx.lineTo(mouseTrail[i].x, mouseTrail[i].y);
                ctx.strokeStyle = `rgba(255, 200, 100, ${alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // アニメーションループ
        let time = 0;
        function animate() {
            if (!isAnimating) return;

            ctx.fillStyle = 'rgba(10, 10, 25, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            time++;

            // 粒子を更新・描画
            particles.forEach(p => {
                p.update(time);
                p.draw();
            });

            // 接続を描画
            drawConnections();

            // マウス軌跡を描画
            drawMouseTrail();

            // マウス軌跡を更新
            if (showMouseTrail && mouse.x !== null && mouse.y !== null) {
                mouseTrail.push({ x: mouse.x, y: mouse.y });
                if (mouseTrail.length > CONFIG.trailLength) {
                    mouseTrail.shift();
                }
            }

            animationId = requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
            mouseTrail = [];
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.touches[0].clientX - rect.left;
            mouse.y = e.touches[0].clientY - rect.top;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
            mouseTrail = [];
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // コントロール関数
        function toggleAnimation() {
            isAnimating = !isAnimating;
            const btn = document.querySelector('.controls button:nth-child(1)');
            btn.textContent = isAnimating ? '一時停止' : '再生';

            if (isAnimating) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        function regenerate() {
            createParticles();
            mouseTrail = [];
        }

        function toggleMouseTrail() {
            showMouseTrail = !showMouseTrail;
            const btn = document.querySelector('.controls button:nth-child(4)');
            btn.textContent = `マウス軌跡: ${showMouseTrail ? 'ON' : 'OFF'}`;
            if (!showMouseTrail) mouseTrail = [];
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function updateStats() {
            document.getElementById('particleCount').textContent = particles.length;
        }

        // 初期化
        resizeCanvas();
        createParticles();
        animate();
    </script>
</body>
</html>
