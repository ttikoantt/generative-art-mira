<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Pulse - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 3px;
            pointer-events: none;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">Geometric Pulse</div>
    <div class="info">Click to change pattern • Space to pause</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let time = 0;
        let paused = false;
        let patternIndex = 0;
        let clickEffect = { active: false, x: 0, y: 0, radius: 0, alpha: 1 };

        const patterns = [
            // Pattern 1: Concentric breathing circles
            (t) => {
                const layers = 8;
                for (let i = 0; i < layers; i++) {
                    const baseRadius = 50 + i * 40;
                    const pulse = Math.sin(t * 2 + i * 0.3) * 20;
                    const radius = baseRadius + pulse;
                    const alpha = 0.3 + Math.sin(t * 1.5 + i * 0.2) * 0.2;
                    const hue = (t * 20 + i * 30) % 360;

                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            },

            // Pattern 2: Rotating hexagons
            (t) => {
                const count = 6;
                for (let i = 0; i < count; i++) {
                    const radius = 80 + i * 35;
                    const rotation = t * (0.5 + i * 0.1) * (i % 2 === 0 ? 1 : -1);
                    const sides = 6;
                    const hue = (t * 15 + i * 40) % 360;

                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(rotation);

                    ctx.beginPath();
                    for (let j = 0; j <= sides; j++) {
                        const angle = (j / sides) * Math.PI * 2;
                        const x = Math.cos(angle) * radius;
                        const y = Math.sin(angle) * radius;
                        if (j === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = `hsla(${hue}, 70%, 55%, 0.4)`;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.restore();
                }
            },

            // Pattern 3: Dancing triangles
            (t) => {
                const count = 12;
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2 + t * 0.5;
                    const distance = 100 + Math.sin(t * 2 + i * 0.5) * 50;
                    const x = centerX + Math.cos(angle) * distance;
                    const y = centerY + Math.sin(angle) * distance;
                    const size = 20 + Math.sin(t * 3 + i * 0.3) * 10;
                    const rotation = t * 2 + i * 0.5;
                    const hue = (t * 25 + i * 20) % 360;

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(rotation);

                    ctx.beginPath();
                    ctx.moveTo(0, -size);
                    ctx.lineTo(size * 0.866, size * 0.5);
                    ctx.lineTo(-size * 0.866, size * 0.5);
                    ctx.closePath();
                    ctx.strokeStyle = `hsla(${hue}, 75%, 60%, 0.5)`;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    ctx.restore();
                }
            },

            // Pattern 4: Spiral waves
            (t) => {
                const arms = 5;
                const pointsPerArm = 50;
                for (let arm = 0; arm < arms; arm++) {
                    const armOffset = (arm / arms) * Math.PI * 2;
                    for (let i = 0; i < pointsPerArm; i++) {
                        const progress = i / pointsPerArm;
                        const radius = progress * 250;
                        const angle = armOffset + progress * Math.PI * 4 + t;
                        const x = centerX + Math.cos(angle) * radius;
                        const y = centerY + Math.sin(angle) * radius;
                        const size = 2 + progress * 4;
                        const hue = (t * 20 + arm * 50 + progress * 100) % 360;
                        const alpha = progress * 0.8;

                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
                        ctx.fill();
                    }
                }
            },

            // Pattern 5: Morphing squares
            (t) => {
                const gridSize = 5;
                const cellSize = 80;
                for (let gx = 0; gx < gridSize; gx++) {
                    for (let gy = 0; gy < gridSize; gy++) {
                        const x = centerX + (gx - gridSize/2 + 0.5) * cellSize;
                        const y = centerY + (gy - gridSize/2 + 0.5) * cellSize;
                        const rotation = Math.sin(t + gx * 0.5 + gy * 0.5) * Math.PI * 0.5;
                        const scale = 0.5 + Math.sin(t * 1.5 + gx * 0.3 + gy * 0.3) * 0.3;
                        const hue = (t * 15 + (gx + gy) * 20) % 360;
                        const alpha = 0.3 + Math.sin(t + gx * 0.4 + gy * 0.4) * 0.2;

                        ctx.save();
                        ctx.translate(x, y);
                        ctx.rotate(rotation);
                        ctx.scale(scale, scale);

                        ctx.beginPath();
                        ctx.rect(-cellSize/2, -cellSize/2, cellSize, cellSize);
                        ctx.strokeStyle = `hsla(${hue}, 70%, 55%, ${alpha})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        ctx.restore();
                    }
                }
            }
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function drawClickEffect() {
            if (!clickEffect.active) return;

            ctx.beginPath();
            ctx.arc(clickEffect.x, clickEffect.y, clickEffect.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${clickEffect.alpha})`;
            ctx.lineWidth = 2;
            ctx.stroke();

            clickEffect.radius += 5;
            clickEffect.alpha -= 0.03;

            if (clickEffect.alpha <= 0) {
                clickEffect.active = false;
            }
        }

        function draw() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Draw current pattern
            patterns[patternIndex](time);

            // Draw click effect
            drawClickEffect();

            if (!paused) {
                time += 0.016;
            }
        }

        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('click', (e) => {
            clickEffect.active = true;
            clickEffect.x = e.clientX;
            clickEffect.y = e.clientY;
            clickEffect.radius = 0;
            clickEffect.alpha = 1;
            patternIndex = (patternIndex + 1) % patterns.length;
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                paused = !paused;
            }
        });

        // Initialize
        resize();
        animate();
    </script>
</body>
</html>
