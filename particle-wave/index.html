<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle Wave</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                padding: 0 20px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面</button>
    <div class="info">タッチまたはマウスを動かして波紋を作ろう</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let particles = [];
        let ripples = [];
        let mouseX = 0;
        let mouseY = 0;
        let time = 0;
        let lastInteraction = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.size = Math.random() * 3 + 1;
                this.hue = hue || Math.random() * 360;
                this.alpha = Math.random() * 0.5 + 0.5;
                this.vx = 0;
                this.vy = 0;
                this.friction = 0.98;
            }

            update() {
                // 波紋からの影響
                ripples.forEach(ripple => {
                    const dx = this.x - ripple.x;
                    const dy = this.y - ripple.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < ripple.radius + 50 && dist > ripple.radius - 50) {
                        const force = (1 - Math.abs(dist - ripple.radius) / 50) * ripple.strength;
                        const angle = Math.atan2(dy, dx);
                        this.vx += Math.cos(angle) * force;
                        this.vy += Math.sin(angle) * force;
                    }
                });

                // 速度を適用
                this.x += this.vx;
                this.y += this.vy;

                // 摩擦
                this.vx *= this.friction;
                this.vy *= this.friction;

                // 原点に戻る力
                const returnForceX = (this.originX - this.x) * 0.02;
                const returnForceY = (this.originY - this.y) * 0.02;
                this.vx += returnForceX;
                this.vy += returnForceY;
            }

            draw() {
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const brightness = 50 + speed * 10;
                ctx.fillStyle = `hsla(${this.hue}, 80%, ${brightness}%, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 300;
                this.strength = 3;
                this.hue = (time * 0.5) % 360;
                this.alpha = 1;
            }

            update() {
                this.radius += 5;
                this.strength *= 0.98;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.radius < this.maxRadius && this.alpha > 0;
            }

            draw() {
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${this.alpha * 0.5})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function createParticles() {
            particles = [];
            const gridSize = 20;
            const cols = Math.ceil(width / gridSize);
            const rows = Math.ceil(height / gridSize);

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * gridSize + gridSize / 2;
                    const y = j * gridSize + gridSize / 2;
                    const hue = (i / cols * 60 + j / rows * 60 + time * 0.2) % 360;
                    particles.push(new Particle(x, y, hue));
                }
            }
        }

        createParticles();

        function addRipple(x, y) {
            ripples.push(new Ripple(x, y));
            if (ripples.length > 10) {
                ripples.shift();
            }
            lastInteraction = time;
        }

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            if (time - lastInteraction > 5) {
                addRipple(mouseX, mouseY);
            }
        });

        canvas.addEventListener('click', (e) => {
            addRipple(e.clientX, e.clientY);
            addRipple(e.clientX + 30, e.clientY + 30);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (time - lastInteraction > 3) {
                addRipple(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addRipple(touch.clientX, touch.clientY);
            addRipple(touch.clientX, touch.clientY);
        }, { passive: false });

        function animate() {
            // フェードアウト効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 波紋を更新・描画
            ripples = ripples.filter(ripple => {
                ripple.draw();
                return ripple.update();
            });

            // パーティクルを更新・描画
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            time++;
            requestAnimationFrame(animate);
        }

        animate();

        // 全画面ボタン
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                fullscreenBtn.textContent = '全画面解除';
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = '全画面';
            }
        });

        // 全画面変更イベント
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.textContent = '全画面解除';
            } else {
                fullscreenBtn.textContent = '全画面';
            }
        });
    </script>
</body>
</html>
