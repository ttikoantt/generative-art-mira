<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Wave Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Particle Wave - Click or touch to interact</div>
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        function initParticles() {
            particles = [];
            const particleCount = 800;
            const spacing = 8;

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    baseX: (i % 40) * spacing,
                    baseY: Math.floor(i / 40) * spacing,
                    x: 0,
                    y: 0,
                    size: 2 + Math.random() * 2,
                    hue: (i / particleCount) * 360,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.5 + Math.random() * 0.5
                });
            }

            // Center the grid
            const gridWidth = 40 * spacing;
            const gridHeight = Math.floor(particleCount / 40) * spacing;
            particles.forEach(p => {
                p.baseX += (width - gridWidth) / 2;
                p.baseY += (height - gridHeight) / 2;
            });
        }

        function update() {
            time += 0.02;

            particles.forEach((p, i) => {
                const wave1 = Math.sin(time * p.speed + p.baseX * 0.02 + p.phase) * 30;
                const wave2 = Math.cos(time * p.speed * 0.7 + p.baseY * 0.02 + p.phase) * 20;
                const wave3 = Math.sin(time * 0.3 + (p.baseX + p.baseY) * 0.01) * 15;

                p.x = p.baseX + wave1 + wave3;
                p.y = p.baseY + wave2 + wave3;

                // Mouse interaction
                const dx = mouseX - p.x;
                const dy = mouseY - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 150;

                if (dist < maxDist) {
                    const force = (maxDist - dist) / maxDist;
                    p.x -= dx * force * 0.3;
                    p.y -= dy * force * 0.3;
                }

                // Hue shift
                p.hue = ((i / particles.length) * 360 + time * 50) % 360;
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                const alpha = 0.6 + Math.sin(time * p.speed + p.phase) * 0.3;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 70%, 60%, ${alpha})`;
                ctx.fill();

                // Glow effect
                if (p.size > 3) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 70%, 60%, ${alpha * 0.2})`;
                    ctx.fill();
                }
            });
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        // Event listeners
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Initialize
        resize();
        animate();
    </script>
</body>
</html>
