<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rising Bubbles | Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a1628 0%, #1a3a5c 50%, #2d5a7b 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">🫧 Rising Bubbles - Click to create bubbles</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Bubble class
        class Bubble {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || height + 50;
                this.radius = Math.random() * 30 + 10;
                this.speed = Math.random() * 2 + 0.5;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                this.wobbleAmount = Math.random() * 2 + 1;
                this.time = Math.random() * Math.PI * 2;
                this.opacity = Math.random() * 0.3 + 0.1;
                this.hue = Math.random() * 40 + 180; // Blue-cyan range
                this.popped = false;
                this.popAnimation = 0;
            }

            update() {
                if (this.popped) {
                    this.popAnimation += 0.1;
                    return this.popAnimation < Math.PI * 2;
                }

                this.time += this.wobbleSpeed;
                this.y -= this.speed;
                this.x += Math.sin(this.time) * this.wobbleAmount;

                // Pop when reaching surface
                if (this.y < -this.radius) {
                    this.popped = true;
                    this.y = 0;
                }

                return true;
            }

            draw() {
                ctx.save();

                if (this.popped) {
                    // Pop effect
                    const progress = this.popAnimation;
                    const alpha = Math.max(0, 1 - progress / (Math.PI * 2));
                    const size = this.radius * (1 + progress * 2);

                    ctx.strokeStyle = `hsla(${this.hue}, 70%, 70%, ${alpha * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, 0, size, 0, Math.PI * 2);
                    ctx.stroke();

                    // Ripples
                    for (let i = 0; i < 3; i++) {
                        const rippleSize = size * (1 + i * 0.5);
                        const rippleAlpha = alpha * (1 - i * 0.3);
                        ctx.strokeStyle = `hsla(${this.hue}, 70%, 70%, ${rippleAlpha * 0.3})`;
                        ctx.beginPath();
                        ctx.arc(this.x, 0, rippleSize, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                } else {
                    // Main bubble
                    const gradient = ctx.createRadialGradient(
                        this.x - this.radius * 0.3,
                        this.y - this.radius * 0.3,
                        0,
                        this.x,
                        this.y,
                        this.radius
                    );
                    gradient.addColorStop(0, `hsla(${this.hue}, 70%, 90%, ${this.opacity + 0.2})`);
                    gradient.addColorStop(0.5, `hsla(${this.hue}, 60%, 70%, ${this.opacity})`);
                    gradient.addColorStop(1, `hsla(${this.hue}, 50%, 50%, ${this.opacity * 0.5})`);

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();

                    // Highlight
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity + 0.3})`;
                    ctx.beginPath();
                    ctx.arc(
                        this.x - this.radius * 0.3,
                        this.y - this.radius * 0.3,
                        this.radius * 0.2,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();

                    // Ring
                    ctx.strokeStyle = `hsla(${this.hue}, 60%, 70%, ${this.opacity * 0.5})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.stroke();
                }

                ctx.restore();
            }
        }

        let bubbles = [];

        // Create initial bubbles
        function createBubbles(count) {
            for (let i = 0; i < count; i++) {
                bubbles.push(new Bubble());
            }
        }

        // Animation loop
        function animate() {
            // Semi-transparent clear for trail effect
            ctx.fillStyle = 'rgba(10, 22, 40, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw bubbles
            bubbles = bubbles.filter(bubble => {
                const alive = bubble.update();
                if (alive) bubble.draw();
                return alive;
            });

            // Spawn new bubbles occasionally
            if (Math.random() < 0.03 && bubbles.length < 50) {
                bubbles.push(new Bubble());
            }

            requestAnimationFrame(animate);
        }

        // Handle click/tap to create bubbles
        function handleInteraction(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            // Create burst of bubbles
            for (let i = 0; i < 5; i++) {
                const bubble = new Bubble(x + (Math.random() - 0.5) * 50, y + (Math.random() - 0.5) * 50);
                bubbles.push(bubble);
            }
        }

        canvas.addEventListener('click', handleInteraction);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInteraction(e);
        });

        // Handle resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Fullscreen toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Start
        createBubbles(20);
        animate();
    </script>
</body>
</html>
