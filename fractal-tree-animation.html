<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #canvas {
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(100, 200, 255, 0.2);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .control-group label {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            background: #222;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, #64c8ff, #a855f7);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #64c8ff, #a855f7);
            border: none;
            border-radius: 6px;
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(100, 200, 255, 0.4);
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #666;
            font-size: 11px;
            line-height: 1.6;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            color: #888;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .fullscreen-btn:hover {
            background: #333;
            color: #fff;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 9px;
                top: 10px;
                left: 10px;
            }

            input[type="range"] {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <div>Fractal Tree Animation</div>
        <div id="stats"></div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <canvas id="canvas" width="800" height="600"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>再帰回数: <span id="depthValue">10</span></label>
            <input type="range" id="depth" min="4" max="14" value="10">
        </div>

        <div class="control-group">
            <label>分岐角度: <span id="angleValue">25</span>°</label>
            <input type="range" id="angle" min="10" max="45" value="25">
        </div>

        <div class="control-group">
            <label>枝の長さ: <span id="lengthValue">120</span></label>
            <input type="range" id="length" min="50" max="180" value="120">
        </div>

        <button id="regenerate">再生成</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let depth = 10;
        let angle = 25;
        let trunkLength = 120;
        let animationProgress = 0;
        let animationSpeed = 0.015;
        let hue = 0;

        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 200, 600);

            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }

        function drawBranch(x, y, length, angle, currentDepth, maxDepth) {
            if (currentDepth > maxDepth || length < 2) return;

            const progress = Math.min(1, (animationProgress - currentDepth * 0.08) * 2);
            if (progress < 0) return;

            const actualLength = length * easeOutQuad(progress);

            const endX = x + actualLength * Math.cos(angle * Math.PI / 180);
            const endY = y - actualLength * Math.sin(angle * Math.PI / 180);

            const hueOffset = (currentDepth / maxDepth) * 60;
            const saturation = 70 - (currentDepth / maxDepth) * 30;
            const lightness = 60 - (currentDepth / maxDepth) * 20;
            const alpha = 0.9 - (currentDepth / maxDepth) * 0.3;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);

            const gradient = ctx.createLinearGradient(x, y, endX, endY);
            gradient.addColorStop(0, `hsla(${hue + hueOffset}, ${saturation}%, ${lightness}%, ${alpha})`);
            gradient.addColorStop(1, `hsla(${hue + hueOffset + 20}, ${saturation}%, ${lightness + 10}%, ${alpha * 0.8})`);

            ctx.strokeStyle = gradient;
            ctx.lineWidth = Math.max(0.5, (maxDepth - currentDepth) * 0.8);
            ctx.lineCap = 'round';
            ctx.stroke();

            if (progress >= 1) {
                const newLength = length * 0.75;
                const spreadAngle = parseFloat(document.getElementById('angle').value);

                setTimeout(() => {
                    drawBranch(endX, endY, newLength, angle - spreadAngle, currentDepth + 1, maxDepth);
                    drawBranch(endX, endY, newLength, angle + spreadAngle, currentDepth + 1, maxDepth);
                }, 30);
            }
        }

        function easeOutQuad(t) {
            return t * (2 - t);
        }

        function draw() {
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            animationProgress = 0;
            hue = Math.random() * 360;

            const startX = canvas.width / 2;
            const startY = canvas.height - 20;

            function animate() {
                animationProgress += animationSpeed;

                if (animationProgress < depth * 0.15 + 1) {
                    requestAnimationFrame(animate);
                }

                ctx.fillStyle = '#0a0a0f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                drawBranch(
                    startX,
                    startY,
                    trunkLength,
                    90,
                    0,
                    depth
                );
            }

            animate();
        }

        function updateStats() {
            const branches = Math.pow(2, depth + 1) - 1;
            document.getElementById('stats').innerHTML = `
                枝の数: ${branches.toLocaleString()}
            `;
        }

        // Event Listeners
        document.getElementById('depth').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = depth;
            updateStats();
        });

        document.getElementById('angle').addEventListener('input', (e) => {
            document.getElementById('angleValue').textContent = e.target.value;
        });

        document.getElementById('length').addEventListener('input', (e) => {
            trunkLength = parseInt(e.target.value);
            document.getElementById('lengthValue').textContent = e.target.value;
        });

        document.getElementById('regenerate').addEventListener('click', draw);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resizeCanvas);

        // Initialize
        resizeCanvas();
        draw();
        updateStats();
    </script>
</body>
</html>
