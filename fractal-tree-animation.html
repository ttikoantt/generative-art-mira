<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フラクタルツリーアニメーション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #e94560;
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .subtitle {
            color: #a2a8d3;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        #canvas {
            border: 2px solid rgba(233, 69, 96, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.2);
            max-width: 95vw;
            max-height: 70vh;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            color: #a2a8d3;
            font-size: 0.8rem;
        }

        input[type="range"] {
            width: 120px;
            accent-color: #e94560;
        }

        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        button:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(233, 69, 96, 0.8);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <h1>🌳 フラクタルツリーアニメーション</h1>
    <p class="subtitle">幾何学的な美しさ - 再帰関数で描く自然</p>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <div class="control-group">
            <label>分岐角度: <span id="angleValue">25</span>°</label>
            <input type="range" id="angle" min="10" max="45" value="25">
        </div>
        <div class="control-group">
            <label>深さ: <span id="depthValue">10</span></label>
            <input type="range" id="depth" min="5" max="12" value="10">
        </div>
        <div class="control-group">
            <label>アニメーション速度</label>
            <input type="range" id="speed" min="1" max="10" value="5">
        </div>
        <button onclick="regenerate()">新しい木</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let angle = 25;
        let maxDepth = 10;
        let animationSpeed = 5;
        let time = 0;
        let animationId;
        let hue = 0;

        function resize() {
            const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.7, 600);
            canvas.width = size;
            canvas.height = size;
        }

        function drawBranch(x, y, length, angle, depth, time) {
            if (depth === 0 || length < 2) return;

            const endX = x + length * Math.cos(angle);
            const endY = y + length * Math.sin(angle);

            // 色のグラデーション
            const depthRatio = depth / maxDepth;
            const branchHue = (hue + (maxDepth - depth) * 20) % 360;
            ctx.strokeStyle = `hsl(${branchHue}, 70%, ${40 + depthRatio * 30}%)`;
            ctx.lineWidth = depth * 1.5;
            ctx.lineCap = 'round';

            // 枝を描画
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // 風のアニメーション
            const wind = Math.sin(time * 0.02 + depth * 0.5) * 0.02 * (maxDepth - depth + 1);
            const angleRad = (angle * Math.PI) / 180;

            // 左の枝
            drawBranch(
                endX,
                endY,
                length * 0.75,
                angle - angleRad + wind,
                depth - 1,
                time
            );

            // 右の枝
            drawBranch(
                endX,
                endY,
                length * 0.75,
                angle + angleRad + wind,
                depth - 1,
                time
            );
        }

        function draw() {
            ctx.fillStyle = 'rgba(26, 26, 46, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const startX = canvas.width / 2;
            const startY = canvas.height - 20;
            const initialLength = canvas.height * 0.25;

            drawBranch(startX, startY, initialLength, -Math.PI / 2, maxDepth, time);

            time += animationSpeed;
            hue = (hue + 0.5) % 360;

            animationId = requestAnimationFrame(draw);
        }

        function regenerate() {
            hue = Math.random() * 360;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        document.getElementById('angle').addEventListener('input', (e) => {
            angle = parseInt(e.target.value);
            document.getElementById('angleValue').textContent = angle;
        });

        document.getElementById('depth').addEventListener('input', (e) => {
            maxDepth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = maxDepth;
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            animationSpeed = parseInt(e.target.value);
        });

        window.addEventListener('resize', resize);

        // 初期化
        resize();
        draw();
    </script>
</body>
</html>
