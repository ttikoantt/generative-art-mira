<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow Art - 川のように流れる粒子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: clamp(0.8rem, 2vw, 1rem);
            margin-bottom: 20px;
        }

        canvas {
            background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 100%);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(100, 150, 255, 0.3);
            max-width: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(74, 144, 217, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 217, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
        }

        .fullscreen-btn:hover {
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.6);
        }

        .info {
            color: #666;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            margin-top: 15px;
        }

        /* フルスクリーン時のスタイル */
        .fullscreen-active {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-active canvas {
            max-width: 100vw;
            max-height: 100vh;
            border-radius: 0;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <h1>🌊 Particle Flow Art</h1>
        <p class="subtitle">川のように流れる粒子 - マウスを動かして楽しんで</p>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="resetParticles()">リセット</button>
            <button onclick="toggleFlow()">流れを切替</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>
        </div>

        <p class="info">💡 マウス/タッチを動かすと粒子が反応します</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('container');

        // キャンバスサイズ
        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 40, window.innerHeight - 300, 800);
            canvas.width = size;
            canvas.height = size * 0.75;
        }

        resizeCanvas();
        window.addEventListener('resize', () => {
            if (!document.fullscreenElement) {
                resizeCanvas();
            }
        });

        // 粒子設定
        const particles = [];
        const PARTICLE_COUNT = 300;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let flowMode = true;

        // 色パレット
        const colors = [
            { r: 100, g: 200, b: 255 },  // 水色
            { r: 150, g: 100, b: 255 },  // 紫
            { r: 100, g: 255, b: 200 },  // 薄緑
            { r: 255, g: 150, b: 200 },  // ピンク
            { r: 100, g: 150, b: 255 },  // 青
        ];

        // 粒子クラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 3 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = Math.random() * 0.8 + 0.2;
                this.life = Math.random() * 100 + 100;
                this.trail = [];
            }

            update() {
                // 軌跡を保存
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }

                if (flowMode) {
                    // マウスへの引力
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 200) {
                        const force = (200 - dist) / 200;
                        this.vx += (dx / dist) * force * 0.3;
                        this.vy += (dy / dist) * force * 0.3;
                    }

                    // 流れの効果
                    this.vy += 0.02;
                    this.vx += Math.sin(this.y * 0.02) * 0.02;
                }

                // 抵抗
                this.vx *= 0.99;
                this.vy *= 0.99;

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // 境界処理
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // 寿命
                this.life--;
                if (this.life <= 0) {
                    this.reset();
                }
            }

            draw() {
                // 軌跡を描画
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = (i / this.trail.length) * this.alpha * 0.3;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                    ctx.fill();
                }

                // 本体を描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.fill();

                // 光る効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // 粒子を初期化
        function initParticles() {
            particles.length = 0;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        initParticles();

        // マウスイベント
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        });

        // アニメーション
        function animate() {
            // 半透明でクリア（残像効果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        animate();

        // コントロール関数
        function resetParticles() {
            initParticles();
        }

        function toggleFlow() {
            flowMode = !flowMode;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // フルスクリーン時のキャンバス調整
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                container.classList.add('fullscreen-active');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            } else {
                container.classList.remove('fullscreen-active');
                resizeCanvas();
            }
        });
    </script>
</body>
</html>
