<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Flow Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 12px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        タッチ/マウスでインタラクション
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <div class="controls">
        <button onclick="changePattern('flow')">フロー</button>
        <button onclick="changePattern('spiral')">スパイラル</button>
        <button onclick="changePattern('explosion')">爆発</button>
        <button onclick="changePattern('wave')">ウェーブ</button>
        <button onclick="reset()">リセット</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let currentPattern = 'flow';
        let hue = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y, pattern = 'flow') {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = 0;
                this.speedY = 0;
                this.color = `hsl(${hue + Math.random() * 60}, 100%, 60%)`;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
                this.pattern = pattern;

                this.initPattern();
            }

            initPattern() {
                switch(this.pattern) {
                    case 'flow':
                        this.speedX = (Math.random() - 0.5) * 2;
                        this.speedY = (Math.random() - 0.5) * 2;
                        break;
                    case 'spiral':
                        const angle = Math.random() * Math.PI * 2;
                        const radius = Math.random() * 100;
                        this.speedX = Math.cos(angle) * radius * 0.02;
                        this.speedY = Math.sin(angle) * radius * 0.02;
                        break;
                    case 'explosion':
                        const expAngle = Math.random() * Math.PI * 2;
                        const expSpeed = Math.random() * 5 + 2;
                        this.speedX = Math.cos(expAngle) * expSpeed;
                        this.speedY = Math.sin(expAngle) * expSpeed;
                        break;
                    case 'wave':
                        this.speedX = Math.random() * 2 - 1;
                        this.speedY = 0;
                        this.originalY = this.y;
                        break;
                }
            }

            update() {
                this.life -= this.decay;

                switch(this.pattern) {
                    case 'flow':
                        // マウスに向かって流れる
                        if (isMouseDown) {
                            const dx = mouseX - this.x;
                            const dy = mouseY - this.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 200) {
                                this.speedX += dx * 0.001;
                                this.speedY += dy * 0.001;
                            }
                        }
                        this.x += this.speedX;
                        this.y += this.speedY;
                        this.speedX *= 0.99;
                        this.speedY *= 0.99;
                        break;

                    case 'spiral':
                        // 螺旋状に動く
                        const centerX = width / 2;
                        const centerY = height / 2;
                        const dx = this.x - centerX;
                        const dy = this.y - centerY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const angle = Math.atan2(dy, dx);
                        const newAngle = angle + 0.02;
                        this.speedX = Math.cos(newAngle) * dist * 0.01 - dx * 0.005;
                        this.speedY = Math.sin(newAngle) * dist * 0.01 - dy * 0.005;
                        this.x += this.speedX;
                        this.y += this.speedY;
                        break;

                    case 'explosion':
                        this.x += this.speedX;
                        this.y += this.speedY;
                        this.speedY += 0.1; // 重力
                        this.speedX *= 0.99;
                        this.speedY *= 0.99;
                        break;

                    case 'wave':
                        this.x += this.speedX;
                        this.y = this.originalY + Math.sin(this.x * 0.02 + Date.now() * 0.003) * 50;
                        break;
                }

                // 画面外から出たら反対側から出現
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function createParticles(count, x, y) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, currentPattern));
            }
        }

        function changePattern(pattern) {
            currentPattern = pattern;
            particles = [];
            hue = Math.random() * 360;
            createParticles(200);
        }

        function reset() {
            particles = [];
            hue = Math.random() * 360;
            createParticles(200);
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 新しいパーティクルを追加
            if (particles.length < 500) {
                createParticles(2);
            }

            // パーティクルを更新・描画
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            hue += 0.5;

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
            createParticles(20, mouseX, mouseY);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isMouseDown) {
                createParticles(5, mouseX, mouseY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createParticles(20, mouseX, mouseY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            if (isMouseDown) {
                createParticles(5, mouseX, mouseY);
            }
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // 初期化
        resize();
        createParticles(200);
        animate();
    </script>
</body>
</html>
