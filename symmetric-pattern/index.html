<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンメトリック・パターン・アート | Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        h1 {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
            padding: 0 1rem;
        }
        canvas {
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            max-width: 95vw;
            max-height: 70vh;
            cursor: pointer;
        }
        .controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 1rem;
            padding: 0 1rem;
        }
        button {
            background: linear-gradient(135deg, #00ffaa, #00ccff);
            color: #000;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 170, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 170, 0.5);
        }
        button:active {
            transform: translateY(0);
        }
        .info {
            color: #888;
            font-size: 0.8rem;
            margin-top: 0.8rem;
            text-align: center;
        }
        .fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 1000;
        }
        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" id="fullscreenBtn">📺 全画面</button>

    <h1>🎨 シンメトリック・パターン・アート</h1>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button id="newBtn">✨ 新しいパターン</button>
        <button id="animateBtn">🌀 アニメーション</button>
        <button id="saveBtn">💾 保存</button>
    </div>
    <div class="info">クリックで新しいパターン生成</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let centerX, centerY;
        let animationId = null;
        let hue = 0;
        let points = [];
        let symmetryCount = 8;
        let animationEnabled = false;

        function resize() {
            const maxWidth = Math.min(window.innerWidth * 0.95, 800);
            const maxHeight = Math.min(window.innerHeight * 0.7, 600);
            width = maxWidth;
            height = maxHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
            generatePattern();
        }

        function generatePattern() {
            points = [];
            hue = Math.random() * 360;
            const numPoints = 50 + Math.floor(Math.random() * 100);
            symmetryCount = 4 + Math.floor(Math.random() * 10);

            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 2;
                const radius = 50 + Math.random() * (Math.min(width, height) / 2 - 80);
                points.push({
                    angle,
                    radius,
                    speed: 0.01 + Math.random() * 0.02,
                    amplitude: 10 + Math.random() * 30,
                    phase: Math.random() * Math.PI * 2
                });
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);

            ctx.globalCompositeOperation = 'screen';
            ctx.lineWidth = 2;

            const time = Date.now() * 0.001;

            // 各対称セグメントを描画
            for (let sym = 0; sym < symmetryCount; sym++) {
                const rotation = (sym / symmetryCount) * Math.PI * 2;

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(rotation);

                // ポイントを接続して曲線を描画
                for (let i = 0; i < points.length; i++) {
                    const point = points[i];
                    const nextPoint = points[(i + 1) % points.length];

                    let r1 = point.radius;
                    let r2 = nextPoint.radius;

                    if (animationEnabled) {
                        r1 += Math.sin(time * point.speed + point.phase) * point.amplitude;
                        r2 += Math.sin(time * nextPoint.speed + nextPoint.phase) * nextPoint.amplitude;
                    }

                    const x1 = Math.cos(point.angle) * r1;
                    const y1 = Math.sin(point.angle) * r1;
                    const x2 = Math.cos(nextPoint.angle) * r2;
                    const y2 = Math.sin(nextPoint.angle) * r2;

                    const segmentHue = (hue + i * 2 + sym * 30) % 360;
                    ctx.strokeStyle = `hsla(${segmentHue}, 80%, 55%, 0.6)`;

                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }

                ctx.restore();
            }

            ctx.globalCompositeOperation = 'source-over';

            // 中心の光る円
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 30);
            gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, 0.8)`);
            gradient.addColorStop(0.5, `hsla(${hue}, 80%, 50%, 0.3)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fill();

            if (animationEnabled) {
                animationId = requestAnimationFrame(draw);
            }
        }

        function toggleAnimation() {
            animationEnabled = !animationEnabled;
            const btn = document.getElementById('animateBtn');

            if (animationEnabled) {
                btn.textContent = '⏹️ 停止';
                draw();
            } else {
                btn.textContent = '🌀 アニメーション';
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                draw();
            }
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = `symmetric-pattern-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Event Listeners
        canvas.addEventListener('click', generatePattern);
        document.getElementById('newBtn').addEventListener('click', generatePattern);
        document.getElementById('animateBtn').addEventListener('click', toggleAnimation);
        document.getElementById('saveBtn').addEventListener('click', saveImage);
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        window.addEventListener('resize', () => {
            if (!animationEnabled) {
                resize();
            }
        });

        // Initialize
        resize();
    </script>
</body>
</html>
