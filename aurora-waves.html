<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Waves</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Aurora Waves - Flowing Northern Lights</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        }

        function initWaves() {
            waves = [];
            const numWaves = 7;

            for (let i = 0; i < numWaves; i++) {
                const hue = (i / numWaves) * 60 + 120; // Green to cyan range
                waves.push({
                    baseY: height * 0.3 + (i / numWaves) * height * 0.4,
                    amplitude: 50 + Math.random() * 100,
                    frequency: 0.002 + Math.random() * 0.003,
                    speed: 0.5 + Math.random() * 1,
                    phase: Math.random() * Math.PI * 2,
                    hue: hue,
                    saturation: 70 + Math.random() * 30,
                    lightness: 50 + Math.random() * 20,
                    alpha: 0.3 + Math.random() * 0.4,
                    layers: Math.floor(2 + Math.random() * 3)
                });
            }
        }

        function drawWave(wave, layerOffset) {
            const gradient = ctx.createLinearGradient(0, 0, width, 0);

            for (let i = 0; i <= 10; i++) {
                const x = (i / 10) * width;
                const hueVar = Math.sin(time * 0.001 + i * 0.5) * 20;
                gradient.addColorStop(
                    i / 10,
                    `hsla(${wave.hue + hueVar}, ${wave.saturation}%, ${wave.lightness}%, ${wave.alpha * 0.5})`
                );
            }

            ctx.beginPath();
            ctx.moveTo(0, height);

            for (let x = 0; x <= width; x += 3) {
                const y = wave.baseY +
                    Math.sin(x * wave.frequency + time * wave.speed * 0.01 + wave.phase + layerOffset) *
                    wave.amplitude *
                    (1 + Math.sin(time * 0.0005) * 0.3) +
                    Math.sin(x * wave.frequency * 2 + time * wave.speed * 0.02 + layerOffset * 2) *
                    wave.amplitude * 0.3;

                ctx.lineTo(x, y);
            }

            ctx.lineTo(width, height);
            ctx.closePath();

            ctx.fillStyle = gradient;
            ctx.fill();

            // Add glow effect
            ctx.shadowColor = `hsla(${wave.hue}, ${wave.saturation}%, ${wave.lightness}%, ${wave.alpha})`;
            ctx.shadowBlur = 20;
        }

        function draw() {
            // Dark gradient background
            const bgGradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height) * 0.7
            );
            bgGradient.addColorStop(0, '#0a0a2a');
            bgGradient.addColorStop(0.5, '#050515');
            bgGradient.addColorStop(1, '#000008');

            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);

            // Draw stars
            ctx.shadowBlur = 0;
            for (let i = 0; i < 100; i++) {
                const x = (Math.sin(i * 123.456) * 0.5 + 0.5) * width;
                const y = (Math.cos(i * 789.012) * 0.5 + 0.5) * height * 0.6;
                const size = Math.sin(time * 0.002 + i) * 0.5 + 1;
                const alpha = Math.sin(time * 0.001 + i * 2) * 0.3 + 0.5;

                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw aurora waves
            waves.forEach((wave, index) => {
                for (let layer = 0; layer < wave.layers; layer++) {
                    drawWave(wave, layer * 0.5);
                }
            });

            time++;
            requestAnimationFrame(draw);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
