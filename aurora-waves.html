<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aurora Waves - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            color: #7fffd4;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(127, 255, 212, 0.5);
        }

        canvas {
            border: 2px solid rgba(127, 255, 212, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(127, 255, 212, 0.2);
            background: #0a0a1a;
            max-width: 100%;
            height: auto;
        }

        .fullscreen-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #1a1a3a, #2a2a5a);
            color: #7fffd4;
            border: 2px solid #7fffd4;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .fullscreen-btn:hover {
            background: linear-gradient(135deg, #2a2a5a, #3a3a7a);
            box-shadow: 0 0 20px rgba(127, 255, 212, 0.4);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Aurora Waves</h1>
        <canvas id="canvas" width="700" height="500"></canvas>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 全画面表示</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // タッチ・マウス対応
        let isTouching = false;
        let touchX = 0;
        let touchY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isTouching = true;
            touchX = e.offsetX;
            touchY = e.offsetY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isTouching) {
                touchX = e.offsetX;
                touchY = e.offsetY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isTouching = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isTouching = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isTouching = true;
            const rect = canvas.getBoundingClientRect();
            touchX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
            touchY = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isTouching) {
                const rect = canvas.getBoundingClientRect();
                touchX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
                touchY = (e.touches[0].clientY - rect.top) * (canvas.height / rect.height);
            }
        });

        canvas.addEventListener('touchend', () => {
            isTouching = false;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 波のクラス
        class Wave {
            constructor(amplitude, frequency, phase, speed, color) {
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.phase = phase;
                this.speed = speed;
                this.color = color;
            }

            draw(time, touchEffect) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height / 2);

                for (let x = 0; x < canvas.width; x++) {
                    const baseY = canvas.height / 2;
                    const distanceToTouch = Math.sqrt(Math.pow(x - touchX, 2) + Math.pow(baseY - touchY, 2));
                    const touchInfluence = isTouching ? Math.exp(-distanceToTouch / 150) * 30 : 0;

                    const y = baseY +
                        Math.sin(x * this.frequency + time * this.speed + this.phase) * this.amplitude +
                        Math.sin(x * this.frequency * 2 + time * this.speed * 1.5) * (this.amplitude * 0.3) +
                        touchInfluence;

                    ctx.lineTo(x, y);
                }

                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // 波を生成
        const waves = [];
        const colors = [
            'rgba(0, 255, 255, 0.6)',    // Cyan
            'rgba(127, 255, 212, 0.5)',  // Aquamarine
            'rgba(138, 43, 226, 0.4)',   // Blue Violet
            'rgba(255, 0, 255, 0.3)',    // Magenta
            'rgba(0, 191, 255, 0.4)',    // Deep Sky Blue
        ];

        for (let i = 0; i < 5; i++) {
            waves.push(new Wave(
                30 + i * 10,           // amplitude
                0.005 + i * 0.002,     // frequency
                i * Math.PI / 3,        // phase
                0.5 + i * 0.1,          // speed
                colors[i]               // color
            ));
        }

        // パーティクルクラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.2;
                this.hue = Math.random() * 60 + 160; // Cyan to Blue range
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > canvas.width ||
                    this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.opacity})`;
                ctx.fill();
            }
        }

        // パーティクルを生成
        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        // アニメーションループ
        let time = 0;
        function animate() {
            // グラデーション背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#0a0a2a');
            gradient.addColorStop(1, '#0a0a1a');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パーティクルを描画（背景）
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 波を描画
            waves.forEach(wave => {
                wave.draw(time, 0);
            });

            // グロー効果
            ctx.globalCompositeOperation = 'lighter';
            waves.forEach(wave => {
                wave.draw(time, 0);
            });
            ctx.globalCompositeOperation = 'source-over';

            time += 0.02;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
