<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幾何学的織物 - Geometric Weaving</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Geometric Weaving | 幾何学的織物</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        // 幾何学的パターンのパラメータ
        const patterns = [
            { sides: 3, radius: 150, speed: 0.001, rotation: 0 },
            { sides: 4, radius: 120, speed: -0.0015, rotation: Math.PI / 4 },
            { sides: 5, radius: 100, speed: 0.002, rotation: Math.PI / 5 },
            { sides: 6, radius: 80, speed: -0.0025, rotation: 0 },
            { sides: 8, radius: 60, speed: 0.003, rotation: Math.PI / 8 }
        ];

        function getPolygonPoints(sides, radius, rotation, offsetX = 0, offsetY = 0) {
            const points = [];
            for (let i = 0; i < sides; i++) {
                const angle = (i / sides) * Math.PI * 2 + rotation;
                points.push({
                    x: centerX + offsetX + Math.cos(angle) * radius,
                    y: centerY + offsetY + Math.sin(angle) * radius
                });
            }
            return points;
        }

        function drawPolygon(points, color, lineWidth = 1) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            points.forEach((point, i) => {
                if (i === 0) ctx.moveTo(point.x, point.y);
                else ctx.lineTo(point.x, point.y);
            });
            ctx.closePath();
            ctx.stroke();
        }

        function drawConnections(points1, points2, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 0.5;

            for (let i = 0; i < points1.length; i++) {
                for (let j = 0; j < points2.length; j++) {
                    const dist = Math.hypot(
                        points1[i].x - points2[j].x,
                        points1[i].y - points2[j].y
                    );

                    if (dist < 100) {
                        const alpha = 1 - (dist / 100);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
                        ctx.beginPath();
                        ctx.moveTo(points1[i].x, points1[i].y);
                        ctx.lineTo(points2[j].x, points2[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function getRainbowColor(offset) {
            const hue = (time * 20 + offset) % 360;
            return `hsl(${hue}, 70%, 60%)`;
        }

        function draw() {
            // 背景を半透明で塗りつぶしてトレイル効果
            ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 複数の幾何学パターンを描画
            const allPoints = [];

            patterns.forEach((pattern, index) => {
                const rotation = pattern.rotation + time * pattern.speed * 100;
                const points = getPolygonPoints(
                    pattern.sides,
                    pattern.radius + Math.sin(time * 0.5 + index) * 20,
                    rotation
                );

                allPoints.push(points);

                const color = getRainbowColor(index * 72);
                drawPolygon(points, color, 2);
            });

            // パターン間の接続を描画
            for (let i = 0; i < allPoints.length - 1; i++) {
                drawConnections(allPoints[i], allPoints[i + 1], 'rgba(255, 255, 255, 0.3)');
            }

            // 中心から放射状の線を描画
            const numRays = 12;
            for (let i = 0; i < numRays; i++) {
                const angle = (i / numRays) * Math.PI * 2 + time * 0.01;
                const length = 200 + Math.sin(time + i) * 50;

                const gradient = ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, length
                );

                const hue = (time * 30 + i * 30) % 360;
                gradient.addColorStop(0, `hsla(${hue}, 70%, 60%, 0.6)`);
                gradient.addColorStop(1, `hsla(${hue}, 70%, 60%, 0)`);

                ctx.beginPath();
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + Math.cos(angle) * length,
                    centerY + Math.sin(angle) * length
                );
                ctx.stroke();
            }

            // 外側の装飾的な円を描画
            for (let i = 0; i < 3; i++) {
                const radius = 250 + i * 30 + Math.sin(time * 0.3 + i) * 20;
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255, 255, 255, ${0.1 - i * 0.03})`;
                ctx.lineWidth = 1;
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.stroke();
            }

            time += 0.016;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
