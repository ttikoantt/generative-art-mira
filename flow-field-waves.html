<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Field Waves by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
        .info span {
            color: #00ffaa;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <div>Flow Field Waves | Hourly Experiment #1</div>
        <div>Click to • <span>respawn particles</span></div>
        <div>Move mouse to • <span>influence flow</span></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let time = 0;

        // Flow field configuration
        const scale = 20;
        const cols = Math.floor(width / scale);
        const rows = Math.floor(height / scale);

        // Particle system
        const particles = [];
        const particleCount = 3000;
        const colors = [
            { r: 0, g: 255, b: 170 },   // Cyan
            { r: 100, g: 200, b: 255 },  // Light Blue
            { r: 180, g: 100, b: 255 },  // Purple
            { r: 255, g: 100, b: 200 },  // Pink
            { r: 255, g: 200, b: 100 }   // Orange
        ];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.ax = 0;
                this.ay = 0;
                this.maxSpeed = 2 + Math.random() * 2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.life = 1;
                this.decay = 0.001 + Math.random() * 0.002;
                this.size = 1 + Math.random() * 1.5;
                this.trail = [];
                this.maxTrail = 10;
            }

            getFlowAngle(x, y) {
                // Perlin noise-like function using sine waves
                const noiseX = x * 0.005;
                const noiseY = y * 0.005;
                const noiseZ = time * 0.001;

                // Multiple overlapping sine waves for organic flow
                const angle =
                    Math.sin(noiseX + noiseZ) * Math.PI * 2 +
                    Math.cos(noiseY + noiseZ * 0.5) * Math.PI +
                    Math.sin((noiseX + noiseY) * 0.5 + noiseZ * 0.3) * Math.PI * 0.5;

                return angle;
            }

            update() {
                // Get flow field angle at current position
                const angle = this.getFlowAngle(this.x, this.y);

                // Calculate acceleration based on flow angle
                this.ax = Math.cos(angle) * 0.2;
                this.ay = Math.sin(angle) * 0.2;

                // Mouse influence
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    const force = (200 - dist) / 200 * 0.5;
                    this.ax += (dx / dist) * force;
                    this.ay += (dy / dist) * force;
                }

                // Update velocity
                this.vx += this.ax;
                this.vy += this.ay;

                // Limit speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.maxSpeed) {
                    this.vx = (this.vx / speed) * this.maxSpeed;
                    this.vy = (this.vy / speed) * this.maxSpeed;
                }

                // Store trail
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // Update position
                this.x += this.vx;
                this.y += this.vy;

                // Decay life
                this.life -= this.decay;

                // Wrap or reset
                if (this.life <= 0 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw(ctx) {
                // Draw trail
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.lineTo(this.x, this.y);
                    ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.life * 0.3})`;
                    ctx.lineWidth = this.size;
                    ctx.stroke();
                }

                // Draw particle head
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.life})`;
                ctx.fill();
            }
        }

        // Initialize particles
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', () => {
            particles.forEach(p => {
                if (Math.random() > 0.5) {
                    p.reset();
                }
            });
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Animation loop
        function animate() {
            // Fade effect for trails
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            particles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });

            time++;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
