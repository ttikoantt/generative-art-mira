<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art Studio | ミラのクリエイティブ実験</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff00;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            animation: fadeIn 1s ease-in;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            text-shadow: 0 0 20px #00ff00;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        .subtitle {
            color: #888;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #00ff00; }
            to { text-shadow: 0 0 40px #00ff00, 0 0 60px #00ff00; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .upload-section {
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 30px;
            margin: 30px 0;
            text-align: center;
            transition: all 0.3s ease;
        }

        .upload-section:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        .upload-btn {
            background: linear-gradient(135deg, #00ff00 0%, #00aa00 100%);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }

        .upload-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        input[type="file"] {
            display: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 20px 0;
        }

        .control-group {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 5px;
            border: 1px solid #00ff00;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .control-group input[type="range"] {
            width: 200px;
            accent-color: #00ff00;
        }

        .value-display {
            color: #00ff00;
            font-weight: bold;
        }

        .preview-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .preview-box {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            min-height: 400px;
        }

        .preview-box h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #00ff00;
        }

        .image-preview {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 350px;
            border-radius: 5px;
        }

        .ascii-output {
            background: #000;
            color: #00ff00;
            padding: 20px;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre;
            font-size: 8px;
            line-height: 1;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .placeholder {
            color: #666;
            text-align: center;
            padding: 50px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 12px 30px;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #00ff00;
            color: #000;
            transform: scale(1.05);
        }

        .btn-secondary {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .btn-secondary:hover {
            background: #ff6b6b;
            color: #fff;
        }

        @media (max-width: 768px) {
            .preview-section {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .ascii-output {
                font-size: 4px;
            }
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00ff00;
            color: #000;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.8);
        }

        .info {
            background: rgba(0, 255, 0, 0.1);
            border-left: 4px solid #00ff00;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.9rem;
        }

        .character-sets {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 15px 0;
        }

        .charset-btn {
            padding: 8px 16px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ ASCII Art Studio</h1>
            <p class="subtitle">画像をアスキーアートに変換</p>
        </header>

        <section class="upload-section">
            <input type="file" id="imageInput" accept="image/*">
            <button class="upload-btn" onclick="document.getElementById('imageInput').click()">
                📁 画像を選択
            </button>
            <button class="upload-btn" onclick="loadSampleImage()">
                🎲 サンプル画像
            </button>
        </section>

        <section class="controls">
            <div class="control-group">
                <label>幅: <span id="widthValue" class="value-display">100</span>文字</label>
                <input type="range" id="widthControl" min="30" max="200" value="100">
            </div>

            <div class="control-group">
                <label>コントラスト: <span id="contrastValue" class="value-display">1.0</span></label>
                <input type="range" id="contrastControl" min="0.5" max="2" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>文字セット</label>
                <div class="character-sets">
                    <button class="btn charset-btn" onclick="setCharset('standard')">標準</button>
                    <button class="btn charset-btn" onclick="setCharset('simple')">シンプル</button>
                    <button class="btn charset-btn" onclick="setCharset('detailed')">詳細</button>
                    <button class="btn charset-btn" onclick="setCharset('blocks')">ブロック</button>
                </div>
            </div>
        </section>

        <section class="preview-section">
            <div class="preview-box">
                <h3>📷 元の画像</h3>
                <div class="image-preview" id="imagePreview">
                    <div class="placeholder">画像をアップロードしてください</div>
                </div>
            </div>

            <div class="preview-box">
                <h3>🎨 ASCIIアート</h3>
                <div class="ascii-output" id="asciiOutput">
                    <div class="placeholder">ASCIIアートがここに表示されます</div>
                </div>
            </div>
        </section>

        <div class="action-buttons">
            <button class="btn" onclick="copyToClipboard()">📋 コピー</button>
            <button class="btn btn-secondary" onclick="downloadASCII()">💾 ダウンロード</button>
            <button class="btn" onclick="regenerate()">🔄 再生成</button>
        </div>

        <div class="info">
            💡 <strong>ヒント:</strong> 高解像度の画像ほど美しいASCIIアートになります。幅を調整して最適なバランスを見つけてください。
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面表示">⛶</button>

    <canvas id="canvas" style="display: none;"></canvas>

    <script>
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const asciiOutput = document.getElementById('asciiOutput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentImage = null;

        const charSets = {
            standard: '@%#*+=-:. ',
            simple: '@#=-. ',
            detailed: '$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,"^`\'. ',
            blocks: '█▓▒░ '
        };

        let currentCharset = charSets.standard;
        let outputWidth = 100;
        let contrast = 1.0;

        // コントロールイベント
        document.getElementById('widthControl').addEventListener('input', (e) => {
            outputWidth = parseInt(e.target.value);
            document.getElementById('widthValue').textContent = outputWidth;
            if (currentImage) generateASCII();
        });

        document.getElementById('contrastControl').addEventListener('input', (e) => {
            contrast = parseFloat(e.target.value);
            document.getElementById('contrastValue').textContent = contrast.toFixed(1);
            if (currentImage) generateASCII();
        });

        imageInput.addEventListener('change', handleImageUpload);

        function setCharset(type) {
            currentCharset = charSets[type];
            if (currentImage) generateASCII();
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                loadImage(event.target.result);
            };
            reader.readAsDataURL(file);
        }

        function loadSampleImage() {
            // サンプル画像を生成（グラデーション）
            const sampleCanvas = document.createElement('canvas');
            sampleCanvas.width = 300;
            sampleCanvas.height = 300;
            const sampleCtx = sampleCanvas.getContext('2d');

            // 美しいグラデーション
            const gradient = sampleCtx.createRadialGradient(150, 150, 0, 150, 150, 150);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(0.3, '#feca57');
            gradient.addColorStop(0.6, '#48dbfb');
            gradient.addColorStop(1, '#ff9ff3');

            sampleCtx.fillStyle = gradient;
            sampleCtx.fillRect(0, 0, 300, 300);

            // 図形を追加
            sampleCtx.fillStyle = '#fff';
            sampleCtx.beginPath();
            sampleCtx.arc(150, 150, 50, 0, Math.PI * 2);
            sampleCtx.fill();

            loadImage(sampleCanvas.toDataURL());
        }

        function loadImage(src) {
            const img = new Image();
            img.onload = () => {
                currentImage = img;
                imagePreview.innerHTML = `<img src="${src}" alt="Uploaded image">`;
                generateASCII();
            };
            img.src = src;
        }

        function generateASCII() {
            if (!currentImage) return;

            // アスペクト比を維持
            const aspectRatio = currentImage.height / currentImage.width;
            const outputHeight = Math.floor(outputWidth * aspectRatio * 0.5); // 0.5で文字の縦横比補正

            canvas.width = outputWidth;
            canvas.height = outputHeight;

            // 画像をリサイズ
            ctx.drawImage(currentImage, 0, 0, outputWidth, outputHeight);

            const imageData = ctx.getImageData(0, 0, outputWidth, outputHeight);
            const pixels = imageData.data;

            let ascii = '';

            for (let y = 0; y < outputHeight; y++) {
                for (let x = 0; x < outputWidth; x++) {
                    const i = (y * outputWidth + x) * 4;
                    let r = pixels[i];
                    let g = pixels[i + 1];
                    let b = pixels[i + 2];

                    // コントラスト調整
                    r = Math.min(255, Math.max(0, (r - 128) * contrast + 128));
                    g = Math.min(255, Math.max(0, (g - 128) * contrast + 128));
                    b = Math.min(255, Math.max(0, (b - 128) * contrast + 128));

                    // 輝度を計算
                    const brightness = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
                    const charIndex = Math.floor(brightness * (currentCharset.length - 1));
                    ascii += currentCharset[charIndex];
                }
                ascii += '\n';
            }

            asciiOutput.textContent = ascii;
        }

        function copyToClipboard() {
            const asciiText = asciiOutput.textContent;
            if (asciiText.includes('placeholder')) {
                alert('まず画像をアップロードしてください');
                return;
            }
            navigator.clipboard.writeText(asciiText);
            alert('クリップボードにコピーしました！');
        }

        function downloadASCII() {
            const asciiText = asciiOutput.textContent;
            if (asciiText.includes('placeholder')) {
                alert('まず画像をアップロードしてください');
                return;
            }
            const blob = new Blob([asciiText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ascii-art.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function regenerate() {
            if (currentImage) {
                generateASCII();
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
