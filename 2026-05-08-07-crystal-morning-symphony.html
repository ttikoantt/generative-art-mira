<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Morning Symphony - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            overflow: hidden;
            font-family: 'Georgia', serif;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        #title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            z-index: 100;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="title">✨ Crystal Morning Symphony ✨</div>
    <div id="info">Click to spawn crystals • Move mouse to influence growth</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        let mouseX = width / 2;
        let mouseY = height / 2;
        let time = 0;
        
        // Crystal structures
        class Crystal {
            constructor(x, y, size = null) {
                this.x = x;
                this.y = y;
                this.size = size || Math.random() * 40 + 20;
                this.angle = Math.random() * Math.PI * 2;
                this.growthSpeed = Math.random() * 0.02 + 0.01;
                this.currentSize = 0;
                this.maxSize = this.size;
                this.sides = Math.floor(Math.random() * 4) + 3; // 3-6 sides
                this.hue = Math.random() * 60 + 180; // Blue-cyan range
                this.alpha = 0;
                this.targetAlpha = Math.random() * 0.5 + 0.3;
                this.rotationSpeed = (Math.random() - 0.5) * 0.01;
                this.reflections = [];
                this.growing = true;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.branches = [];
                
                // Generate branches
                if (Math.random() > 0.5) {
                    const branchCount = Math.floor(Math.random() * 3) + 1;
                    for (let i = 0; i < branchCount; i++) {
                        this.branches.push({
                            angle: (Math.PI * 2 / branchCount) * i,
                            length: Math.random() * 0.5 + 0.3,
                            width: Math.random() * 0.3 + 0.1
                        });
                    }
                }
            }
            
            update() {
                // Grow in
                if (this.growing) {
                    this.currentSize += (this.maxSize - this.currentSize) * 0.05;
                    this.alpha += (this.targetAlpha - this.alpha) * 0.05;
                    if (Math.abs(this.maxSize - this.currentSize) < 0.1) {
                        this.growing = false;
                    }
                }
                
                // Rotate slowly
                this.angle += this.rotationSpeed;
                
                // Pulse effect
                this.pulsePhase += 0.02;
                
                // Update reflections
                this.reflections = this.reflections.filter(ref => ref.life > 0);
                this.reflections.forEach(ref => {
                    ref.x += ref.vx;
                    ref.y += ref.vy;
                    ref.life -= 0.02;
                    ref.alpha = ref.life * 0.5;
                });
                
                // Mouse influence
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200 && Math.random() > 0.95) {
                    this.spawnReflection();
                }
                
                // Random refraction
                if (Math.random() > 0.99) {
                    this.spawnReflection();
                }
            }
            
            spawnReflection() {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2 + 1;
                this.reflections.push({
                    x: this.x,
                    y: this.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    alpha: 0.5,
                    hue: this.hue + Math.random() * 30 - 15
                });
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                const pulse = Math.sin(this.pulsePhase) * 0.1 + 1;
                const size = this.currentSize * pulse;
                
                // Draw main crystal
                this.drawCrystalShape(0, 0, size, this.angle, this.hue, this.alpha);
                
                // Draw branches
                this.branches.forEach(branch => {
                    const bx = Math.cos(this.angle + branch.angle) * size * 0.8;
                    const by = Math.sin(this.angle + branch.angle) * size * 0.8;
                    this.drawCrystalShape(
                        bx, by,
                        size * branch.length,
                        this.angle + branch.angle,
                        this.hue + 20,
                        this.alpha * 0.7
                    );
                });
                
                ctx.restore();
                
                // Draw reflections
                this.reflections.forEach(ref => {
                    ctx.save();
                    ctx.translate(ref.x, ref.y);
                    this.drawCrystalShape(0, 0, 3, ref.life * Math.PI, ref.hue, ref.alpha);
                    ctx.restore();
                });
            }
            
            drawCrystalShape(x, y, size, angle, hue, alpha) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                
                // Outer glow
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 1.5);
                gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, size * 1.5, 0, Math.PI * 2);
                ctx.fill();
                
                // Crystal facets
                for (let i = 0; i < this.sides; i++) {
                    const facetAngle = (Math.PI * 2 / this.sides) * i;
                    const nextAngle = (Math.PI * 2 / this.sides) * (i + 1);
                    
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(
                        Math.cos(facetAngle) * size,
                        Math.sin(facetAngle) * size
                    );
                    ctx.lineTo(
                        Math.cos(nextAngle) * size,
                        Math.sin(nextAngle) * size
                    );
                    ctx.closePath();
                    
                    // Facet gradient for 3D effect
                    const facetGradient = ctx.createLinearGradient(
                        Math.cos(facetAngle) * size,
                        Math.sin(facetAngle) * size,
                        0, 0
                    );
                    const lightness = 50 + Math.sin(facetAngle + time * 0.5) * 20;
                    facetGradient.addColorStop(0, `hsla(${hue}, 80%, ${lightness}%, ${alpha})`);
                    facetGradient.addColorStop(1, `hsla(${hue}, 100%, 30%, ${alpha * 0.5})`);
                    
                    ctx.fillStyle = facetGradient;
                    ctx.fill();
                    
                    // Edge highlight
                    ctx.strokeStyle = `hsla(${hue}, 100%, 80%, ${alpha * 0.8})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                // Center glow
                const centerGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.3);
                centerGlow.addColorStop(0, `hsla(${hue + 30}, 100%, 90%, ${alpha})`);
                centerGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = centerGlow;
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // Floating light particles
        class LightParticle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.hue = Math.random() * 60 + 180;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.life = 1;
                this.maxLife = Math.random() * 200 + 100;
                this.age = 0;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.age++;
                
                // Mouse attraction
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 150) {
                    this.x += dx * 0.01;
                    this.y += dy * 0.01;
                }
                
                // Fade out
                if (this.age > this.maxLife * 0.8) {
                    this.alpha = ((this.maxLife - this.age) / (this.maxLife * 0.2)) * 0.5;
                }
                
                // Reset
                if (this.age >= this.maxLife || 
                    this.x < -50 || this.x > width + 50 ||
                    this.y < -50 || this.y > height + 50) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // Initialize
        const crystals = [];
        const particles = [];
        
        // Spawn initial crystals
        for (let i = 0; i < 15; i++) {
            crystals.push(new Crystal(
                Math.random() * width,
                Math.random() * height
            ));
        }
        
        // Spawn particles
        for (let i = 0; i < 100; i++) {
            particles.push(new LightParticle());
        }
        
        // Background gradient
        function drawBackground() {
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height) / 2
            );
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#0f0f23');
            gradient.addColorStop(1, '#050510');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Morning light rays
            ctx.save();
            ctx.globalAlpha = 0.03;
            for (let i = 0; i < 12; i++) {
                const angle = (time * 0.2) + (Math.PI * 2 / 12) * i;
                const gradient = ctx.createLinearGradient(
                    width / 2, height / 2,
                    width / 2 + Math.cos(angle) * width,
                    height / 2 + Math.sin(angle) * height
                );
                gradient.addColorStop(0, `hsla(${200 + i * 10}, 100%, 70%, 0.5)`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(width / 2, height / 2);
                ctx.lineTo(
                    width / 2 + Math.cos(angle - 0.1) * width,
                    height / 2 + Math.sin(angle - 0.1) * height
                );
                ctx.lineTo(
                    width / 2 + Math.cos(angle + 0.1) * width,
                    height / 2 + Math.sin(angle + 0.1) * height
                );
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
        }
        
        // Animation loop
        function animate() {
            time += 0.01;
            
            drawBackground();
            
            // Update and draw particles
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // Update and draw crystals (sorted by size for layering)
            crystals.sort((a, b) => a.currentSize - b.currentSize);
            crystals.forEach(crystal => {
                crystal.update();
                crystal.draw();
            });
            
            // Connection lines between nearby crystals
            ctx.save();
            ctx.globalAlpha = 0.1;
            crystals.forEach((crystal, i) => {
                crystals.slice(i + 1).forEach(other => {
                    const dx = crystal.x - other.x;
                    const dy = crystal.y - other.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 250) {
                        const gradient = ctx.createLinearGradient(
                            crystal.x, crystal.y, other.x, other.y
                        );
                        gradient.addColorStop(0, `hsla(${crystal.hue}, 100%, 70%, ${(1 - dist / 250) * 0.3})`);
                        gradient.addColorStop(1, `hsla(${other.hue}, 100%, 70%, ${(1 - dist / 250) * 0.3})`);
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(crystal.x, crystal.y);
                        ctx.lineTo(other.x, other.y);
                        ctx.stroke();
                    }
                });
            });
            ctx.restore();
            
            requestAnimationFrame(animate);
        }
        
        // Event listeners
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Spawn new crystal
            crystals.push(new Crystal(x, y));
            
            // Limit crystal count
            if (crystals.length > 30) {
                crystals.shift();
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // Start animation
        animate();
    </script>
</body>
</html>
