<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Spiral Galaxy - Mira's Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(138, 180, 248, 0.8);
            pointer-events: none;
            z-index: 100;
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #8ab4f8, #c58af9, #f98b8b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info p {
            opacity: 0.8;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(138, 180, 248, 0.2);
            border: 1px solid rgba(138, 180, 248, 0.4);
            color: #8ab4f8;
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        }

        .control-btn:hover {
            background: rgba(138, 180, 248, 0.3);
            border-color: rgba(138, 180, 248, 0.6);
            box-shadow: 0 0 20px rgba(138, 180, 248, 0.3);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .info {
                top: 10px;
                left: 10px;
                font-size: 12px;
            }

            .info h1 {
                font-size: 14px;
            }

            .info p {
                font-size: 10px;
            }

            .controls {
                bottom: 10px;
                gap: 10px;
            }

            .control-btn {
                padding: 10px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>🌌 Spinning Spiral Galaxy</h1>
        <p>ドラッグで回転速度を調整</p>
        <p>クリックで星をリセット</p>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="togglePause()">一時停止/再開</button>
        <button class="control-btn" onclick="resetGalaxy()">銀河リセット</button>
        <button class="control-btn" onclick="changeColorScheme()">色変更</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let stars = [];
        let paused = false;
        let mouseX = 0;
        let rotationSpeed = 0.001;
        let targetRotationSpeed = 0.001;
        let colorScheme = 0;
        let isDragging = false;
        let dragStartX = 0;

        const colorSchemes = [
            // Classic Galaxy (Blue to Pink)
            ['#8ab4f8', '#a8c7fa', '#c58af9', '#f98b8b', '#ffb4b4'],
            // Fire Galaxy (Red to Yellow)
            ['#ff6b6b', '#ffa500', '#ffd700', '#ff8c00', '#dc143c'],
            // Ocean Galaxy (Cyan to Blue)
            ['#00ced1', '#40e0d0', '#1e90ff', '#00bfff', '#87ceeb'],
            // Aurora Galaxy (Green to Purple)
            ['#00ff7f', '#7fff00', '#9370db', '#8a2be2', '#ff00ff']
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                const arm = Math.floor(Math.random() * 3);
                const armOffset = (arm * Math.PI * 2) / 3;
                const distance = Math.random() * Math.min(width, height) * 0.4;
                const spiralAngle = distance * 0.02 + armOffset;

                this.x = Math.cos(spiralAngle) * distance;
                this.y = Math.sin(spiralAngle) * distance;
                this.z = Math.random() * 2 + 0.5;
                this.baseSize = Math.random() * 2 + 1;
                this.angle = Math.random() * Math.PI * 2;
                this.orbitSpeed = (Math.random() * 0.0005 + 0.0002) / this.z;
                this.color = colorSchemes[colorScheme][Math.floor(Math.random() * 5)];
                this.brightness = Math.random() * 0.5 + 0.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinkleOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.angle += this.orbitSpeed + rotationSpeed / this.z;
            }

            draw() {
                const twinkle = Math.sin(Date.now() * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
                const x = centerX + Math.cos(this.angle) * Math.sqrt(this.x * this.x + this.y * this.y);
                const y = centerY + Math.sin(this.angle) * Math.sqrt(this.x * this.x + this.y * this.y);
                const size = this.baseSize * this.z * twinkle;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '80');
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(x, y, size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.brightness * twinkle;
                ctx.fill();
                ctx.globalAlpha = 1;

                // Core glow
                if (this.z > 1.8) {
                    ctx.beginPath();
                    ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.globalAlpha = twinkle;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
        }

        function initStars() {
            stars = [];
            const numStars = Math.floor((width * height) / 3000);
            for (let i = 0; i < numStars; i++) {
                stars.push(new Star());
            }
        }

        function drawBackground() {
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height) * 0.6);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#050510');
            gradient.addColorStop(1, '#000005');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        function animate() {
            if (!paused) {
                drawBackground();

                // Smooth rotation speed transition
                rotationSpeed += (targetRotationSpeed - rotationSpeed) * 0.05;

                // Center glow
                const centerGlow = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 50);
                centerGlow.addColorStop(0, 'rgba(255, 255, 255, 0.1)');
                centerGlow.addColorStop(0.5, 'rgba(138, 180, 248, 0.05)');
                centerGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = centerGlow;
                ctx.fillRect(0, 0, width, height);

                // Sort by z for proper layering
                stars.sort((a, b) => a.z - b.z);

                stars.forEach(star => {
                    star.update();
                    star.draw();
                });
            }

            requestAnimationFrame(animate);
        }

        function togglePause() {
            paused = !paused;
        }

        function resetGalaxy() {
            initStars();
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            stars.forEach(star => {
                star.color = colorSchemes[colorScheme][Math.floor(Math.random() * 5)];
            });
        }

        // Mouse/Touch controls
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - dragStartX;
                targetRotationSpeed = Math.max(-0.01, Math.min(0.01, deltaX * 0.0001));
                dragStartX = e.clientX;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
            targetRotationSpeed = 0.001;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
            targetRotationSpeed = 0.001;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            dragStartX = e.touches[0].clientX;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const deltaX = e.touches[0].clientX - dragStartX;
                targetRotationSpeed = Math.max(-0.01, Math.min(0.01, deltaX * 0.0001));
                dragStartX = e.touches[0].clientX;
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
            targetRotationSpeed = 0.001;
        });

        // Double tap to reset
        let lastTap = 0;
        canvas.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 500 && tapLength > 0) {
                resetGalaxy();
            }
            lastTap = currentTime;
        });

        window.addEventListener('resize', () => {
            resize();
            initStars();
        });

        // Initialize
        resize();
        initStars();
        animate();
    </script>
</body>
</html>
