<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gravity Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: white;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(0.8rem, 3vw, 1rem);
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        #canvas-container {
            position: relative;
            width: 90vw;
            height: 60vh;
            max-width: 800px;
            max-height: 500px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
        }

        .gravity-point {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 200, 100, 1), rgba(255, 100, 50, 0));
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: pulse 1s ease-in-out infinite;
            z-index: 5;
            box-shadow: 0 0 30px rgba(255, 200, 100, 0.8),
                        0 0 60px rgba(255, 150, 50, 0.5);
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 0.7;
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 12px;
                font-size: 12px;
            }

            #canvas-container {
                width: 95vw;
                height: 55vh;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.3rem;
            }

            .subtitle {
                font-size: 0.75rem;
            }

            #canvas-container {
                width: 98vw;
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ 全画面</button>

    <h1>🌌 Gravity Particles</h1>
    <p class="subtitle">クリックで引力源を作成 • パーティクルを集めよう</p>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        let particles = [];
        let gravityPoints = [];
        let mouseX = 0;
        let mouseY = 0;

        // キャンバスサイズ設定
        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // パーティクルクラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.color = this.getRandomColor();
                this.alpha = Math.random() * 0.5 + 0.5;
                this.trail = [];
                this.maxTrail = 20;
            }

            getRandomColor() {
                const colors = [
                    '#FF6B9D', '#C084FC', '#60A5FA', '#34D399',
                    '#FBBF24', '#F87171', '#A78BFA', '#2DD4BF'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // 軌跡を保存
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // 引力源の影響
                gravityPoints.forEach(point => {
                    const dx = point.x - this.x;
                    const dy = point.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance > 10) {
                        const force = point.strength / (distance * distance);
                        const ax = (dx / distance) * force;
                        const ay = (dy / distance) * force;

                        this.vx += ax;
                        this.vy += ay;
                    }
                });

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 8) {
                    this.vx = (this.vx / speed) * 8;
                    this.vy = (this.vy / speed) * 8;
                }

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // 境界処理
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // 減速
                this.vx *= 0.99;
                this.vy *= 0.99;
            }

            draw() {
                // 軌跡を描画
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);

                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }

                    ctx.strokeStyle = this.color + Math.floor(this.alpha * 100).toString(16).padStart(2, '0');
                    ctx.lineWidth = this.radius * 0.5;
                    ctx.stroke();
                }

                // パーティクルを描画
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // パーティクルを初期化
        function initParticles() {
            particles = [];
            const particleCount = Math.min(150, Math.floor((canvas.width * canvas.height) / 3000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        initParticles();

        // クリックで引力源を作成
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            addGravityPoint(x, y);
        });

        // タッチ操作
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            addGravityPoint(x, y);
        });

        function addGravityPoint(x, y) {
            // 既存の引力点を削除
            gravityPoints = [];

            // 新しい引力点を追加
            gravityPoints.push({
                x: x,
                y: y,
                strength: 500,
                life: 180
            });

            // DOM要素を追加
            const container = document.getElementById('canvas-container');
            const existingPoint = container.querySelector('.gravity-point');
            if (existingPoint) {
                existingPoint.remove();
            }

            const gravityEl = document.createElement('div');
            gravityEl.className = 'gravity-point';
            gravityEl.style.left = x + 'px';
            gravityEl.style.top = y + 'px';
            container.appendChild(gravityEl);
        }

        // アニメーションループ
        function animate() {
            // 半透明背景でフェード効果
            ctx.fillStyle = 'rgba(15, 12, 41, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パーティクルを更新・描画
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 引力点の寿命を管理
            gravityPoints = gravityPoints.filter(point => {
                point.life--;
                return point.life > 0;
            });

            if (gravityPoints.length === 0) {
                const gravityEl = container.querySelector('.gravity-point');
                if (gravityEl) {
                    gravityEl.remove();
                }
            }

            requestAnimationFrame(animate);
        }

        animate();

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
