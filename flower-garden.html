<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ジェネレーティブ・フラワー・ガーデン</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.8rem;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .flower-count {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌸 ジェネレーティブ・フラワー・ガーデン</h1>
        <p class="subtitle">クリックして花を咲かせよう</p>
    </div>

    <div class="flower-count">
        <span id="count">0</span> 本の花が咲いています
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="clearGarden()">クリア</button>
        <button onclick="randomGarden()">ランダム生成</button>
        <button onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const countEl = document.getElementById('count');

        let flowers = [];
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function generateColor() {
            const colors = [
                ['#FF6B6B', '#FF8E8E', '#FFB4B4'],
                ['#4ECDC4', '#7EDDD6', '#A8EDE8'],
                ['#FFE66D', '#FFF09E', '#FFFACD'],
                ['#95E1D3', '#B5F0E5', '#D5F9F0'],
                ['#F38181', '#F7A4A4', '#FCC7C7'],
                ['#AA96DA', '#C4B6E8', '#DED6F4'],
                ['#FCBAD3', '#FDCEE0', '#FEE2ED'],
                ['#A8E6CF', '#C5F0DE', '#E2FAED'],
                ['#FFD93D', '#FFE575', '#FFF1AB'],
                ['#6BCB77', '#94DD9F', '#BEEFC7']
            ];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        class Flower {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.colors = generateColor();
                this.petalCount = 5 + Math.floor(Math.random() * 4);
                this.maxSize = 30 + Math.random() * 40;
                this.size = 0;
                this.growthSpeed = 0.5 + Math.random() * 0.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.petalShape = Math.random();
                this.centerSize = 5 + Math.random() * 10;
            }

            update() {
                if (this.size < this.maxSize) {
                    this.size += this.growthSpeed;
                }
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Draw petals
                for (let i = 0; i < this.petalCount; i++) {
                    const angle = (i / this.petalCount) * Math.PI * 2;
                    ctx.save();
                    ctx.rotate(angle);

                    ctx.beginPath();
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                    gradient.addColorStop(0, this.colors[0]);
                    gradient.addColorStop(0.5, this.colors[1]);
                    gradient.addColorStop(1, this.colors[2]);

                    ctx.fillStyle = gradient;

                    if (this.petalShape < 0.33) {
                        // Ellipse petals
                        ctx.ellipse(this.size / 2, 0, this.size / 2, this.size / 4, 0, 0, Math.PI * 2);
                    } else if (this.petalShape < 0.66) {
                        // Heart petals
                        ctx.moveTo(0, 0);
                        ctx.bezierCurveTo(this.size / 4, -this.size / 3, this.size, -this.size / 4, this.size / 2, 0);
                        ctx.bezierCurveTo(this.size, this.size / 4, this.size / 4, this.size / 3, 0, 0);
                    } else {
                        // Pointed petals
                        ctx.moveTo(0, 0);
                        ctx.quadraticCurveTo(this.size / 3, -this.size / 4, this.size / 2, 0);
                        ctx.quadraticCurveTo(this.size / 3, this.size / 4, 0, 0);
                    }

                    ctx.fill();
                    ctx.restore();
                }

                // Draw center
                ctx.beginPath();
                const centerGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.centerSize);
                centerGradient.addColorStop(0, '#FFE66D');
                centerGradient.addColorStop(0.5, '#FFD93D');
                centerGradient.addColorStop(1, '#FF9500');
                ctx.fillStyle = centerGradient;
                ctx.arc(0, 0, this.centerSize, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = 2 + Math.random() * 3;
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = (Math.random() - 0.5) * 4 - 2;
                this.gravity = 0.05;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.01;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createFlower(x, y) {
            flowers.push(new Flower(x, y));

            // Create particles
            const colors = generateColor();
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * 3)]));
            }

            updateCount();
        }

        function updateCount() {
            countEl.textContent = flowers.length;
        }

        function clearGarden() {
            flowers = [];
            particles = [];
            updateCount();
        }

        function randomGarden() {
            const count = 10 + Math.floor(Math.random() * 20);
            for (let i = 0; i < count; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                flowers.push(new Flower(x, y));
            }
            updateCount();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw flowers
            flowers.forEach(flower => {
                flower.update();
                flower.draw();
            });

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            createFlower(x, y);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            for (let touch of e.touches) {
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                createFlower(x, y);
            }
        });

        window.addEventListener('resize', resize);
        resize();
        animate();

        // Create initial flowers
        setTimeout(() => {
            randomGarden();
        }, 500);
    </script>
</body>
</html>
