<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Wind Dance - テキストが風のように舞う</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            cursor: pointer;
            touch-action: none;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                top: 10px;
                left: 10px;
            }

            .fullscreen-btn {
                padding: 8px 16px;
                font-size: 12px;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>🎨 Text Wind Dance</div>
        <div>クリック/タッチで風を起こす</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let time = 0;

        const words = [
            'Wind', 'Dance', 'Flow', 'Free', 'Air',
            'Breeze', 'Float', 'Drift', 'Sky', 'Dream',
            'Light', 'Hope', 'Love', 'Peace', 'Joy',
            '風', '舞', '流', '夢', '光',
            '希望', '愛', '平和', '喜び', '空'
        ];

        const colors = [
            '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3',
            '#54a0ff', '#5f27cd', '#00d2d3', '#ff9f43',
            '#ee5a24', '#009432', '#0652DD', '#9980FA'
        ];

        class Particle {
            constructor(x, y, text) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.text = text || words[Math.floor(Math.random() * words.length)];
                this.size = Math.random() * 30 + 15;
                this.color = colors[Math.floor(Math.random() * colors.length)];

                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.life = 1;
                this.decay = Math.random() * 0.002 + 0.001;

                this.baseSize = this.size;
            }

            update() {
                // 自然な風の動き
                const windX = Math.sin(time * 0.001 + this.y * 0.01) * 0.5;
                const windY = Math.cos(time * 0.0015 + this.x * 0.01) * 0.3;

                this.vx += windX * 0.1;
                this.vy += windY * 0.1;

                // マウス/タッチによる風
                if (isMouseDown) {
                    const dx = this.x - mouseX;
                    const dy = this.y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 200) {
                        const force = (1 - dist / 200) * 0.3;
                        this.vx += (dx / dist) * force;
                        this.vy += (dy / dist) * force;
                    }
                }

                // 空気抵抗
                this.vx *= 0.99;
                this.vy *= 0.99;

                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;

                // 呼吸のようなサイズ変化
                this.size = this.baseSize + Math.sin(time * 0.003 + this.x * 0.01) * 5;

                // 寿命
                this.life -= this.decay;

                // 画面外に出たら反対側から
                if (this.x < -50) this.x = width + 50;
                if (this.x > width + 50) this.x = -50;
                if (this.y < -50) this.y = height + 50;
                if (this.y > height + 50) this.y = -50;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                ctx.globalAlpha = this.opacity * this.life;
                ctx.fillStyle = this.color;
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                // テキストの影
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 20;
                ctx.fillText(this.text, 0, 0);

                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function init() {
            particles = [];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            time++;

            // 背景を少し残す
            ctx.fillStyle = 'rgba(12, 12, 12, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // パーティクルを更新・描画
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 死んだパーティクルを削除
            particles = particles.filter(p => !p.isDead());

            // 新しいパーティクルを追加
            if (particles.length < 50 && Math.random() < 0.05) {
                particles.push(new Particle());
            }

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isMouseDown) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            isMouseDown = true;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (isMouseDown) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // クリック/タッチで爆発的な風
        canvas.addEventListener('click', (e) => {
            const clickX = e.clientX || e.touches[0].clientX;
            const clickY = e.clientY || e.touches[0].clientY;

            for (let i = 0; i < 10; i++) {
                const p = new Particle(clickX, clickY);
                p.vx = (Math.random() - 0.5) * 10;
                p.vy = (Math.random() - 0.5) * 10;
                p.size = Math.random() * 20 + 10;
                particles.push(p);
            }
        });

        resize();
        init();
        animate();
    </script>
</body>
</html>
