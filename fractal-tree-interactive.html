<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fractal Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            z-index: 10;
        }

        .info p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="info">
        <p>🌳 Interactive Fractal Tree</p>
        <p>Move mouse to change parameters</p>
        <p>Click to regenerate colors</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Mouse position
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        // Tree parameters (controlled by mouse)
        let angle = 0;
        let branchRatio = 0.67;
        let depth = 10;
        let colorHue = 120;
        let colorHue2 = 280;

        // Update parameters based on mouse position
        function updateParams() {
            angle = (mouseX / canvas.width) * Math.PI;
            branchRatio = 0.5 + (mouseY / canvas.height) * 0.25;
        }

        // Draw fractal tree recursively
        function drawTree(x, y, length, angle, depth) {
            if (depth === 0) return;

            // Calculate end point
            const x2 = x + Math.cos(angle) * length;
            const y2 = y + Math.sin(angle) * length;

            // Calculate color based on depth
            const t = 1 - depth / 11;
            const hue = colorHue + t * (colorHue2 - colorHue);
            const saturation = 70 + t * 30;
            const lightness = 30 + t * 40;
            const alpha = 0.6 + t * 0.4;

            ctx.strokeStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`;
            ctx.lineWidth = depth * 1.5;
            ctx.lineCap = 'round';

            // Draw branch
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            // Recursive calls for left and right branches
            const newLength = length * branchRatio;
            drawTree(x2, y2, newLength, angle - angle, depth - 1);
            drawTree(x2, y2, newLength, angle + angle, depth - 1);
        }

        // Main draw function
        function draw() {
            // Clear canvas with dark background
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update parameters
            updateParams();

            // Draw tree starting from bottom center
            const startX = canvas.width / 2;
            const startY = canvas.height;
            const initialLength = canvas.height * 0.25;

            drawTree(startX, startY, initialLength, -Math.PI / 2, depth);

            requestAnimationFrame(draw);
        }

        // Mouse move handler
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Touch move handler
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        // Click to regenerate colors
        canvas.addEventListener('click', () => {
            colorHue = Math.random() * 360;
            colorHue2 = (colorHue + 120 + Math.random() * 120) % 360;
        });

        // Start animation
        draw();
    </script>
</body>
</html>
