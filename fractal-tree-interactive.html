<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fractal Tree</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .value-display {
            min-width: 60px;
            text-align: right;
            font-size: 0.9rem;
            color: #00d4ff;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .canvas-container {
                aspect-ratio: 4/3;
            }
        }
    </style>
</head>
<body>
    <h1>🌳 Interactive Fractal Tree</h1>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>分岐角度</label>
            <div class="slider-container">
                <input type="range" id="angle" min="5" max="60" value="25">
                <span class="value-display" id="angleValue">25°</span>
            </div>
        </div>

        <div class="control-group">
            <label>再帰回数</label>
            <div class="slider-container">
                <input type="range" id="depth" min="5" max="12" value="10">
                <span class="value-display" id="depthValue">10</span>
            </div>
        </div>

        <div class="control-group">
            <label>枝の長さ</label>
            <div class="slider-container">
                <input type="range" id="length" min="50" max="150" value="100">
                <span class="value-display" id="lengthValue">100</span>
            </div>
        </div>

        <div class="control-group">
            <label>分岐比率</label>
            <div class="slider-container">
                <input type="range" id="ratio" min="50" max="85" value="70">
                <span class="value-display" id="ratioValue">0.70</span>
            </div>
        </div>

        <div class="control-group">
            <label>風の動き</label>
            <div class="slider-container">
                <input type="range" id="wind" min="0" max="100" value="30">
                <span class="value-display" id="windValue">30%</span>
            </div>
        </div>

        <div class="control-group">
            <label>色の変化</label>
            <div class="slider-container">
                <input type="range" id="colorShift" min="0" max="100" value="50">
                <span class="value-display" id="colorShiftValue">50%</span>
            </div>
        </div>
    </div>

    <div class="button-group">
        <button id="randomize">🎲 ランダム生成</button>
        <button id="animate" class="secondary">▶️ アニメーション</button>
        <button id="reset" class="secondary">🔄 リセット</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let angle = 25;
        let depth = 10;
        let length = 100;
        let ratio = 0.7;
        let wind = 30;
        let colorShift = 50;
        let animating = false;
        let animationTime = 0;

        function resize() {
            const container = canvas.parentElement;
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            draw();
        }

        function drawBranch(x, y, len, angle, currentDepth) {
            if (currentDepth === 0 || len < 2) return;

            const endX = x + len * Math.cos(angle);
            const endY = y - len * Math.sin(angle);

            // 色の計算
            const progress = (depth - currentDepth) / depth;
            const hue = (120 + progress * colorShift + animationTime * 20) % 360;
            const saturation = 70 + progress * 30;
            const lightness = 40 + progress * 30;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
            ctx.lineWidth = Math.max(1, currentDepth * 0.8);
            ctx.stroke();

            // 風の動きを追加
            const windEffect = Math.sin(animationTime * 2 + currentDepth * 0.5) * (wind / 100) * 0.1;
            const angleOffset = (angle * Math.PI / 180) + windEffect;

            // 再帰的に描画
            drawBranch(endX, endY, len * ratio, angle - angleOffset, currentDepth - 1);
            drawBranch(endX, endY, len * ratio, angle + angleOffset, currentDepth - 1);
        }

        function draw() {
            // 背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0a0a');
            gradient.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 地面
            ctx.fillStyle = '#2d4a3e';
            ctx.fillRect(0, height * 0.85, width, height * 0.15);

            // 木を描画
            const startX = width / 2;
            const startY = height * 0.85;
            drawBranch(startX, startY, length, Math.PI / 2, depth);
        }

        function animate() {
            if (animating) {
                animationTime += 0.02;
                draw();
                requestAnimationFrame(animate);
            }
        }

        // イベントリスナー
        document.getElementById('angle').addEventListener('input', (e) => {
            angle = parseInt(e.target.value);
            document.getElementById('angleValue').textContent = angle + '°';
            if (!animating) draw();
        });

        document.getElementById('depth').addEventListener('input', (e) => {
            depth = parseInt(e.target.value);
            document.getElementById('depthValue').textContent = depth;
            if (!animating) draw();
        });

        document.getElementById('length').addEventListener('input', (e) => {
            length = parseInt(e.target.value);
            document.getElementById('lengthValue').textContent = length;
            if (!animating) draw();
        });

        document.getElementById('ratio').addEventListener('input', (e) => {
            ratio = parseInt(e.target.value) / 100;
            document.getElementById('ratioValue').textContent = ratio.toFixed(2);
            if (!animating) draw();
        });

        document.getElementById('wind').addEventListener('input', (e) => {
            wind = parseInt(e.target.value);
            document.getElementById('windValue').textContent = wind + '%';
            if (!animating) draw();
        });

        document.getElementById('colorShift').addEventListener('input', (e) => {
            colorShift = parseInt(e.target.value);
            document.getElementById('colorShiftValue').textContent = colorShift + '%';
            if (!animating) draw();
        });

        document.getElementById('randomize').addEventListener('click', () => {
            angle = Math.random() * 55 + 5;
            depth = Math.floor(Math.random() * 8) + 5;
            length = Math.random() * 100 + 50;
            ratio = Math.random() * 0.35 + 0.5;
            wind = Math.random() * 100;
            colorShift = Math.random() * 100;

            document.getElementById('angle').value = angle;
            document.getElementById('depth').value = depth;
            document.getElementById('length').value = length;
            document.getElementById('ratio').value = ratio * 100;
            document.getElementById('wind').value = wind;
            document.getElementById('colorShift').value = colorShift;

            document.getElementById('angleValue').textContent = Math.round(angle) + '°';
            document.getElementById('depthValue').textContent = depth;
            document.getElementById('lengthValue').textContent = Math.round(length);
            document.getElementById('ratioValue').textContent = ratio.toFixed(2);
            document.getElementById('windValue').textContent = Math.round(wind) + '%';
            document.getElementById('colorShiftValue').textContent = Math.round(colorShift) + '%';

            if (!animating) draw();
        });

        document.getElementById('animate').addEventListener('click', () => {
            animating = !animating;
            document.getElementById('animate').textContent = animating ? '⏸️ 停止' : '▶️ アニメーション';
            if (animating) animate();
        });

        document.getElementById('reset').addEventListener('click', () => {
            angle = 25;
            depth = 10;
            length = 100;
            ratio = 0.7;
            wind = 30;
            colorShift = 50;
            animationTime = 0;
            animating = false;

            document.getElementById('angle').value = angle;
            document.getElementById('depth').value = depth;
            document.getElementById('length').value = length;
            document.getElementById('ratio').value = ratio * 100;
            document.getElementById('wind').value = wind;
            document.getElementById('colorShift').value = colorShift;

            document.getElementById('angleValue').textContent = angle + '°';
            document.getElementById('depthValue').textContent = depth;
            document.getElementById('lengthValue').textContent = length;
            document.getElementById('ratioValue').textContent = '0.70';
            document.getElementById('windValue').textContent = wind + '%';
            document.getElementById('colorShiftValue').textContent = colorShift + '%';
            document.getElementById('animate').textContent = '▶️ アニメーション';

            draw();
        });

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
