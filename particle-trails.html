<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Trails - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .info h1 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #fff;
        }

        .info p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .control-btn.active {
            background: rgba(100, 200, 255, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <h1>✨ Particle Trails</h1>
        <p>マウスを動かして美しい粒子の軌跡を作成</p>
    </div>

    <button class="fullscreen-btn" id="fullscreenBtn">🖥️ 全画面</button>

    <div class="controls">
        <button class="control-btn" id="colorBtn">🎨 カラー</button>
        <button class="control-btn" id="trailBtn">✨ 軌跡</button>
        <button class="control-btn" id="clearBtn">🗑️ クリア</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        let mouse = { x: width / 2, y: height / 2 };
        let hue = 0;
        let colorMode = 'rainbow';
        let trailLength = 'medium';

        const colorModes = ['rainbow', 'fire', 'ice', 'neon'];
        const trailLengths = ['short', 'medium', 'long'];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 2;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.hue = hue;
                this.life = 1;
                this.decay = 0.008;

                if (trailLength === 'short') this.decay = 0.015;
                if (trailLength === 'long') this.decay = 0.004;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                this.size *= 0.98;
            }

            draw() {
                let color;
                switch (colorMode) {
                    case 'rainbow':
                        color = `hsla(${this.hue}, 100%, 50%, ${this.life})`;
                        break;
                    case 'fire':
                        color = `hsla(${this.hue % 60}, 100%, 50%, ${this.life})`;
                        break;
                    case 'ice':
                        color = `hsla(${180 + this.hue % 60}, 100%, 70%, ${this.life})`;
                        break;
                    case 'neon':
                        color = `hsla(${this.hue % 360}, 100%, 60%, ${this.life})`;
                        break;
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();

                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
            }
        }

        function createParticles(x, y, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, hue));
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0 || particles[i].size <= 0.1) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            hue += 0.5;
            requestAnimationFrame(animate);
        }

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            createParticles(mouse.x, mouse.y, 8);
        });

        canvas.addEventListener('click', (e) => {
            createParticles(e.clientX, e.clientY, 50);
        });

        // Touch events
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            createParticles(mouse.x, mouse.y, 8);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createParticles(touch.clientX, touch.clientY, 50);
        });

        // Controls
        document.getElementById('colorBtn').addEventListener('click', () => {
            const currentIndex = colorModes.indexOf(colorMode);
            colorMode = colorModes[(currentIndex + 1) % colorModes.length];
            document.getElementById('colorBtn').textContent = `🎨 ${colorMode}`;
        });

        document.getElementById('trailBtn').addEventListener('click', () => {
            const currentIndex = trailLengths.indexOf(trailLength);
            trailLength = trailLengths[(currentIndex + 1) % trailLengths.length];
            document.getElementById('trailBtn').textContent = `✨ ${trailLength}`;
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            particles = [];
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Start animation
        animate();
        createParticles(width / 2, height / 2, 100);
    </script>
</body>
</html>
