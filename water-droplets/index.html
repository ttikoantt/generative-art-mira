<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Droplets - 水滴アニメーション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0c1445 0%, #1a237e 50%, #0d47a1 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">💧 クリック/タップで水滴を追加</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let droplets = [];
        let ripples = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Droplet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 8 + 4;
                this.speed = Math.random() * 3 + 2;
                this.opacity = 1;
                this.hue = Math.random() * 60 + 180; // 青～紫
            }

            update() {
                this.y += this.speed;
                this.speed += 0.1;
                this.opacity -= 0.003;

                if (this.y > canvas.height && this.opacity > 0) {
                    ripples.push(new Ripple(this.x, canvas.height, this.hue));
                    this.opacity = 0;
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;

                // 水滴の本体
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 90%, 0.9)`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 70%, 70%, 0.6)`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 50%, 0.3)`);

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();

                ctx.restore();
            }
        }

        class Ripple {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.radius = 1;
                this.maxRadius = Math.random() * 50 + 30;
                this.opacity = 1;
                this.hue = hue;
            }

            update() {
                this.radius += 2;
                this.opacity -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;

                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.3, 0, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 70%, 0.6)`;
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius * 0.7, this.radius * 0.21, 0, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 70%, 0.3)`;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.restore();
            }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // 複数の水滴を追加
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    droplets.push(new Droplet(
                        x + (Math.random() - 0.5) * 50,
                        y + (Math.random() - 0.5) * 20
                    ));
                }, i * 100);
            }
        });

        // タッチ対応
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    droplets.push(new Droplet(
                        x + (Math.random() - 0.5) * 50,
                        y + (Math.random() - 0.5) * 20
                    ));
                }, i * 100);
            }
        });

        function animate() {
            ctx.fillStyle = 'rgba(12, 20, 69, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            droplets = droplets.filter(d => d.opacity > 0);
            droplets.forEach(d => {
                d.update();
                d.draw();
            });

            ripples = ripples.filter(r => r.opacity > 0);
            ripples.forEach(r => {
                r.update();
                r.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 自動的に水滴を追加
        setInterval(() => {
            if (droplets.length < 30) {
                droplets.push(new Droplet(
                    Math.random() * canvas.width,
                    -20
                ));
            }
        }, 500);

        animate();
    </script>
</body>
</html>
