<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April Fools' Cosmic Joke</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            cursor: crosshair;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px #0ff;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0ff;
            font-size: 12px;
            z-index: 10;
            text-align: center;
            text-shadow: 0 0 10px #0ff;
        }

        #fullscreenBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #0ff;
            color: #0ff;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            text-shadow: 0 0 5px #0ff;
            transition: all 0.3s ease;
        }

        #fullscreenBtn:hover {
            background: rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px #0ff;
        }

        .joke-text {
            position: absolute;
            color: #ff0;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff0;
            pointer-events: none;
            z-index: 5;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <canvas id="cosmos"></canvas>
    <div id="ui">
        <div>🌌 April Fools' Cosmic Joke</div>
        <div id="jokeCount">Jokes: 0</div>
    </div>
    <div id="instructions">Click anywhere to launch cosmic jokes into the void! 🚀</div>
    <button id="fullscreenBtn">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('cosmos');
        const ctx = canvas.getContext('2d');
        const jokeCountEl = document.getElementById('jokeCount');

        let width, height;
        let stars = [];
        let jokes = [];
        let jokeCount = 0;

        // April Fools' themed jokes
        const cosmicJokes = [
            "Why did the astronomer break up with his girlfriend? He needed space!",
            "What do you call a fake noodle? An impasta!",
            "Why don't scientists trust atoms? Because they make up everything!",
            "What do you call a bear with no teeth? A gummy bear!",
            "Why did the scarecrow win an award? He was outstanding in his field!",
            "What do you call a fish without eyes? A fsh!",
            "Why don't eggs tell jokes? They'd crack each other up!",
            "What do you call a can opener that doesn't work? A can't opener!",
            "Why did the coffee file a police report? It got mugged!",
            "What do you call a dinosaur that crashes their car? Tyrannosaurus Wrecks!",
            "APRIL FOOLS! 🎭 This is just a cosmic joke!",
            "In space, no one can hear you laugh... or can they?",
            "The universe is expanding. So is this joke. Forever.",
            "Error 404: Seriousness not found in this sector",
            "WARNING: High levels of cosmic silliness detected!",
            "You've been visited by the Cosmic Prankster! 🌌"
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 0.5 + 0.1,
                    brightness: Math.random()
                });
            }
        }

        class JokeParticle {
            constructor(x, y, text) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.003;
                this.size = 14;
                this.color = `hsl(${Math.random() * 60 + 30}, 100%, 70%)`;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                this.vy -= 0.01; // Slight upward drift

                // Wrap around edges
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.font = `bold ${this.size}px 'Courier New', monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, 0, 0);
                ctx.restore();
            }
        }

        class CosmicBurst {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.life = 1;

                for (let i = 0; i < 20; i++) {
                    const angle = (Math.PI * 2 / 20) * i;
                    const speed = Math.random() * 3 + 2;
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: Math.random() * 3 + 1,
                        color: `hsl(${Math.random() * 360}, 100%, 70%)`
                    });
                }
            }

            update() {
                this.life -= 0.02;
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.size *= 0.99;
                });
            }

            draw() {
                ctx.globalAlpha = this.life;
                this.particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }
        }

        let bursts = [];

        function drawStars() {
            stars.forEach(star => {
                const twinkle = Math.sin(Date.now() * 0.001 + star.brightness * 10) * 0.3 + 0.7;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size * twinkle, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkle})`;
                ctx.fill();

                // Subtle movement
                star.y += star.speed;
                if (star.y > height) star.y = 0;
            });
        }

        function drawNebula() {
            const time = Date.now() * 0.0001;

            for (let i = 0; i < 3; i++) {
                const x = width * (0.3 + i * 0.2) + Math.sin(time + i) * 100;
                const y = height * 0.5 + Math.cos(time * 0.7 + i) * 50;

                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 200);
                const hue = (time * 50 + i * 120) % 360;
                gradient.addColorStop(0, `hsla(${hue}, 80%, 50%, 0.1)`);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, width, height);
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            drawNebula();
            drawStars();

            // Update and draw jokes
            jokes = jokes.filter(joke => joke.life > 0);
            jokes.forEach(joke => {
                joke.update();
                joke.draw();
            });

            // Update and draw bursts
            bursts = bursts.filter(burst => burst.life > 0);
            bursts.forEach(burst => {
                burst.update();
                burst.draw();
            });

            requestAnimationFrame(animate);
        }

        function launchJoke(x, y) {
            const jokeText = cosmicJokes[Math.floor(Math.random() * cosmicJokes.length)];
            jokes.push(new JokeParticle(x, y, jokeText));
            bursts.push(new CosmicBurst(x, y));

            jokeCount++;
            jokeCountEl.textContent = `Jokes: ${jokeCount}`;
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            launchJoke(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            launchJoke(touch.clientX, touch.clientY);
        });

        window.addEventListener('resize', resize);

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Auto-launch a joke every 3 seconds
        setInterval(() => {
            const x = Math.random() * width;
            const y = Math.random() * height;
            launchJoke(x, y);
        }, 3000);

        // Initialize
        resize();
        animate();

        // Launch initial joke
        setTimeout(() => {
            launchJoke(width / 2, height / 2);
        }, 500);
    </script>
</body>
</html>
