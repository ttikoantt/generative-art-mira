<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Entangled Particles - Art #870</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
        
        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">✨ Quantum Entangled Particles ✨</div>
    <div class="info">Art #870 | Click to add particles | Space to reset</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        const ENTANGLEMENT_DISTANCE = 150;
        const MAX_PARTICLES = 50;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 2;
                this.baseHue = Math.random() * 360;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = Math.random() * 0.05 + 0.02;
                this.entangledWith = [];
            }
            
            update(particles) {
                // Update position
                this.x += this.vx;
                this.y += this.vy;
                
                // Bounce off walls
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
                
                // Keep within bounds
                this.x = Math.max(0, Math.min(width, this.x));
                this.y = Math.max(0, Math.min(height, this.y));
                
                // Update pulse
                this.pulsePhase += this.pulseSpeed;
                
                // Find entangled particles
                this.entangledWith = [];
                for (let other of particles) {
                    if (other === this) continue;
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < ENTANGLEMENT_DISTANCE) {
                        this.entangledWith.push({ particle: other, distance });
                    }
                }
            }
            
            draw() {
                const pulse = Math.sin(this.pulsePhase) * 0.5 + 0.5;
                const currentRadius = this.radius * (0.8 + pulse * 0.4);
                
                // Glow effect
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, currentRadius * 3
                );
                
                // Color based on entanglement
                let hue = this.baseHue;
                let saturation = 80;
                let lightness = 60;
                
                if (this.entangledWith.length > 0) {
                    // Shift color based on entanglement count
                    hue = (this.baseHue + this.entangledWith.length * 20) % 360;
                    saturation = 90;
                    lightness = 60 + pulse * 20;
                }
                
                gradient.addColorStop(0, `hsla(${hue}, ${saturation}%, ${lightness}%, 1)`);
                gradient.addColorStop(0.3, `hsla(${hue}, ${saturation}%, ${lightness * 0.5}%, 0.5)`);
                gradient.addColorStop(1, `hsla(${hue}, ${saturation}%, ${lightness * 0.2}%, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness + 20}%, 1)`;
                ctx.fill();
            }
            
            drawEntanglements() {
                for (let entangled of this.entangledWith) {
                    const { particle: other, distance } = entangled;
                    const strength = 1 - (distance / ENTANGLEMENT_DISTANCE);
                    
                    // Draw entanglement line
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(other.x, other.y);
                    
                    const hue = (this.baseHue + other.baseHue) / 2;
                    ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${strength * 0.6})`;
                    ctx.lineWidth = strength * 2;
                    ctx.stroke();
                    
                    // Draw energy particles along the line
                    const energyCount = Math.floor(strength * 5);
                    for (let i = 0; i < energyCount; i++) {
                        const t = (Date.now() / 1000 + i * 0.2) % 1;
                        const ex = this.x + (other.x - this.x) * t;
                        const ey = this.y + (other.y - this.y) * t;
                        
                        ctx.beginPath();
                        ctx.arc(ex, ey, 2 * strength, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${hue}, 90%, 70%, ${strength})`;
                        ctx.fill();
                    }
                }
            }
        }
        
        function init() {
            particles = [];
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle());
            }
        }
        
        function animate() {
            // Create trail effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // Update all particles
            for (let particle of particles) {
                particle.update(particles);
            }
            
            // Draw entanglements first (behind particles)
            for (let particle of particles) {
                particle.drawEntanglements();
            }
            
            // Draw particles on top
            for (let particle of particles) {
                particle.draw();
            }
            
            // Draw stats
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '12px Courier New';
            ctx.fillText(`Particles: ${particles.length}`, 20, height - 50);
            
            const totalEntanglements = particles.reduce((sum, p) => sum + p.entangledWith.length, 0) / 2;
            ctx.fillText(`Entanglements: ${totalEntanglements}`, 20, height - 35);
            
            requestAnimationFrame(animate);
        }
        
        // Event listeners
        canvas.addEventListener('click', (e) => {
            if (particles.length < MAX_PARTICLES) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                init();
            }
        });
        
        window.addEventListener('resize', resize);
        
        // Initialize
        resize();
        init();
        animate();
    </script>
</body>
</html>
