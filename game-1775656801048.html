<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Catcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 100%);
            font-family: 'Courier New', monospace;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            cursor: crosshair;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .score-display {
            font-size: 24px;
            text-shadow: 0 0 10px rgba(255, 255, 100, 0.8);
            margin-bottom: 5px;
        }

        .time-display {
            font-size: 18px;
            opacity: 0.8;
        }

        .combo-display {
            position: fixed;
            font-size: 36px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 200, 0, 0.8);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
        }

        .combo-display.show {
            opacity: 1;
            transform: scale(1.2);
        }

        #startScreen, #gameOverScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 26, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 100;
        }

        #gameOverScreen {
            display: none;
        }

        .screen-title {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 100, 0.8);
        }

        .screen-score {
            font-size: 32px;
            margin-bottom: 10px;
            color: #ffcc00;
        }

        .screen-stats {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .instructions {
            margin-top: 30px;
            font-size: 16px;
            opacity: 0.7;
            text-align: center;
            max-width: 400px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div class="score-display">⭐ Score: <span id="score">0</span></div>
        <div class="time-display">⏱️ Time: <span id="time">60</span>s</div>
    </div>

    <div id="comboDisplay" class="combo-display"></div>

    <div id="startScreen">
        <div class="screen-title">⭐ Star Catcher ⭐</div>
        <button class="start-btn" id="startBtn">Start Game</button>
        <div class="instructions">
            Catch the shooting stars!<br>
            Click or tap stars before they disappear<br>
            Build combos for bonus points!
        </div>
    </div>

    <div id="gameOverScreen">
        <div class="screen-title">Game Over!</div>
        <div class="screen-score">Score: <span id="finalScore">0</span></div>
        <div class="screen-stats" id="gameStats"></div>
        <button class="start-btn" id="restartBtn">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Game state
        let gameRunning = false;
        let score = 0;
        let timeLeft = 60;
        let combo = 0;
        let maxCombo = 0;
        let starsCaught = 0;
        let starsMissed = 0;
        let lastCatchTime = 0;

        // Stars (background)
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.5 + 0.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinkleOffset = Math.random() * Math.PI * 2;
            }

            draw(ctx, time) {
                const twinkle = Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkle})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Shooting stars (game targets)
        class ShootingStar {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width * 0.3;
                this.y = Math.random() * height * 0.3;
                this.size = Math.random() * 15 + 12;
                this.speed = Math.random() * 3 + 2;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
                this.opacity = 1;
                this.decay = 0.003;
                this.points = Math.floor(this.size);
                this.hue = Math.random() * 60 + 30; // Yellow to orange
                this.trail = [];
            }

            update() {
                this.trail.unshift({ x: this.x, y: this.y, opacity: this.opacity });
                if (this.trail.length > 20) {
                    this.trail.pop();
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.opacity -= this.decay;

                return this.opacity > 0 && this.x < width + 50 && this.y < height + 50;
            }

            draw(ctx) {
                // Trail
                for (let i = 0; i < this.trail.length; i++) {
                    const point = this.trail[i];
                    const trailOpacity = point.opacity * (1 - i / this.trail.length) * 0.5;
                    const size = this.size * (1 - i / this.trail.length);

                    ctx.fillStyle = `hsla(${this.hue}, 90%, 70%, ${trailOpacity})`;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Head glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 90%, ${this.opacity})`);
                gradient.addColorStop(0.4, `hsla(${this.hue}, 80%, 60%, ${this.opacity * 0.8})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 40%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Bright center
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }

            containsPoint(px, py) {
                const dx = px - this.x;
                const dy = py - this.y;
                return Math.sqrt(dx * dx + dy * dy) < this.size * 1.5;
            }
        }

        // Initialize background stars
        const backgroundStars = [];
        for (let i = 0; i < 150; i++) {
            backgroundStars.push(new Star());
        }

        // Game objects
        let shootingStars = [];

        // Spawn stars
        function spawnStar() {
            if (gameRunning && shootingStars.length < 8) {
                shootingStars.push(new ShootingStar());
            }
        }

        let spawnInterval;
        function startSpawning() {
            spawnInterval = setInterval(spawnStar, 800);
        }

        function stopSpawning() {
            clearInterval(spawnInterval);
        }

        // Combo display
        const comboDisplay = document.getElementById('comboDisplay');
        function showCombo(x, y, text) {
            comboDisplay.textContent = text;
            comboDisplay.style.left = x + 'px';
            comboDisplay.style.top = y + 'px';
            comboDisplay.classList.add('show');
            setTimeout(() => {
                comboDisplay.classList.remove('show');
            }, 500);
        }

        // Catch star
        function catchStar(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            for (let i = shootingStars.length - 1; i >= 0; i--) {
                if (shootingStars[i].containsPoint(x, y)) {
                    const star = shootingStars[i];
                    const now = Date.now();

                    // Combo system
                    if (now - lastCatchTime < 1500) {
                        combo++;
                    } else {
                        combo = 1;
                    }
                    lastCatchTime = now;

                    if (combo > maxCombo) {
                        maxCombo = combo;
                    }

                    // Calculate score with combo bonus
                    const comboBonus = Math.min(combo, 10);
                    const points = star.points * comboBonus;
                    score += points;
                    starsCaught++;

                    // Show combo text
                    if (combo > 1) {
                        showCombo(x, y, `${combo}x Combo! +${points}`);
                    } else {
                        showCombo(x, y, `+${points}`);
                    }

                    // Remove star
                    shootingStars.splice(i, 1);
                    break;
                }
            }
        }

        canvas.addEventListener('click', catchStar);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            catchStar(e);
        });

        // Start game
        function startGame() {
            gameRunning = true;
            score = 0;
            timeLeft = 60;
            combo = 0;
            maxCombo = 0;
            starsCaught = 0;
            starsMissed = 0;
            lastCatchTime = 0;
            shootingStars = [];

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('score').textContent = '0';
            document.getElementById('time').textContent = '60';

            startSpawning();
            startTimer();
        }

        // Timer
        let timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                if (gameRunning) {
                    timeLeft--;
                    document.getElementById('time').textContent = timeLeft;

                    if (timeLeft <= 0) {
                        endGame();
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        // End game
        function endGame() {
            gameRunning = false;
            stopSpawning();
            stopTimer();

            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameStats').innerHTML = `
                Stars Caught: ${starsCaught}<br>
                Max Combo: ${maxCombo}x<br>
                Final Score: ${score}
            `;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // Animation loop
        let time = 0;
        function animate() {
            // Clear with trail effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);

            time++;

            // Draw background stars
            backgroundStars.forEach(star => star.draw(ctx, time));

            if (gameRunning) {
                // Update and draw shooting stars
                shootingStars = shootingStars.filter(star => {
                    star.draw(ctx);
                    if (!star.update()) {
                        starsMissed++;
                        combo = 0; // Reset combo on miss
                    }
                    return star.update();
                });

                // Update score display
                document.getElementById('score').textContent = score;
            }

            requestAnimationFrame(animate);
        }

        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            backgroundStars.length = 0;
            for (let i = 0; i < 150; i++) {
                backgroundStars.push(new Star());
            }
        });
    </script>
</body>
</html>
