<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Spiral Harmony - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            pointer-events: none;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">SPIRAL HARMONY</div>
    <div class="info">Click or drag to interact</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let hueOffset = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            mouseX = centerX;
            mouseY = centerY;
        }

        function drawSpiral(x, y, radius, rotation, hue, layers) {
            for (let i = 0; i < layers; i++) {
                const layerRadius = radius * (1 - i / layers);
                const layerRotation = rotation + i * 0.1;
                const layerHue = (hue + i * 10) % 360;

                ctx.beginPath();
                for (let angle = 0; angle < Math.PI * 2; angle += 0.02) {
                    const spiralRadius = layerRadius * (0.5 + 0.5 * Math.sin(angle * 5 + layerRotation));
                    const px = x + Math.cos(angle) * spiralRadius;
                    const py = y + Math.sin(angle) * spiralRadius;

                    if (angle === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                ctx.closePath();
                ctx.strokeStyle = `hsla(${layerHue}, 80%, 60%, ${0.3 - i * 0.05})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        function draw() {
            // 背景を少し残す
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.01;
            hueOffset += 0.2;

            // 複数のスパイラル
            const spirals = 5;
            for (let i = 0; i < spirals; i++) {
                const angle = (i / spirals) * Math.PI * 2 + time * 0.2;
                const distance = Math.sin(time + i) * 100 + 150;
                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;
                const radius = Math.sin(time * 0.5 + i) * 50 + 80;
                const rotation = time + i;
                const hue = (hueOffset + i * 60) % 360;

                drawSpiral(x, y, radius, rotation, hue, 6);
            }

            // マウスインタラクション
            const mouseDistance = Math.sqrt(
                Math.pow(mouseX - centerX, 2) + Math.pow(mouseY - centerY, 2)
            );
            const mouseAngle = Math.atan2(mouseY - centerY, mouseX - centerX);
            const mouseRadius = Math.max(30, mouseDistance * 0.3);
            const mouseHue = (hueOffset + 180) % 360;

            drawSpiral(mouseX, mouseY, mouseRadius, -time * 2, mouseHue, 8);

            requestAnimationFrame(draw);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('click', (e) => {
            hueOffset += 30;
        });

        // 初期化
        resize();
        draw();
    </script>
</body>
</html>
