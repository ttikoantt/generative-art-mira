<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Aurora Dreams - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a, #0a0a2a);
            overflow: hidden;
            font-family: 'Georgia', serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(200, 220, 255, 0.7);
            font-size: 14px;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(180, 220, 255, 0.8);
            font-size: 24px;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.6);
            letter-spacing: 3px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>
    <div class="title">MIDNIGHT AURORA DREAMS</div>
    <div class="info">Move mouse to interact • Click to create bursts</div>

    <script>
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouseX = width / 2;
        let mouseY = height / 2;
        let time = 0;

        // Aurora waves
        class AuroraWave {
            constructor(y, amplitude, frequency, speed, color) {
                this.baseY = y;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.speed = speed;
                this.color = color;
                this.points = [];
                this.offset = Math.random() * Math.PI * 2;
            }

            update(time) {
                this.points = [];
                const segments = Math.ceil(width / 5);

                for (let i = 0; i <= segments; i++) {
                    const x = (i / segments) * width;

                    // Complex wave calculation for natural aurora movement
                    const wave1 = Math.sin(x * this.frequency + time * this.speed + this.offset);
                    const wave2 = Math.sin(x * this.frequency * 2.1 + time * this.speed * 0.7 + this.offset * 1.5);
                    const wave3 = Math.sin(x * this.frequency * 0.5 + time * this.speed * 1.3);

                    // Mouse influence
                    const dx = x - mouseX;
                    const dist = Math.abs(dx);
                    const mouseInfluence = Math.max(0, 1 - dist / 300) * Math.sin(time * 3 + dx * 0.02) * 50;

                    const y = this.baseY + (wave1 + wave2 * 0.5 + wave3 * 0.3) * this.amplitude + mouseInfluence;
                    this.points.push({ x, y });
                }
            }

            draw() {
                if (this.points.length < 2) return;

                // Create gradient for smooth aurora effect
                const gradient = ctx.createLinearGradient(0, this.baseY - this.amplitude, 0, this.baseY + this.amplitude);
                gradient.addColorStop(0, this.color.replace('1)', '0.0)'));
                gradient.addColorStop(0.3, this.color.replace('1)', '0.3)'));
                gradient.addColorStop(0.5, this.color.replace('1)', '0.5)'));
                gradient.addColorStop(0.7, this.color.replace('1)', '0.3)'));
                gradient.addColorStop(1, this.color.replace('1)', '0.0)'));

                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);

                for (let i = 1; i < this.points.length; i++) {
                    const xc = (this.points[i].x + this.points[i - 1].x) / 2;
                    const yc = (this.points[i].y + this.points[i - 1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i - 1].x, this.points[i - 1].y, xc, yc);
                }

                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();

                ctx.fillStyle = gradient;
                ctx.fill();

                // Add glow effect
                ctx.shadowBlur = 30;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Stars
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.6;
                this.size = Math.random() * 2 + 0.5;
                this.twinkleSpeed = Math.random() * 2 + 1;
                this.twinkleOffset = Math.random() * Math.PI * 2;
                this.brightness = Math.random() * 0.5 + 0.5;
            }

            draw(time) {
                const twinkle = Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.3 + 0.7;
                const alpha = this.brightness * twinkle;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.shadowBlur = this.size * 3;
                ctx.shadowColor = 'white';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Shooting stars
        class ShootingStar {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.3;
                this.length = Math.random() * 80 + 40;
                this.speed = Math.random() * 15 + 10;
                this.opacity = 0;
                this.active = false;
                this.delay = Math.random() * 500 + 200;
            }

            update(time) {
                if (!this.active) {
                    this.delay--;
                    if (this.delay <= 0) {
                        this.active = true;
                        this.opacity = 1;
                    }
                    return;
                }

                this.x -= this.speed;
                this.y += this.speed * 0.3;
                this.opacity -= 0.015;

                if (this.opacity <= 0 || this.x < -100) {
                    this.reset();
                }
            }

            draw() {
                if (!this.active || this.opacity <= 0) return;

                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x + this.length, this.y - this.length * 0.3
                );
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.length, this.y - this.length * 0.3);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.stroke();

                // Bright head
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'white';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Particle bursts on click
        class BurstParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.size = Math.random() * 3 + 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // gravity
                this.life -= this.decay;
            }

            draw() {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('1)', `${this.life})`);
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Initialize aurora waves with midnight colors
        const auroraWaves = [
            new AuroraWave(height * 0.35, 60, 0.008, 0.5, 'rgba(100, 200, 255, 1)'),
            new AuroraWave(height * 0.38, 50, 0.01, 0.6, 'rgba(150, 100, 255, 1)'),
            new AuroraWave(height * 0.41, 45, 0.012, 0.4, 'rgba(200, 100, 255, 1)'),
            new AuroraWave(height * 0.44, 55, 0.009, 0.55, 'rgba(100, 255, 200, 1)'),
        ];

        // Initialize stars
        const stars = Array.from({ length: 200 }, () => new Star());

        // Initialize shooting stars
        const shootingStars = Array.from({ length: 3 }, () => new ShootingStar());

        // Burst particles
        let bursts = [];

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', (e) => {
            const colors = [
                'rgba(100, 200, 255, 1)',
                'rgba(150, 100, 255, 1)',
                'rgba(200, 100, 255, 1)',
                'rgba(100, 255, 200, 1)'
            ];
            const color = colors[Math.floor(Math.random() * colors.length)];

            for (let i = 0; i < 30; i++) {
                bursts.push(new BurstParticle(e.clientX, e.clientY, color));
            }
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;

            // Update aurora base positions
            auroraWaves[0].baseY = height * 0.35;
            auroraWaves[1].baseY = height * 0.38;
            auroraWaves[2].baseY = height * 0.41;
            auroraWaves[3].baseY = height * 0.44;
        });

        // Animation loop
        function animate() {
            // Clear with fade effect for trails
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            time += 0.016;

            // Draw stars
            stars.forEach(star => star.draw(time));

            // Draw aurora waves (back to front)
            auroraWaves.forEach(wave => {
                wave.update(time);
                wave.draw();
            });

            // Update and draw shooting stars
            shootingStars.forEach(star => {
                star.update(time);
                star.draw();
            });

            // Update and draw burst particles
            bursts = bursts.filter(p => p.life > 0);
            bursts.forEach(p => {
                p.update();
                p.draw();
            });

            // Add subtle ground reflection
            const groundGradient = ctx.createLinearGradient(0, height * 0.6, 0, height);
            groundGradient.addColorStop(0, 'rgba(20, 30, 50, 0)');
            groundGradient.addColorStop(1, 'rgba(20, 30, 50, 0.8)');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, height * 0.6, width, height * 0.4);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
