<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Waves - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            color: #0ff;
            font-size: 12px;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 120px;
            accent-color: #0ff;
        }

        button {
            background: linear-gradient(135deg, #0ff, #f0f);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            text-transform: uppercase;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #0ff;
            color: #0ff;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #0ff;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>Quantum Waves</div>
        <div>クリック/タッチで波を追加</div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <div class="controls">
        <div class="control-group">
            <label>波の数: <span id="waveCountLabel">5</span></label>
            <input type="range" id="waveCount" min="1" max="10" value="5">
        </div>
        <div class="control-group">
            <label>粒子数: <span id="particleCountLabel">200</span></label>
            <input type="range" id="particleCount" min="50" max="500" value="200">
        </div>
        <div class="control-group">
            <label>速度: <span id="speedLabel">1.0</span></label>
            <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1">
        </div>
        <button onclick="reset()">リセット</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];
        let particles = [];
        let time = 0;

        const config = {
            waveCount: 5,
            particleCount: 200,
            speed: 1
        };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Wave {
            constructor(x, y) {
                this.x = x || width / 2;
                this.y = y || height / 2;
                this.frequency = Math.random() * 0.02 + 0.01;
                this.amplitude = Math.random() * 50 + 30;
                this.phase = Math.random() * Math.PI * 2;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.speed = Math.random() * 0.02 + 0.01;
            }

            getValueAt(px, py, t) {
                const dist = Math.sqrt((px - this.x) ** 2 + (py - this.y) ** 2);
                return Math.sin(dist * this.frequency + this.phase + t * this.speed) * this.amplitude;
            }
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 3 + 1;
            }

            update(t) {
                let offsetX = 0;
                let offsetY = 0;

                waves.forEach(wave => {
                    const value = wave.getValueAt(this.baseX, this.baseY, t);
                    const angle = Math.atan2(this.baseY - wave.y, this.baseX - wave.x);
                    offsetX += Math.cos(angle) * value * 0.5;
                    offsetY += Math.sin(angle) * value * 0.5;
                });

                this.x = this.baseX + offsetX;
                this.y = this.baseY + offsetY;
            }

            draw() {
                const totalWave = waves.reduce((sum, wave) => {
                    return sum + wave.getValueAt(this.baseX, this.baseY, time);
                }, 0);

                const hue = (Math.abs(totalWave) * 2 + time * 10) % 360;
                ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            waves = [];
            particles = [];

            for (let i = 0; i < config.waveCount; i++) {
                waves.push(new Wave(
                    Math.random() * width,
                    Math.random() * height
                ));
            }

            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update(time);
                p.draw();
            });

            time += config.speed;
            requestAnimationFrame(draw);
        }

        function addWave(x, y) {
            waves.push(new Wave(x, y));
            if (waves.length > 10) {
                waves.shift();
            }
        }

        canvas.addEventListener('click', (e) => {
            addWave(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addWave(touch.clientX, touch.clientY);
        });

        document.getElementById('waveCount').addEventListener('input', (e) => {
            config.waveCount = parseInt(e.target.value);
            document.getElementById('waveCountLabel').textContent = config.waveCount;
            init();
        });

        document.getElementById('particleCount').addEventListener('input', (e) => {
            config.particleCount = parseInt(e.target.value);
            document.getElementById('particleCountLabel').textContent = config.particleCount;
            init();
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            config.speed = parseFloat(e.target.value);
            document.getElementById('speedLabel').textContent = config.speed.toFixed(1);
        });

        function reset() {
            time = 0;
            init();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        resize();
        init();
        draw();
    </script>
</body>
</html>
