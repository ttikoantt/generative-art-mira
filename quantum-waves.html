<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Waves - ジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }

            .controls {
                top: 10px;
                right: 10px;
            }

            .btn {
                padding: 8px 16px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>Quantum Waves</div>
        <div>クリック/タップで波紋を生成</div>
    </div>

    <div class="controls">
        <button class="btn" onclick="changeMode()">モード切替</button>
        <button class="btn" onclick="toggleAuto()">自動生成: ON</button>
        <button class="btn" onclick="clearWaves()">クリア</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let waves = [];
        let mode = 0;
        let autoGenerate = true;
        let hue = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resize();
        window.addEventListener('resize', resize);

        class Wave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 200 + 150;
                this.speed = Math.random() * 2 + 1;
                this.hue = hue;
                this.alpha = 1;
                this.lineWidth = Math.random() * 3 + 1;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);

                const gradient = ctx.createRadialGradient(
                    this.x, this.y, this.radius * 0.8,
                    this.x, this.y, this.radius
                );

                const color1 = `hsla(${this.hue}, 80%, 60%, ${this.alpha})`;
                const color2 = `hsla(${(this.hue + 30) % 360}, 80%, 50%, 0)`;

                gradient.addColorStop(0, color2);
                gradient.addColorStop(1, color1);

                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // インターフェレンス効果（多重波）
                if (mode === 1) {
                    for (let i = 1; i <= 3; i++) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.radius - (i * 20), 0, Math.PI * 2);
                        ctx.strokeStyle = `hsla(${(this.hue + i * 20) % 360}, 70%, 50%, ${this.alpha * 0.5})`;
                        ctx.lineWidth = this.lineWidth * 0.5;
                        ctx.stroke();
                    }
                }

                // 量子もつれ効果（螺旋）
                if (mode === 2) {
                    const spiralCount = 8;
                    for (let i = 0; i < spiralCount; i++) {
                        const angle = (i / spiralCount) * Math.PI * 2 + (this.radius * 0.02);
                        const px = this.x + Math.cos(angle) * this.radius;
                        const py = this.y + Math.sin(angle) * this.radius;

                        ctx.beginPath();
                        ctx.arc(px, py, 3, 0, Math.PI * 2);
                        ctx.fillStyle = `hsla(${(this.hue + i * 45) % 360}, 80%, 60%, ${this.alpha})`;
                        ctx.fill();
                    }
                }
            }
        }

        function addWave(x, y) {
            waves.push(new Wave(x, y));
            hue = (hue + 15) % 360;
        }

        function changeMode() {
            mode = (mode + 1) % 3;
            const modeNames = ['標準', '干渉', '量子もつれ'];
            console.log(`モード: ${modeNames[mode]}`);
        }

        function toggleAuto() {
            autoGenerate = !autoGenerate;
            const btn = event.target;
            btn.textContent = `自動生成: ${autoGenerate ? 'ON' : 'OFF'}`;
        }

        function clearWaves() {
            waves = [];
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            addWave(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addWave(touch.clientX, touch.clientY);
        });

        // 自動生成
        let lastAutoGen = 0;
        function autoGenerateWave(timestamp) {
            if (autoGenerate && timestamp - lastAutoGen > 1500) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                addWave(x, y);
                lastAutoGen = timestamp;
            }
        }

        // アニメーションループ
        function animate(timestamp) {
            // 背景をフェード
            ctx.fillStyle = 'rgba(10, 10, 26, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 自動生成
            autoGenerateWave(timestamp);

            // 波を更新・描画
            waves = waves.filter(wave => {
                wave.draw();
                return wave.update();
            });

            // 惑星のような光る中心
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100);
            gradient.addColorStop(0, `hsla(${hue}, 80%, 50%, 0.02)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            requestAnimationFrame(animate);
        }

        animate(0);

        // 初期波紋
        setTimeout(() => addWave(canvas.width / 2, canvas.height / 2), 500);
    </script>
</body>
</html>
