<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Tree Growth - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 95vw;
            max-height: 80vh;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #e0e0e0;
            z-index: 10;
        }

        .info h1 {
            font-size: 1.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .info p {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        .controls button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .controls button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .controls button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 1.2em;
            transition: background 0.2s;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .info h1 {
                font-size: 1.2em;
            }

            .controls button {
                padding: 10px 18px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h1>🌳 Fractal Tree Growth</h1>
            <p>Watch the tree grow from a seed to a fractal masterpiece</p>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <button onclick="startGrowth()">🌱 New Tree</button>
            <button onclick="toggleWind()">💨 Toggle Wind</button>
            <button onclick="changeColor()">🎨 Change Color</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let growthProgress = 0;
        let windEnabled = true;
        let windOffset = 0;
        let colorScheme = 0;

        const colorSchemes = [
            { bark: [139, 90, 43], leaf: [34, 139, 34] },
            { bark: [100, 100, 100], leaf: [255, 183, 197] },
            { bark: [160, 82, 45], leaf: [255, 215, 0] },
            { bark: [128, 128, 128], leaf: [138, 43, 226] },
            { bark: [101, 67, 33], leaf: [0, 255, 127] }
        ];

        function resize() {
            width = Math.min(window.innerWidth * 0.95, 900);
            height = Math.min(window.innerHeight * 0.75, 700);
            canvas.width = width;
            canvas.height = height;
        }

        function drawTree(x, y, len, angle, depth, progress) {
            if (depth === 0 || len < 2) return;

            const currentLen = len * Math.min(progress * 2, 1);
            const endX = x + currentLen * Math.cos(angle);
            const endY = y + currentLen * Math.sin(angle);

            const scheme = colorSchemes[colorScheme];
            const barkColor = `rgb(${scheme.bark.join(',')})`;
            const leafColor = `rgb(${scheme.leaf.join(',')})`;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = barkColor;
            ctx.lineWidth = depth * 1.5;
            ctx.lineCap = 'round';
            ctx.stroke();

            if (depth <= 3 && progress > 0.8) {
                const leafSize = (progress - 0.8) * 5 * (4 - depth);
                ctx.beginPath();
                ctx.arc(endX, endY, leafSize, 0, Math.PI * 2);
                ctx.fillStyle = leafColor;
                ctx.globalAlpha = 0.6;
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            if (progress > 0.3) {
                const subProgress = (progress - 0.3) / 0.7;
                const wind = windEnabled ? Math.sin(windOffset + depth * 0.5) * 0.05 : 0;
                const angleVariation = 0.4 + wind;

                drawTree(endX, endY, len * 0.7, angle - angleVariation, depth - 1, subProgress);
                drawTree(endX, endY, len * 0.7, angle + angleVariation, depth - 1, subProgress);
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            ctx.clearRect(0, 0, width, height);

            const startX = width / 2;
            const startY = height * 0.9;
            const initialLen = height * 0.25;
            const depth = 10;

            drawTree(startX, startY, initialLen, -Math.PI / 2, depth, growthProgress);

            if (windEnabled) {
                windOffset += 0.02;
            }
        }

        function animate() {
            if (growthProgress < 1) {
                growthProgress += 0.005;
            }

            draw();
            requestAnimationFrame(animate);
        }

        function startGrowth() {
            growthProgress = 0;
        }

        function toggleWind() {
            windEnabled = !windEnabled;
        }

        function changeColor() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
