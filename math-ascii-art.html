<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathematical ASCII Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #eaeaea;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(234, 234, 234, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: #aaa;
        }

        select, button {
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.3);
            color: #eaeaea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover, button:hover {
            border-color: #00d9ff;
            background: rgba(0, 217, 255, 0.1);
        }

        button {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            font-weight: bold;
            border: none;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .art-display {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .art-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 255, 136, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        #asciiCanvas {
            font-size: 10px;
            line-height: 1.2;
            white-space: pre;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            position: relative;
            z-index: 1;
        }

        .formula-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #00d9ff;
        }

        .formula-name {
            font-size: 1.3rem;
            color: #00d9ff;
            margin-bottom: 10px;
        }

        .formula-description {
            color: #aaa;
            line-height: 1.6;
        }

        .formula-latex {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 1.1rem;
            color: #00ff88;
            overflow-x: auto;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            min-width: 150px;
        }

        .stat-value {
            font-size: 1.5rem;
            color: #00d9ff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #888;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 217, 255, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .controls {
                flex-direction: column;
            }

            #asciiCanvas {
                font-size: 6px;
            }

            .art-display {
                padding: 15px;
                min-height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔢 Mathematical ASCII Art</h1>
            <p class="subtitle">美しい数式をASCIIアートで表現</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label>数式を選択</label>
                <select id="formulaSelect">
                    <option value="euler">オイラーの公式</option>
                    <option value="pythagoras">ピタゴラスの定理</option>
                    <option value="quadratic">二次方程式の解</option>
                    <option value="newton">ニュートン冷却の法則</option>
                    <option value="wave">波動方程式</option>
                </select>
            </div>

            <div class="control-group">
                <label>文字の太さ</label>
                <select id="densitySelect">
                    <option value="light">細い</option>
                    <option value="medium" selected>中</option>
                    <option value="bold">太い</option>
                </select>
            </div>

            <button onclick="generateArt()">🎨 生成</button>
            <button onclick="downloadArt()">💾 保存</button>
        </div>

        <div class="formula-info">
            <div class="formula-name" id="formulaName">オイラーの公式</div>
            <div class="formula-description" id="formulaDescription">
                数学史上最も美しい式。e^(iπ) + 1 = 0 は、指数関数、虚数単位、円周率、1、0という数学の基本定数を1つの式で結びつけています。
            </div>
            <div class="formula-latex" id="formulaLatex">e^(iπ) + 1 = 0</div>
        </div>

        <div class="art-display">
            <div id="asciiCanvas"></div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="charCount">0</div>
                <div class="stat-label">文字数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="lineCount">0</div>
                <div class="stat-label">行数</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="complexity">0</div>
                <div class="stat-label">複雑度</div>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

    <script>
        const formulas = {
            euler: {
                name: "オイラーの公式",
                description: "数学史上最も美しい式。e^(iπ) + 1 = 0 は、指数関数、虚数単位、円周率、1、0という数学の基本定数を1つの式で結びつけています。",
                latex: "e^(iπ) + 1 = 0",
                generate: (density) => generateEuler(density)
            },
            pythagoras: {
                name: "ピタゴラスの定理",
                description: "直角三角形の三辺の関係 a² + b² = c²。幾何学の最も基本的な定理で、2000年以上前から知られています。",
                latex: "a² + b² = c²",
                generate: (density) => generatePythagoras(density)
            },
            quadratic: {
                name: "二次方程式の解",
                description: "ax² + bx + c = 0 の解の公式。数学で最も有名な公式の一つです。",
                latex: "x = (-b ± √(b²-4ac)) / 2a",
                generate: (density) => generateQuadratic(density)
            },
            newton: {
                name: "ニュートン冷却の法則",
                description: "物体の温度変化を表す微分方程式。T(t) = T₀ + (T₁ - T₀)e^(-kt)",
                latex: "dT/dt = -k(T - Tₑ)",
                generate: (density) => generateNewton(density)
            },
            wave: {
                name: "波動方程式",
                description: "波の伝播を記述する偏微分方程式。∂²u/∂t² = c²∂²u/∂x²",
                latex: "∂²u/∂t² = c²∂²u/∂x²",
                generate: (density) => generateWave(density)
            }
        };

        const densityChars = {
            light: ['.', ':', '!', '|', '+'],
            medium: ['.', ':', '!', '|', '+', '#', '&', '@'],
            bold: ['@', '#', '&', '%', '*', '+', '=', ':']
        };

        function getDensity() {
            return document.getElementById('densitySelect').value;
        }

        function generateEuler(density) {
            const chars = densityChars[density];
            let art = '';
            
            // Generate a spiral representation
            const size = density === 'light' ? 25 : density === 'medium' ? 35 : 45;
            const centerX = Math.floor(size / 2);
            const centerY = Math.floor(size / 2);
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);
                    
                    // Create spiral pattern
                    const spiral = Math.sin(dist * 0.5 - angle * 3) * Math.cos(dist * 0.3);
                    
                    if (Math.abs(spiral) > 0.3) {
                        const intensity = Math.floor(Math.abs(spiral) * chars.length);
                        art += chars[Math.min(intensity, chars.length - 1)];
                    } else if (dist < 2) {
                        art += '●';
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            
            return art;
        }

        function generatePythagoras(density) {
            const chars = densityChars[density];
            let art = '';
            
            const size = density === 'light' ? 25 : density === 'medium' ? 35 : 45;
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    // Create right triangle
                    const relX = x / size;
                    const relY = 1 - y / size;
                    
                    if (relX + relY <= 1) {
                        // Inside triangle - create pattern
                        const distFromHypotenuse = relX + relY;
                        const pattern = Math.sin(distFromHypotenuse * Math.PI * 4) * 
                                       Math.cos(relX * Math.PI * 3);
                        
                        if (Math.abs(pattern) > 0.2) {
                            const intensity = Math.floor(Math.abs(pattern) * chars.length);
                            art += chars[Math.min(intensity, chars.length - 1)];
                        } else {
                            art += '·';
                        }
                    } else if (Math.abs(relX + relY - 1) < 0.02) {
                        art += '=';
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            
            return art;
        }

        function generateQuadratic(density) {
            const chars = densityChars[density];
            let art = '';
            
            const size = density === 'light' ? 25 : density === 'medium' ? 35 : 45;
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const relX = (x - size / 2) / (size / 4);
                    const relY = (y - size / 2) / (size / 4);
                    
                    // Parabolic pattern
                    const parabola = relY - relX * relX;
                    const wave = Math.sin(parabola * Math.PI * 2) * Math.cos(relX * 2);
                    
                    if (Math.abs(parabola) < 0.2) {
                        art += '─';
                    } else if (Math.abs(wave) > 0.3) {
                        const intensity = Math.floor(Math.abs(wave) * chars.length);
                        art += chars[Math.min(intensity, chars.length - 1)];
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            
            return art;
        }

        function generateNewton(density) {
            const chars = densityChars[density];
            let art = '';
            
            const size = density === 'light' ? 25 : density === 'medium' ? 35 : 45;
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const relX = (x - size / 2) / (size / 3);
                    const relY = (y - size / 2) / (size / 3);
                    const dist = Math.sqrt(relX * relX + relY * relY);
                    
                    // Exponential decay pattern
                    const value = Math.exp(-dist) * Math.sin(dist * Math.PI * 3);
                    
                    if (Math.abs(value) > 0.15) {
                        const intensity = Math.floor(Math.abs(value) * chars.length);
                        art += chars[Math.min(intensity, chars.length - 1)];
                    } else if (dist < 0.5) {
                        art += '○';
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            
            return art;
        }

        function generateWave(density) {
            const chars = densityChars[density];
            let art = '';
            
            const size = density === 'light' ? 25 : density === 'medium' ? 35 : 45;
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const relX = x / size;
                    const relY = y / size;
                    
                    // Wave interference pattern
                    const wave1 = Math.sin(relX * Math.PI * 6) * Math.cos(relY * Math.PI * 4);
                    const wave2 = Math.cos(relX * Math.PI * 4) * Math.sin(relY * Math.PI * 6);
                    const interference = (wave1 + wave2) / 2;
                    
                    if (Math.abs(interference) > 0.2) {
                        const intensity = Math.floor(Math.abs(interference) * chars.length);
                        art += chars[Math.min(intensity, chars.length - 1)];
                    } else if (Math.abs(interference) > 0.05) {
                        art += '·';
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            
            return art;
        }

        function generateArt() {
            const formulaKey = document.getElementById('formulaSelect').value;
            const density = getDensity();
            const formula = formulas[formulaKey];
            
            // Update info
            document.getElementById('formulaName').textContent = formula.name;
            document.getElementById('formulaDescription').textContent = formula.description;
            document.getElementById('formulaLatex').textContent = formula.latex;
            
            // Generate ASCII art
            const asciiArt = formula.generate(density);
            document.getElementById('asciiCanvas').textContent = asciiArt;
            
            // Update stats
            const lines = asciiArt.split('\n').length;
            const chars = asciiArt.replace(/\n/g, '').length;
            const complexity = Math.floor((chars / lines) * 10) / 10;
            
            document.getElementById('charCount').textContent = chars.toLocaleString();
            document.getElementById('lineCount').textContent = lines;
            document.getElementById('complexity').textContent = complexity.toFixed(1);
        }

        function downloadArt() {
            const art = document.getElementById('asciiCanvas').textContent;
            const formula = document.getElementById('formulaName').textContent;
            const blob = new Blob([art], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${formula.replace(/\s+/g, '_')}_ASCII_Art.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Generate initial art
        generateArt();

        // Auto-regenerate on formula change
        document.getElementById('formulaSelect').addEventListener('change', generateArt);
        document.getElementById('densitySelect').addEventListener('change', generateArt);
    </script>
</body>
</html>
