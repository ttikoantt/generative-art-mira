<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Particles Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #0ff;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0ff;
            letter-spacing: 0.3em;
        }

        .canvas-wrapper {
            background: #111;
            border: 2px solid #0ff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            margin-bottom: 20px;
        }

        #asciiCanvas {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 14px;
            white-space: pre;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            overflow: hidden;
            min-height: 300px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #00ffff, #0080ff);
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        .info {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2rem;
            }

            #asciiCanvas {
                font-size: 10px;
                line-height: 10px;
            }

            button {
                padding: 10px 20px;
                font-size: 12px;
            }
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff00ff, #00ffff);
            z-index: 1000;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ASCII PARTICLES ART</h1>

        <div class="canvas-wrapper">
            <pre id="asciiCanvas"></pre>
        </div>

        <div class="controls">
            <button onclick="changePattern()">パターン変更</button>
            <button onclick="changeSpeed()">速度変更</button>
            <button onclick="changeColors()">色変更</button>
            <button onclick="toggleAnimation()">一時停止/再生</button>
        </div>

        <div class="info">
            パーティクル数: <span id="particleCount">0</span> |
            パターン: <span id="currentPattern">Rain</span> |
            速度: <span id="currentSpeed">1x</span>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('asciiCanvas');
        const width = 80;
        const height = 40;

        const particles = [];
        const patterns = ['rain', 'snow', 'firework', 'spiral', 'wave'];
        const colors = [
            { main: '#0f0', shadow: '#0f0' },
            { main: '#0ff', shadow: '#0ff' },
            { main: '#f0f', shadow: '#f0f' },
            { main: '#ff0', shadow: '#ff0' },
            { main: '#f00', shadow: '#f00' }
        ];

        let currentPattern = 0;
        let currentColor = 0;
        let speed = 1;
        let isAnimating = true;
        let animationId;
        let frame = 0;

        const chars = ['*', '+', '.', 'o', '@', '#', '&', '%', '$', '~'];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * 2 + 1;
                this.life = Math.random() * 100 + 50;
                this.char = chars[Math.floor(Math.random() * chars.length)];
                this.size = Math.random() * 2 + 1;
            }

            update(pattern) {
                this.life--;

                switch (pattern) {
                    case 'rain':
                        this.y += this.vy * speed;
                        if (this.y >= height) {
                            this.y = 0;
                            this.x = Math.random() * width;
                        }
                        break;
                    case 'snow':
                        this.y += this.vy * 0.5 * speed;
                        this.x += Math.sin(frame * 0.02 + this.life) * 0.5;
                        if (this.y >= height) {
                            this.y = 0;
                            this.x = Math.random() * width;
                        }
                        break;
                    case 'firework':
                        const angle = (this.life / 50) * Math.PI * 2;
                        const radius = (100 - this.life) * 0.3;
                        this.x = width / 2 + Math.cos(angle) * radius;
                        this.y = height / 2 + Math.sin(angle) * radius;
                        if (this.life <= 0) {
                            this.reset();
                            this.x = width / 2;
                            this.y = height / 2;
                        }
                        break;
                    case 'spiral':
                        const spiralAngle = this.life * 0.1;
                        const spiralRadius = (100 - this.life) * 0.2;
                        this.x = width / 2 + Math.cos(spiralAngle) * spiralRadius;
                        this.y = height / 2 + Math.sin(spiralAngle) * spiralRadius;
                        if (this.life <= 0) {
                            this.reset();
                            this.x = width / 2;
                            this.y = height / 2;
                        }
                        break;
                    case 'wave':
                        this.y = height / 2 + Math.sin(this.x * 0.1 + frame * 0.05) * 10;
                        this.x += speed * 0.5;
                        if (this.x >= width) {
                            this.x = 0;
                        }
                        break;
                }
            }

            draw(buffer) {
                if (this.x >= 0 && this.x < width && this.y >= 0 && this.y < height) {
                    const index = Math.floor(this.y) * width + Math.floor(this.x);
                    if (index >= 0 && index < buffer.length) {
                        buffer[index] = this.char;
                    }
                }
            }
        }

        function init() {
            for (let i = 0; i < 200; i++) {
                particles.push(new Particle());
            }
            document.getElementById('particleCount').textContent = particles.length;
            animate();
        }

        function animate() {
            if (!isAnimating) {
                animationId = requestAnimationFrame(animate);
                return;
            }

            frame++;
            const buffer = new Array(width * height).fill(' ');

            particles.forEach(p => {
                p.update(patterns[currentPattern]);
                p.draw(buffer);
            });

            let output = '';
            for (let y = 0; y < height; y++) {
                output += buffer.slice(y * width, (y + 1) * width).join('') + '\n';
            }

            canvas.textContent = output;
            animationId = requestAnimationFrame(animate);
        }

        function changePattern() {
            currentPattern = (currentPattern + 1) % patterns.length;
            document.getElementById('currentPattern').textContent =
                patterns[currentPattern].charAt(0).toUpperCase() + patterns[currentPattern].slice(1);

            if (patterns[currentPattern] === 'firework' || patterns[currentPattern] === 'spiral') {
                particles.forEach(p => {
                    p.x = width / 2;
                    p.y = height / 2;
                    p.life = Math.random() * 100;
                });
            }
        }

        function changeSpeed() {
            speed = speed === 1 ? 2 : speed === 2 ? 0.5 : 1;
            document.getElementById('currentSpeed').textContent = speed + 'x';
        }

        function changeColors() {
            currentColor = (currentColor + 1) % colors.length;
            const color = colors[currentColor];
            canvas.style.color = color.main;
            canvas.style.textShadow = `0 0 5px ${color.shadow}`;
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        init();
    </script>
</body>
</html>
