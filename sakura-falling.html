<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Falling - 桜舞い</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #1a0a1e 0%, #2d1b3d 50%, #4a2c5a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Hiragino Kaku Gothic Pro', 'Helvetica Neue', Arial, sans-serif;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #ffb7c5;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 183, 197, 0.5);
        }

        .info h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 5px;
        }

        .info p {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 183, 197, 0.2);
            border: 1px solid rgba(255, 183, 197, 0.3);
            color: #ffb7c5;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 183, 197, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .info h1 {
                font-size: 1.5rem;
            }

            .info p {
                font-size: 0.8rem;
            }

            .fullscreen-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>桜舞い</h1>
        <p>Sakura Falling</p>
    </div>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面表示</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let petals = [];
        let windForce = 0;
        let time = 0;

        // 桜の色
        const sakuraColors = [
            'rgba(255, 183, 197, 0.9)',   // ピンク
            'rgba(255, 192, 203, 0.9)',   // ライトピンク
            'rgba(255, 160, 180, 0.8)',   // 濃いピンク
            'rgba(255, 200, 210, 0.85)',  // 薄ピンク
            'rgba(255, 170, 190, 0.9)'    // 中間ピンク
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Petal {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = -20;
                this.z = Math.random() * 3 + 1; // 深度
                this.size = (Math.random() * 8 + 4) * this.z;
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = 0;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.02 + 0.01;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.color = sakuraColors[Math.floor(Math.random() * sakuraColors.length)];
            }

            update() {
                // 重力
                this.y += this.speedY * this.z;

                // 風の影響
                this.speedX += windForce * 0.01;
                this.speedX *= 0.98;
                this.x += this.speedX;

                // ゆらゆら
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5 * this.z;

                // 回転
                this.rotation += this.rotationSpeed;

                // 画面外に出たらリセット
                if (this.y > height + 20) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // 桜の花びらの形
                ctx.beginPath();
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;

                // 花びらの形を描画
                const s = this.size;
                ctx.moveTo(0, -s);
                ctx.bezierCurveTo(s * 0.8, -s * 0.5, s * 0.8, s * 0.5, 0, s);
                ctx.bezierCurveTo(-s * 0.8, s * 0.5, -s * 0.8, -s * 0.5, 0, -s);

                ctx.fill();

                // 花びらの中央の線
                ctx.strokeStyle = 'rgba(255, 150, 170, 0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -s * 0.7);
                ctx.lineTo(0, s * 0.7);
                ctx.stroke();

                ctx.restore();
            }
        }

        function init() {
            petals = [];
            const petalCount = Math.floor((width * height) / 8000);
            for (let i = 0; i < petalCount; i++) {
                const petal = new Petal();
                petal.y = Math.random() * height;
                petals.push(petal);
            }
        }

        function drawBackground() {
            // グラデーション背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#1a0a1e');
            gradient.addColorStop(0.5, '#2d1b3d');
            gradient.addColorStop(1, '#4a2c5a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 満月
            const moonX = width * 0.85;
            const moonY = height * 0.15;
            const moonRadius = Math.min(width, height) * 0.08;

            // 月の光
            const moonGlow = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonRadius * 3);
            moonGlow.addColorStop(0, 'rgba(255, 250, 240, 0.1)');
            moonGlow.addColorStop(1, 'rgba(255, 250, 240, 0)');
            ctx.fillStyle = moonGlow;
            ctx.fillRect(0, 0, width, height);

            // 月本体
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 250, 240, 0.9)';
            ctx.fill();
        }

        function animate() {
            drawBackground();

            time += 0.01;
            windForce = Math.sin(time) * 2;

            petals.forEach(petal => {
                petal.update();
                petal.draw();
            });

            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', () => {
            resize();
            init();
        });

        resize();
        init();
        animate();
    </script>
</body>
</html>
