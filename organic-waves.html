<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Waves - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.8rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        canvas {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(100, 150, 255, 0.2);
            max-width: 100%;
            height: auto;
            touch-action: none;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .control-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }

        input[type="range"] {
            width: 120px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.4rem;
            }

            canvas {
                width: 100% !important;
                height: auto !important;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Organic Waves</h1>
        <p class="subtitle">有機的な波の動き - Mathematical Beauty</p>

        <canvas id="canvas" width="800" height="600"></canvas>

        <div class="controls">
            <div class="control-group">
                <label>波の数: <span id="waveCountValue">5</span></label>
                <input type="range" id="waveCount" min="3" max="10" value="5">
            </div>

            <div class="control-group">
                <label>スピード: <span id="speedValue">1.0</span></label>
                <input type="range" id="speed" min="0.1" max="2.0" step="0.1" value="1.0">
            </div>

            <button id="randomize">🎲 ランダム化</button>
            <button id="fullscreen" class="fullscreen-btn">📺 全画面</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let waves = [];
        let time = 0;
        let animationId;

        // パラメータ
        let waveCount = 5;
        let speed = 1.0;

        // 色パレット
        const colorPalettes = [
            ['#667eea', '#764ba2', '#f093fb', '#f5576c'],
            ['#4facfe', '#00f2fe', '#43e97b', '#38f9d7'],
            ['#fa709a', '#fee140', '#f6d365', '#fda085'],
            ['#a8edea', '#fed6e3', '#ffecd2', '#fcb69f'],
            ['#ff9a9e', '#fecfef', '#fecfef', '#ffecd2']
        ];

        let currentPalette = 0;

        // クラス: Wave
        class Wave {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.reset();
            }

            reset() {
                this.amplitude = 50 + Math.random() * 100;
                this.frequency = 0.005 + Math.random() * 0.01;
                this.phase = Math.random() * Math.PI * 2;
                this.offset = (this.index / this.total) * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 0.5;
                this.color = colorPalettes[currentPalette][this.index % colorPalettes[currentPalette].length];
            }

            getY(x, t) {
                // 三角波とノイズを組み合わせて有機的な動きを表現
                const wave1 = Math.sin(x * this.frequency + t * this.speed + this.offset);
                const wave2 = Math.sin(x * this.frequency * 2 + t * this.speed * 1.5 + this.offset) * 0.5;
                const wave3 = Math.sin(x * this.frequency * 0.5 + t * this.speed * 0.5 + this.offset) * 0.3;

                return (wave1 + wave2 + wave3) * this.amplitude;
            }

            draw(t) {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;

                const baseY = canvas.height / 2;
                let startX = 0;
                let startY = baseY + this.getY(startX, t);

                ctx.moveTo(startX, startY);

                for (let x = 0; x < canvas.width; x += 2) {
                    const y = baseY + this.getY(x, t);
                    ctx.lineTo(x, y);
                }

                ctx.stroke();

                // グラデーション効果
                ctx.beginPath();
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
                gradient.addColorStop(0, this.color + '00');
                gradient.addColorStop(0.5, this.color + '40');
                gradient.addColorStop(1, this.color + '00');
                ctx.fillStyle = gradient;

                ctx.moveTo(0, baseY + this.getY(0, t));
                for (let x = 0; x < canvas.width; x += 5) {
                    const y = baseY + this.getY(x, t);
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(canvas.width, canvas.height);
                ctx.lineTo(0, canvas.height);
                ctx.fill();
            }
        }

        // 波を初期化
        function initWaves() {
            waves = [];
            for (let i = 0; i < waveCount; i++) {
                waves.push(new Wave(i, waveCount));
            }
        }

        // 描画
        function draw() {
            // 背景を半透明でクリア（トレイル効果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 波を描画
            waves.forEach(wave => {
                wave.draw(time);
            });

            // パーティクル効果（小さな光点）
            for (let i = 0; i < 20; i++) {
                const x = (Math.sin(time * 0.3 + i) * 0.5 + 0.5) * canvas.width;
                const y = (Math.cos(time * 0.5 + i * 0.5) * 0.5 + 0.5) * canvas.height;
                const size = 1 + Math.sin(time + i) * 0.5;
                const alpha = 0.3 + Math.sin(time * 2 + i) * 0.2;

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }

            time += 0.02 * speed;
            animationId = requestAnimationFrame(draw);
        }

        // コントロール
        document.getElementById('waveCount').addEventListener('input', (e) => {
            waveCount = parseInt(e.target.value);
            document.getElementById('waveCountValue').textContent = waveCount;
            initWaves();
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = speed.toFixed(1);
        });

        document.getElementById('randomize').addEventListener('click', () => {
            currentPalette = (currentPalette + 1) % colorPalettes.length;
            initWaves();
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            } else if (canvas.webkitRequestFullscreen) {
                canvas.webkitRequestFullscreen();
            }
        });

        // 初期化
        initWaves();
        draw();

        // レスポンシブ対応
        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(800, container.clientWidth - 40);
            const aspectRatio = 600 / 800;

            if (window.innerWidth < 768) {
                canvas.style.width = maxWidth + 'px';
                canvas.style.height = (maxWidth * aspectRatio) + 'px';
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>
