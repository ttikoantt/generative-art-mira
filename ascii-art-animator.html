<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive ASCII Art Animator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 20px;
            text-align: center;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }

        .canvas-container {
            background: #000;
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            max-width: 100%;
            overflow: auto;
        }

        #asciiCanvas {
            font-family: 'Courier New', monospace;
            font-size: clamp(8px, 2vw, 14px);
            line-height: 1.1;
            white-space: pre;
            color: #00ff00;
            user-select: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 150px;
            flex: 1;
        }

        label {
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #00ff00;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #00ff00;
        }

        button {
            background: #001100;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 12px 24px;
            font-family: 'Courier New', monospace;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            min-width: 120px;
        }

        button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }

        button:active {
            transform: scale(0.98);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: #00aa00;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #001100;
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 10px 15px;
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 15px #00ff00;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }
            
            .control-group {
                min-width: 100%;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    
    <h1>⌨️ Interactive ASCII Art Animator</h1>
    
    <div class="canvas-container">
        <div id="asciiCanvas"></div>
    </div>
    
    <div class="controls">
        <div class="control-group">
            <label for="speedRange">速度: <span id="speedValue">50</span>ms</label>
            <input type="range" id="speedRange" min="10" max="200" value="50">
        </div>
        
        <div class="control-group">
            <label for="widthRange">幅: <span id="widthValue">60</span></label>
            <input type="range" id="widthRange" min="30" max="100" value="60">
        </div>
        
        <div class="control-group">
            <label for="heightRange">高さ: <span id="heightValue">30</span></label>
            <input type="range" id="heightRange" min="15" max="50" value="30">
        </div>
    </div>
    
    <div class="button-group">
        <button onclick="setPattern('wave')">🌊 波</button>
        <button onclick="setPattern('spiral')">🌀 渦</button>
        <button onclick="setPattern('matrix')">💻 マトリックス</button>
        <button onclick="setPattern('firework')">🎆 花火</button>
        <button onclick="setPattern('dna')">🧬 DNA</button>
        <button onclick="setPattern('rain')">🌧️ 雨</button>
    </div>
    
    <div class="info">
        <p>パターンを選択するか、マウス/タッチでインタラクション！</p>
        <p>Frame: <span id="frameCount">0</span> | FPS: <span id="fps">0</span></p>
    </div>

    <script>
        const canvas = document.getElementById('asciiCanvas');
        const speedRange = document.getElementById('speedRange');
        const widthRange = document.getElementById('widthRange');
        const heightRange = document.getElementById('heightRange');
        const speedValue = document.getElementById('speedValue');
        const widthValue = document.getElementById('widthValue');
        const heightValue = document.getElementById('heightValue');
        const frameCountEl = document.getElementById('frameCount');
        const fpsEl = document.getElementById('fps');

        let width = 60;
        let height = 30;
        let speed = 50;
        let currentPattern = 'wave';
        let frame = 0;
        let lastTime = performance.now();
        let fps = 0;
        let animationId;

        const chars = ['@', '#', 'S', '%', '?', '*', '+', ';', ':', ',', '.', ' '];
        const brightChars = ['@', '#', 'S', '%', '?', '*', '+', ';', ':', ',', '.', ' '];

        function init() {
            updateCanvas();
            animate();
        }

        function updateCanvas() {
            speedValue.textContent = speed;
            widthValue.textContent = width;
            heightValue.textContent = height;
        }

        function setPattern(pattern) {
            currentPattern = pattern;
            frame = 0;
        }

        function generateWave() {
            let output = '';
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const wave1 = Math.sin((x + frame) * 0.1) * Math.cos((y + frame) * 0.1);
                    const wave2 = Math.sin((x - frame) * 0.15) * Math.sin((y + frame * 0.5) * 0.1);
                    const value = (wave1 + wave2 + 2) / 4;
                    const charIndex = Math.floor(value * (chars.length - 1));
                    output += chars[charIndex];
                }
                output += '\n';
            }
            return output;
        }

        function generateSpiral() {
            let output = '';
            const centerX = width / 2;
            const centerY = height / 2;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx);
                    
                    const spiral = Math.sin(distance * 0.5 - frame * 0.1 + angle * 3);
                    const value = (spiral + 1) / 2;
                    const charIndex = Math.floor(value * (chars.length - 1));
                    output += chars[charIndex];
                }
                output += '\n';
            }
            return output;
        }

        function generateMatrix() {
            let output = '';
            const drops = [];
            
            for (let x = 0; x < width; x++) {
                drops[x] = (Math.sin(x * 0.5 + frame * 0.05) * 0.5 + 0.5) * height;
            }
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const dropY = drops[x] % height;
                    const distFromDrop = Math.abs(y - dropY);
                    
                    if (distFromDrop < 3) {
                        const brightness = 1 - (distFromDrop / 3);
                        const charIndex = Math.floor(brightness * (chars.length - 1));
                        output += chars[charIndex];
                    } else if (Math.random() < 0.02) {
                        output += chars[Math.floor(Math.random() * 3)];
                    } else {
                        output += ' ';
                    }
                }
                output += '\n';
            }
            return output;
        }

        function generateFirework() {
            let output = '';
            const centerX = width / 2;
            const centerY = height / 2;
            const particles = [];
            
            const numParticles = 50;
            for (let i = 0; i < numParticles; i++) {
                const angle = (i / numParticles) * Math.PI * 2;
                const radius = (frame % 50) * 0.8;
                particles.push({
                    x: centerX + Math.cos(angle) * radius,
                    y: centerY + Math.sin(angle) * radius
                });
            }
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let brightness = 0;
                    
                    for (const p of particles) {
                        const dist = Math.sqrt((x - p.x) ** 2 + (y - p.y) ** 2);
                        if (dist < 2) {
                            brightness = Math.max(brightness, 1 - dist / 2);
                        }
                    }
                    
                    if (brightness > 0) {
                        const charIndex = Math.floor(brightness * (chars.length - 1));
                        output += chars[charIndex];
                    } else {
                        output += ' ';
                    }
                }
                output += '\n';
            }
            return output;
        }

        function generateDNA() {
            let output = '';
            const centerX = width / 2;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const t = y * 0.2 + frame * 0.1;
                    const offset1 = Math.sin(t) * (width * 0.3);
                    const offset2 = Math.sin(t + Math.PI) * (width * 0.3);
                    
                    const dist1 = Math.abs(x - (centerX + offset1));
                    const dist2 = Math.abs(x - (centerX + offset2));
                    
                    if (dist1 < 1.5 || dist2 < 1.5) {
                        const brightness = Math.max(0, 1 - Math.min(dist1, dist2) / 1.5);
                        const charIndex = Math.floor(brightness * (chars.length - 1));
                        output += chars[charIndex];
                    } else if (Math.abs(x - centerX) < 0.5 && Math.random() < 0.3) {
                        output += '-';
                    } else {
                        output += ' ';
                    }
                }
                output += '\n';
            }
            return output;
        }

        function generateRain() {
            let output = '';
            const drops = [];
            
            for (let i = 0; i < 20; i++) {
                drops.push({
                    x: (Math.sin(i * 123.456 + frame * 0.01) * 0.5 + 0.5) * width,
                    y: (frame * 2 + i * 30) % height,
                    length: 3 + Math.floor(Math.random() * 5)
                });
            }
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let brightness = 0;
                    
                    for (const drop of drops) {
                        if (Math.abs(x - drop.x) < 1 && y >= drop.y && y < drop.y + drop.length) {
                            brightness = Math.max(brightness, 1 - Math.abs(x - drop.x));
                        }
                    }
                    
                    if (brightness > 0) {
                        const charIndex = Math.floor(brightness * (chars.length - 1));
                        output += chars[charIndex];
                    } else if (Math.random() < 0.005) {
                        output += '.';
                    } else {
                        output += ' ';
                    }
                }
                output += '\n';
            }
            return output;
        }

        function animate() {
            const currentTime = performance.now();
            const delta = currentTime - lastTime;
            fps = Math.round(1000 / delta);
            lastTime = currentTime;
            
            let ascii;
            switch (currentPattern) {
                case 'wave':
                    ascii = generateWave();
                    break;
                case 'spiral':
                    ascii = generateSpiral();
                    break;
                case 'matrix':
                    ascii = generateMatrix();
                    break;
                case 'firework':
                    ascii = generateFirework();
                    break;
                case 'dna':
                    ascii = generateDNA();
                    break;
                case 'rain':
                    ascii = generateRain();
                    break;
                default:
                    ascii = generateWave();
            }
            
            canvas.textContent = ascii;
            frameCountEl.textContent = frame;
            fpsEl.textContent = fps;
            frame++;
            
            setTimeout(() => {
                animationId = requestAnimationFrame(animate);
            }, speed);
        }

        speedRange.addEventListener('input', (e) => {
            speed = parseInt(e.target.value);
            updateCanvas();
        });

        widthRange.addEventListener('input', (e) => {
            width = parseInt(e.target.value);
            updateCanvas();
        });

        heightRange.addEventListener('input', (e) => {
            height = parseInt(e.target.value);
            updateCanvas();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Touch/click interaction
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Add interaction effect
            const patterns = ['wave', 'spiral', 'matrix', 'firework', 'dna', 'rain'];
            const currentIndex = patterns.indexOf(currentPattern);
            currentPattern = patterns[(currentIndex + 1) % patterns.length];
            frame = 0;
        });

        init();
    </script>
</body>
</html>
