<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Particle Universe Interactive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ui h1 {
            font-size: 18px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 12px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .control-row label {
            color: #aaa;
            min-width: 80px;
        }

        .control-row button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.3s ease;
        }

        .control-row button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .control-row button:active {
            transform: scale(0.95);
        }

        .stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 11px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 768px) {
            .ui {
                top: 10px;
                left: 10px;
                padding: 10px 15px;
            }

            .ui h1 {
                font-size: 14px;
            }

            .controls {
                font-size: 10px;
            }

            .control-row button {
                padding: 6px 12px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="ui">
        <h1>🌌 Particle Universe</h1>
        <div class="controls">
            <div class="control-row">
                <label>Mode:</label>
                <button onclick="setMode('gravity')">Gravity</button>
                <button onclick="setMode('vortex')">Vortex</button>
                <button onclick="setMode('explosion')">Explosion</button>
            </div>
            <div class="control-row">
                <label>Effect:</label>
                <button onclick="toggleTrails()">Trails</button>
                <button onclick="clearParticles()">Clear</button>
            </div>
        </div>
    </div>

    <div class="stats">
        <span id="particleCount">Particles: 0</span>
    </div>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        let mode = 'gravity';
        let showTrails = true;
        let mouseX = width / 2;
        let mouseY = height / 2;
        let isMouseDown = false;

        class Particle {
            constructor(x, y, vx = 0, vy = 0) {
                this.x = x;
                this.y = y;
                this.vx = vx || (Math.random() - 0.5) * 4;
                this.vy = vy || (Math.random() - 0.5) * 4;
                this.radius = Math.random() * 3 + 1;
                this.color = this.getRandomColor();
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.001;
                this.angle = Math.random() * Math.PI * 2;
                this.angularVelocity = (Math.random() - 0.5) * 0.1;
            }

            getRandomColor() {
                const colors = [
                    '#667eea', '#764ba2', '#f093fb', '#4facfe',
                    '#00f2fe', '#fa709a', '#fee140', '#30cfd0',
                    '#a8edea', '#ff6b6b', '#feca57', '#ff9ff3'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                switch (mode) {
                    case 'gravity':
                        const dx = mouseX - this.x;
                        const dy = mouseY - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const force = 500 / (dist * dist + 100);
                        this.vx += dx * force * 0.01;
                        this.vy += dy * force * 0.01;
                        break;

                    case 'vortex':
                        const vdx = mouseX - this.x;
                        const vdy = mouseY - this.y;
                        const vdist = Math.sqrt(vdx * vdx + vdy * vdy);
                        const tangentX = -vdy / vdist;
                        const tangentY = vdx / vdist;
                        this.vx += tangentX * 0.5;
                        this.vy += tangentY * 0.5;
                        this.vx += vdx * 0.001;
                        this.vy += vdy * 0.001;
                        break;

                    case 'explosion':
                        if (isMouseDown) {
                            const edx = this.x - mouseX;
                            const edy = this.y - mouseY;
                            const edist = Math.sqrt(edx * edx + edy * edy);
                            if (edist < 200) {
                                const force = (200 - edist) / 200;
                                this.vx += (edx / edist) * force * 2;
                                this.vy += (edy / edist) * force * 2;
                            }
                        }
                        break;
                }

                this.vx *= 0.99;
                this.vy *= 0.99;

                this.x += this.vx;
                this.y += this.vy;

                this.angle += this.angularVelocity;
                this.life -= this.decay;

                // Bounce off walls
                if (this.x < 0 || this.x > width) {
                    this.vx *= -0.8;
                    this.x = Math.max(0, Math.min(width, this.x));
                }
                if (this.y < 0 || this.y > height) {
                    this.vy *= -0.8;
                    this.y = Math.max(0, Math.min(height, this.y));
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        function createParticles(x, y, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function setMode(newMode) {
            mode = newMode;
        }

        function toggleTrails() {
            showTrails = !showTrails;
        }

        function clearParticles() {
            particles = [];
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 100) {
                        ctx.globalAlpha = (1 - dist / 100) * 0.3 * Math.min(particles[i].life, particles[j].life);
                        ctx.strokeStyle = particles[i].color;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            if (showTrails) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.clearRect(0, 0, width, height);
            }

            // Auto-spawn particles
            if (particles.length < 500 && Math.random() < 0.3) {
                createParticles(
                    Math.random() * width,
                    Math.random() * height,
                    1
                );
            }

            // Update and draw particles
            particles = particles.filter(p => !p.isDead());

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            drawConnections();

            document.getElementById('particleCount').textContent = `Particles: ${particles.length}`;

            requestAnimationFrame(animate);
        }

        // Event listeners
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
            createParticles(e.clientX, e.clientY, 20);
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isMouseDown) {
                createParticles(e.clientX, e.clientY, 5);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createParticles(touch.clientX, touch.clientY, 20);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            if (isMouseDown) {
                createParticles(touch.clientX, touch.clientY, 5);
            }
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Start animation
        animate();
    </script>
</body>
</html>
