<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Sacred Mandala | 数学的曼荼羅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #ffffff;
            font-size: clamp(1.2rem, 3vw, 2rem);
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #mandala {
            background: #000;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin: 0 auto;
            max-width: 100%;
            overflow: auto;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        pre {
            color: #ffd700;
            font-size: clamp(4px, 1.2vw, 8px);
            line-height: 1.1;
            white-space: pre;
            text-align: center;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border: none;
            color: #000;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Courier New', monospace;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .info {
            color: #888;
            margin-top: 20px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            #mandala {
                padding: 10px;
            }

            button {
                padding: 10px 20px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ ASCII Sacred Mandala ✨</h1>
        <div id="mandala">
            <pre id="art"></pre>
        </div>
        <div class="controls">
            <button onclick="generateMandala()">🎨 新しい曼荼羅</button>
            <button onclick="toggleAnimation()">▶️ アニメーション</button>
        </div>
        <p class="info">数学的なパターンで生成される神聖な幾何学模様</p>
    </div>

    <script>
        const canvas = document.getElementById('art');
        let animationId = null;
        let isAnimating = false;
        let currentRotation = 0;

        // 数学的パターンの種類
        const patterns = [
            createFlowerOfLife,
            createSeedOfLife,
            createSriYantra,
            createMetatronsCube,
            createToroidal,
            createFibonacciSpiral
        ];

        let currentPattern = 0;

        function generateMandala() {
            const pattern = patterns[currentPattern];
            canvas.textContent = pattern();
            currentPattern = (currentPattern + 1) % patterns.length;
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            } else {
                cancelAnimationFrame(animationId);
            }
        }

        function animate() {
            if (!isAnimating) return;
            currentRotation += 0.02;
            canvas.textContent = patterns[currentPattern](currentRotation);
            animationId = requestAnimationFrame(animate);
        }

        // パターン生成関数
        function createFlowerOfLife(rotation = 0) {
            const size = 35;
            const centerX = Math.floor(size / 2);
            const centerY = Math.floor(size / 2);
            const radius = size / 3;
            let art = '';

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // 中心の円
                    if (Math.abs(dist - radius) < 0.8) {
                        art += '◎';
                    } else if (dist < radius && dist > radius - 2) {
                        art += '○';
                    }
                    // 周囲の6つの円
                    else if (dist < radius * 2) {
                        const angle = Math.atan2(dy, dx) + rotation;
                        const petalDist = Math.abs(dist - radius);
                        const petalAngle = (angle % (Math.PI / 3));

                        if (petalDist < 1.5 && petalAngle < 0.3) {
                            art += '◉';
                        } else if (petalDist < 2.5) {
                            art += '◌';
                        } else {
                            art += '·';
                        }
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            return art;
        }

        function createSeedOfLife(rotation = 0) {
            const size = 30;
            const centerX = Math.floor(size / 2);
            const centerY = Math.floor(size / 2);
            const radius = size / 4;
            let art = '';

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // 7つの円（中心+6つの周囲）
                    let inCircle = false;
                    const positions = [
                        { x: 0, y: 0 },
                        { x: Math.cos(0) * radius, y: Math.sin(0) * radius },
                        { x: Math.cos(Math.PI / 3) * radius, y: Math.sin(Math.PI / 3) * radius },
                        { x: Math.cos(2 * Math.PI / 3) * radius, y: Math.sin(2 * Math.PI / 3) * radius },
                        { x: Math.cos(Math.PI) * radius, y: Math.sin(Math.PI) * radius },
                        { x: Math.cos(4 * Math.PI / 3) * radius, y: Math.sin(4 * Math.PI / 3) * radius },
                        { x: Math.cos(5 * Math.PI / 3) * radius, y: Math.sin(5 * Math.PI / 3) * radius }
                    ];

                    for (const pos of positions) {
                        const pdx = dx - pos.x;
                        const pdy = dy - pos.y;
                        const pdist = Math.sqrt(pdx * pdx + pdy * pdy);
                        if (pdist < radius * 0.8) {
                            inCircle = true;
                            break;
                        }
                    }

                    if (inCircle) {
                        const angle = Math.atan2(dy, dx) + rotation;
                        const intensity = (Math.sin(angle * 6) + 1) / 2;
                        if (intensity > 0.8) {
                            art += '✦';
                        } else if (intensity > 0.5) {
                            art += '✧';
                        } else {
                            art += '·';
                        }
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            return art;
        }

        function createSriYantra(rotation = 0) {
            const size = 32;
            const centerX = Math.floor(size / 2);
            const centerY = Math.floor(size / 2);
            let art = '';

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx) + rotation;

                    // 三角形のパターン
                    const triangle = Math.abs(Math.sin(angle * 9 + dist * 0.3));
                    const pattern = Math.abs(Math.cos(angle * 6 - dist * 0.2));

                    if (dist < size * 0.4) {
                        if (triangle > 0.95) {
                            art += '▲';
                        } else if (triangle > 0.9) {
                            art += '△';
                        } else if (pattern > 0.9) {
                            art += '◆';
                        } else if (pattern > 0.8) {
                            art += '◇';
                        } else {
                            art += '✧';
                        }
                    } else if (dist < size * 0.45) {
                        art += '▬';
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            return art;
        }

        function createMetatronsCube(rotation = 0) {
            const size = 30;
            const centerX = Math.floor(size / 2);
            const centerY = Math.floor(size / 2);
            let art = '';

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx) + rotation;

                    // 六角形のパターン
                    const hex = Math.abs(Math.cos(angle * 3) * Math.sin(dist * 0.4));
                    const lines = Math.abs(Math.sin(angle * 6 + dist * 0.3));

                    if (dist < size * 0.45) {
                        if (lines > 0.9) {
                            art += '╋';
                        } else if (hex > 0.85) {
                            art += '⬡';
                        } else if (hex > 0.7) {
                            art += '◊';
                        } else {
                            art += '·';
                        }
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            return art;
        }

        function createToroidal(rotation = 0) {
            const size = 28;
            const centerX = Math.floor(size / 2);
            const centerY = Math.floor(size / 2);
            let art = '';

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx) + rotation;

                    // トロイドパターン
                    const pattern = Math.sin(angle * 8) * Math.cos(dist * 0.5 - rotation * 2);
                    const wave = Math.sin(dist * 0.8 - angle * 2 + rotation);

                    if (Math.abs(pattern) > 0.8) {
                        art += '◈';
                    } else if (Math.abs(pattern) > 0.6) {
                        art += '◆';
                    } else if (wave > 0.7) {
                        art += '✦';
                    } else if (wave > 0.4) {
                        art += '·';
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            return art;
        }

        function createFibonacciSpiral(rotation = 0) {
            const size = 30;
            const centerX = Math.floor(size / 2);
            const centerY = Math.floor(size / 2);
            let art = '';

            const goldenAngle = Math.PI * (3 - Math.sqrt(5));

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const angle = Math.atan2(dy, dx) + rotation;

                    // フィボナッチ螺旋
                    const spiral = Math.sin(angle * 13 - dist * 0.5 + rotation * 3);
                    const dots = Math.abs(Math.cos(angle * goldenAngle * 10 + dist * 0.3));

                    if (dist < size * 0.45) {
                        if (spiral > 0.9) {
                            art += '✿';
                        } else if (spiral > 0.7) {
                            art += '❀';
                        } else if (dots > 0.85) {
                            art += '◉';
                        } else if (dots > 0.7) {
                            art += '◎';
                        } else {
                            art += '·';
                        }
                    } else {
                        art += ' ';
                    }
                }
                art += '\n';
            }
            return art;
        }

        // 初期生成
        generateMandala();
    </script>
</body>
</html>
