<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Ripple Art - by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(0.8rem, 2vw, 1rem);
            opacity: 0.7;
            margin-bottom: 20px;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.3);
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #0a1628 0%, #1a3a5c 100%);
            cursor: pointer;
            max-width: 100vw;
            max-height: 70vh;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: clamp(0.9rem, 2vw, 1rem);
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 15px;
            font-size: clamp(0.75rem, 1.5vw, 0.9rem);
            opacity: 0.6;
            text-align: center;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 217, 255, 0.9);
            border: none;
            color: #1a1a2e;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.4);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: #00ff88;
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .fullscreen-btn {
                top: 10px;
                right: 10px;
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <h1>💧 Water Ripple Art</h1>
    <p class="subtitle">クリックで水滴を落としてください</p>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button id="clearBtn">クリア</button>
        <button id="autoBtn">自動水滴</button>
    </div>

    <p class="info">Canvas + JavaScript | by Mira</p>

    <button class="fullscreen-btn" id="fullscreenBtn" title="全画面">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const autoBtn = document.getElementById('autoBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        let width, height;
        let ripples = [];
        let autoMode = false;
        let autoInterval;

        function resize() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(window.innerWidth - 40, 800);
            const maxHeight = Math.min(window.innerHeight - 250, 600);

            width = Math.min(maxWidth, maxHeight * 4/3);
            height = Math.min(maxHeight, width * 3/4);

            canvas.width = width;
            canvas.height = height;
        }

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 100 + 80;
                this.alpha = 1;
                this.speed = Math.random() * 1 + 0.5;
                this.waves = Math.floor(Math.random() * 2) + 2;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw(ctx) {
                for (let i = 0; i < this.waves; i++) {
                    const r = this.radius - i * 15;
                    if (r > 0) {
                        const alpha = this.alpha * (1 - i * 0.25);
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(0, 217, 255, ${alpha * 0.5})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }
        }

        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));
        }

        function animate() {
            // キャンバスをクリア
            ctx.fillStyle = 'rgba(10, 22, 40, 0.3)';
            ctx.fillRect(0, 0, width, height);

            // 背景グラデーション
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, 'rgba(26, 58, 92, 0.1)');
            gradient.addColorStop(1, 'rgba(10, 22, 40, 0.3)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            // 水面の光効果
            ctx.fillStyle = 'rgba(0, 217, 255, 0.02)';
            ctx.fillRect(0, 0, width, height);

            // 波紋を更新
            ripples = ripples.filter(ripple => {
                ripple.draw(ctx);
                return ripple.update();
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (width / rect.width);
            const y = (e.clientY - rect.top) * (height / rect.height);
            createRipple(x, y);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (width / rect.width);
            const y = (touch.clientY - rect.top) * (height / rect.height);
            createRipple(x, y);
        }, { passive: false });

        clearBtn.addEventListener('click', () => {
            ripples = [];
        });

        autoBtn.addEventListener('click', () => {
            autoMode = !autoMode;
            if (autoMode) {
                autoBtn.textContent = '自動停止';
                autoInterval = setInterval(() => {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    createRipple(x, y);
                }, 500);
            } else {
                autoBtn.textContent = '自動水滴';
                clearInterval(autoInterval);
            }
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        window.addEventListener('resize', resize);
        resize();
        animate();

        // 初期波紋
        setTimeout(() => createRipple(width/2, height/2), 500);
    </script>
</body>
</html>
