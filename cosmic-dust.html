<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Dust Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 8px;
            margin-top: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            color: #aaa;
            font-size: 0.8rem;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 15px;
            }

            .stats {
                top: auto;
                bottom: 80px;
                right: 10px;
                font-size: 0.75rem;
            }

            .hint {
                bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <h2>🌌 Cosmic Dust Simulator</h2>
        <div class="control-group">
            <label>Particle Count: <span id="countValue">300</span></label>
            <input type="range" id="particleCount" min="100" max="1000" value="300">
        </div>
        <div class="control-group">
            <label>Gravity Strength: <span id="gravityValue">0.5</span></label>
            <input type="range" id="gravity" min="0.1" max="2" step="0.1" value="0.5">
        </div>
        <div class="control-group">
            <label>Particle Size: <span id="sizeValue">3</span></label>
            <input type="range" id="particleSize" min="1" max="8" value="3">
        </div>
        <button class="btn btn-primary" id="addAttractor">Add Gravity Point</button>
        <button class="btn btn-secondary" id="reset">Reset</button>
    </div>

    <div class="stats">
        <div>Particles: <span id="particleStats">300</span></div>
        <div>Attractors: <span id="attractorStats">1</span></div>
        <div>FPS: <span id="fpsStats">60</span></div>
    </div>

    <button class="fullscreen-btn" id="fullscreen">⛶</button>

    <div class="hint">Click or tap to add gravity points</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Settings
        let particleCount = 300;
        let gravityStrength = 0.5;
        let particleSize = 3;

        // Particles
        let particles = [];

        // Attractors (gravity points)
        let attractors = [];

        // FPS tracking
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;

        // Colors
        const colors = [
            '#667eea', '#764ba2', '#f093fb', '#f5576c',
            '#4facfe', '#00f2fe', '#43e97b', '#38f9d7',
            '#fa709a', '#fee140', '#a8edea', '#fed6e3'
        ];

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.size = particleSize + Math.random() * 2;
                this.life = 1;
                this.decay = 0.0001 + Math.random() * 0.0005;
            }

            update() {
                // Apply gravity from all attractors
                for (let attractor of attractors) {
                    const dx = attractor.x - this.x;
                    const dy = attractor.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 5) {
                        const force = gravityStrength / dist;
                        const angle = Math.atan2(dy, dx);
                        this.vx += Math.cos(angle) * force;
                        this.vy += Math.sin(angle) * force;
                    }
                }

                // Apply velocity
                this.x += this.vx;
                this.y += this.vy;

                // Damping
                this.vx *= 0.99;
                this.vy *= 0.99;

                // Decay
                this.life -= this.decay;

                // Respawn if dead or out of bounds
                if (this.life <= 0 || this.x < -50 || this.x > width + 50 ||
                    this.y < -50 || this.y > height + 50) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            // Start with center attractor
            attractors = [{
                x: width / 2,
                y: height / 2,
                strength: 1
            }];
        }

        function drawAttractors() {
            for (let attractor of attractors) {
                // Glow effect
                const gradient = ctx.createRadialGradient(
                    attractor.x, attractor.y, 0,
                    attractor.x, attractor.y, 30
                );
                gradient.addColorStop(0, 'rgba(102, 126, 234, 0.8)');
                gradient.addColorStop(0.5, 'rgba(118, 75, 162, 0.3)');
                gradient.addColorStop(1, 'rgba(118, 75, 162, 0)');

                ctx.beginPath();
                ctx.arc(attractor.x, attractor.y, 30, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Core
                ctx.beginPath();
                ctx.arc(attractor.x, attractor.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            for (let particle of particles) {
                particle.update();
                particle.draw();
            }

            // Draw attractors
            drawAttractors();

            // Calculate FPS
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fpsStats').textContent = fps;
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            attractors.push({
                x: e.clientX,
                y: e.clientY,
                strength: 1
            });
            updateStats();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            attractors.push({
                x: touch.clientX,
                y: touch.clientY,
                strength: 1
            });
            updateStats();
        }, { passive: false });

        document.getElementById('particleCount').addEventListener('input', (e) => {
            particleCount = parseInt(e.target.value);
            document.getElementById('countValue').textContent = particleCount;

            // Adjust particles
            while (particles.length < particleCount) {
                particles.push(new Particle());
            }
            while (particles.length > particleCount) {
                particles.pop();
            }
            updateStats();
        });

        document.getElementById('gravity').addEventListener('input', (e) => {
            gravityStrength = parseFloat(e.target.value);
            document.getElementById('gravityValue').textContent = gravityStrength;
        });

        document.getElementById('particleSize').addEventListener('input', (e) => {
            particleSize = parseInt(e.target.value);
            document.getElementById('sizeValue').textContent = particleSize;

            // Update existing particles
            for (let particle of particles) {
                particle.size = particleSize + Math.random() * 2;
            }
        });

        document.getElementById('addAttractor').addEventListener('click', () => {
            attractors.push({
                x: Math.random() * width,
                y: Math.random() * height,
                strength: 1
            });
            updateStats();
        });

        document.getElementById('reset').addEventListener('click', () => {
            attractors = [{
                x: width / 2,
                y: height / 2,
                strength: 1
            }];
            init();
            updateStats();
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        function updateStats() {
            document.getElementById('particleStats').textContent = particles.length;
            document.getElementById('attractorStats').textContent = attractors.length;
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Initialize
        init();
        animate();
    </script>
</body>
</html>
