<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Vortex - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Particle Vortex | Move mouse/touch to interact</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        let particles = [];
        const numParticles = 300;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class Particle {
            constructor(index) {
                this.index = index;
                this.reset();
            }

            reset() {
                this.angle = (this.index / numParticles) * Math.PI * 2;
                this.radius = 50 + Math.random() * 150;
                this.speed = 0.02 + Math.random() * 0.03;
                this.size = 2 + Math.random() * 4;
                this.hue = (this.index / numParticles) * 360;
                this.brightness = 50 + Math.random() * 30;
                this.alpha = 0.6 + Math.random() * 0.4;
                this.oscillation = Math.random() * Math.PI * 2;
            }

            update() {
                // 回転
                this.angle += this.speed;

                // マウスへの反応
                const dx = mouseX - centerX;
                const dy = mouseY - centerY;
                const distToMouse = Math.sqrt(dx * dx + dy * dy);

                // 渦の中心をマウス位置に向かって徐々に移動
                targetX += (dx - targetX) * 0.02;
                targetY += (dy - targetY) * 0.02;

                // 半径の振動
                this.oscillation += 0.05;
                const radiusVariation = Math.sin(this.oscillation) * 30;

                // マウスからの影響
                const influence = Math.max(0, 1 - distToMouse / 500);
                const targetRadius = 100 + influence * 100;

                this.radius += (targetRadius - this.radius) * 0.1 + radiusVariation * 0.1;

                // 位置計算
                this.x = centerX + targetX + Math.cos(this.angle) * this.radius;
                this.y = centerY + targetY + Math.sin(this.angle) * this.radius;

                // 色の変化
                this.hue = (this.hue + 0.5) % 360;

                // 明るさの変化
                this.brightness = 50 + Math.sin(time * 0.02 + this.oscillation) * 20;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, ${this.brightness}%, ${this.alpha})`;
                ctx.fill();

                // グロー効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, ${this.brightness}%, ${this.alpha * 0.3})`;
                ctx.fill();
            }
        }

        function init() {
            resize();
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(i));
            }
        }

        function animate() {
            // 背景を半透明で塗ってトレイル効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 粒子を更新・描画
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 中心の輝き
            const gradient = ctx.createRadialGradient(
                centerX + targetX, centerY + targetY, 0,
                centerX + targetX, centerY + targetY, 100
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.1)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            time++;
            requestAnimationFrame(animate);
        }

        // イベントリスナー
        window.addEventListener('resize', () => {
            resize();
            particles.forEach(p => p.reset());
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期化
        init();
        mouseX = centerX;
        mouseY = centerY;
        animate();
    </script>
</body>
</html>
