<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bubble Pop | 泡割りゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 0;
        }

        @media (min-width: 768px) {
            .game-container {
                border-radius: 20px;
                height: 700px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: inherit;
            cursor: pointer;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            backdrop-filter: blur(10px);
        }

        .hud-item.combo {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 0.3s ease;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: inherit;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h1 {
            font-size: 42px;
            color: #64f4ac;
            margin-bottom: 10px;
            text-align: center;
        }

        .overlay p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
        }

        .overlay .stats {
            color: white;
            font-size: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .overlay .stats div {
            margin: 8px 0;
        }

        .btn {
            background: linear-gradient(135deg, #64f4ac 0%, #64b5f6 100%);
            color: #0a0a0a;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            pointer-events: all;
        }

        .btn:hover, .btn:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(100, 244, 172, 0.4);
        }

        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            z-index: 15;
            font-size: 20px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .hud-item {
                font-size: 14px;
                padding: 8px 12px;
            }

            .overlay h1 {
                font-size: 32px;
            }

            .overlay p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="hud">
            <div class="hud-item">🫧 <span id="score">0</span></div>
            <div class="hud-item" id="comboDisplay"></div>
            <div class="hud-item">⏱️ <span id="time">30</span>s</div>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()" id="fullscreenBtn">
            ⛶
        </button>

        <canvas id="canvas"></canvas>

        <div class="overlay" id="startScreen">
            <h1>🫧 Bubble Pop</h1>
            <p>泡をタップして割るゲーム！<br>連続で割るとコンボボーナス！</p>
            <button class="btn" onclick="startGame()">スタート</button>
        </div>

        <div class="overlay hidden" id="gameOverScreen">
            <h1>終了！</h1>
            <div class="stats">
                <div>スコア: <span id="finalScore">0</span></div>
                <div>最大コンボ: <span id="maxCombo">0</span></div>
                <div>泡割り数: <span id="bubblesPopped">0</span></div>
            </div>
            <button class="btn" onclick="startGame()">もう一度</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let bubbles = [];
        let particles = [];
        let score = 0;
        let combo = 0;
        let maxCombo = 0;
        let bubblesPopped = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let gameTimer = null;
        let bubbleTimer = null;
        let lastPopTime = 0;

        function resize() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        class Bubble {
            constructor() {
                this.radius = Math.random() * 25 + 25;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = canvas.height + this.radius;
                this.speed = Math.random() * 2 + 1;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.hue = Math.random() * 60 + 180; // 青〜紫系
                this.alpha = 0.7 + Math.random() * 0.3;
                this.popped = false;
            }

            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;

                if (this.y < -this.radius) {
                    this.popped = true;
                    combo = 0;
                    updateHUD();
                }
            }

            draw() {
                const wobbleX = Math.sin(this.wobble) * 5;

                // 泡の外側
                const gradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.3, this.y - this.radius * 0.3, 0,
                    this.x + wobbleX, this.y, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 90%, ${this.alpha})`);
                gradient.addColorStop(0.7, `hsla(${this.hue}, 70%, 60%, ${this.alpha * 0.7})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 60%, 40%, ${this.alpha * 0.3})`);

                ctx.beginPath();
                ctx.arc(this.x + wobbleX, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // ハイライト
                const highlightGradient = ctx.createRadialGradient(
                    this.x - this.radius * 0.4, this.y - this.radius * 0.4, 0,
                    this.x - this.radius * 0.4, this.y - this.radius * 0.4, this.radius * 0.4
                );
                highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = highlightGradient;
                ctx.fill();

                // リング
                ctx.beginPath();
                ctx.arc(this.x + wobbleX, this.y, this.radius * 0.9, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 70%, ${this.alpha * 0.3})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            containsPoint(px, py) {
                const wobbleX = Math.sin(this.wobble) * 5;
                const dx = px - (this.x + wobbleX);
                const dy = py - this.y;
                return dx * dx + dy * dy < this.radius * this.radius;
            }

            pop() {
                this.popped = true;
                bubblesPopped++;

                // コンボ計算
                const now = Date.now();
                if (now - lastPopTime < 1500) {
                    combo++;
                } else {
                    combo = 1;
                }
                lastPopTime = now;
                maxCombo = Math.max(maxCombo, combo);

                // スコア計算（コンボボーナス）
                const baseScore = Math.floor(100 - this.radius) + 10;
                const comboBonus = combo > 1 ? Math.floor(baseScore * 0.2 * combo) : 0;
                score += baseScore + comboBonus;

                // パーティクル生成
                for (let i = 0; i < 12; i++) {
                    const angle = (Math.PI * 2 / 12) * i;
                    const speed = Math.random() * 4 + 2;
                    particles.push(new Particle(this.x, this.y, angle, speed, this.hue));
                }

                updateHUD();
            }
        }

        class Particle {
            constructor(x, y, angle, speed, hue) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 4 + 2;
                this.hue = hue + Math.random() * 30 - 15;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.alpha})`;
                ctx.fill();
            }
        }

        function updateHUD() {
            document.getElementById('score').textContent = score.toLocaleString();
            document.getElementById('time').textContent = timeLeft;

            const comboDisplay = document.getElementById('comboDisplay');
            if (combo > 1) {
                comboDisplay.textContent = `🔥 ${combo}コンボ`;
                comboDisplay.classList.add('combo');
                comboDisplay.style.background = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
            } else {
                comboDisplay.textContent = '';
                comboDisplay.classList.remove('combo');
            }
        }

        function spawnBubble() {
            if (gameRunning) {
                bubbles.push(new Bubble());
            }
        }

        function gameLoop() {
            // クリア
            ctx.fillStyle = 'rgba(20, 20, 40, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 泡を更新・描画
            bubbles.forEach((bubble, index) => {
                bubble.update();
                bubble.draw();
            });

            // パーティクルを更新・描画
            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();
                if (particle.alpha <= 0) {
                    particles.splice(index, 1);
                }
            });

            // 画面外の泡を削除
            bubbles = bubbles.filter(b => !b.popped);

            requestAnimationFrame(gameLoop);
        }

        function handleClick(e) {
            if (!gameRunning) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX || e.touches[0].clientX - rect.left) * scaleX;
            const y = (e.clientY || e.touches[0].clientY - rect.top) * scaleY;

            bubbles.forEach(bubble => {
                if (!bubble.popped && bubble.containsPoint(x, y)) {
                    bubble.pop();
                }
            });
        }

        function startGame() {
            score = 0;
            combo = 0;
            maxCombo = 0;
            bubblesPopped = 0;
            timeLeft = 30;
            bubbles = [];
            particles = [];
            gameRunning = true;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            updateHUD();

            // ゲームタイマー
            gameTimer = setInterval(() => {
                timeLeft--;
                updateHUD();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            // 泡スポーンタイマー
            bubbleTimer = setInterval(spawnBubble, 500);

            // 初期泡
            for (let i = 0; i < 3; i++) {
                setTimeout(() => spawnBubble(), i * 200);
            }
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            clearInterval(bubbleTimer);

            document.getElementById('finalScore').textContent = score.toLocaleString();
            document.getElementById('maxCombo').textContent = maxCombo;
            document.getElementById('bubblesPopped').textContent = bubblesPopped;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.parentElement.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        window.addEventListener('resize', resize);
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleClick(e);
        }, { passive: false });

        // 初期化
        resize();
        gameLoop();
    </script>
</body>
</html>
