<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        
        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="title">Particle Flow</div>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <button class="btn" onclick="changeMode()">Mode</button>
        <button class="btn" onclick="reset()">Reset</button>
        <button class="btn fullscreen" onclick="toggleFullscreen()">⛶</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let mode = 0;
        const modes = ['flow', 'spiral', 'wave', 'chaos'];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 3 + 1;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.alpha = Math.random() * 0.5 + 0.5;
                this.life = 1;
                this.decay = Math.random() * 0.002 + 0.001;
            }
            
            update() {
                const modeName = modes[mode];
                
                switch(modeName) {
                    case 'flow':
                        this.vx += Math.random() * 0.2 - 0.1;
                        this.vy += Math.random() * 0.2 - 0.1;
                        this.x += this.vx + 0.5;
                        this.y += this.vy;
                        break;
                        
                    case 'spiral':
                        const cx = width / 2;
                        const cy = height / 2;
                        const dx = this.x - cx;
                        const dy = this.y - cy;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const angle = Math.atan2(dy, dx);
                        
                        this.vx += Math.cos(angle + Math.PI / 2) * 0.1;
                        this.vy += Math.sin(angle + Math.PI / 2) * 0.1;
                        this.x += this.vx + Math.cos(angle) * 0.5;
                        this.y += this.vy + Math.sin(angle) * 0.5;
                        break;
                        
                    case 'wave':
                        this.x += 1;
                        this.y += Math.sin(this.x * 0.02 + Date.now() * 0.001) * 0.5;
                        this.vy += Math.random() * 0.2 - 0.1;
                        this.y += this.vy;
                        this.vy *= 0.95;
                        break;
                        
                    case 'chaos':
                        this.vx += Math.random() * 0.4 - 0.2;
                        this.vy += Math.random() * 0.4 - 0.2;
                        this.vx *= 0.99;
                        this.vy *= 0.99;
                        this.x += this.vx;
                        this.y += this.vy;
                        break;
                }
                
                this.life -= this.decay;
                
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha * this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        function init() {
            particles = [];
            for (let i = 0; i < 500; i++) {
                particles.push(new Particle());
            }
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    particles.push(new Particle());
                }
            }
            
            // Add trail effect
            if (Math.random() < 0.3) {
                particles.push(new Particle(Math.random() * width, Math.random() * height));
            }
            
            requestAnimationFrame(animate);
        }
        
        function changeMode() {
            mode = (mode + 1) % modes.length;
        }
        
        function reset() {
            init();
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        resize();
        init();
        animate();
        
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 20; i++) {
                const p = new Particle(e.clientX, e.clientY);
                p.vx = (Math.random() - 0.5) * 5;
                p.vy = (Math.random() - 0.5) * 5;
                particles.push(p);
            }
        });
    </script>
</body>
</html>
