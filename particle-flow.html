<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パーティクル・フロー | Mira's Art Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        .info h1 {
            font-size: 14px;
            margin-bottom: 5px;
            color: #a855f7;
        }

        .info p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-fullscreen {
            background: rgba(168, 85, 247, 0.3);
            border-color: rgba(168, 85, 247, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="btn" onclick="resetParticles()">リセット</button>
        <button class="btn btn-fullscreen" onclick="toggleFullscreen()">全画面</button>
        <a href="index.html" class="btn">一覧に戻る</a>
    </div>

    <div class="info">
        <h1>🌊 パーティクル・フロー</h1>
        <p>マウスを動かすとパーティクルが反応します</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let mouse = { x: width / 2, y: height / 2 };
        let particles = [];

        // パーティクルクラス
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.baseRadius = this.radius;
                this.color = this.getRandomColor();
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * 0.02;
                this.life = Math.random() * 100 + 100;
                this.maxLife = this.life;
            }

            getRandomColor() {
                const colors = [
                    'hsla(280, 70%, 60%, ',  // 紫
                    'hsla(340, 70%, 60%, ',  // ピンク
                    'hsla(200, 70%, 60%, ',  // 青
                    'hsla(160, 70%, 60%, ',  // 水色
                    'hsla(60, 70%, 60%, ',   // 黄
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // マウスへの引力
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    this.vx += (dx / dist) * force * 0.3;
                    this.vy += (dy / dist) * force * 0.3;
                    this.radius = this.baseRadius * (1 + force * 2);
                } else {
                    this.radius = this.baseRadius;
                }

                // 回転運動
                this.angle += this.angleSpeed;
                this.vx += Math.cos(this.angle) * 0.05;
                this.vy += Math.sin(this.angle) * 0.05;

                // 抵抗
                this.vx *= 0.98;
                this.vy *= 0.98;

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // 境界処理
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                // ライフ減少
                this.life--;
                if (this.life <= 0) {
                    this.life = this.maxLife;
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.color = this.getRandomColor();
                }
            }

            draw() {
                const alpha = (this.life / this.maxLife) * 0.8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color + alpha + ')';
                ctx.fill();

                // 光るエフェクト
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color + (alpha * 0.2) + ')';
                ctx.fill();
            }
        }

        // パーティクル初期化
        function initParticles() {
            particles = [];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        // パーティクルリセット
        function resetParticles() {
            initParticles();
        }

        // アニメーション
        function animate() {
            // トレイルエフェクト
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // パーティクル更新・描画
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // 近いパーティクルを線で繋ぐ
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(168, 85, 247, ${(1 - dist / 80) * 0.3})`;
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 開始
        initParticles();
        animate();
    </script>
</body>
</html>
