<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - Interactive Fluid Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .fullscreen-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">マウス/タッチで動かすと流れが変わります</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // マウス/タッチ位置
        let mouse = {
            x: width / 2,
            y: height / 2,
            vx: 0,
            vy: 0
        };

        // パーティクル配列
        const particles = [];
        const PARTICLE_COUNT = 300;

        // カラーパレット（青紫系）
        const colors = [
            { r: 64, g: 156, b: 255 },  // 明るい青
            { r: 139, g: 92, b: 246 },  // 紫
            { r: 236, g: 72, b: 153 },  // ピンク
            { r: 59, g: 130, b: 246 },  // 青
            { r: 168, g: 85, b: 247 }   // ラベンダー
        ];

        // パーティクルクラス
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.size = Math.random() * 3 + 1;
                this.life = Math.random() * 0.5 + 0.5;
                this.decay = Math.random() * 0.002 + 0.001;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                // マウスへの引力
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // マウスの速度を加える
                this.vx += mouse.vx * 0.02;
                this.vy += mouse.vy * 0.02;

                // 引力（近いほど強く）
                const force = Math.min(100 / (dist + 1), 2);
                this.vx += (dx / dist) * force;
                this.vy += (dy / dist) * force;

                // 抵抗
                this.vx *= 0.96;
                this.vy *= 0.96;

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // ライフ減少
                this.life -= this.decay;

                // ライフが尽きたらリセット
                if (this.life <= 0 || this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }

            draw() {
                const alpha = this.life * 0.7;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();

                // グロー効果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`;
                ctx.fill();
            }
        }

        // パーティクルを初期化
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        // マウス/タッチイベント
        let lastMouseX = mouse.x;
        let lastMouseY = mouse.y;

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.vx = e.clientX - lastMouseX;
            mouse.vy = e.clientY - lastMouseY;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            mouse.vx = touch.clientX - lastMouseX;
            mouse.vy = touch.clientY - lastMouseY;
            lastMouseX = touch.clientX;
            lastMouseY = touch.clientY;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            lastMouseX = touch.clientX;
            lastMouseY = touch.clientY;
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
        });

        // アニメーションループ
        function animate() {
            // 半透明でクリア（トレイル効果）
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // パーティクルを更新・描画
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // マウス速度を減衰
            mouse.vx *= 0.95;
            mouse.vy *= 0.95;

            requestAnimationFrame(animate);
        }

        // 全画面切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 開始
        animate();
    </script>
</body>
</html>
