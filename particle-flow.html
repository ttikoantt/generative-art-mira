<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - 光の粒子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 60vh;
            max-height: 600px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.2);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            color: #666;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.2rem;
            }

            #canvas-container {
                height: 50vh;
            }

            button {
                padding: 10px 20px;
                font-size: 0.8rem;
            }
        }

        .fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 10px 15px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Particle Flow</h1>
        <p class="subtitle">光の粒子が流れる美しいビジュアライゼーション</p>

        <div id="canvas-container">
            <canvas id="canvas"></canvas>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
        </div>

        <div class="controls">
            <button onclick="changeColorScheme('cyber')">サイバー</button>
            <button onclick="changeColorScheme('sunset')">サンセット</button>
            <button onclick="changeColorScheme('aurora')">オーロラ</button>
            <button onclick="changeColorScheme('fire')">ファイア</button>
            <button onclick="changeParticleCount()">粒子数変更</button>
        </div>

        <p class="info">クリックで新しい流れを作成</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let mouse = { x: null, y: null };
        let colorScheme = 'cyber';
        let particleCount = 150;

        const colorSchemes = {
            cyber: ['#00ffff', '#0080ff', '#8000ff', '#ff00ff', '#ffffff'],
            sunset: ['#ff6b6b', '#ee5a24', '#f9ca24', '#f0932b', '#ffbe76'],
            aurora: ['#00ff87', '#60efff', '#00b8d4', '#00ff00', '#7fff00'],
            fire: ['#ff0000', '#ff4500', '#ff8c00', '#ffd700', '#ffff00']
        };

        function resize() {
            const container = document.getElementById('canvas-container');
            width = container.clientWidth;
            height = container.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.baseRadius = this.radius;
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
                this.color = colorSchemes[colorScheme][Math.floor(Math.random() * colorSchemes[colorScheme].length)];
                this.angle = Math.random() * Math.PI * 2;
            }

            update() {
                // マウスの影響
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const force = (150 - dist) / 150;
                        this.vx += (dx / dist) * force * 0.5;
                        this.vy += (dy / dist) * force * 0.5;
                        this.radius = this.baseRadius + force * 3;
                    }
                }

                // フローフィールド風の動き
                const angle = Math.sin(this.x * 0.005) + Math.cos(this.y * 0.005);
                this.vx += Math.cos(angle) * 0.05;
                this.vy += Math.sin(angle) * 0.05;

                // 速度制限
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 3) {
                    this.vx = (this.vx / speed) * 3;
                    this.vy = (this.vy / speed) * 3;
                }

                this.x += this.vx;
                this.y += this.vy;

                // 画面外に出たら反対側から
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;

                this.life -= this.decay;
                this.radius = Math.max(0.5, this.baseRadius * this.life);
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.8;
                ctx.fill();

                // グロー効果
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function connect() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 80) {
                        ctx.beginPath();
                        ctx.strokeStyle = particles[i].color;
                        ctx.globalAlpha = (1 - dist / 80) * 0.3 * particles[i].life;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach((particle, index) => {
                particle.update();
                particle.draw();

                if (particle.life <= 0) {
                    particles[index] = new Particle();
                }
            });

            connect();
            requestAnimationFrame(animate);
        }

        function changeColorScheme(scheme) {
            colorScheme = scheme;
            particles.forEach(p => {
                p.color = colorSchemes[colorScheme][Math.floor(Math.random() * colorSchemes[colorScheme].length)];
            });
        }

        function changeParticleCount() {
            particleCount = particleCount === 150 ? 250 : particleCount === 250 ? 80 : 150;
            init();
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = 0; i < 20; i++) {
                const p = new Particle(x, y);
                p.vx = (Math.random() - 0.5) * 6;
                p.vy = (Math.random() - 0.5) * 6;
                particles.push(p);
            }

            if (particles.length > particleCount + 50) {
                particles.splice(0, 20);
            }
        });

        function toggleFullscreen() {
            const container = document.getElementById('canvas-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    console.log('全画面エラー:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        resize();
        init();
        animate();
    </script>
</body>
</html>
