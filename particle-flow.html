<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - Particle Flow Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0e27;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            cursor: crosshair;
        }
        
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #7dd3fc;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
        
        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid #7dd3fc;
            color: #7dd3fc;
            padding: 10px 15px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            z-index: 10;
        }
        
        .fullscreen-btn:hover {
            background: rgba(56, 189, 248, 0.4);
            transform: scale(1.05);
        }
        
        .title {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(125, 211, 252, 0.5);
            font-size: 14px;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="info">
        <div>🖱️ Move to create flow</div>
        <div>Click to burst</div>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <div class="title">Particle Flow - Move your mouse/finger to guide the particles</div>
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        const particles = [];
        const maxParticles = 800;
        const colors = [
            '#7dd3fc', '#38bdf8', '#0ea5e9', '#0284c7',
            '#c084fc', '#a855f7', '#9333ea',
            '#f472b6', '#ec4899'
        ];
        
        let mouse = { x: width / 2, y: height / 2 };
        let isMouseDown = false;
        
        class Particle {
            constructor(x, y, burst = false) {
                this.x = x;
                this.y = y;
                this.baseX = x;
                this.baseY = y;
                
                if (burst) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 5;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.life = 1;
                    this.decay = 0.01 + Math.random() * 0.02;
                } else {
                    this.vx = 0;
                    this.vy = 0;
                    this.life = 0.5 + Math.random() * 0.5;
                    this.decay = 0.002 + Math.random() * 0.005;
                }
                
                this.size = 1 + Math.random() * 2.5;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.oscillationSpeed = 0.02 + Math.random() * 0.03;
                this.oscillationAmplitude = 0.5 + Math.random() * 1.5;
                this.time = Math.random() * 1000;
                this.burst = burst;
            }
            
            update() {
                this.time += 1;
                
                if (this.burst) {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vx *= 0.98;
                    this.vy *= 0.98;
                    this.life -= this.decay;
                } else {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 200) {
                        const force = (200 - dist) / 200;
                        const angle = Math.atan2(dy, dx);
                        this.vx -= Math.cos(angle) * force * 0.5;
                        this.vy -= Math.sin(angle) * force * 0.5;
                    }
                    
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                    
                    const oscillation = Math.sin(this.time * this.oscillationSpeed) * this.oscillationAmplitude;
                    
                    this.x += this.vx + oscillation;
                    this.y += this.vy;
                    
                    this.angle += this.rotationSpeed;
                    
                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                    
                    this.life -= this.decay;
                }
                
                return this.life > 0;
            }
            
            draw() {
                const alpha = this.life * 0.8;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                if (this.size > 2) {
                    ctx.globalAlpha = alpha * 0.3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }
        
        function createParticles() {
            if (particles.length < maxParticles) {
                for (let i = 0; i < 5; i++) {
                    particles.push(new Particle(
                        Math.random() * width,
                        Math.random() * height
                    ));
                }
            }
        }
        
        function burst(x, y) {
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(x, y, true));
            }
        }
        
        function animate() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            createParticles();
            
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw();
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        
        canvas.addEventListener('mousedown', (e) => {
            burst(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            burst(mouse.x, mouse.y);
        });
        
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        animate();
    </script>
</body>
</html>
