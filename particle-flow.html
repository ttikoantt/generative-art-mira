<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Flow - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .controls button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .controls button.active {
            background: rgba(100, 200, 255, 0.3);
            border-color: rgba(100, 200, 255, 0.6);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .controls {
                bottom: 10px;
                left: 10px;
                right: 10px;
                padding: 10px;
            }

            .controls button {
                padding: 10px 15px;
                font-size: 14px;
            }

            .info {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>粒子数: <span id="particleCount">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>

    <div class="controls">
        <button id="mode1" class="active">流れ</button>
        <button id="mode2">引力</button>
        <button id="mode3">爆発</button>
        <button id="mode4">渦</button>
        <button id="clear">クリア</button>
    </div>

    <button class="fullscreen-btn" id="fullscreen">⛶</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        let mouseX = width / 2;
        let mouseY = height / 2;
        let mode = 'flow';
        let hue = 0;

        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        class Particle {
            constructor(x, y, mode) {
                this.x = x;
                this.y = y;
                this.mode = mode;

                if (mode === 'explosion') {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 8 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.friction = 0.98;
                } else {
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = (Math.random() - 0.5) * 2;
                    this.friction = 0.99;
                }

                this.life = 1;
                this.decay = Math.random() * 0.008 + 0.002;
                this.size = Math.random() * 3 + 1;
                this.hue = hue + Math.random() * 60 - 30;
            }

            update() {
                // Mode-based behavior
                if (this.mode === 'flow') {
                    this.x += this.vx;
                    this.y += this.vy;

                    // Gentle attraction to mouse
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        this.vx += dx * 0.0005;
                        this.vy += dy * 0.0005;
                    }
                } else if (this.mode === 'attract') {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist > 10) {
                        const force = 50 / (dist + 10);
                        this.vx += (dx / dist) * force;
                        this.vy += (dy / dist) * force;
                    }

                    this.vx *= 0.95;
                    this.vy *= 0.95;
                    this.x += this.vx;
                    this.y += this.vy;
                } else if (this.mode === 'explosion') {
                    this.vx *= this.friction;
                    this.vy *= this.friction;
                    this.x += this.vx;
                    this.y += this.vy;
                } else if (this.mode === 'vortex') {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    // Tangential force (spiral)
                    const angle = Math.atan2(dy, dx);
                    const spiralX = Math.cos(angle + Math.PI / 2);
                    const spiralY = Math.sin(angle + Math.PI / 2);

                    this.vx += spiralX * 0.5;
                    this.vy += spiralY * 0.5;

                    // Slight attraction
                    this.vx += (dx / dist) * 0.2;
                    this.vy += (dy / dist) * 0.2;

                    this.vx *= 0.97;
                    this.vy *= 0.97;
                    this.x += this.vx;
                    this.y += this.vy;
                }

                this.life -= this.decay;
                this.hue += 0.5;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.life})`;
                ctx.fill();

                // Glow effect
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.life * 0.3})`;
                ctx.fill();
            }
        }

        function createParticles(x, y, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, mode));
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Update hue
            hue = (hue + 0.2) % 360;

            // Update info
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            document.getElementById('particleCount').textContent = particles.length;
            document.getElementById('fps').textContent = fps;

            requestAnimationFrame(animate);
        }

        // Event listeners
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            createParticles(mouseX, mouseY, 3);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            createParticles(mouseX, mouseY, 3);
        });

        canvas.addEventListener('click', (e) => {
            createParticles(e.clientX, e.clientY, 50);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            createParticles(mouseX, mouseY, 50);
        });

        // Mode buttons
        document.getElementById('mode1').addEventListener('click', () => {
            mode = 'flow';
            updateActiveButton();
        });

        document.getElementById('mode2').addEventListener('click', () => {
            mode = 'attract';
            updateActiveButton();
        });

        document.getElementById('mode3').addEventListener('click', () => {
            mode = 'explosion';
            updateActiveButton();
        });

        document.getElementById('mode4').addEventListener('click', () => {
            mode = 'vortex';
            updateActiveButton();
        });

        document.getElementById('clear').addEventListener('click', () => {
            particles = [];
        });

        function updateActiveButton() {
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`mode${['flow', 'attract', 'explosion', 'vortex'].indexOf(mode) + 1}`).classList.add('active');
        }

        // Fullscreen
        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // Resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Initial particles
        for (let i = 0; i < 100; i++) {
            createParticles(
                Math.random() * width,
                Math.random() * height,
                1
            );
        }

        // Start animation
        animate();
    </script>
</body>
</html>
