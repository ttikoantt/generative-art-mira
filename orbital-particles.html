<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Particles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 10px;
                bottom: 10px;
            }

            .fullscreen-btn {
                top: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Click or tap to add new orbital system</div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height, centerX, centerY;
        let orbitalSystems = [];
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        class OrbitalSystem {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.hue = Math.random() * 360;
                this.particles = [];
                this.numParticles = 3 + Math.floor(Math.random() * 5);
                this.baseRadius = 30 + Math.random() * 50;
                this.speed = 0.5 + Math.random() * 1.5;
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.phase = Math.random() * Math.PI * 2;

                for (let i = 0; i < this.numParticles; i++) {
                    this.particles.push({
                        angle: (Math.PI * 2 / this.numParticles) * i,
                        radiusOffset: Math.random() * 20,
                        size: 2 + Math.random() * 3,
                        trail: []
                    });
                }
            }

            update() {
                this.phase += 0.01 * this.speed;

                this.particles.forEach((p, i) => {
                    let angle = p.angle + this.phase * this.direction;
                    let radius = this.baseRadius + p.radiusOffset + Math.sin(time * 0.001 + i) * 10;

                    let px = this.x + Math.cos(angle) * radius;
                    let py = this.y + Math.sin(angle) * radius;

                    // Update trail
                    p.trail.push({ x: px, y: py });
                    if (p.trail.length > 50) {
                        p.trail.shift();
                    }
                });
            }

            draw() {
                this.particles.forEach((p, i) => {
                    let hue = (this.hue + i * 30) % 360;

                    // Draw trail
                    if (p.trail.length > 1) {
                        ctx.beginPath();
                        ctx.moveTo(p.trail[0].x, p.trail[0].y);
                        for (let j = 1; j < p.trail.length; j++) {
                            ctx.lineTo(p.trail[j].x, p.trail[j].y);
                        }
                        ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.3)`;
                        ctx.lineWidth = p.size * 0.5;
                        ctx.stroke();
                    }

                    // Draw particle
                    let angle = p.angle + this.phase * this.direction;
                    let radius = this.baseRadius + p.radiusOffset + Math.sin(time * 0.001 + i) * 10;
                    let px = this.x + Math.cos(angle) * radius;
                    let py = this.y + Math.sin(angle) * radius;

                    ctx.beginPath();
                    ctx.arc(px, py, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsl(${hue}, 80%, 70%)`;
                    ctx.fill();

                    // Glow effect
                    ctx.beginPath();
                    ctx.arc(px, py, p.size * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, 80%, 70%, 0.2)`;
                    ctx.fill();
                });
            }
        }

        function init() {
            orbitalSystems = [];
            // Create initial orbital system in center
            orbitalSystems.push(new OrbitalSystem(centerX, centerY));
        }

        function animate() {
            time++;

            // Fade effect
            ctx.fillStyle = 'rgba(10, 14, 26, 0.05)';
            ctx.fillRect(0, 0, width, height);

            orbitalSystems.forEach(system => {
                system.update();
                system.draw();
            });

            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', (e) => {
            orbitalSystems.push(new OrbitalSystem(e.clientX, e.clientY));
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            orbitalSystems.push(new OrbitalSystem(touch.clientX, touch.clientY));
        });

        window.addEventListener('resize', () => {
            resize();
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        resize();
        init();
        animate();
    </script>
</body>
</html>
