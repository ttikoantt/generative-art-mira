<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Field Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        h1 {
            color: #fff;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        #canvas {
            border: 2px solid #333;
            border-radius: 10px;
            background: #000;
            max-width: 100%;
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        .info {
            color: #666;
            margin-top: 15px;
            font-size: 0.85em;
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5em;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 100%;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Flow Field Art</h1>
        <p class="subtitle">クリックで新しいフローを生成</p>

        <canvas id="canvas" width="900" height="600"></canvas>

        <div class="controls">
            <button onclick="regenerate()">🎨 新しいフロー</button>
            <button onclick="changeColorScheme()">🎨 色スキーム変更</button>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">📺 全画面</button>
        </div>

        <p class="info">✨ パーティクルがノイズフィールドに沿って流れる</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let flowField = [];
        let rows, cols;
        const resolution = 10;
        let zOff = 0;
        let colorScheme = 0;

        const colorSchemes = [
            // Rainbow flow
            () => `hsl(${Math.random() * 360}, 70%, 60%)`,
            // Blue to purple
            () => `hsl(${220 + Math.random() * 60}, 70%, ${50 + Math.random() * 30}%)`,
            // Fire colors
            () => `hsl(${Math.random() * 60}, 100%, ${50 + Math.random() * 30}%)`,
            // Green to teal
            () => `hsl(${120 + Math.random() * 60}, 70%, ${40 + Math.random() * 40}%)`
        ];

        function resizeCanvas() {
            const container = document.querySelector('.container');
            const maxWidth = Math.min(900, container.clientWidth - 40);
            const ratio = 600 / 900;

            canvas.width = maxWidth;
            canvas.height = maxWidth * ratio;

            init();
        }

        function init() {
            particles = [];
            flowField = [];
            zOff = 0;

            cols = Math.floor(canvas.width / resolution);
            rows = Math.floor(canvas.height / resolution);

            // Create flow field
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const index = x + y * cols;
                    const angle = noise(x / 10, y / 10, zOff) * Math.PI * 4;
                    flowField[index] = angle;
                }
            }

            // Create particles
            const particleCount = 2000;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function noise(x, y, z) {
            // Simple pseudo-random noise
            const n = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453;
            return (n - Math.floor(n)) * 2 - 1;
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = 0;
                this.vy = 0;
                this.history = [];
                this.maxHistory = 5;
                this.color = colorSchemes[colorScheme]();
                this.speed = 1 + Math.random();
            }

            update() {
                const x = Math.floor(this.x / resolution);
                const y = Math.floor(this.y / resolution);
                const index = x + y * cols;

                if (index >= 0 && index < flowField.length) {
                    const angle = flowField[index];
                    this.vx += Math.cos(angle) * 0.1;
                    this.vy += Math.sin(angle) * 0.1;
                }

                // Limit speed
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > this.speed * 2) {
                    this.vx = (this.vx / speed) * this.speed * 2;
                    this.vy = (this.vy / speed) * this.speed * 2;
                }

                this.x += this.vx;
                this.y += this.vy;

                // Store history
                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }

                // Reset if out of bounds
                if (this.x < 0 || this.x > canvas.width ||
                    this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);

                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }

                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.6;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            zOff += 0.01;

            if (zOff > 2) {
                // Regenerate flow field periodically
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        const index = x + y * cols;
                        const angle = noise(x / 10, y / 10, zOff) * Math.PI * 4;
                        flowField[index] = angle;
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        function regenerate() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            init();
        }

        function changeColorScheme() {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            particles.forEach(p => {
                p.color = colorSchemes[colorScheme]();
            });
        }

        function toggleFullscreen() {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                canvas.requestFullscreen();
            }
        }

        // Initialize
        resizeCanvas();
        animate();

        // Handle resize
        window.addEventListener('resize', resizeCanvas);

        // Click to regenerate
        canvas.addEventListener('click', regenerate);
    </script>
</body>
</html>
