<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Particles - 流体粒子シミュレーション</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #fff;
            padding: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
            max-width: 400px;
        }

        #canvas-container {
            position: relative;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .fullscreen-btn {
            background: linear-gradient(135deg, #f472b6, #7c3aed);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.2rem;
            }

            .description {
                font-size: 0.75rem;
            }

            button {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <h1>🌊 Fluid Particles</h1>
    <p class="description">マウス/タッチで粒子を操る流体シミュレーション</p>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="resetParticles()">リセット</button>
        <button onclick="toggleMode()">モード変更</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Canvasサイズ設定
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth - 20, 700);
            const maxHeight = Math.min(window.innerHeight - 180, 500);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 粒子クラス
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.hue = Math.random() * 60 + 180; // 青〜紫
                this.alpha = Math.random() * 0.5 + 0.5;
                this.friction = 0.99;
            }

            update(mouseX, mouseY, isMouseDown) {
                // マウスの影響
                if (isMouseDown && mouseX !== null && mouseY !== null) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        const force = (150 - dist) / 150;
                        if (currentMode === 'attract') {
                            this.vx += (dx / dist) * force * 0.5;
                            this.vy += (dy / dist) * force * 0.5;
                        } else {
                            this.vx -= (dx / dist) * force * 0.8;
                            this.vy -= (dy / dist) * force * 0.8;
                        }
                    }
                }

                // 流体のような動き
                this.vx *= this.friction;
                this.vy *= this.friction;

                // 隣接する粒子との相互作用
                particles.forEach(p => {
                    if (p === this) return;
                    const dx = p.x - this.x;
                    const dy = p.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 30 && dist > 0) {
                        const force = (30 - dist) / 30;
                        this.vx -= (dx / dist) * force * 0.01;
                        this.vy -= (dy / dist) * force * 0.01;
                    }
                });

                this.x += this.vx;
                this.y += this.vy;

                // 色の変化
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                this.hue = 180 + speed * 30;

                // 境界処理
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, ${this.alpha})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 40%, 0)`);
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 初期化
        let particles = [];
        const particleCount = 200;

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                ));
            }
        }
        initParticles();

        // マウス/タッチ処理
        let mouseX = null;
        let mouseY = null;
        let isMouseDown = false;

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            updateMouse(e);
        });

        canvas.addEventListener('mousemove', updateMouse);

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
            mouseX = null;
            mouseY = null;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
            mouseX = null;
            mouseY = null;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isMouseDown = true;
            updateTouch(e);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            updateTouch(e);
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
            mouseX = null;
            mouseY = null;
        });

        function updateMouse(e) {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        }

        function updateTouch(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouseX = touch.clientX - rect.left;
            mouseY = touch.clientY - rect.top;
        }

        // モード切替
        let currentMode = 'attract';

        function toggleMode() {
            currentMode = currentMode === 'attract' ? 'repel' : 'attract';
        }

        // リセット
        function resetParticles() {
            initParticles();
        }

        // 全画面
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.getElementById('canvas-container').requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // アニメーション
        function animate() {
            // 半透明で残像効果
            ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.update(mouseX, mouseY, isMouseDown);
                p.draw();
            });

            // 接続線
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 60) {
                        ctx.beginPath();
                        ctx.strokeStyle = `hsla(${p1.hue}, 100%, 50%, ${(1 - dist / 60) * 0.3})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
