<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sound Wave Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            touch-action: none;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="info">
        <div>🎵 Sound Wave Visualizer</div>
        <div id="waveCount">Waves: 0</div>
    </div>

    <div class="controls">
        <button id="addWave">Add Wave</button>
        <button id="clear">Clear</button>
        <button id="randomize">Randomize</button>
    </div>

    <button class="fullscreen-btn" id="fullscreen">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let waves = [];
        let hue = 0;

        class Wave {
            constructor(x, y) {
                this.x = x || width / 2;
                this.y = y || height / 2;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.8;
                this.speed = 2 + Math.random() * 2;
                this.hue = hue % 360;
                this.opacity = 1;
                this.thickness = 3 + Math.random() * 5;
            }

            update() {
                this.radius += this.speed;
                this.opacity = 1 - (this.radius / this.maxRadius);
                this.opacity = Math.max(0, this.opacity);
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
                ctx.lineWidth = this.thickness;
                ctx.stroke();

                // Second echo wave
                if (this.radius > 30) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 30, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue + 30}, 70%, 50%, ${this.opacity * 0.5})`;
                    ctx.lineWidth = this.thickness * 0.7;
                    ctx.stroke();
                }

                // Third echo wave
                if (this.radius > 60) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 60, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue + 60}, 60%, 40%, ${this.opacity * 0.3})`;
                    ctx.lineWidth = this.thickness * 0.5;
                    ctx.stroke();
                }
            }

            isDead() {
                return this.opacity <= 0;
            }
        }

        function addWave(x, y) {
            waves.push(new Wave(x, y));
            hue += 15;
            updateWaveCount();
        }

        function updateWaveCount() {
            document.getElementById('waveCount').textContent = `Waves: ${waves.length}`;
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw waves
            waves = waves.filter(wave => !wave.isDead());
            waves.forEach(wave => {
                wave.update();
                wave.draw();
            });

            updateWaveCount();
            requestAnimationFrame(animate);
        }

        // Event Listeners
        canvas.addEventListener('click', (e) => {
            addWave(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addWave(touch.clientX, touch.clientY);
        });

        document.getElementById('addWave').addEventListener('click', () => {
            addWave();
        });

        document.getElementById('clear').addEventListener('click', () => {
            waves = [];
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        });

        document.getElementById('randomize').addEventListener('click', () => {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    addWave(
                        Math.random() * width,
                        Math.random() * height
                    );
                }, i * 100);
            }
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                document.getElementById('fullscreen').textContent = '⛶ Exit';
            } else {
                document.exitFullscreen();
                document.getElementById('fullscreen').textContent = '⛶ Fullscreen';
            }
        });

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Start
        animate();

        // Auto-add waves periodically
        setInterval(() => {
            if (waves.length < 10) {
                addWave();
            }
        }, 2000);
    </script>
</body>
</html>
