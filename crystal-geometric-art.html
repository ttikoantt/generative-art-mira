<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Crystal Geometric Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0e27;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(100, 200, 255, 0.2);
            border: 2px solid rgba(100, 200, 255, 0.5);
            color: #64c8ff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            z-index: 100;
        }

        #fullscreen:hover {
            background: rgba(100, 200, 255, 0.3);
            border-color: rgba(100, 200, 255, 0.8);
            transform: scale(1.05);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button id="fullscreen">全画面表示</button>
    <div class="info">タップ/クリックで結晶を追加 • ダブルタップでリセット</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fullscreenBtn = document.getElementById('fullscreen');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 結晶の配列
        let crystals = [];
        let autoAddTimer = 0;

        // 色相
        let hue = 0;

        // 結晶クラス
        class Crystal {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 0;
                this.maxSize = Math.random() * 80 + 60;
                this.sides = Math.floor(Math.random() * 4) + 6; // 6-9角形
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.01;
                this.hue = hue;
                this.alpha = 1;
                this.life = 1;
                this.layers = Math.floor(Math.random() * 3) + 3; // 3-5層
                this.growthSpeed = Math.random() * 0.5 + 0.5;
            }

            update() {
                // 成長
                if (this.size < this.maxSize) {
                    this.size += this.growthSpeed;
                }

                // 回転
                this.rotation += this.rotationSpeed;

                // フェードアウト
                this.life -= 0.002;
                this.alpha = Math.max(0, this.life);
            }

            draw() {
                for (let l = 0; l < this.layers; l++) {
                    const layerSize = this.size * (1 - l * 0.15);
                    const layerAlpha = this.alpha * (1 - l * 0.2);
                    const layerHue = (this.hue + l * 20) % 360;

                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation + l * 0.1);

                    // グロー効果
                    for (let g = 3; g >= 0; g--) {
                        ctx.beginPath();
                        const glowSize = layerSize + g * 8;
                        const glowAlpha = layerAlpha * (0.15 - g * 0.03);

                        for (let i = 0; i <= this.sides; i++) {
                            const angle = (i / this.sides) * Math.PI * 2 - Math.PI / 2;
                            const x = Math.cos(angle) * glowSize;
                            const y = Math.sin(angle) * glowSize;

                            if (i === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        ctx.closePath();

                        ctx.strokeStyle = `hsla(${layerHue}, 80%, 60%, ${glowAlpha})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }

                    // メインの多角形
                    ctx.beginPath();
                    for (let i = 0; i <= this.sides; i++) {
                        const angle = (i / this.sides) * Math.PI * 2 - Math.PI / 2;
                        const x = Math.cos(angle) * layerSize;
                        const y = Math.sin(angle) * layerSize;

                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.closePath();

                    // グラデーション
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, layerSize
                    );
                    gradient.addColorStop(0, `hsla(${layerHue}, 70%, 70%, ${layerAlpha * 0.3})`);
                    gradient.addColorStop(0.5, `hsla(${layerHue}, 80%, 60%, ${layerAlpha * 0.2})`);
                    gradient.addColorStop(1, `hsla(${layerHue}, 90%, 50%, ${layerAlpha * 0.1})`);

                    ctx.fillStyle = gradient;
                    ctx.fill();

                    ctx.strokeStyle = `hsla(${layerHue}, 90%, 70%, ${layerAlpha * 0.8})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // ハイライト
                    ctx.beginPath();
                    for (let i = 0; i <= this.sides; i++) {
                        const angle = (i / this.sides) * Math.PI * 2 - Math.PI / 2;
                        const x = Math.cos(angle) * (layerSize * 0.6);
                        const y = Math.sin(angle) * (layerSize * 0.6);

                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.closePath();
                    ctx.strokeStyle = `hsla(${layerHue}, 100%, 85%, ${layerAlpha * 0.4})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    ctx.restore();
                }
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // 結晶を追加
        function addCrystal(x, y) {
            crystals.push(new Crystal(x, y));
            hue = (hue + 15) % 360;
        }

        // タップ/クリック
        canvas.addEventListener('click', (e) => {
            addCrystal(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            addCrystal(touch.clientX, touch.clientY);
        });

        // ダブルタップでリセット
        let lastTap = 0;
        canvas.addEventListener('dblclick', () => {
            crystals = [];
        });

        canvas.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTap < 300) {
                crystals = [];
            }
            lastTap = now;
        });

        // 全画面
        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // リサイズ
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // アニメーション
        function animate() {
            // トレイルエフェクト
            ctx.fillStyle = 'rgba(10, 14, 39, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // 結晶を更新・描画
            crystals = crystals.filter(crystal => !crystal.isDead());
            crystals.forEach(crystal => {
                crystal.update();
                crystal.draw();
            });

            // 自動追加
            autoAddTimer++;
            if (autoAddTimer > 120) { // 2秒ごと
                addCrystal(
                    Math.random() * width,
                    Math.random() * height
                );
                autoAddTimer = 0;
            }

            requestAnimationFrame(animate);
        }

        // 初期結晶
        for (let i = 0; i < 3; i++) {
            addCrystal(
                Math.random() * width,
                Math.random() * height
            );
        }

        animate();
    </script>
</body>
</html>
