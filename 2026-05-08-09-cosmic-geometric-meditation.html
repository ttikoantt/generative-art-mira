<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Geometric Meditation - Generative Art by Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">
        Cosmic Geometric Meditation | Move mouse to influence | Click to change patterns
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let patternIndex = 0;
        const patterns = ['sacred', 'cosmic', 'quantum', 'ethereal'];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        resize();
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX - centerX;
            mouseY = e.clientY - centerY;
        });
        
        canvas.addEventListener('click', () => {
            patternIndex = (patternIndex + 1) % patterns.length;
        });
        
        function getColor(i, total, pattern) {
            const hue = (i / total * 360 + time * 10) % 360;
            const saturation = 70 + Math.sin(time + i * 0.1) * 20;
            const lightness = 50 + Math.sin(time * 2 + i * 0.2) * 15;
            return `hsla(${hue}, ${saturation}%, ${lightness}%, 0.6)`;
        }
        
        function drawSacredGeometry() {
            const layers = 12;
            const points = 8;
            const baseRadius = Math.min(width, height) * 0.35;
            
            for (let layer = 0; layer < layers; layer++) {
                const radius = baseRadius * (1 - layer * 0.07);
                const rotation = time * (0.5 + layer * 0.1) * (layer % 2 === 0 ? 1 : -1);
                const influence = Math.atan2(mouseY, mouseX) * 0.1;
                
                ctx.beginPath();
                for (let i = 0; i <= points; i++) {
                    const angle = (i / points) * Math.PI * 2 + rotation + influence;
                    const r = radius + Math.sin(time * 3 + i * 0.8) * 20;
                    const x = centerX + Math.cos(angle) * r;
                    const y = centerY + Math.sin(angle) * r;
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = getColor(layer, layers, 'sacred');
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // Connect to center
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2 + rotation + influence;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(x, y);
                    ctx.strokeStyle = `hsla(${(i / points) * 360 + time * 20}, 70%, 60%, 0.15)`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
        
        function drawCosmicWeb() {
            const nodes = 150;
            const connectionDistance = 150;
            const nodesArray = [];
            
            // Generate nodes
            for (let i = 0; i < nodes; i++) {
                const angle = (i / nodes) * Math.PI * 2 + time * 0.1;
                const radius = Math.min(width, height) * 0.35 + Math.sin(i * 0.5 + time) * 50;
                nodesArray.push({
                    x: centerX + Math.cos(angle) * radius,
                    y: centerY + Math.sin(angle) * radius,
                    hue: (i / nodes) * 360
                });
            }
            
            // Draw connections
            for (let i = 0; i < nodesArray.length; i++) {
                for (let j = i + 1; j < nodesArray.length; j++) {
                    const dx = nodesArray[i].x - nodesArray[j].x;
                    const dy = nodesArray[i].y - nodesArray[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < connectionDistance) {
                        const alpha = (1 - dist / connectionDistance) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(nodesArray[i].x, nodesArray[i].y);
                        ctx.lineTo(nodesArray[j].x, nodesArray[j].y);
                        ctx.strokeStyle = `hsla(${(nodesArray[i].hue + time * 20) % 360}, 70%, 60%, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            
            // Draw nodes
            nodesArray.forEach((node, i) => {
                const pulse = Math.sin(time * 3 + i * 0.2) * 3 + 4;
                const influence = Math.atan2(mouseY, mouseX) * 0.05;
                
                ctx.beginPath();
                ctx.arc(node.x + Math.cos(influence) * 20, node.y + Math.sin(influence) * 20, pulse, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${(node.hue + time * 30) % 360}, 80%, 60%, 0.8)`;
                ctx.fill();
            });
        }
        
        function drawQuantumField() {
            const gridSize = 40;
            const cols = Math.ceil(width / gridSize);
            const rows = Math.ceil(height / gridSize);
            
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * gridSize;
                    const y = j * gridSize;
                    
                    const dx = x - (centerX + mouseX);
                    const dy = y - (centerY + mouseY);
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    const wave = Math.sin(dist * 0.02 - time * 2) * 0.5 + 0.5;
                    const size = wave * gridSize * 0.8;
                    
                    const hue = (i / cols * 180 + j / rows * 180 + time * 50) % 360;
                    
                    ctx.save();
                    ctx.translate(x + gridSize / 2, y + gridSize / 2);
                    ctx.rotate(wave * Math.PI * 2);
                    
                    ctx.beginPath();
                    ctx.rect(-size / 2, -size / 2, size, size);
                    ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${wave * 0.8})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                    
                    ctx.restore();
                }
            }
        }
        
        function drawEtherealWaves() {
            const waveCount = 15;
            const baseRadius = Math.min(width, height) * 0.4;
            
            for (let w = 0; w < waveCount; w++) {
                ctx.beginPath();
                const radius = baseRadius * (0.2 + (w / waveCount) * 0.8);
                const points = 200;
                
                for (let i = 0; i <= points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    
                    const wave1 = Math.sin(angle * 8 + time * 2 + w * 0.3) * 20;
                    const wave2 = Math.cos(angle * 5 - time * 1.5 + w * 0.2) * 15;
                    const wave3 = Math.sin(angle * 12 + time + w * 0.4) * 10;
                    
                    const r = radius + wave1 + wave2 + wave3;
                    const x = centerX + Math.cos(angle) * r;
                    const y = centerY + Math.sin(angle) * r;
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                
                ctx.closePath();
                const hue = (w / waveCount * 180 + time * 30) % 360;
                ctx.strokeStyle = `hsla(${hue}, 70%, 65%, ${0.8 - w * 0.04})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        function drawParticles() {
            const particleCount = 100;
            
            for (let i = 0; i < particleCount; i++) {
                const angle = (i / particleCount) * Math.PI * 2 + time * (0.5 + (i % 3) * 0.2);
                const radius = Math.min(width, height) * 0.3 + Math.sin(time + i * 0.5) * 50;
                const spiral = (i / particleCount) * Math.PI * 6;
                
                const x = centerX + Math.cos(angle + spiral) * radius;
                const y = centerY + Math.sin(angle + spiral) * radius;
                
                const size = Math.sin(time * 2 + i * 0.3) * 2 + 3;
                const hue = (i / particleCount * 360 + time * 50) % 360;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 80%, 70%, 0.8)`;
                ctx.fill();
            }
        }
        
        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            time += 0.01;
            
            const currentPattern = patterns[patternIndex];
            
            switch(currentPattern) {
                case 'sacred':
                    drawSacredGeometry();
                    break;
                case 'cosmic':
                    drawCosmicWeb();
                    break;
                case 'quantum':
                    drawQuantumField();
                    break;
                case 'ethereal':
                    drawEtherealWaves();
                    break;
            }
            
            drawParticles();
            
            requestAnimationFrame(animate);
        }
        
        // Initialize mouse position
        mouseX = width * 0.3;
        mouseY = height * 0.2;
        
        animate();
    </script>
</body>
</html>
