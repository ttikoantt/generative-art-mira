<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowing Neon Waves</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 10;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.3s;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">Flowing Neon Waves | Mira 2026</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let waves = [];
        let time = 0;

        // ネオンカラーパレット
        const neonColors = [
            '#ff006e', // Neon Pink
            '#00f5ff', // Cyan
            '#ffbe0b', // Neon Yellow
            '#8338ec', // Purple
            '#3a86ff', // Blue
            '#06ffa5', // Green
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        }

        function initWaves() {
            waves = [];
            const numWaves = 8;
            for (let i = 0; i < numWaves; i++) {
                waves.push({
                    amplitude: 50 + Math.random() * 100,
                    frequency: 0.005 + Math.random() * 0.01,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.5 + Math.random() * 1,
                    color: neonColors[i % neonColors.length],
                    opacity: 0.3 + Math.random() * 0.5,
                    baseY: height / 2 + (Math.random() - 0.5) * height * 0.5
                });
            }
        }

        function draw() {
            // フェード効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 各波を描画
            waves.forEach((wave, index) => {
                ctx.beginPath();
                ctx.strokeStyle = wave.color;
                ctx.lineWidth = 2 + Math.sin(time * 0.02 + index) * 1;
                ctx.globalAlpha = wave.opacity;

                for (let x = 0; x < width; x += 2) {
                    // 複数のサイン波を重ねて複雑な動きに
                    const y = wave.baseY +
                        Math.sin(x * wave.frequency + time * wave.speed + wave.phase) * wave.amplitude +
                        Math.sin(x * wave.frequency * 2 + time * wave.speed * 1.5) * wave.amplitude * 0.3 +
                        Math.sin(x * wave.frequency * 3 + time * wave.speed * 0.5) * wave.amplitude * 0.2;

                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();

                // グロー効果（2回描画）
                ctx.strokeStyle = wave.color;
                ctx.lineWidth = 10;
                ctx.globalAlpha = wave.opacity * 0.3;
                ctx.stroke();
            });

            ctx.globalAlpha = 1;
            time++;
            requestAnimationFrame(draw);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
