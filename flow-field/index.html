<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Field - Generative Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .canvas-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            line-height: 1.6;
            pointer-events: none;
        }

        .fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.2rem;
            }

            button {
                padding: 8px 16px;
                font-size: 0.85rem;
            }

            .info {
                font-size: 0.75rem;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Flow Field</h1>
            <div class="controls">
                <button onclick="resetParticles()">リセット</button>
                <button class="secondary" onclick="changePalette()">色変更</button>
                <button class="secondary" onclick="toggleTrails()">軌跡: <span id="trailStatus">ON</span></button>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
            <div class="info">
                <strong>操作方法:</strong><br>
                • マウス移動: フロー場に影響<br>
                • クリック: 新しいパーティクル追加<br>
                • ダブルクリック: フロー場リセット
            </div>
            <button class="fullscreen-btn" onclick="toggleFullscreen()" title="全画面">⛶</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let flowField = [];
        let scale = 20;
        let rows, cols;
        let showTrails = true;
        let mouse = { x: null, y: null, influence: 150 };
        let colorOffset = 0;

        const palettes = [
            ['#667eea', '#764ba2', '#f093fb', '#4facfe'],
            ['#fa709a', '#fee140', '#fa709a', '#f6d365'],
            ['#30cfd0', '#330867', '#a8edea', '#fed6e3'],
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3'],
            ['#00b894', '#00cec9', '#6c5ce7', '#fd79a8']
        ];
        let currentPalette = 0;

        function resize() {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
            rows = Math.ceil(height / scale);
            cols = Math.ceil(width / scale);
            initFlowField();
        }

        function initFlowField() {
            flowField = [];
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let angle = (Math.cos(x * 0.1) + Math.sin(y * 0.1)) * Math.PI;
                    flowField.push(angle);
                }
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = 0;
                this.vy = 0;
                this.history = [];
                this.maxHistory = 10;
                this.speed = Math.random() * 2 + 1;
                this.color = palettes[currentPalette][Math.floor(Math.random() * palettes[currentPalette].length)];
                this.size = Math.random() * 2 + 1;
                this.life = 1;
                this.decay = Math.random() * 0.002 + 0.001;
            }

            update() {
                let x = Math.floor(this.x / scale);
                let y = Math.floor(this.y / scale);
                let index = x + y * cols;

                if (index >= 0 && index < flowField.length) {
                    let angle = flowField[index];

                    // マウスの影響
                    if (mouse.x !== null && mouse.y !== null) {
                        let dx = mouse.x - this.x;
                        let dy = mouse.y - this.y;
                        let dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < mouse.influence) {
                            angle += Math.atan2(dy, dx) * (1 - dist / mouse.influence) * 2;
                        }
                    }

                    this.vx += Math.cos(angle) * 0.5;
                    this.vy += Math.sin(angle) * 0.5;
                }

                this.vx *= 0.9;
                this.vy *= 0.9;

                this.x += this.vx * this.speed;
                this.y += this.vy * this.speed;

                this.history.push({ x: this.x, y: this.y });
                if (this.history.length > this.maxHistory) {
                    this.history.shift();
                }

                this.life -= this.decay;

                // 境界チェック
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height || this.life <= 0) {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.history = [];
                    this.life = 1;
                    this.color = palettes[currentPalette][Math.floor(Math.random() * palettes[currentPalette].length)];
                }
            }

            draw() {
                if (this.history.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.history[0].x, this.history[0].y);

                for (let i = 1; i < this.history.length; i++) {
                    ctx.lineTo(this.history[i].x, this.history[i].y);
                }

                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalAlpha = this.life * 0.7;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        function initParticles() {
            particles = [];
            let numParticles = Math.min((width * height) / 2000, 500);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            if (showTrails) {
                ctx.fillStyle = 'rgba(10, 10, 15, 0.02)';
                ctx.fillRect(0, 0, width, height);
            } else {
                ctx.clearRect(0, 0, width, height);
            }

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            colorOffset += 0.01;
            requestAnimationFrame(animate);
        }

        function resetParticles() {
            initParticles();
            if (!showTrails) {
                ctx.clearRect(0, 0, width, height);
            }
        }

        function changePalette() {
            currentPalette = (currentPalette + 1) % palettes.length;
            particles.forEach(p => {
                p.color = palettes[currentPalette][Math.floor(Math.random() * palettes[currentPalette].length)];
            });
        }

        function toggleTrails() {
            showTrails = !showTrails;
            document.getElementById('trailStatus').textContent = showTrails ? 'ON' : 'OFF';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // イベントリスナー
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y));
            }
        });

        canvas.addEventListener('dblclick', () => {
            initFlowField();
        });

        window.addEventListener('resize', resize);

        // タッチ対応
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            mouse.x = touch.clientX - rect.left;
            mouse.y = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 初期化
        resize();
        initParticles();
        animate();
    </script>
</body>
</html>
