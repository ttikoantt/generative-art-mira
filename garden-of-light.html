<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>光の庭 - Garden of Light</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .waveform-indicator {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .harmony-indicator {
            position: fixed;
            top: 95px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            background: rgba(102, 126, 234, 0.8);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .control-btn:hover {
            transform: scale(1.05);
            background: rgba(102, 126, 234, 1);
        }

        .control-btn.recording {
            background: rgba(239, 68, 68, 0.8);
            animation: pulse 1.5s infinite;
        }

        .control-btn.playing {
            background: rgba(34, 197, 94, 0.8);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .stats {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        .saved-patterns {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }

        .pattern-item {
            background: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pattern-item:hover {
            background: rgba(102, 126, 234, 0.5);
            color: white;
        }

        .pattern-item .delete {
            margin-left: 8px;
            color: rgba(239, 68, 68, 0.8);
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .waveform-indicator, .harmony-indicator {
                font-size: 0.65rem;
                padding: 6px 12px;
            }

            .control-btn {
                padding: 10px 16px;
                font-size: 0.8rem;
            }

            .start-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="info">🌸 タップすると光と音が広がります</div>
    <div class="waveform-indicator">🎵 波形: <span id="waveformName">サイン波</span></div>
    <div class="harmony-indicator">🎶 和音: <span id="chordName">単音</span></div>
    <div class="stats">Ripples: <span id="rippleCount">0</span></div>
    
    <div class="saved-patterns" id="savedPatterns"></div>
    
    <div class="controls">
        <button class="control-btn" id="recordBtn">⏺️ 録画</button>
        <button class="control-btn" id="stopBtn" style="display: none;">⏹️ 停止</button>
        <button class="control-btn" id="saveBtn" style="display: none;">💾 保存</button>
        <button class="control-btn" id="clearBtn">🗑️ クリア</button>
    </div>
    
    <button class="start-btn" id="startBtn">🎵 音をオンにする</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const rippleCountEl = document.getElementById('rippleCount');
        const waveformNameEl = document.getElementById('waveformName');
        const chordNameEl = document.getElementById('chordName');
        const startBtn = document.getElementById('startBtn');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const savedPatternsEl = document.getElementById('savedPatterns');

        let width, height;
        let ripples = [];
        let particles = [];
        let hue = 0;
        let audioCtx = null;
        let audioEnabled = false;

        // Recording state
        let isRecording = false;
        let isPlaying = false;
        let recordedTaps = [];
        let recordingStartTime = 0;
        let playbackTimeout = null;

        // Saved patterns
        let savedPatterns = JSON.parse(localStorage.getItem('gardenPatterns') || '[]');

        const pentatonicScale = [
            261.63, 293.66, 329.63, 392.00, 440.00,
            523.25, 587.33, 659.25, 783.99, 880.00
        ];

        const chords = {
            'major': [0, 4, 7],
            'minor': [0, 3, 7],
            'sus4': [0, 5, 7],
            'sus2': [0, 2, 7],
            'add9': [0, 4, 7, 14],
            'maj7': [0, 4, 7, 11],
            'min7': [0, 3, 7, 10],
            'power': [0, 7],
            'single': [0]
        };

        const chordNames = {
            'major': 'メジャー',
            'minor': 'マイナー',
            'sus4': 'サスペンド4',
            'sus2': 'サスペンド2',
            'add9': 'アド9',
            'maj7': 'メジャー7',
            'min7': 'マイナー7',
            'power': 'パワー',
            'single': '単音'
        };

        const chordTypes = Object.keys(chords);

        const waveformTypes = [
            { type: 'sine', name: 'サイン波', emoji: '〰️', layers: 3, softness: 1.0 },
            { type: 'triangle', name: '三角波', emoji: '📐', layers: 4, softness: 0.8 },
            { type: 'sawtooth', name: 'のこぎり波', emoji: '🪚', layers: 5, softness: 0.6 },
            { type: 'square', name: '矩形波', emoji: '⬛', layers: 6, softness: 0.4 }
        ];

        let currentWaveformIndex = 0;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioEnabled = true;
            startBtn.style.display = 'none';
        }

        function getWaveformFromPosition(x) {
            const index = Math.floor((x / width) * waveformTypes.length);
            return Math.min(index, waveformTypes.length - 1);
        }

        function getChordFromPosition(y) {
            const index = Math.floor((y / height) * chordTypes.length);
            return chordTypes[Math.min(index, chordTypes.length - 1)];
        }

        function playHarmony(noteIndex, chordType, waveformIndex) {
            if (!audioEnabled || !audioCtx) return;

            const baseFreq = pentatonicScale[noteIndex];
            const chord = chords[chordType];
            const waveform = waveformTypes[waveformIndex];

            chord.forEach((interval, i) => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                const filterNode = audioCtx.createBiquadFilter();

                oscillator.connect(filterNode);
                filterNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                const freq = baseFreq * Math.pow(2, interval / 12);
                
                oscillator.type = waveform.type;
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

                filterNode.type = 'lowpass';
                filterNode.frequency.setValueAtTime(2000 + (i * 500), audioCtx.currentTime);
                filterNode.Q.setValueAtTime(1, audioCtx.currentTime);

                const volume = chord.length > 1 ? 0.15 : 0.2;
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);

                oscillator.start(audioCtx.currentTime + i * 0.01);
                oscillator.stop(audioCtx.currentTime + 2);
            });
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = (Math.random() - 0.5) * 4;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.alpha -= this.decay;
                this.rotation += this.rotationSpeed;
                this.size *= 0.99;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;

                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 80%, ${this.alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 60%, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 100%, 40%, 0)`);

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        class Ripple {
            constructor(x, y, waveformIndex, chordType) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.hue = hue % 360;
                this.alpha = 1;
                this.speed = 3;
                this.waveformIndex = waveformIndex;
                this.waveform = waveformTypes[waveformIndex];
                this.chordType = chordType;
                this.chord = chords[chordType];
                this.spawnParticles = true;
                hue += 30;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);

                if (this.spawnParticles && this.radius < this.maxRadius * 0.5) {
                    for (let i = 0; i < 3; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const distance = this.radius + Math.random() * 20;
                        const px = this.x + Math.cos(angle) * distance;
                        const py = this.y + Math.sin(angle) * distance;
                        particles.push(new Particle(px, py, this.hue));
                    }
                }
            }

            draw() {
                const { layers, softness } = this.waveform;
                const noteCount = this.chord.length;
                
                ctx.save();
                ctx.globalAlpha = this.alpha * softness + 0.2;

                for (let n = 0; n < noteCount; n++) {
                    for (let i = 0; i < layers; i++) {
                        const layerOffset = n * 20;
                        const layerRadius = this.radius * (1 - i * 0.1) + layerOffset;
                        const layerAlpha = this.alpha * (1 - i * 0.15) * (1 - n * 0.1);
                        
                        const gradient = ctx.createRadialGradient(
                            this.x, this.y, 0,
                            this.x, this.y, layerRadius
                        );

                        const hue = (this.hue + i * 10 + n * 15) % 360;
                        
                        gradient.addColorStop(0, `hsla(${hue}, 100%, 80%, ${layerAlpha * 0.5})`);
                        gradient.addColorStop(0.3, `hsla(${hue}, 90%, 60%, ${layerAlpha * 0.4})`);
                        gradient.addColorStop(0.6, `hsla(${hue}, 80%, 50%, ${layerAlpha * 0.2})`);
                        gradient.addColorStop(1, `hsla(${hue}, 70%, 40%, 0)`);

                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, layerRadius, 0, Math.PI * 2);
                        ctx.fill();

                        for (let r = 0; r < 3; r++) {
                            const ringRadius = layerRadius * (0.7 + r * 0.1);
                            const ringAlpha = layerAlpha * (1 - r * 0.2);
                            
                            ctx.strokeStyle = `hsla(${hue}, 90%, 70%, ${ringAlpha * 0.8})`;
                            ctx.lineWidth = 1.5;
                            ctx.beginPath();
                            ctx.arc(this.x, this.y, ringRadius, 0, Math.PI * 2);
                            ctx.stroke();
                        }

                        if (Math.random() > 0.95) {
                            const sparkleAngle = Math.random() * Math.PI * 2;
                            const sparkleDist = layerRadius * (0.6 + Math.random() * 0.4);
                            const sx = this.x + Math.cos(sparkleAngle) * sparkleDist;
                            const sy = this.y + Math.sin(sparkleAngle) * sparkleDist;
                            
                            ctx.fillStyle = `hsla(${hue}, 100%, 90%, ${layerAlpha})`;
                            ctx.beginPath();
                            ctx.arc(sx, sy, 2, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }

                ctx.strokeStyle = `hsla(${this.hue}, 80%, 50%, ${this.alpha * 0.4})`;
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 1.15, 0, Math.PI * 2);
                ctx.stroke();

                const centralGradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 0.3
                );
                centralGradient.addColorStop(0, `hsla(${this.hue}, 100%, 90%, ${this.alpha * 0.8})`);
                centralGradient.addColorStop(1, `hsla(${this.hue}, 100%, 70%, 0)`);
                
                ctx.fillStyle = centralGradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        function addRipple(x, y, isPlayback = false) {
            const waveformIndex = getWaveformFromPosition(x);
            const chordType = getChordFromPosition(y);
            const ripple = new Ripple(x, y, waveformIndex, chordType);
            ripples.push(ripple);
            
            const noteIndex = Math.floor((ripple.hue % 360) / 36) % pentatonicScale.length;
            playHarmony(noteIndex, chordType, waveformIndex);

            waveformNameEl.textContent = `${ripple.waveform.emoji} ${ripple.waveform.name}`;
            chordNameEl.textContent = chordNames[chordType];

            // Record tap if recording
            if (isRecording && !isPlayback) {
                const timeOffset = Date.now() - recordingStartTime;
                recordedTaps.push({
                    x: x / width,
                    y: y / height,
                    time: timeOffset
                });
            }

            if (ripples.length > 50) {
                ripples.shift();
            }
        }

        function animate() {
            const time = Date.now() * 0.001;
            const bgHue = (time * 2) % 360;
            ctx.fillStyle = `hsla(${bgHue}, 30%, 5%, 0.15)`;
            ctx.fillRect(0, 0, width, height);

            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return !particle.isDead();
            });

            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            rippleCountEl.textContent = ripples.length;

            requestAnimationFrame(animate);
        }

        function updateSavedPatternsUI() {
            savedPatternsEl.innerHTML = '';
            savedPatterns.forEach((pattern, index) => {
                const item = document.createElement('div');
                item.className = 'pattern-item';
                item.innerHTML = `
                    🎵 パターン ${index + 1} (${pattern.taps.length}タップ)
                    <span class="delete" onclick="event.stopPropagation(); deletePattern(${index})">×</span>
                `;
                item.onclick = () => playPattern(index);
                savedPatternsEl.appendChild(item);
            });
        }

        function playPattern(index) {
            if (isPlaying) return;
            
            const pattern = savedPatterns[index];
            if (!pattern) return;

            isPlaying = true;
            
            pattern.taps.forEach(tap => {
                playbackTimeout = setTimeout(() => {
                    addRipple(tap.x * width, tap.y * height, true);
                }, tap.time);
            });

            setTimeout(() => {
                isPlaying = false;
            }, Math.max(...pattern.taps.map(t => t.time)) + 2000);
        }

        function deletePattern(index) {
            savedPatterns.splice(index, 1);
            localStorage.setItem('gardenPatterns', JSON.stringify(savedPatterns));
            updateSavedPatternsUI();
        }

        // Recording controls
        recordBtn.onclick = () => {
            isRecording = true;
            recordedTaps = [];
            recordingStartTime = Date.now();
            recordBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            recordBtn.classList.add('recording');
        };

        stopBtn.onclick = () => {
            isRecording = false;
            recordBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            saveBtn.style.display = 'block';
            recordBtn.classList.remove('recording');
        };

        saveBtn.onclick = () => {
            if (recordedTaps.length === 0) return;
            
            const pattern = {
                id: Date.now(),
                taps: recordedTaps,
                createdAt: new Date().toISOString()
            };
            
            savedPatterns.push(pattern);
            localStorage.setItem('gardenPatterns', JSON.stringify(savedPatterns));
            updateSavedPatternsUI();
            
            recordedTaps = [];
            saveBtn.style.display = 'none';
        };

        clearBtn.onclick = () => {
            if (confirm('全ての保存されたパターンを削除しますか？')) {
                savedPatterns = [];
                localStorage.setItem('gardenPatterns', '[]');
                updateSavedPatternsUI();
            }
        };

        canvas.addEventListener('click', (e) => {
            addRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                addRipple(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        startBtn.addEventListener('click', initAudio);

        setInterval(() => {
            if (ripples.length < 3 && !isRecording && !isPlaying) {
                const waveformIndex = Math.floor(Math.random() * waveformTypes.length);
                const chordType = chordTypes[Math.floor(Math.random() * chordTypes.length)];
                const x = (waveformIndex / waveformTypes.length) * width + (width / waveformTypes.length / 2);
                const y = Math.random() * height;
                
                const ripple = new Ripple(x, y, waveformIndex, chordType);
                ripples.push(ripple);
                
                if (audioEnabled) {
                    const noteIndex = Math.floor((ripple.hue % 360) / 36) % pentatonicScale.length;
                    playHarmony(noteIndex, chordType, waveformIndex);
                }

                if (ripples.length > 50) {
                    ripples.shift();
                }
            }
        }, 2000);

        updateSavedPatternsUI();
        animate();
    </script>
</body>
</html>
