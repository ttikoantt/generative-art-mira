<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>光の庭 - Garden of Light</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            cursor: pointer;
        }

        .info {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .waveform-indicator {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
        }

        .stats {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translate(-50%, -50%) scale(1.05);
        }

        @media (max-width: 768px) {
            .info {
                font-size: 0.75rem;
                padding: 0 20px;
            }

            .waveform-indicator {
                font-size: 0.65rem;
                padding: 6px 12px;
            }

            .start-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="info">🌸 タップすると光と音が広がります</div>
    <div class="waveform-indicator">🎵 波形: <span id="waveformName">サイン波</span></div>
    <div class="stats">Ripples: <span id="rippleCount">0</span></div>
    <button class="start-btn" id="startBtn">🎵 音をオンにする</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const rippleCountEl = document.getElementById('rippleCount');
        const waveformNameEl = document.getElementById('waveformName');
        const startBtn = document.getElementById('startBtn');

        let width, height;
        let ripples = [];
        let hue = 0;
        let audioCtx = null;
        let audioEnabled = false;

        // Musical scales (pentatonic for harmony)
        const pentatonicScale = [
            261.63,  // C4
            293.66,  // D4
            329.63,  // E4
            392.00,  // G4
            440.00,  // A4
            523.25,  // C5
            587.33,  // D5
            659.25,  // E5
            783.99,  // G5
            880.00   // A5
        ];

        // Waveform types with visual characteristics
        const waveformTypes = [
            { type: 'sine', name: 'サイン波', emoji: '〰️', layers: 3, softness: 1.0 },
            { type: 'triangle', name: '三角波', emoji: '📐', layers: 4, softness: 0.8 },
            { type: 'sawtooth', name: 'のこぎり波', emoji: '🪚', layers: 5, softness: 0.6 },
            { type: 'square', name: '矩形波', emoji: '⬛', layers: 6, softness: 0.4 }
        ];

        let currentWaveformIndex = 0;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioEnabled = true;
            startBtn.style.display = 'none';
        }

        function getWaveformFromPosition(x) {
            // Map X position to waveform type
            const index = Math.floor((x / width) * waveformTypes.length);
            return Math.min(index, waveformTypes.length - 1);
        }

        function playNote(hue, waveformIndex) {
            if (!audioEnabled || !audioCtx) return;

            // Map hue to scale note
            const noteIndex = Math.floor((hue % 360) / 36) % pentatonicScale.length;
            const frequency = pentatonicScale[noteIndex];

            // Create oscillator
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filterNode = audioCtx.createBiquadFilter();

            oscillator.connect(filterNode);
            filterNode.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const waveform = waveformTypes[waveformIndex];
            oscillator.type = waveform.type;
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);

            // Filter to soften harsh waveforms
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(2000, audioCtx.currentTime);
            filterNode.Q.setValueAtTime(1, audioCtx.currentTime);

            // Envelope
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);

            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 1.5);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Ripple {
            constructor(x, y, waveformIndex) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.4;
                this.hue = hue % 360;
                this.alpha = 1;
                this.speed = 3;
                this.waveformIndex = waveformIndex;
                this.waveform = waveformTypes[waveformIndex];
                hue += 30;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
            }

            draw() {
                const { layers, softness } = this.waveform;
                
                ctx.save();
                ctx.globalAlpha = this.alpha * softness + 0.2;

                // Multiple layers based on waveform type
                for (let i = 0; i < layers; i++) {
                    const layerRadius = this.radius * (1 - i * 0.1);
                    const layerAlpha = this.alpha * (1 - i * 0.15);
                    
                    // Glow effect
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, layerRadius
                    );

                    const hue = (this.hue + i * 10) % 360;
                    gradient.addColorStop(0, `hsla(${hue}, 80%, 60%, 0)`);
                    gradient.addColorStop(0.4, `hsla(${hue}, 80%, 60%, ${layerAlpha * 0.3})`);
                    gradient.addColorStop(1, `hsla(${hue}, 80%, 60%, 0)`);

                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, layerRadius, 0, Math.PI * 2);
                    ctx.fill();

                    // Ring
                    ctx.strokeStyle = `hsla(${hue}, 80%, 70%, ${layerAlpha * 0.6})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, layerRadius * 0.8, 0, Math.PI * 2);
                    ctx.stroke();
                }

                // Outer glow ring
                ctx.strokeStyle = `hsla(${this.hue}, 80%, 50%, ${this.alpha * 0.3})`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 1.1, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        function addRipple(x, y) {
            const waveformIndex = getWaveformFromPosition(x);
            const ripple = new Ripple(x, y, waveformIndex);
            ripples.push(ripple);
            playNote(ripple.hue, waveformIndex);

            // Update waveform indicator
            waveformNameEl.textContent = `${ripple.waveform.emoji} ${ripple.waveform.name}`;

            if (ripples.length > 50) {
                ripples.shift();
            }
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            rippleCountEl.textContent = ripples.length;

            requestAnimationFrame(animate);
        }

        // Mouse/Touch events
        canvas.addEventListener('click', (e) => {
            addRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                addRipple(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        // Start button
        startBtn.addEventListener('click', initAudio);

        // Auto ripple with varying waveforms
        setInterval(() => {
            if (ripples.length < 3) {
                const waveformIndex = Math.floor(Math.random() * waveformTypes.length);
                const x = (waveformIndex / waveformTypes.length) * width + (width / waveformTypes.length / 2);
                const y = Math.random() * height;
                
                const ripple = new Ripple(x, y, waveformIndex);
                ripples.push(ripple);
                if (audioEnabled) {
                    playNote(ripple.hue, waveformIndex);
                }

                if (ripples.length > 50) {
                    ripples.shift();
                }
            }
        }, 2000);

        // Start
        animate();
    </script>
</body>
</html>
