<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Wave Art - Mira</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #canvas {
            display: block;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">全画面</button>
    <div class="info">Quantum Wave Art | Mira | 2026-04-02</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let time = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // 波のパラメータ
        const waves = [
            { frequency: 0.02, amplitude: 50, speed: 0.03, color: 'rgba(255, 100, 150, 0.6)' },
            { frequency: 0.03, amplitude: 40, speed: 0.02, color: 'rgba(100, 200, 255, 0.6)' },
            { frequency: 0.01, amplitude: 60, speed: 0.04, color: 'rgba(150, 255, 150, 0.6)' },
            { frequency: 0.025, amplitude: 45, speed: 0.025, color: 'rgba(255, 200, 100, 0.6)' },
            { frequency: 0.015, amplitude: 55, speed: 0.035, color: 'rgba(200, 100, 255, 0.6)' }
        ];

        // 粒子のパラメータ
        const particles = [];
        const particleCount = 50;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                radius: Math.random() * 3 + 1,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`
            });
        }

        function drawWaves() {
            for (let w = 0; w < waves.length; w++) {
                const wave = waves[w];

                ctx.beginPath();
                ctx.strokeStyle = wave.color;
                ctx.lineWidth = 2;

                for (let x = 0; x < width; x += 2) {
                    const y1 = Math.sin(x * wave.frequency + time * wave.speed) * wave.amplitude;
                    const y2 = Math.cos(x * wave.frequency * 0.5 + time * wave.speed * 0.8) * wave.amplitude * 0.5;
                    const y = height / 2 + y1 + y2;

                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();

                // 反射波（上部）
                ctx.beginPath();
                ctx.strokeStyle = wave.color.replace('0.6', '0.3');

                for (let x = 0; x < width; x += 2) {
                    const y1 = Math.sin(x * wave.frequency + time * wave.speed + Math.PI) * wave.amplitude * 0.7;
                    const y2 = Math.cos(x * wave.frequency * 0.5 + time * wave.speed * 0.8) * wave.amplitude * 0.35;
                    const y = height / 2 + y1 + y2;

                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.stroke();
            }
        }

        function drawParticles() {
            for (let p of particles) {
                // 更新位置
                p.x += p.vx;
                p.y += p.vy;

                // 境界チェック
                if (p.x < 0) p.x = width;
                if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height;
                if (p.y > height) p.y = 0;

                // 波の影響
                for (let wave of waves) {
                    const waveY = Math.sin(p.x * wave.frequency + time * wave.speed) * wave.amplitude;
                    const dist = Math.abs(p.y - (height / 2 + waveY));
                    if (dist < 50) {
                        p.vy += (height / 2 + waveY - p.y) * 0.001;
                    }
                }

                // 描画
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();

                // グロー効果
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 3);
                gradient.addColorStop(0, p.color.replace('60%', '60%, 0.3'));
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        function drawInterference() {
            // 干渉パターン
            ctx.globalAlpha = 0.1;

            for (let i = 0; i < 3; i++) {
                const cx = width * (0.3 + i * 0.2);
                const cy = height / 2 + Math.sin(time * 0.02 + i) * 100;

                for (let r = 0; r < 200; r += 10) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, r + Math.sin(time * 0.05 + r * 0.05) * 20, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsl(${(time * 10 + r + i * 60) % 360}, 70%, 60%)`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            ctx.globalAlpha = 1;
        }

        function animate() {
            // 背景をフェード
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 干渉パターン
            drawInterference();

            // 波を描画
            drawWaves();

            // 粒子を描画
            drawParticles();

            time++;
            requestAnimationFrame(animate);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // タッチ操作
        let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            const deltaY = e.touches[0].clientY - touchStartY;
            for (let wave of waves) {
                wave.amplitude += deltaY * 0.1;
                wave.amplitude = Math.max(20, Math.min(100, wave.amplitude));
            }
            touchStartY = e.touches[0].clientY;
        });

        // タップでパーティクル追加
        canvas.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: e.clientX + (Math.random() - 0.5) * 50,
                    y: e.clientY + (Math.random() - 0.5) * 50,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    radius: Math.random() * 3 + 1,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                });
            }

            // パーティクル数制限
            while (particles.length > 100) {
                particles.shift();
            }
        });

        animate();
    </script>
</body>
</html>
