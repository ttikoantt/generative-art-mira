<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandala Patterns - ジェネレーティブ・マンダラ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .subtitle {
            font-size: 1.1em;
            color: #a0a0a0;
            margin-bottom: 20px;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background: #000;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.9em;
            color: #a0a0a0;
        }

        input[type="range"] {
            width: 150px;
            accent-color: #48dbfb;
        }

        button {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            max-width: 600px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .canvas-container {
                width: 100%;
                max-width: 350px;
            }

            canvas {
                width: 100%;
                height: auto;
            }

            .controls {
                gap: 10px;
            }

            input[type="range"] {
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <h1>🕉️ Mandala Patterns</h1>
    <p class="subtitle">対称的な幾何学模様を生成</p>

    <div class="canvas-container">
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>セグメント数: <span id="segmentValue">8</span></label>
            <input type="range" id="segments" min="3" max="16" value="8">
        </div>
        <div class="control-group">
            <label>レイヤー数: <span id="layerValue">5</span></label>
            <input type="range" id="layers" min="2" max="10" value="5">
        </div>
        <div class="control-group">
            <label>複雑さ: <span id="complexValue">3</span></label>
            <input type="range" id="complexity" min="1" max="6" value="3">
        </div>
        <button id="generate">新しいマンダラ</button>
        <button id="fullscreen">全画面表示</button>
    </div>

    <p class="info">スライダーを調整して「新しいマンダラ」をクリック</p>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const segmentSlider = document.getElementById('segments');
        const layerSlider = document.getElementById('layers');
        const complexSlider = document.getElementById('complexity');
        const generateBtn = document.getElementById('generate');
        const fullscreenBtn = document.getElementById('fullscreen');

        let segments = parseInt(segmentSlider.value);
        let layers = parseInt(layerSlider.value);
        let complexity = parseInt(complexSlider.value);

        // Update slider value displays
        segmentSlider.addEventListener('input', () => {
            segments = parseInt(segmentSlider.value);
            document.getElementById('segmentValue').textContent = segments;
        });

        layerSlider.addEventListener('input', () => {
            layers = parseInt(layerSlider.value);
            document.getElementById('layerValue').textContent = layers;
        });

        complexSlider.addEventListener('input', () => {
            complexity = parseInt(complexSlider.value);
            document.getElementById('complexValue').textContent = complexity;
        });

        // Color palettes
        const palettes = [
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'],
            ['#a55eea', '#5f27cd', '#341f97', '#fd79a8', '#e84393'],
            ['#00b894', '#00cec9', '#0984e3', '#6c5ce7', '#fdcb6e'],
            ['#e17055', '#d63031', '#fdcb6e', '#00b894', '#74b9ff'],
            ['#ff7675', '#fd79a8', '#a29bfe', '#74b9ff', '#55efc4']
        ];

        function getRandomColor(palette) {
            return palette[Math.floor(Math.random() * palette.length)];
        }

        function drawMandala() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.min(centerX, centerY) - 20;

            const palette = palettes[Math.floor(Math.random() * palettes.length)];

            // Draw layers
            for (let layer = layers; layer >= 1; layer--) {
                const layerRadius = (maxRadius / layers) * layer;

                for (let segment = 0; segment < segments; segment++) {
                    const angle1 = (segment * 2 * Math.PI) / segments;
                    const angle2 = ((segment + 1) * 2 * Math.PI) / segments;

                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(angle1);

                    // Draw segment
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    
                    const prevRadius = (maxRadius / layers) * (layer - 1);
                    
                    // Create curved outer edge
                    const curveDepth = layerRadius * 0.1 * complexity;
                    ctx.quadraticCurveTo(
                        Math.cos(angle2 - angle1) * (layerRadius + curveDepth),
                        Math.sin(angle2 - angle1) * (layerRadius + curveDepth),
                        Math.cos(angle2 - angle1) * layerRadius,
                        Math.sin(angle2 - angle1) * layerRadius
                    );

                    // Draw inner details
                    for (let detail = 0; detail < complexity; detail++) {
                        const detailRadius = prevRadius + (layerRadius - prevRadius) * ((detail + 1) / (complexity + 1));
                        const detailSize = (detailRadius - prevRadius) * 0.3;

                        ctx.beginPath();
                        ctx.arc(detailRadius, 0, detailSize, 0, Math.PI * 2);
                        ctx.fillStyle = getRandomColor(palette);
                        ctx.globalAlpha = 0.7;
                        ctx.fill();
                    }

                    ctx.globalAlpha = 0.6;
                    ctx.fillStyle = getRandomColor(palette);
                    ctx.fill();
                    ctx.globalAlpha = 1;

                    ctx.strokeStyle = getRandomColor(palette);
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    ctx.restore();
                }
            }

            // Center decoration
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15, 0, Math.PI * 2);
            ctx.fillStyle = palette[0];
            ctx.fill();
            ctx.strokeStyle = palette[1];
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        generateBtn.addEventListener('click', drawMandala);

        fullscreenBtn.addEventListener('click', () => {
            if (canvas.requestFullscreen) {
                canvas.requestFullscreen();
            } else if (canvas.webkitRequestFullscreen) {
                canvas.webkitRequestFullscreen();
            } else if (canvas.msRequestFullscreen) {
                canvas.msRequestFullscreen();
            }
        });

        // Initial draw
        drawMandala();
    </script>
</body>
</html>
