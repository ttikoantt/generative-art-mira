<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaleidoscope Dreams - ミラのジェネレーティブアート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            margin-bottom: 20px;
        }

        #kaleidoscope {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 245, 255, 0.3);
            cursor: pointer;
            touch-action: none;
        }

        .fullscreen-btn {
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            border: none;
            color: white;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fullscreen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 245, 255, 0.5);
        }

        .fullscreen-btn:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            max-width: 600px;
            text-align: center;
        }

        .info h2 {
            margin-bottom: 10px;
            color: #00f5ff;
        }

        .info p {
            color: #ccc;
            line-height: 1.6;
        }

        /* 全画面表示時 */
        #kaleidoscope.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            z-index: 9999;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .fullscreen-btn {
                padding: 12px 24px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Kaleidoscope Dreams</h1>
        <p class="subtitle">インタラクティブ万華鏡アート</p>

        <div id="canvas-container">
            <canvas id="kaleidoscope"></canvas>
        </div>

        <button class="fullscreen-btn" onclick="toggleFullscreen()">
            <span>🖥️</span>
            <span>全画面表示</span>
        </button>

        <div class="info">
            <h2>🎨 遊び方</h2>
            <p>
                キャンバスをタップ/クリックすると、新しいパターンが生成されます。<br>
                マウスを動かすと、パターンが回転します。<br>
                美しい幾何学的パターンをお楽しみください！
            </p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        let isFullscreen = false;

        // キャンバスサイズ設定
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            const size = Math.min(container.offsetWidth, container.offsetHeight);
            canvas.width = size;
            canvas.height = size;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // パターン生成の設定
        let segments = 12;
        let rotation = 0;
        let mousePos = { x: 0, y: 0 };
        let autoRotate = true;
        let pattern = [];

        // 色パレット
        const palettes = [
            ['#00f5ff', '#ff00ff', '#ffeb3b', '#ff5722', '#9c27b0'],
            ['#4fc3f7', '#81c784', '#ffb74d', '#e57373', '#ba68c8'],
            ['#00bcd4', '#ff4081', '#ffc107', '#76ff03', '#e040fb'],
            ['#00e5ff', '#ff6e40', '#ffd740', '#69f0ae', '#ff4081']
        ];
        let currentPalette = 0;

        // パターンを生成
        function generatePattern() {
            pattern = [];
            const numShapes = 8 + Math.floor(Math.random() * 8);
            const palette = palettes[currentPalette];

            for (let i = 0; i < numShapes; i++) {
                pattern.push({
                    type: Math.floor(Math.random() * 3),
                    x: Math.random() * 0.5,
                    y: Math.random() * 0.5,
                    size: 0.05 + Math.random() * 0.15,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    rotation: Math.random() * Math.PI * 2,
                    rotationSpeed: (Math.random() - 0.5) * 0.02
                });
            }

            currentPalette = (currentPalette + 1) % palettes.length;
        }

        // セグメントを描画
        function drawSegment() {
            pattern.forEach(shape => {
                ctx.save();
                ctx.translate(shape.x * canvas.width, shape.y * canvas.height);
                ctx.rotate(shape.rotation);

                ctx.fillStyle = shape.color;
                ctx.globalAlpha = 0.7;

                const size = shape.size * canvas.width;

                switch (shape.type) {
                    case 0: // 円
                        ctx.beginPath();
                        ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 1: // 四角形
                        ctx.fillRect(-size / 2, -size / 2, size, size);
                        break;
                    case 2: // 三角形
                        ctx.beginPath();
                        ctx.moveTo(0, -size / 2);
                        ctx.lineTo(size / 2, size / 2);
                        ctx.lineTo(-size / 2, size / 2);
                        ctx.closePath();
                        ctx.fill();
                        break;
                }

                ctx.restore();
            });
        }

        // 万華鏡を描画
        function draw() {
            // 背景をクリア
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 中心に移動
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            // 各セグメントを描画
            for (let i = 0; i < segments; i++) {
                ctx.save();
                ctx.rotate((Math.PI * 2 / segments) * i + rotation);

                if (i % 2 === 0) {
                    drawSegment();
                } else {
                    ctx.scale(-1, 1);
                    drawSegment();
                }

                ctx.restore();
            }

            ctx.restore();

            // 回転を更新
            if (autoRotate) {
                rotation += 0.005;
            } else {
                rotation += (mousePos.x / canvas.width - 0.5) * 0.05;
            }

            // シェイプの回転を更新
            pattern.forEach(shape => {
                shape.rotation += shape.rotationSpeed;
            });

            requestAnimationFrame(draw);
        }

        // タップ/クリックで新しいパターン
        canvas.addEventListener('click', () => {
            generatePattern();
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            generatePattern();
        });

        // マウス移動で回転
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mousePos.x = e.clientX - rect.left;
            mousePos.y = e.clientY - rect.top;
            autoRotate = false;
        });

        canvas.addEventListener('mouseleave', () => {
            autoRotate = true;
        });

        // 全画面表示切り替え
        function toggleFullscreen() {
            isFullscreen = !isFullscreen;
            canvas.classList.toggle('fullscreen', isFullscreen);

            if (isFullscreen) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                document.querySelector('.fullscreen-btn').innerHTML = '<span>✕</span><span>全画面を閉じる</span>';
            } else {
                resizeCanvas();
                document.querySelector('.fullscreen-btn').innerHTML = '<span>🖥️</span><span>全画面表示</span>';
            }
        }

        // ESCキーで全画面を閉じる
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isFullscreen) {
                toggleFullscreen();
            }
        });

        // 初期パターン生成と描画開始
        generatePattern();
        draw();
    </script>
</body>
</html>
