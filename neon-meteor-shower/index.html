<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Meteor Shower - 流星アート</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0.8;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            font-size: 14px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="title">✨ Neon Meteor Shower</div>
    <div class="stats" id="stats"></div>
    <button class="fullscreen-btn" id="fullscreenBtn">全画面表示</button>
    <div class="info">タップで新しい流星を生成</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');

        let width, height;
        let meteors = [];
        let stars = [];
        let lastTime = 0;

        // ネオンカラーパレット
        const neonColors = [
            '#ff00ff', // マゼンタ
            '#00ffff', // シアン
            '#ff0080', // ピンク
            '#80ff00', // ライム
            '#ff8000', // オレンジ
            '#8000ff', // パープル
            '#00ff80', // ミント
            '#ff0040', // レッドピンク
        ];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 星を生成
        function createStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random(),
                    twinkleSpeed: Math.random() * 0.02 + 0.01
                });
            }
        }

        // 流星クラス
        class Meteor {
            constructor(x, y, isInteractive = false) {
                this.x = x || Math.random() * width;
                this.y = y || -50;
                this.length = Math.random() * 80 + 40;
                this.speed = Math.random() * 8 + 6;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.4;
                this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                this.opacity = 1;
                this.width = Math.random() * 3 + 2;
                this.isInteractive = isInteractive;
                this.particles = [];
                this.life = 1;
                this.decay = Math.random() * 0.005 + 0.002;
            }

            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // パーティクルを生成
                if (Math.random() < 0.3) {
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2,
                        size: Math.random() * 3 + 1,
                        opacity: 1,
                        color: this.color
                    });
                }

                // パーティクル更新
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.opacity -= 0.02;
                    return p.opacity > 0;
                });

                this.life -= this.decay;

                return this.life > 0 && this.y < height + 100;
            }

            draw() {
                // パーティクル描画
                this.particles.forEach(p => {
                    ctx.save();
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                // 流星描画
                const endX = this.x - Math.cos(this.angle) * this.length;
                const endY = this.y - Math.sin(this.angle) * this.length;

                const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');

                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.width;
                ctx.lineCap = 'round';
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.moveTo(endX, endY);
                ctx.lineTo(this.x, this.y);
                ctx.stroke();
                ctx.restore();
            }
        }

        // 星を描画
        function drawStars(time) {
            stars.forEach(star => {
                const twinkle = Math.sin(time * star.twinkleSpeed) * 0.3 + 0.7;
                ctx.save();
                ctx.globalAlpha = star.brightness * twinkle;
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // 背景のグラデーション描画
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 自動的に流星を生成
        function spawnMeteor() {
            if (Math.random() < 0.03) {
                meteors.push(new Meteor());
            }
        }

        // メインループ
        function animate(time) {
            const deltaTime = time - lastTime;
            lastTime = time;

            drawBackground();
            drawStars(time);

            // 流星更新・描画
            meteors = meteors.filter(meteor => {
                const alive = meteor.update();
                if (alive) {
                    meteor.draw();
                }
                return alive;
            });

            spawnMeteor();

            statsEl.textContent = `流星: ${meteors.length} | 星: ${stars.length}`;

            requestAnimationFrame(animate);
        }

        // タップで新しい流星を生成
        function createInteractiveMeteor(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    meteors.push(new Meteor(x + (Math.random() - 0.5) * 50, y - 50, true));
                }, i * 100);
            }
        }

        canvas.addEventListener('click', createInteractiveMeteor);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createInteractiveMeteor({
                clientX: touch.clientX,
                clientY: touch.clientY
            });
        });

        // 全画面表示
        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // 初期化
        window.addEventListener('resize', () => {
            resize();
            createStars();
        });

        resize();
        createStars();
        animate(0);

        // 最初の流星をいくつか生成
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                meteors.push(new Meteor());
            }, i * 500);
        }
    </script>
</body>
</html>
