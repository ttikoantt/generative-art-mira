<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raindrop Ripples - Interactive Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a1a2a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            cursor: pointer;
            touch-action: none;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
        }

        .controls button {
            background: rgba(100, 150, 255, 0.2);
            border: 1px solid rgba(100, 150, 255, 0.4);
            color: #aaccff;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .controls button:hover {
            background: rgba(100, 150, 255, 0.4);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
        }

        .controls button.active {
            background: rgba(150, 200, 255, 0.4);
            box-shadow: 0 0 25px rgba(100, 150, 255, 0.6);
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(150, 200, 255, 0.6);
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
        }

        #fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="info">
        <div>🌧️ Raindrop Ripples</div>
        <div id="rippleCount">Ripples: 0</div>
    </div>

    <div class="controls">
        <button id="autoRain" class="active">🌧️ Auto Rain</button>
        <button id="clearRipples">🧹 Clear</button>
    </div>

    <button id="fullscreen" class="controls">⛶ Fullscreen</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const rippleCountEl = document.getElementById('rippleCount');
        const autoRainBtn = document.getElementById('autoRain');
        const clearBtn = document.getElementById('clearRipples');
        const fullscreenBtn = document.getElementById('fullscreen');

        let ripples = [];
        let autoRain = true;
        let hue = 200;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.random() * 150 + 100;
                this.alpha = 1;
                this.hue = hue;
                this.lineWidth = Math.random() * 3 + 1;
                this.speed = Math.random() * 2 + 1;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.alpha > 0;
            }

            draw() {
                ctx.save();
                
                // Main ripple
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();

                // Secondary ripple (echo)
                if (this.radius > 20) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 20, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue + 20}, 60%, 50%, ${this.alpha * 0.5})`;
                    ctx.lineWidth = this.lineWidth * 0.5;
                    ctx.stroke();
                }

                // Inner glow
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 70%, ${this.alpha * 0.1})`);
                gradient.addColorStop(1, `hsla(${this.hue}, 80%, 70%, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                ctx.restore();
            }
        }

        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));
            hue = (hue + 15) % 360;
            rippleCountEl.textContent = `Ripples: ${ripples.length}`;
        }

        function animate() {
            // Fade effect
            ctx.fillStyle = 'rgba(10, 10, 26, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                const alive = ripple.update();
                if (alive) {
                    ripple.draw();
                }
                return alive;
            });

            rippleCountEl.textContent = `Ripples: ${ripples.length}`;

            // Auto rain
            if (autoRain && Math.random() < 0.03) {
                createRipple(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                );
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            createRipple(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                createRipple(touch.clientX, touch.clientY);
            }
        });

        autoRainBtn.addEventListener('click', () => {
            autoRain = !autoRain;
            autoRainBtn.classList.toggle('active', autoRain);
        });

        clearBtn.addEventListener('click', () => {
            ripples = [];
            ctx.fillStyle = 'rgba(10, 10, 26, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        fullscreenBtn.addEventListener('click', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else {
                document.documentElement.requestFullscreen();
            }
        });

        // Start
        animate();
    </script>
</body>
</html>
