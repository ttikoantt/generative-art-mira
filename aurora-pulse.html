<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Pulse - オーロラ・パルス</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #0a0a1a, #1a0a2e, #0a0a1a);
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .ui-overlay h1 {
            font-size: 18px;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ui-overlay p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: #00ffff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            pointer-events: auto;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .ui-overlay {
                top: 10px;
                left: 10px;
            }

            .ui-overlay h1 {
                font-size: 16px;
            }

            .fullscreen-btn {
                bottom: 10px;
                right: 10px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <h1>Aurora Pulse</h1>
        <p>Tap or click to create waves</p>
    </div>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let waves = [];
        let hue = 0;
        let mouseX = width / 2;
        let mouseY = height / 2;

        // オーロラの波クラス
        class AuroraWave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height) * 0.8;
                this.hue = (hue + Math.random() * 60) % 360;
                this.speed = 2 + Math.random() * 2;
                this.alpha = 1;
                this.thickness = 3 + Math.random() * 5;
                this.decay = 0.002 + Math.random() * 0.002;
            }

            update() {
                this.radius += this.speed;
                this.alpha -= this.decay;
                this.speed *= 0.998; // 徐々に減速
            }

            draw() {
                if (this.alpha <= 0) return;

                // グロー効果（複数のストローク）
                for (let i = 3; i >= 0; i--) {
                    const glowAlpha = this.alpha * (0.2 - i * 0.04);
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + i * 8, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${this.hue}, 100%, 60%, ${glowAlpha})`;
                    ctx.lineWidth = this.thickness;
                    ctx.stroke();
                }

                // メインリング
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 70%, ${this.alpha})`;
                ctx.lineWidth = this.thickness;
                ctx.stroke();

                // 内側のハイライト
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius - 2, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 100%, 85%, ${this.alpha * 0.8})`;
                ctx.lineWidth = this.thickness * 0.5;
                ctx.stroke();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            createWave(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let touch of e.touches) {
                createWave(touch.clientX, touch.clientY);
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        function createWave(x, y) {
            waves.push(new AuroraWave(x, y));
            hue = (hue + 30) % 360;
        }

        // 自動的に波を生成
        setInterval(() => {
            const x = Math.random() * width;
            const y = Math.random() * height;
            createWave(x, y);
        }, 2000);

        function animate() {
            // トレイルエフェクト
            ctx.fillStyle = 'rgba(10, 10, 26, 0.03)';
            ctx.fillRect(0, 0, width, height);

            // 波を更新・描画
            waves = waves.filter(wave => {
                wave.update();
                wave.draw();
                return !wave.isDead();
            });

            hue = (hue + 0.2) % 360;

            requestAnimationFrame(animate);
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // フルスクリーン切り替え
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 初期波を生成
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                createWave(width / 2, height / 2);
            }, i * 500);
        }

        animate();
    </script>
</body>
</html>
