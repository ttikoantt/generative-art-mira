<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>リサージュ・ハーモニー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #canvas {
            display: block;
            max-width: 100%;
            max-height: 100vh;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        .controls button {
            padding: 10px 20px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <div>リサージュ・ハーモニー</div>
        <div id="params"></div>
    </div>
    <div class="controls">
        <button onclick="toggleFullscreen()">全画面</button>
        <button onclick="resetAnimation()">リセット</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const paramsDiv = document.getElementById('params');

        let width, height, centerX, centerY;
        let time = 0;
        let animationId;
        let curves = [];

        // 複数のリサージュ曲線を定義
        function initCurves() {
            curves = [];
            for (let i = 0; i < 5; i++) {
                curves.push({
                    a: 2 + i,
                    b: 3 + i * 0.7,
                    delta: Math.PI / 4 * (i + 1),
                    speed: 0.005 + i * 0.002,
                    hue: (i * 60 + Math.random() * 30) % 360,
                    amplitude: 0.4 + Math.random() * 0.3
                });
            }
        }

        function resize() {
            const size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
            width = canvas.width = size * window.devicePixelRatio;
            height = canvas.height = size * window.devicePixelRatio;
            centerX = width / 2;
            centerY = height / 2;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
        }

        function drawLissajous(a, b, delta, hue, amplitude) {
            ctx.beginPath();
            ctx.strokeStyle = `hsla(${hue}, 70%, 60%, 0.6)`;
            ctx.lineWidth = 2;

            const scale = Math.min(width, height) * amplitude * 0.45;
            const points = 1000;

            for (let i = 0; i <= points; i++) {
                const t = (i / points) * Math.PI * 2;
                const x = centerX + scale * Math.sin(a * t + delta);
                const y = centerY + scale * Math.sin(b * t);

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();

            // 光る効果を追加
            ctx.beginPath();
            ctx.strokeStyle = `hsla(${hue}, 100%, 70%, 0.2)`;
            ctx.lineWidth = 6;
            for (let i = 0; i <= points; i += 10) {
                const t = (i / points) * Math.PI * 2;
                const x = centerX + scale * Math.sin(a * t + delta);
                const y = centerY + scale * Math.sin(b * t);

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
        }

        function draw() {
            // 背景を少し残してトレイル効果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);

            // すべての曲線を描画
            curves.forEach((curve, index) => {
                const delta = curve.delta + time * curve.speed;
                const hue = (curve.hue + time * 5) % 360;
                drawLissajous(curve.a, curve.b, delta, hue, curve.amplitude);
            });

            // パラメータ表示を更新
            const mainCurve = curves[0];
            paramsDiv.textContent = `a=${mainCurve.a.toFixed(1)} b=${mainCurve.b.toFixed(1)} δ=${((mainCurve.delta + time * mainCurve.speed) % (Math.PI * 2)).toFixed(2)}`;

            time += 1;
            animationId = requestAnimationFrame(draw);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                canvas.requestFullscreen().catch(err => {
                    console.log('Fullscreen error:', err);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function resetAnimation() {
            time = 0;
            initCurves();
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
        }

        // 初期化
        window.addEventListener('resize', resize);
        resize();
        initCurves();
        draw();
    </script>
</body>
</html>
