<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イースターエッグ・ジェネレーター</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 50%, #f9ca24 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 {
            color: #2d3436;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .subtitle {
            color: #636e72;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1rem;
        }

        .canvas-container {
            position: relative;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }

        canvas {
            border-radius: 15px;
            cursor: pointer;
            display: block;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(116, 185, 255, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(116, 185, 255, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #fab1a0 0%, #e17055 100%);
            box-shadow: 0 4px 15px rgba(250, 177, 160, 0.4);
        }

        button.secondary:hover {
            box-shadow: 0 6px 20px rgba(250, 177, 160, 0.6);
        }

        .info {
            background: rgba(255,255,255,0.9);
            padding: 15px 25px;
            border-radius: 15px;
            color: #2d3436;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }

            canvas {
                max-width: 100%;
            }

            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <h1>🐰 イースターエッグ・ジェネレーター 🌷</h1>
    <p class="subtitle">Click to place eggs | Generate random colorful eggs</p>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <button id="generateBtn">🎨 Generate New</button>
        <button id="clearBtn" class="secondary">🗑️ Clear All</button>
        <button id="downloadBtn" class="secondary">💾 Download</button>
    </div>

    <div class="info">
        <p id="eggCount">Eggs: 0 | Click on canvas to add eggs!</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const generateBtn = document.getElementById('generateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const eggCountEl = document.getElementById('eggCount');

        // Canvas size
        const width = Math.min(800, window.innerWidth - 80);
        const height = Math.min(600, window.innerHeight - 300);
        canvas.width = width;
        canvas.height = height;

        let eggs = [];

        // Spring colors
        const colors = [
            '#fab1a0', '#ffeaa7', '#81ecec', '#74b9ff',
            '#a29bfe', '#fd79a8', '#00b894', '#fdcb6e',
            '#e17055', '#d63031', '#0984e3', '#6c5ce7',
            '#00cec9', '#e84393', '#ff7675', '#55efc4'
        ];

        const patterns = ['dots', 'stripes', 'solid', 'gradient', 'swirl'];

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function getRandomPattern() {
            return patterns[Math.floor(Math.random() * patterns.length)];
        }

        function drawEgg(x, y, size) {
            const color1 = getRandomColor();
            const color2 = getRandomColor();
            const pattern = getRandomPattern();

            ctx.save();
            ctx.translate(x, y);

            // Egg shape
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.7, size, 0, 0, Math.PI * 2);
            ctx.closePath();

            // Shadow
            ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetX = 5;
            ctx.shadowOffsetY = 5;

            // Fill based on pattern
            switch (pattern) {
                case 'solid':
                    ctx.fillStyle = color1;
                    ctx.fill();
                    break;

                case 'gradient':
                    const gradient = ctx.createRadialGradient(-size * 0.3, -size * 0.3, 0, 0, 0, size);
                    gradient.addColorStop(0, color1);
                    gradient.addColorStop(1, color2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                    break;

                case 'dots':
                    ctx.fillStyle = color1;
                    ctx.fill();
                    // Add dots
                    for (let i = 0; i < 8; i++) {
                        const dotX = (Math.random() - 0.5) * size;
                        const dotY = (Math.random() - 0.5) * size * 1.5;
                        const dotSize = size * 0.05 + Math.random() * size * 0.1;
                        ctx.beginPath();
                        ctx.arc(dotX, dotY, dotSize, 0, Math.PI * 2);
                        ctx.fillStyle = color2;
                        ctx.fill();
                    }
                    break;

                case 'stripes':
                    ctx.fillStyle = color1;
                    ctx.fill();
                    // Add stripes
                    ctx.strokeStyle = color2;
                    ctx.lineWidth = 3;
                    for (let i = 0; i < 5; i++) {
                        ctx.beginPath();
                        const y = (i - 2) * size * 0.25;
                        ctx.moveTo(-size * 0.6, y);
                        ctx.quadraticCurveTo(0, y + Math.sin(i) * 10, size * 0.6, y);
                        ctx.stroke();
                    }
                    break;

                case 'swirl':
                    const swirlGrad = ctx.createLinearGradient(-size, -size, size, size);
                    swirlGrad.addColorStop(0, color1);
                    swirlGrad.addColorStop(0.5, color2);
                    swirlGrad.addColorStop(1, color1);
                    ctx.fillStyle = swirlGrad;
                    ctx.fill();
                    // Add swirl lines
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.lineWidth = 2;
                    for (let j = 0; j < 3; j++) {
                        ctx.beginPath();
                        for (let angle = 0; angle < Math.PI * 4; angle += 0.1) {
                            const r = angle * 5;
                            const x = Math.cos(angle + j * Math.PI * 2 / 3) * r * 0.15;
                            const y = Math.sin(angle + j * Math.PI * 2 / 3) * r * 0.15;
                            if (angle === 0) {
                                ctx.moveTo(x, y);
                            } else {
                                ctx.lineTo(x, y);
                            }
                        }
                        ctx.stroke();
                    }
                    break;
            }

            // Highlight
            ctx.shadowColor = 'transparent';
            ctx.beginPath();
            ctx.ellipse(-size * 0.2, -size * 0.4, size * 0.2, size * 0.15, -0.5, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();

            ctx.restore();
        }

        function addEgg(x, y) {
            const size = 30 + Math.random() * 40;
            eggs.push({ x, y, size, timestamp: Date.now() });
            drawAllEggs();
            updateCount();
        }

        function drawAllEggs() {
            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            // Draw grass background
            ctx.fillStyle = '#a8e6cf';
            ctx.fillRect(0, 0, width, height);

            // Draw grass blades
            ctx.strokeStyle = '#56ab2f';
            ctx.lineWidth = 2;
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * width;
                const y = height;
                const bladeHeight = 10 + Math.random() * 20;
                const sway = Math.sin(Date.now() / 500 + i) * 5;

                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(x + sway, y - bladeHeight / 2, x + sway * 1.5, y - bladeHeight);
                ctx.stroke();
            }

            // Draw flowers
            for (let i = 0; i < 15; i++) {
                const fx = Math.random() * width;
                const fy = height - Math.random() * 50;
                drawFlower(fx, fy);
            }

            // Draw all eggs
            eggs.forEach(egg => {
                drawEgg(egg.x, egg.y, egg.size);
            });
        }

        function drawFlower(x, y) {
            const petalColor = colors[Math.floor(Math.random() * colors.length)];
            const centerColor = '#fdcb6e';

            ctx.save();
            ctx.translate(x, y);

            // Petals
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.ellipse(
                    Math.cos(i * Math.PI * 2 / 5) * 8,
                    Math.sin(i * Math.PI * 2 / 5) * 8,
                    6, 4,
                    i * Math.PI * 2 / 5,
                    0, Math.PI * 2
                );
                ctx.fillStyle = petalColor;
                ctx.fill();
            }

            // Center
            ctx.beginPath();
            ctx.arc(0, 0, 4, 0, Math.PI * 2);
            ctx.fillStyle = centerColor;
            ctx.fill();

            ctx.restore();
        }

        function generateRandom() {
            eggs = [];
            const count = 5 + Math.floor(Math.random() * 8);
            for (let i = 0; i < count; i++) {
                const x = 50 + Math.random() * (width - 100);
                const y = 100 + Math.random() * (height - 200);
                const size = 30 + Math.random() * 40;
                eggs.push({ x, y, size, timestamp: Date.now() });
            }
            drawAllEggs();
            updateCount();
        }

        function clearAll() {
            eggs = [];
            drawAllEggs();
            updateCount();
        }

        function updateCount() {
            eggCountEl.textContent = `🥚 Eggs: ${eggs.length} | Click on canvas to add more!`;
        }

        function download() {
            const link = document.createElement('a');
            link.download = 'easter-eggs.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addEgg(x, y);
        });

        generateBtn.addEventListener('click', generateRandom);
        clearBtn.addEventListener('click', clearAll);
        downloadBtn.addEventListener('click', download);

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            addEgg(x, y);
        });

        // Initial generation
        generateRandom();

        // Animate grass
        setInterval(() => {
            drawAllEggs();
        }, 100);
    </script>
</body>
</html>
