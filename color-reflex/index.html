<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Reflex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 2rem;
            font-weight: bold;
        }

        .question-area {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .color-word {
            font-size: 4rem;
            font-weight: bold;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .instruction {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
        }

        .buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 20px 40px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            min-width: 150px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-yes {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            box-shadow: 0 5px 20px rgba(0, 184, 148, 0.4);
        }

        .btn-no {
            background: linear-gradient(135deg, #e17055 0%, #d63031 100%);
            box-shadow: 0 5px 20px rgba(214, 48, 49, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(10px);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        .game-over.show {
            display: flex;
        }

        .game-over h2 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .game-over p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .color-word {
                font-size: 3rem;
            }

            .btn {
                padding: 15px 30px;
                font-size: 1.1rem;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>
    <button class="fullscreen" id="fullscreenBtn">全画面</button>

    <div class="game-container">
        <h1>🎨 Color Reflex</h1>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">スコア</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">時間</div>
                <div class="stat-value" id="timer">30</div>
            </div>
        </div>

        <div class="question-area">
            <div class="color-word" id="colorWord">準備中...</div>
            <div class="instruction" id="instruction">「文字の色」と「色の名前」が一致しますか？</div>
        </div>

        <div class="buttons">
            <button class="btn btn-yes" id="yesBtn">◯ 一致する</button>
            <button class="btn btn-no" id="noBtn">✗ 一致しない</button>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>⏱️ タイムアップ！</h2>
        <p>最終スコア: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">もう一度プレイ</button>
    </div>

    <script>
        const colors = [
            { name: '赤', color: '#e74c3c' },
            { name: '青', color: '#3498db' },
            { name: '緑', color: '#2ecc71' },
            { name: '黄', color: '#f1c40f' },
            { name: '紫', color: '#9b59b6' },
            { name: 'オレンジ', color: '#e67e22' },
            { name: 'ピンク', color: '#e91e63' },
            { name: '水色', color: '#00bcd4' }
        ];

        let score = 0;
        let timeLeft = 30;
        let currentMatch = false;
        let gameInterval;
        let timerInterval;
        let gameStarted = false;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const colorWordEl = document.getElementById('colorWord');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function generateQuestion() {
            const textColor = getRandomColor();
            const meaningColor = getRandomColor();

            currentMatch = textColor.name === meaningColor.name;

            colorWordEl.style.color = textColor.color;
            colorWordEl.textContent = meaningColor.name;
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            gameStarted = true;

            scoreEl.textContent = score;
            timerEl.textContent = timeLeft;

            generateQuestion();

            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            clearInterval(timerInterval);
            gameStarted = false;
            finalScoreEl.textContent = score;
            gameOverEl.classList.add('show');
        }

        function checkAnswer(userSaidYes) {
            if (!gameStarted) {
                startGame();
                return;
            }

            if (userSaidYes === currentMatch) {
                score++;
                scoreEl.textContent = score;
            } else {
                score = Math.max(0, score - 1);
                scoreEl.textContent = score;
            }

            generateQuestion();
        }

        document.getElementById('yesBtn').addEventListener('click', () => checkAnswer(true));
        document.getElementById('noBtn').addEventListener('click', () => checkAnswer(false));
        document.getElementById('restartBtn').addEventListener('click', () => {
            gameOverEl.classList.remove('show');
            startGame();
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // タッチ操作の改善
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.click();
            });
        });

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                checkAnswer(true);
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                checkAnswer(false);
            }
        });

        // 初期質問
        generateQuestion();
    </script>
</body>
</html>
