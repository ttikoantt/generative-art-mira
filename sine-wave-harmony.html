<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sine Wave Harmony - サイン波の調和</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        canvas {
            display: block;
        }
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        .fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            z-index: 100;
        }
        .fullscreen:hover {
            background: rgba(102, 126, 234, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="info">
        <div>🎨 Sine Wave Harmony</div>
        <div id="waveCount">Waves: 5</div>
    </div>
    
    <button class="fullscreen" onclick="toggleFullscreen()">⛶</button>
    
    <div class="controls">
        <button class="btn" onclick="addWave()">+ Wave</button>
        <button class="btn" onclick="removeWave()">- Wave</button>
        <button class="btn" onclick="randomize()">Randomize</button>
        <button class="btn" onclick="toggleMotion()">Pause/Play</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        
        let waves = [];
        let time = 0;
        let isPaused = false;
        
        // 波のクラス
        class Wave {
            constructor() {
                this.amplitude = 50 + Math.random() * 100;
                this.frequency = 0.005 + Math.random() * 0.015;
                this.speed = 0.02 + Math.random() * 0.03;
                this.phase = Math.random() * Math.PI * 2;
                this.hue = Math.random() * 360;
                this.lineWidth = 1 + Math.random() * 3;
                this.decay = 0.3 + Math.random() * 0.5; // 中心からの距離による減衰
            }
            
            getY(x, t) {
                const distanceFromCenter = Math.abs(x - width / 2);
                const decayFactor = Math.exp(-this.decay * distanceFromCenter / width);
                return Math.sin(x * this.frequency + t * this.speed + this.phase) 
                       * this.amplitude * decayFactor;
            }
        }
        
        // 初期波を生成
        function initWaves(count = 5) {
            waves = [];
            for (let i = 0; i < count; i++) {
                waves.push(new Wave());
            }
            updateWaveCount();
        }
        
        function addWave() {
            if (waves.length < 15) {
                waves.push(new Wave());
                updateWaveCount();
            }
        }
        
        function removeWave() {
            if (waves.length > 1) {
                waves.pop();
                updateWaveCount();
            }
        }
        
        function randomize() {
            waves = [];
            const count = 3 + Math.floor(Math.random() * 8);
            for (let i = 0; i < count; i++) {
                waves.push(new Wave());
            }
            updateWaveCount();
        }
        
        function toggleMotion() {
            isPaused = !isPaused;
        }
        
        function updateWaveCount() {
            document.getElementById('waveCount').textContent = `Waves: ${waves.length}`;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function draw() {
            // 背景をフェード（トレイル効果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            
            // すべての波を合成して描画
            const centerY = height / 2;
            
            // 各波を個別に描画
            waves.forEach((wave, index) => {
                ctx.beginPath();
                const gradient = ctx.createLinearGradient(0, 0, width, 0);
                gradient.addColorStop(0, `hsla(${wave.hue}, 80%, 50%, 0)`);
                gradient.addColorStop(0.5, `hsla(${wave.hue}, 80%, 60%, 0.6)`);
                gradient.addColorStop(1, `hsla(${wave.hue}, 80%, 50%, 0)`);
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = wave.lineWidth;
                
                for (let x = 0; x < width; x++) {
                    const y = centerY + wave.getY(x, time);
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            });
            
            // 合成波を描画（強調）
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.lineWidth = 2;
            
            for (let x = 0; x < width; x += 2) {
                let totalY = 0;
                waves.forEach(wave => {
                    totalY += wave.getY(x, time);
                });
                const avgY = totalY / waves.length;
                const y = centerY + avgY;
                
                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
            
            // 輝くポイントを描画
            for (let x = width * 0.2; x < width * 0.8; x += width * 0.1) {
                let totalY = 0;
                waves.forEach(wave => {
                    totalY += wave.getY(x, time);
                });
                const avgY = totalY / waves.length;
                const y = centerY + avgY;
                
                const intensity = Math.abs(avgY) / 100;
                ctx.beginPath();
                ctx.arc(x, y, 2 + intensity * 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + intensity * 0.5})`;
                ctx.fill();
            }
            
            if (!isPaused) {
                time += 1;
            }
            
            requestAnimationFrame(draw);
        }
        
        // ウィンドウサイズ変更
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        
        // タッチ/クリックで新しい波を追加
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            
            // クリック位置に基づいて新しい波の特性を決定
            const newWave = new Wave();
            newWave.frequency = 0.005 + (x / width) * 0.02;
            newWave.hue = (x / width) * 360;
            
            if (waves.length < 15) {
                waves.push(newWave);
                updateWaveCount();
            }
        });
        
        // 初期化
        initWaves(5);
        draw();
    </script>
</body>
</html>
