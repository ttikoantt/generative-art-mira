<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>リラックスタップ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
            touch-action: manipulation;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
            text-align: center;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
        }
        canvas {
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.3);
            max-width: 90vw;
            max-height: 60vh;
        }
        .score {
            color: white;
            font-size: clamp(1.2rem, 4vw, 2rem);
            margin-top: 20px;
        }
        .info {
            color: rgba(255,255,255,0.6);
            margin-top: 10px;
            text-align: center;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
        }
    </style>
</head>
<body>
    <h1>リラックスタップ</h1>
    <canvas id="canvas" width="400" height="400"></canvas>
    <div class="score">スコア: <span id="score">0</span></div>
    <div class="info">クリック/タップでスタート</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0;
        let gameActive = false;
        let targets = [];

        function resize() {
            const size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.6, 400);
            canvas.width = size;
            canvas.height = size;
        }
        resize();
        window.addEventListener('resize', resize);

        function spawnTarget() {
            const size = Math.random() * 30 + 20;
            targets.push({
                x: Math.random() * (canvas.width - size),
                y: Math.random() * (canvas.height - size),
                size: size,
                hue: Math.random() * 360,
                life: 100
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            targets = targets.filter(t => t.life > 0);
            targets.forEach(t => {
                t.life -= 1;
                const alpha = t.life / 100;
                ctx.fillStyle = `hsla(${t.hue}, 80%, 60%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(t.x + t.size/2, t.y + t.size/2, t.size/2, 0, Math.PI * 2);
                ctx.fill();
            });

            if (gameActive && Math.random() < 0.05) spawnTarget();
            requestAnimationFrame(draw);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            for (let i = targets.length - 1; i >= 0; i--) {
                const t = targets[i];
                const dx = x - (t.x + t.size/2);
                const dy = y - (t.y + t.size/2);
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < t.size/2) {
                    targets.splice(i, 1);
                    score += 10;
                    scoreEl.textContent = score;
                    break;
                }
            }

            if (!gameActive) {
                gameActive = true;
                score = 0;
                scoreEl.textContent = 0;
                targets = [];
                draw();
            }
        });

        draw();
    </script>
</body>
</html>
