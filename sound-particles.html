<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sound Particles - 音と光の粒子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            touch-action: manipulation;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .instructions {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            text-align: center;
        }

        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="title">SOUND PARTICLES</div>
    <div class="instructions">クリックで音と光を創造</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // キャンバスサイズ設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // オーディオコンテキスト
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 音を生成
        function playSound(x, y) {
            initAudio();

            // 位置に基づいて周波数を決定
            const freq = 200 + (x / canvas.width) * 800;
            const volume = 0.3 + (y / canvas.height) * 0.3;

            // オシレーター
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1);
        }

        // 粒子クラス
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.005;
                this.gravity = 0.05;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.life -= this.decay;
                this.size *= 0.99;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 波紋クラス
        class Ripple {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.hue = hue;
                this.radius = 0;
                this.maxRadius = Math.random() * 150 + 100;
                this.life = 1;
                this.speed = Math.random() * 5 + 3;
            }

            update() {
                this.radius += this.speed;
                this.life = 1 - (this.radius / this.maxRadius);
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life * 0.5;
                ctx.strokeStyle = `hsl(${this.hue}, 100%, 60%)`;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 60%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }

        // パーティクルと波紋の配列
        let particles = [];
        let ripples = [];
        let hueCycle = 0;

        // パーティクルを作成
        function createParticles(x, y) {
            hueCycle = (hueCycle + 30) % 360;

            // 粒子を生成
            for (let i = 0; i < 30; i++) {
                particles.push(new Particle(x, y, hueCycle));
            }

            // 波紋を生成
            ripples.push(new Ripple(x, y, hueCycle));

            // 音を再生
            playSound(x, y);
        }

        // アニメーション
        function animate() {
            // 背景を半透明で塗りつぶしてトレイル効果
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 粒子を更新・描画
            particles = particles.filter(p => p.life > 0);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 波紋を更新・描画
            ripples = ripples.filter(r => r.life > 0);
            ripples.forEach(ripple => {
                ripple.update();
                ripple.draw();
            });

            requestAnimationFrame(animate);
        }

        // イベントリスナー
        canvas.addEventListener('click', (e) => {
            createParticles(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createParticles(touch.clientX, touch.clientY);
        });

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            createParticles(x, y);
        });

        // アニメーション開始
        animate();
    </script>
</body>
</html>
